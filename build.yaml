info:
  title: ONDC Protocol API for retail (grocery, f&b)
  domain: ONDC:RET18
  description: ONDC Protocol API specification, which includes statutory requirements for packaged commodities and pre-packaged food This is an adaptation of Beckn Core version 0.9.3
  version: 1.2.0
  x-usecases:
    - HEALTH&WELLNESS
  x-branch-name: draft-RET18-1.2.0
  x-reporting: true
security:
  - SubscriberAuth: []
  - GatewaySubscriberAuth: []
  - GatewaySubscriberAuthNew: []

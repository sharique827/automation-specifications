                  owner: BAP
                  type: enum
                  enums:
                    - code: "*"
                      description: Any city (wildcard)
                      reference: <PR/Issue/Discussion Links md format text>
              _description:
                required: true
                usage: --
                info: This attribute defines the city of location where the transaction is meant to be completed.
                owner: BAP

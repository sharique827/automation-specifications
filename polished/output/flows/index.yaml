flows:
  - type: playground
    id: Buyer_Cancellation_Flow
    usecase: APPLIANCES
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: A buyer initiates the cancellation of a confirmed appliance order on the ONDC network, covering the full purchase lifecycle from item selection and checkout through order confirmation, followed by a buyer-triggered cancellation request and the seller's acknowledgement of that cancellation.
    config:
      $ref: ./APPLIANCES/Buyer_Cancellation_Flow.yaml
  - type: playground
    id: Customization_Input_Text_Flow
    usecase: APPLIANCES
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: This flow exercises the end-to-end purchase journey for an appliance with a text-based customization input, covering buyer-side item selection and order configuration through to seller-side acknowledgement and multi-stage fulfillment status progression. It validates that custom specification details entered by the buyer are correctly propagated and confirmed across the ONDC transaction lifecycle from select through final delivery status updates.
    config:
      $ref: ./APPLIANCES/Customization_Input_Text_Flow.yaml
  - type: playground
    id: Delivery_Flow
    usecase: APPLIANCES
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: This flow exercises the end-to-end purchase and home delivery of an appliance on ONDC, covering buyer-side item selection and order initialisation, seller-side order confirmation, progressive fulfillment status updates through to dispatch and delivery, and real-time shipment tracking — validating the complete mandatory delivery lifecycle for the Appliances category under Retail 1.2.5.
    config:
      $ref: ./APPLIANCES/Delivery_Flow.yaml
  - type: playground
    id: Delivery_Flow_With_IGM(v-1.0.0)
    usecase: APPLIANCES
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: End-to-end appliance purchase flow covering buyer-initiated item selection, order initialization, confirmation, and multi-stage fulfillment status tracking, followed by a full Issue and Grievance Management (IGM) lifecycle including issue raising, seller response, and issue re-escalation to ensure post-delivery dispute resolution for high-value appliance orders.
    config:
      $ref: ./APPLIANCES/Delivery_Flow_With_IGM_v-1_0_0_.yaml
  - type: playground
    id: Delivery_Flow_With_IGM(v-2.0.0)
    usecase: APPLIANCES
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: End-to-end appliance purchase and delivery flow covering buyer-initiated product selection, order initialisation, confirmation, and multi-stage fulfilment status tracking, followed by a complete Issue and Grievance Management (IGM) lifecycle — including issue raising, seller/logistics response, and escalation re-filing — in compliance with ONDC retail protocol v1.2.5.
    config:
      $ref: ./APPLIANCES/Delivery_Flow_With_IGM_v-2_0_0_.yaml
  - type: playground
    id: Delivery_Flow_With_IGM_No_Action(v-2.0.0)
    usecase: APPLIANCES
    tags:
      - WORKBENCH
      - MANDATORY
    description: A complete appliance retail delivery transaction that covers buyer-side order placement (select through confirm) and fulfillment status tracking, followed by a multi-round grievance resolution cycle via the Issue & Grievance Management (IGM) protocol — exercising the scenario where issues are raised and responded to across multiple exchanges before the final delivery status is updated.
    config:
      $ref: ./APPLIANCES/Delivery_Flow_With_IGM_No_Action_v-2_0_0_.yaml
  - type: playground
    id: Delivery_Flow_With_IGM_Rejection(v-2.0.0)
    usecase: APPLIANCES
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: A complete appliance delivery transaction flow that covers order selection, initialization, confirmation, and multi-stage fulfillment status tracking, followed by a sequence of IGM (Issue and Grievance Management) dispute cycles where the buyer raises, escalates, and resolves issues — ultimately resulting in IGM rejection — before a final order update closes the transaction.
    config:
      $ref: ./APPLIANCES/Delivery_Flow_With_IGM_Rejection_v-2_0_0_.yaml
  - type: playground
    id: Discovery_Flow_full_catalog
    usecase: APPLIANCES
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: A buyer app broadcasts a search request for home appliances on the ONDC network, and the seller app responds with a full catalog of available appliance listings, enabling end-to-end catalog discovery for the Appliances category under the Retail 1.2.5 specification.
    config:
      $ref: ./APPLIANCES/Discovery_Flow_full_catalog.yaml
  - type: playground
    id: Discovery_Flow_incremental_catalog
    usecase: APPLIANCES
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: Demonstrates incremental catalog discovery for appliances, where a buyer app sends an initial search request and subsequently receives paginated or updated catalog responses via multiple on_search callbacks, followed by a refined search to fetch the latest product listings from the seller side.
    config:
      $ref: ./APPLIANCES/Discovery_Flow_incremental_catalog.yaml
  - type: playground
    id: Discovery_Flow_incremental_catalog_refresh_pull
    usecase: APPLIANCES
    tags:
      - WORKBENCH
    description: A buyer-side network participant initiates an incremental catalog discovery for appliances by issuing a targeted search request, prompting the seller NP to respond with only the updated or newly added catalog entries since the last sync. A subsequent search-and-response cycle confirms the incremental refresh, ensuring the buyer app maintains an up-to-date appliances catalog without fetching the full inventory on each pull.
    config:
      $ref: ./APPLIANCES/Discovery_Flow_incremental_catalog_refresh_pull.yaml
  - type: playground
    id: Force_Cancellation_Flow
    usecase: APPLIANCES
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer places and confirms an appliance order, which then progresses through multiple status updates before being forcefully cancelled mid-fulfillment; the flow validates that the seller-side platform correctly processes the cancellation and issues a final order update reflecting the cancelled state.
    config:
      $ref: ./APPLIANCES/Force_Cancellation_Flow.yaml
  - type: playground
    id: Out_Of_Stock_Flow
    usecase: APPLIANCES
    tags:
      - WORKBENCH
      - MANDATORY
    description: This flow exercises the end-to-end appliance retail purchase journey where a buyer selects an item, receives an out-of-stock signal during quote negotiation, and the order subsequently progresses through confirmation and multiple status updates reflecting the fulfilment lifecycle under the ONDC retail 1.2.5 specification.
    config:
      $ref: ./APPLIANCES/Out_Of_Stock_Flow.yaml
  - type: playground
    id: Out_Of_Stock_Flow(Error-code)
    usecase: APPLIANCES
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: This flow exercises the scenario where a buyer selects an appliance item and the seller network responds indicating that the requested product is currently out of stock, returning an appropriate ONDC error code to signal unavailability during the item selection phase.
    config:
      $ref: ./APPLIANCES/Out_Of_Stock_Flow_Error-code_.yaml
  - type: playground
    id: Purchase_Finance_Flow
    usecase: APPLIANCES
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer selects a financed purchase option for a home appliance, negotiates order terms, and confirms the order through a financing arrangement; the seller subsequently emits a series of status updates tracking the order through fulfillment milestones from acceptance to delivery.
    config:
      $ref: ./APPLIANCES/Purchase_Finance_Flow.yaml
  - type: playground
    id: Return_Flow
    usecase: APPLIANCES
    tags: []
    description: This flow exercises the end-to-end return lifecycle for an appliances purchase on ONDC, beginning with item selection and order confirmation, followed by multiple status updates tracking order fulfillment, and culminating in a return initiation by the buyer with subsequent return processing and acknowledgment updates from the seller.
    config:
      $ref: ./APPLIANCES/Return_Flow.yaml
  - type: playground
    id: SNP_Collecting_Payment_Flow
    usecase: APPLIANCES
    tags:
      - WORKBENCH
      - MANDATORY
    description: A mandatory end-to-end appliances purchase flow in which the Seller Network Participant (SNP) collects payment directly from the buyer, covering item selection, order initialisation with SNP-side payment terms, order confirmation, and the full lifecycle of post-confirmation status updates tracking the order through to fulfilment.
    config:
      $ref: ./APPLIANCES/SNP_Collecting_Payment_Flow.yaml
  - type: playground
    id: Seller_Cancellation_Flow
    usecase: APPLIANCES
    tags:
      - WORKBENCH
      - MANDATORY
    description: This flow exercises the end-to-end lifecycle of a seller-initiated cancellation for an appliances order on the ONDC network, covering order discovery, cart finalisation, and confirmation before the seller triggers a cancellation request, which progresses through a series of order status transitions and culminates in the formal cancellation acknowledgement and a final post-cancellation status update to the buyer.
    config:
      $ref: ./APPLIANCES/Seller_Cancellation_Flow.yaml
  - type: playground
    id: Replacement_Flow
    usecase: APPLIANCES
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: This flow covers the end-to-end replacement lifecycle for an appliance order on ONDC, beginning with item selection and order confirmation, progressing through multiple status updates tracking the original order's fulfilment, and culminating in a replacement request initiation via update calls followed by status tracking of the replacement item's pick-up, processing, and re-delivery to the buyer.
    config:
      $ref: ./APPLIANCES/Replacement_Flow.yaml
  - type: playground
    id: Catalog_Rejection_Flow
    usecase: APPLIANCES
    tags:
      - WORKBENCH
    description: A buyer platform issues a search request for appliances, the seller platform responds with a catalog via on_search, and the network validates and rejects that catalog due to non-compliance or data quality failures, exercising the end-to-end catalog rejection pathway in the ONDC retail 1.2.5 protocol.
    config:
      $ref: ./APPLIANCES/Catalog_Rejection_Flow.yaml

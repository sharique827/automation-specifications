meta:
  use_case_id: ELECTRONICS
attribute_set:
  search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET10
          info: Specifies the domain in which the transaction operates
          owner: BAP
          type: enum
          enums:
            - code: ONDC:RET10
              description: Grocery
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET11
              description: F&B
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET12
              description: Fashion
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET13
              description: BPC
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET14
              description: Electronics
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET15
              description: Appliances
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET16
              description: Home & Kitchen
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET17
              description: Toys & Games
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET18
              description: Agriculture
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET19
              description: Health & Wellness
              reference: <PR/Issue/Discussion Links md format text>
      action:
        _description:
          required: true
          usage: search
          info: Specifies the action being performed in the transaction
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: Specifies the country in which the transaction is occurring
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: "*"
          info: Specifies the city or region of the transaction
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.0
          info: Specifies the ONDC core version being used
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: buyerNP.com
          info: Specifies the ID of the Buyer App participating in the transaction
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://buyerNP.com/ondc
          info: Specifies the URI where the Buyer App is hosted
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: a4b24113-7c05-495b-9249-f33482bf3493
          info: Helps track a specific transaction across ONDC
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 6aae986b-37c2-47d2-a26c-daaf8ccbd764
          info: Used for tracking and logging purposes
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2023-06-03T09:00:00.000Z
          info: Ensures synchronization across different ONDC participants
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Specifies how long the request remains valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: Carries the search transaction context that the BAP populates in the request so the flow can be correlated end to end, and downstream validation checks that this container is present.
        owner: BAP
        type: object
    message:
      intent:
        payment:
          "@ondc/org/buyer_app_finder_fee_type":
            _description:
              required: true
              usage: percent
              info: Indicates whether the fee is a fixed amount or a percentage
              owner: BAP
              type: string
          "@ondc/org/buyer_app_finder_fee_amount":
            _description:
              required: true
              usage: "3"
              info: Represents the value of the fee applied
              owner: BAP
              type: string
          _description:
            required: true
            usage: ""
            info: Payment details the payment terms the BAP includes in search intent so the catalog or order search can be interpreted in the right payment context.
            owner: BAP
            type: object
        fulfillment:
          type:
            _description:
              required: false
              usage: Delivery
              info: Specifies how the order will be fulfilled (e.g., Delivery, Pickup)
              owner: BAP
              type: string
          end:
            location:
              gps:
                _description:
                  required: false
                  usage: 12.974002,77.613458
                  info: Indicates where the item is to be delivered
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: false
                    usage: "560001"
                    info: Specifies the postal code of the delivery location
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        item:
          descriptor['name']:
            _description:
              required: false
              usage: coffee
              info: Specifies the product name in the order
              owner: BAP
              type: string
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The BAP places the user’s search intent here so the BPP can match services to what the buyer wants to buy or avail, and this same intent is checked on the round trip in the search flow. It can also carry buyer-app finder fee details in payment, including the fee type and amount.
          owner: BAP
          type: object
        tags:
          code:
            _description:
              required: true
              usage: bap_terms
              info: Identifier for each intent tag the BAP includes in search to indicate what the tag is carrying, such as discovery metadata for incremental catalog refresh or BAP-specific terms. The same code is checked again during validation, so the search payload and its validator are matching the same tag entry across generation and verification in the flow.
              owner: BAP
              type: string
          list:
            code:
              _description:
                required: true
                usage: static_terms
                info: Code that identifies which search-time intent tag is being sent. The BAP sets it in search, and the same code is then checked in validation so the tag choice stays consistent across the round-trip.
                owner: BAP
                type: string
            value:
              _description:
                required: true
                usage: https://github.com/ONDC-Official/NP-Static-Terms/buyerNP_BNP/1.0/tc.pdf
                info: In search, the BAP uses this tag value to pass a control or reference signal inside the intent tags so the BPP can interpret the discovery request correctly, including incremental catalog refresh behavior when that mode is active. The value may be reused from the saved incremental-search session state, so later search generation can keep the same mode signal consistent.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: Container for the tag list the BAP includes in search to steer discovery and custom-menu lookup; it is assembled in the request, then carried through the search flow as the BAP’s structured way to signal what catalog slice it wants.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: The BAP puts these search tags in the intent to carry discovery qualifiers for the search request, and the same container is later validated in incremental catalog refresh flows to ensure the expected search context is present.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: Top-level envelope the BAP uses to send the select request payload, which the BPP reads to evaluate the buyer’s chosen order details.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET10
          info: Represents the ONDC domain version used in the transaction
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: on_search
          info: Specifies the event type in the ONDC protocol
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: Identifies the country for the transaction
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.0
          info: ONDC core version used
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: buyerNP.com
          info: Unique identifier of the buyer app
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://buyerNP.com/ondc
          info: URL for the buyer app
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: sellerNP.com
          info: Unique identifier of the seller app
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://sellerNP.com/ondc
          info: URL for the seller app
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 7c7aa709-a05e-4ad5-a49d-22bd64282e71
          info: ID used to track the transaction
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: bc167440-16e7-4ba6-9132-9b25518f1da2
          info: ID used for message correlation
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2024-12-23T06:55:45.035Z
          info: Time of the request
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: std:022
          info: Identifies the city
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: Carries the transaction context for the select exchange. The BAP mints it in the request, and the same context is validated on the round trip so the BPP can tie the message back to the ongoing session.
        owner: BPP
        type: object
      ttl:
        _description:
          required: true
          usage: PT30S
          info: The BAP sets this validity window in the select request so the BPP knows how long the message should be treated as fresh. It uses an ISO 8601 duration, and the value must not exceed the outer 30-second limit of PT30S, even if the buyer app chooses a shorter UX-driven timeout.
          owner: BPP
          type: string
    message:
      catalog:
        bpp/fulfillments:
          id:
            _description:
              required: true
              usage: F1
              info: Represents fulfillment details
              owner: BAP
              type: string
          type:
            _description:
              required: true
              usage: Delivery
              info: Defines the method of fulfillment
              owner: BAP
              type: enum
              enums:
                - code: Delivery
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Self-Pickup
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Delivery and Self-Pickup
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: List of fulfillment options the BPP publishes in its search response so the BAP can understand how the catalog can be delivered or served.
            owner: BPP
            type: object
        bpp/descriptor:
          name:
            _description:
              required: true
              usage: Seller NP
              info: Seller business name
              owner: BAP
              type: string
          symbol:
            _description:
              required: true
              usage: https://sellerNP.com/images/np.png
              info: Seller brand icon URL
              owner: BAP
              type: string
          short_desc:
            _description:
              required: true
              usage: Seller Marketplace
              info: Short description of the seller
              owner: BAP
              type: string
          long_desc:
            _description:
              required: true
              usage: Seller Marketplace
              info: Detailed description of the seller
              owner: BAP
              type: string
          images:
            _description:
              required: true
              usage: https://sellerNP.com/images/np.png
              info: Image URL of the seller
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: In on_search, the BPP returns the descriptor that describes the real-world object represented by this catalog entry, so the BAP can identify and present it during discovery.
            owner: BPP
            type: object
          tags:
            code:
              _description:
                required: false
                usage: bpp_terms
                info: Tag code that identifies the BPP terms section inside the catalog the BPP returns in on_search, so the BAP can recognize and validate that this terms block is present. The same code is generated in the response and then carried forward consistently through validation and later catalog handling.
                owner: BPP
                type: string
            list:
              code:
                _description:
                  required: false
                  usage: np_type
                  info: The BPP uses this code to label each catalog tag entry it returns in on_search, so the BAP can interpret which kind of tag data is being published in the search response. The same code is then checked during validation against the expected search-time catalog requirements, so it must stay consistent across the round trip.
                  owner: BPP
                  type: string
              value:
                _description:
                  required: false
                  usage: MSN
                  info: String code the BPP returns inside the catalog tag list in on_search, used by the BAP to interpret the catalog entry during discovery and incremental refresh. The observed usage suggests it is a compact protocol code rather than free-form text, so the BPP should emit the exact value consistently for that catalog representation.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: BPP includes this tag list in the catalog descriptor of its on_search response so the BAP can read the catalog-specific metadata attached to the returned menu or catalog.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: BPP returns these descriptor tags in on_search as part of the catalog metadata, and the BAP validates the same values in the round-trip when checking the response.
              owner: BPP
              type: object
        bpp/providers:
          id:
            _description:
              required: true
              usage: P1
              info: Unique identifier for provider
              owner: BAP
              type: string
          descriptor:
            name:
              _description:
                required: true
                usage: Store 1
                info: Name of the provider store
                owner: BAP
                type: string
            symbol:
              _description:
                required: true
                usage: https://sellerNP.com/images/store1.png
                info: URL for provider logo
                owner: BAP
                type: string
            short_desc:
              _description:
                required: true
                usage: Store 1
                info: Short description of the provider
                owner: BAP
                type: string
            long_desc:
              _description:
                required: true
                usage: Store 1
                info: Detailed description of the provider
                owner: BAP
                type: string
            images:
              _description:
                required: true
                usage: https://sellerNP.com/images/store1.png
                info: URL for provider image
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: Public-facing details for each provider in the search catalog, including its display name, logo, short and long descriptions, and images. The BAP uses this information to render and distinguish provider listings in the search results.
              owner: BPP
              type: object
          ttl:
            _description:
              required: true
              usage: P1D
              info: Time-To-Live for provider data
              owner: BAP
              type: string
          items:
            descriptor:
              name:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Name of the item
                  owner: BAP
                  type: string
              code:
                _description:
                  required: false
                  usage: 1:XXXXXXXXXXXXX
                  info: Unique code for the item
                  owner: BAP
                  type: string
              symbol:
                _description:
                  required: true
                  usage: https://sellerNP.com/images/i1.png
                  info: URL for product image
                  owner: BAP
                  type: string
              short_desc:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Short description of the item
                  owner: BAP
                  type: string
              long_desc:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Detailed description of the item
                  owner: BAP
                  type: string
              images:
                _description:
                  required: true
                  usage: https://sellerNP.com/images/i1.png
                  info: URL for product image
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Describes each item as surfaced in the BPP’s search response catalog so the BAP can render and compare the offered items during discovery.
                owner: BPP
                type: object
            price:
              currency:
                _description:
                  required: true
                  usage: INR
                  info: Currency for the item price
                  owner: BAP
                  type: string
              value:
                _description:
                  required: true
                  usage: "100"
                  info: Price of the item
                  owner: BAP
                  type: string
              maximum_value:
                _description:
                  required: true
                  usage: "100"
                  info: Maximum price for the item
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: The BPP returns the item’s price information with each provider catalog entry in on_search so the BAP can display pricing while consuming full or incremental catalog updates.
                owner: BPP
                type: object
            quantity:
              unitized:
                measure:
                  unit:
                    _description:
                      required: true
                      usage: kilogram
                      info: Unit of measurement for the item
                      owner: BAP
                      type: enum
                      enums:
                        - code: unit
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: gram
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: dozen
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: kilogram
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: tonne
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: litre
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: millilitre
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                  value:
                    _description:
                      required: true
                      usage: "3"
                      info: Measured quantity of the item
                      owner: BAP
                      type: string
                  _description:
                    required: true
                    usage: ""
                    info: Carries the unitized measurement details for an item’s quantity in the BPP’s catalog response, so the BAP can interpret how the offered quantity is measured when it consumes search results or incremental catalog updates.
                    owner: BPP
                    type: object
                count:
                  _description:
                    required: true
                    usage: "3"
                    info: Measured Unitized count of the item
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Specifies the unit-based measure used to describe the item’s quantity, such as how many units make up one purchasable or stocked quantity. The BAP uses this to interpret the item’s size or pack measure consistently alongside available and maximum counts.
                  owner: BPP
                  type: object
              available:
                count:
                  _description:
                    required: true
                    usage: "99"
                    info: Available stock count
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Container for the item’s available quantity that the BPP publishes in on_search, so the BAP can use it to refresh the catalog view and incremental catalog updates with what is currently available.
                  owner: BPP
                  type: object
              maximum:
                count:
                  _description:
                    required: true
                    usage: "99"
                    info: Max items per order
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Carries the upper quantity limit the BPP advertises for items in its catalog response, so the BAP can cap how many units a buyer can select during discovery.
                  owner: BPP
                  type: object
              minimum:
                count:
                  _description:
                    required: true
                    usage: "1"
                    info: Min items per order
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: true
                usage: ""
                info: Carries the item quantity details the BPP includes in on_search so the BAP can interpret how many units are being offered in the returned catalog.
                owner: BPP
                type: object
            category_id:
              _description:
                required: true
                usage: Atta, Flours and Sooji
                info: Item category classification
                owner: BAP
                type: string
            "@ondc/org/returnable":
              _description:
                required: true
                usage: "1"
                info: Indicates if the item is returnable
                owner: BAP
                type: string
            rating:
              _description:
                required: true
                usage: "4"
                info: Item Rating
                owner: BAP
                type: string
            "@ondc/org/cancellable":
              _description:
                required: true
                usage: "1"
                info: Indicates if the item can be canceled
                owner: BAP
                type: string
            "@ondc/org/available_on_cod":
              _description:
                required: true
                usage: "False"
                info: Whether Cash on Delivery is available
                owner: BAP
                type: string
            "@ondc/org/statutory_reqs_packaged_commodities":
              manufacturer_or_packer_name:
                _description:
                  required: false
                  usage: ITC
                  info: Name of the manufacturer
                  owner: BAP
                  type: string
              manufacturer_or_packer_address:
                _description:
                  required: false
                  usage: ITC Quality Care Cell, P.O Box No.592, Bangalore-560005
                  info: Address of the manufacturer
                  owner: BAP
                  type: string
              mfg_license_no:
                _description:
                  required: false
                  usage: 51/UA/SC/P-2013
                  info: Manufacturing License number
                  owner: BAP
                  type: string
              multiple_products_name_number_or_qty:
                _description:
                  required: false
                  usage: "15"
                  info: Multiple products name,number or quantity
                  owner: BAP
                  type: string
              common_or_generic_name_of_commodity:
                _description:
                  required: false
                  usage: Electric Sewing Machine
                  info: The common or generic name of the packaged commodity

                  type: string
              month_year_of_manufacture_packing_import:
                _description:
                  required: false
                  usage: 2024-08-06 00:00:00
                  info: The date of manufacture, packing, or import of the commodity
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: In on_search, the BPP includes this container to publish the packaged-commodity statutory requirements attached to a provider item, so the BAP can carry those compliance details into discovery results.
                owner: BPP
                type: object
            time:
              timestamp:
                _description:
                  required: true
                  usage: 2024-12-23T06:55:45.035Z
                  info: Time of item update
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: In on_search, the BPP includes this item-level time container in the catalog response so the BAP can use the catalog’s time-related details during discovery and later incremental refreshes.
                owner: BPP
                type: object
              label:
                _description:
                  required: true
                  usage: enable
                  info: Marks the item as enabled or disabled at the recorded timestamp, so the BAP can tell whether the item is active in the returned catalog snapshot.
                  owner: BPP
                  type: string
            tags:
              list:
                code:
                  _description:
                    required: true
                    usage: channel_margin_type
                    info: Type of channel margin
                    owner: BAP
                    type: string
                value:
                  _description:
                    required: true
                    usage: percent
                    info: Value of channel margin type
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Grouped tag entries for an item, each carrying code/value details that the BPP uses to publish item metadata such as origin, attributes, or customization and variant information in the catalog. The BAP can render these entries under the group heading to show item-specific information in a structured way.
                  owner: BPP
                  type: object
              _description:
                required: true
                usage: ""
                info: Container for item tag metadata in the BPP’s search response; the BPP generates it in on_search, and the same value is later checked again during validation.
                owner: BPP
                type: object
              code:
                _description:
                  required: true
                  usage: origin
                  info: Tag classifier for each BPP catalog item’s tag set, used to indicate what the tag record represents in search responses such as origin, attribute, type, custom_group, or parent. In on_search the BPP supplies this code and the BAP validates it later, so it needs to stay consistent with the tag’s intended meaning across full catalog and incremental refresh flows.
                  owner: BPP
                  type: string
            replacement_terms:
              replace_within:
                duration:
                  _description:
                    required: true
                    usage: P7D
                    info: The duration within which the item can be replaced
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            "@ondc/org/statutory_reqs_prepackaged_food":

meta:
  use_case_id: APPLIANCES
attribute_set:
  search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET10
          info: Specifies the domain in which the transaction operates
          owner: BAP
          type: enum
          enums:
            - code: ONDC:RET10
              description: Grocery
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET11
              description: F&B
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET12
              description: Fashion
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET13
              description: BPC
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET14
              description: Electronics
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET15
              description: Appliances
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET16
              description: Home & Kitchen
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET17
              description: Toys & Games
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET18
              description: Agriculture
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET19
              description: Health & Wellness
              reference: <PR/Issue/Discussion Links md format text>
      action:
        _description:
          required: true
          usage: search
          info: Specifies the action being performed in the transaction
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: Specifies the country in which the transaction is occurring
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: "*"
          info: Specifies the city or region of the transaction
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: Specifies the ONDC core version being used
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: buyerNP.com
          info: Specifies the ID of the Buyer App participating in the transaction
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://buyerNP.com/ondc
          info: Specifies the URI where the Buyer App is hosted
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: a4b24113-7c05-495b-9249-f33482bf3493
          info: Helps track a specific transaction across ONDC
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 6aae986b-37c2-47d2-a26c-daaf8ccbd764
          info: Used for tracking and logging purposes
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2023-06-03T09:00:00.000Z
          info: Ensures synchronization across different ONDC participants
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Specifies how long the request remains valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The BPP populates this envelope with the transaction-scoping fields (domain, city, action, version, timestamps, and IDs) that allow the BAP to correlate the on_status response back to the originating status request; validators confirm its presence before processing any other field in the payload.
        owner: BAP
        type: object
    message:
      intent:
        payment:
          "@ondc/org/buyer_app_finder_fee_type":
            _description:
              required: true
              usage: percent
              info: Indicates whether the fee is a fixed amount or a percentage
              owner: BAP
              type: string
          "@ondc/org/buyer_app_finder_fee_amount":
            _description:
              required: true
              usage: "3"
              info: Represents the value of the fee applied
              owner: BAP
              type: string
          _description:
            required: true
            usage: ""
            info: Sub-object within the search intent where the BAP communicates its commercial discovery terms to the BPP, specifically the finder-fee type and finder-fee amount that govern how the BAP is compensated for surfacing the BPP's catalog.
            owner: BAP
            type: object
        fulfillment:
          type:
            _description:
              required: false
              usage: Delivery
              info: Specifies how the order will be fulfilled (e.g., Delivery, Pickup)
              owner: BAP
              type: string
          end:
            location:
              gps:
                _description:
                  required: false
                  usage: 12.974002,77.613458
                  info: Indicates where the item is to be delivered
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: false
                    usage: "560001"
                    info: Specifies the postal code of the delivery location
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: Sub-object within the search intent where the BAP declares the delivery or service-rendering mode the consumer expects, allowing the BPP to return only catalog items that can be fulfilled in the requested manner.
            owner: BAP
            type: object
        item:
          descriptor['name']:
            _description:
              required: false
              usage: coffee
              info: Specifies the product name in the order
              owner: BAP
              type: string
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The top-level container in a search request that encapsulates the BAP's entire consumer demand signal — fulfillment preferences, payment terms (including the BAP's finder-fee type and amount), and feature tags — which the BPP uses to scope and filter the catalog it returns.
          owner: BAP
          type: object
        tags:
          code:
            _description:
              required: true
              usage: bap_terms
              info: The BAP places a named group identifier here to classify each tag block within the search intent, signaling to the BPP which category of metadata follows — such as the BAP's accepted terms, its declared feature capabilities, or an incremental catalog request. Validators assert that all expected tag codes are present, confirming the BAP has correctly structured every required tag group for the given discovery flow.
              owner: BAP
              type: string
          list:
            code:
              _description:
                required: true
                usage: static_terms
                info: Names the specific attribute or parameter key within a tag list entry, allowing both the BPP and validators to interpret the sibling value field — covering identifiers for static terms documents, effective dates, and catalog streaming modes. This code is required per the flow specification, and validators assert its presence in generated payloads.
                owner: BAP
                type: string
            value:
              _description:
                required: true
                usage: https://github.com/ONDC-Official/NP-Static-Terms/buyerNP_BNP/1.0/tc.pdf
                info: Carries the data payload for the attribute identified by the sibling code field; when the session is running in incremental mode, the BAP overwrites this field to signal a stop command halting the incremental catalog stream. In other contexts it carries data such as a static terms document URL or an ISO 8601 effective date computed dynamically at request generation time.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: Container holding the ordered key-value entries that supply the actual parameters and data for the enclosing named tag group within the BAP's search intent.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: Array of tag groups the BAP attaches to the search intent to signal feature-discovery preferences; the BAP reads a feature-discovery code list from session inputs and appends the resulting tag objects here, and the incremental-catalog-refresh flow explicitly validates that this field is present before processing the BPP's catalog response.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: The payload body sent by the BAP in a track request, containing the order reference details (such as the order ID and optional callback URL) that the BPP needs to identify the shipment and return real-time delivery tracking information.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET10
          info: Represents the ONDC domain version used in the transaction
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: on_search
          info: Specifies the event type in the ONDC protocol
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: Identifies the country for the transaction
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: ONDC core version used
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: buyerNP.com
          info: Unique identifier of the buyer app
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://buyerNP.com/ondc
          info: URL for the buyer app
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: sellerNP.com
          info: Unique identifier of the seller app
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://sellerNP.com/ondc
          info: URL for the seller app
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 7c7aa709-a05e-4ad5-a49d-22bd64282e71
          info: ID used to track the transaction
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: bc167440-16e7-4ba6-9132-9b25518f1da2
          info: ID used for message correlation
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2024-12-23T06:55:45.035Z
          info: Time of the request
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: std:022
          info: Identifies the city
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The BPP populates this envelope with the transaction-scoping fields (domain, city, action, version, timestamps, and IDs) that allow the BAP to correlate the on_status response back to the originating status request; validators confirm its presence before processing any other field in the payload.
        owner: BPP
        type: object
      ttl:
        _description:
          required: true
          usage: PT30S
          info: The BPP includes this ISO 8601 duration in on_select to declare how long the quoted response remains valid; ONDC defines PT30S (30 seconds) as the maximum allowed TTL, though a BAP may configure a shorter window to meet its own UX latency requirements but must not exceed that ceiling.
          owner: BPP
          type: string
    message:
      catalog:
        bpp/fulfillments:
          id:
            _description:
              required: true
              usage: F1
              info: Represents fulfillment details
              owner: BAP
              type: string
          type:
            _description:
              required: true
              usage: Delivery
              info: Defines the method of fulfillment
              owner: BAP
              type: enum
              enums:
                - code: Delivery
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Self-Pickup
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Delivery and Self-Pickup
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The list of fulfillment methods the BPP supports at the provider level, returned during catalog discovery so the BAP knows which delivery modes — such as home delivery or self-pickup — are available across the seller's offerings before an item is selected.
            owner: BPP
            type: object
          contact:
            phone:
              _description:
                required: false
                usage: "9876543210"
                info: Phone number the BPP publishes for a catalog-level fulfillment entry in its on_search response, identifying a contact point for that fulfillment provider.
                owner: BPP
                type: string
            email:
              _description:
                required: false
                usage: test@gmail.com
                info: Email address the BPP publishes for a catalog-level fulfillment entry in its on_search response, providing an electronic contact channel for the fulfillment provider.
                owner: BPP
                type: string
            _description:
              required: false
              usage: ""
              info: The BPP returns contact details (phone number and email address) for each fulfillment option in the catalog, allowing the BAP to surface provider reachability information associated with a specific fulfillment mode such as delivery or self-pickup.
              owner: BPP
              type: object
        bpp/descriptor:
          name:
            _description:
              required: true
              usage: Seller NP
              info: Seller business name
              owner: BAP
              type: string
          symbol:
            _description:
              required: true
              usage: https://sellerNP.com/images/np.png
              info: Seller brand icon URL
              owner: BAP
              type: string
          short_desc:
            _description:
              required: true
              usage: Seller Marketplace
              info: Short description of the seller
              owner: BAP
              type: string
          long_desc:
            _description:
              required: true
              usage: Seller Marketplace
              info: Detailed description of the seller
              owner: BAP
              type: string
          images:
            _description:
              required: true
              usage: https://sellerNP.com/images/np.png
              info: Image URL of the seller
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: Descriptor block the BPP populates to represent itself as a provider in the catalog it returns to the BAP on on_search.
            owner: BPP
            type: object
          tags:
            code:
              _description:
                required: false
                usage: bpp_terms
                info: The BPP sets this tag group classifier on each entry in the descriptor's tags array to indicate the semantic category of metadata carried within that tag group (e.g., `bpp_terms` for provider-level terms). The BAP uses this code to locate the relevant tag group when parsing the catalog response, but the lookup is gated on the BAP having declared specific feature capabilities in its session context.
                owner: BPP
                type: string
            list:
              code:
                _description:
                  required: false
                  usage: np_type
                  info: The machine-readable key for a single entry within a BPP descriptor tag list, identifying which specific provider attribute is being declared in this position of the tag group (such as network participant type or BAP terms acceptance). The BAP reads this code to extract and act on the corresponding value from the catalog response.
                  owner: BPP
                  type: string
              value:
                _description:
                  required: false
                  usage: MSN
                  info: The data value paired with a `code` entry in the BPP descriptor's tag list, carrying the actual declared value for that provider attribute within the tag group.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Container holding the individual key-value entries that carry the actual provider-level attributes for this tag group within the BPP descriptor.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: Array of structured tags on the BPP's catalog descriptor that the BAP reads during on_search catalog generation to iterate over and match against session-level BAP feature flags; because this array is both required in requirements and asserted in validation, its absence or non-conformance triggers catalog rejection.
              owner: BPP
              type: object
        bpp/providers:
          id:
            _description:
              required: true
              usage: P1
              info: Unique identifier for provider
              owner: BAP
              type: string
          descriptor:
            name:
              _description:
                required: true
                usage: Store 1
                info: Name of the provider store
                owner: BAP
                type: string
            symbol:
              _description:
                required: true
                usage: https://sellerNP.com/images/store1.png
                info: URL for provider logo
                owner: BAP
                type: string
            short_desc:
              _description:
                required: true
                usage: Store 1
                info: Short description of the provider
                owner: BAP
                type: string
            long_desc:
              _description:
                required: true
                usage: Store 1
                info: Detailed description of the provider
                owner: BAP
                type: string
            images:
              _description:
                required: true
                usage: https://sellerNP.com/images/store1.png
                info: URL for provider image
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: Identity and display metadata container for a BPP provider in the on_search catalog response, validated as required in conformance requirements.
              owner: BPP
              type: object
          ttl:
            _description:
              required: true
              usage: P1D
              info: Time-To-Live for provider data
              owner: BAP
              type: string
          items:
            descriptor:
              name:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Name of the item
                  owner: BAP
                  type: string
              code:
                _description:
                  required: false
                  usage: 1:XXXXXXXXXXXXX
                  info: Unique code for the item
                  owner: BAP
                  type: string
              symbol:
                _description:
                  required: true
                  usage: https://sellerNP.com/images/i1.png
                  info: URL for product image
                  owner: BAP
                  type: string
              short_desc:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Short description of the item
                  owner: BAP
                  type: string
              long_desc:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Detailed description of the item
                  owner: BAP
                  type: string
              images:
                _description:
                  required: true
                  usage: https://sellerNP.com/images/i1.png
                  info: URL for product image
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Container holding the human-readable identification and presentation metadata for each catalog item that the BPP sets in the on_search response, enabling the BAP to render and differentiate items in search results.
                owner: BPP
                type: object
            price:
              currency:
                _description:
                  required: true
                  usage: INR
                  info: Currency for the item price
                  owner: BAP
                  type: string
              value:
                _description:
                  required: true
                  usage: "100"
                  info: Price of the item
                  owner: BAP
                  type: string
              maximum_value:
                _description:
                  required: true
                  usage: "100"
                  info: Maximum price for the item
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Pricing container that the BPP populates for each catalog item in the on_search response; the BAP validates this object when consuming the catalog, confirming that pricing data is present and well-formed before surfacing the item to buyers.
                owner: BPP
                type: object
            quantity:
              unitized:
                measure:
                  unit:
                    _description:
                      required: true
                      usage: kilogram
                      info: Unit of measurement for the item
                      owner: BAP
                      type: enum
                      enums:
                        - code: unit
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: gram
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: dozen
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: kilogram
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: tonne
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: litre
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: millilitre
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                  value:
                    _description:
                      required: true
                      usage: "3"
                      info: Measured quantity of the item
                      owner: BAP
                      type: string
                  _description:
                    required: true
                    usage: ""
                    info: The physical measurement defining the standard unit size for a single quantity of the item, containing the unit of measurement and its corresponding numeric value to express how the item is measured when sold in unitized form.
                    owner: BPP
                    type: object
                count:
                  _description:
                    required: true
                    usage: "3"
                    info: Measured Unitized count of the item
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Describes the per-unit measurement of an item, specifying the standard unit size and its corresponding value so buyers understand the base quantity represented by a single unit of the item.
                  owner: BPP
                  type: object
              available:
                count:
                  _description:
                    required: true
                    usage: "99"
                    info: Available stock count
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Conveys the current available stock for the item, where the nested count field communicates to the BAP how many units of that item the BPP presently has on hand for ordering.
                  owner: BPP
                  type: object
              maximum:
                count:
                  _description:
                    required: true
                    usage: "99"
                    info: Max items per order
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: The upper bound on how many units of this item a buyer is permitted to order in a single transaction, returned by the BPP so the BAP can enforce purchase limits during the ordering flow.
                  owner: BPP
                  type: object
              minimum:
                count:
                  _description:
                    required: true
                    usage: "1"
                    info: Min items per order
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: true
                usage: ""
                info: Container holding stock and unit quantity details the BPP publishes for each catalog item in the on_search response, allowing the BAP to surface availability and packaging information to the buyer.
                owner: BPP
                type: object
            category_id:
              _description:
                required: true
                usage: Atta, Flours and Sooji
                info: Item category classification
                owner: BAP
                type: string
            "@ondc/org/returnable":
              _description:
                required: true
                usage: "1"
                info: Indicates if the item is returnable
                owner: BAP
                type: string
            rating:
              _description:
                required: true
                usage: "4"
                info: The BPP returns the aggregate rating of an item as part of the on_search catalog payload; in the Catalog_Rejection_Flow, this field is written conditionally only when the classification code equals "001".
                owner: BPP
                type: string
            "@ondc/org/cancellable":
              _description:
                required: true
                usage: "1"
                info: Indicates if the item can be canceled
                owner: BAP
                type: string
            "@ondc/org/available_on_cod":
              _description:
                required: true
                usage: "False"
                info: Whether Cash on Delivery is available
                owner: BAP
                type: string
            "@ondc/org/statutory_reqs_packaged_commodities":
              manufacturer_or_packer_name:
                _description:
                  required: false
                  usage: ITC
                  info: Name of the manufacturer
                  owner: BAP
                  type: string
              manufacturer_or_packer_address:
                _description:
                  required: false
                  usage: ITC Quality Care Cell, P.O Box No.592, Bangalore-560005
                  info: Address of the manufacturer
                  owner: BAP
                  type: string
              mfg_license_no:
                _description:
                  required: false
                  usage: 51/UA/SC/P-2013
                  info: Manufacturing License number
                  owner: BAP
                  type: string
              multiple_products_name_number_or_qty:
                _description:
                  required: false
                  usage: "15"
                  info: Multiple products name,number or quantity
                  owner: BAP
                  type: string
              common_or_generic_name_of_commodity:
                _description:
                  required: false
                  usage: Electric Sewing Machine
                  info: The common or generic name of the packaged commodity
                  owner: BAP
                  type: string
              month_year_of_manufacture_packing_import:
                _description:
                  required: false
                  usage: 2024-08-06 00:00:00
                  info: The date of manufacture, packing, or import of the commodity
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Statutory compliance details that the BPP must furnish for packaged commodities under applicable regulations (such as net quantity, manufacturer details, country of origin, and month/year of manufacture), enabling the BAP to display legally required labelling information to the buyer for each item in the catalog.
                owner: BPP
                type: object
            time:
              timestamp:
                _description:
                  required: true
                  usage: 2024-12-23T06:55:45.035Z
                  info: Time of item update
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Container holding temporal state information for a catalog item as returned by the BPP in on_search; it is set in the catalog payload and asserted during flow validation, making it a required structural element of the item representation.
                owner: BPP
                type: object
              label:
                _description:
                  required: true
                  usage: enable
                  info: Indicates the operational state of the item's availability window, signaling whether the item is currently active and eligible to appear in search results during the specified time period.
                  owner: BPP
                  type: string
            tags:
              list:
                code:
                  _description:
                    required: true
                    usage: channel_margin_type
                    info: Type of channel margin
                    owner: BAP
                    type: string
                value:
                  _description:
                    required: true
                    usage: percent
                    info: Value of channel margin type
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: The collection of key-value descriptor entries within an item's tag group that the BPP populates in its on_search catalog response; the BPP sets these entries and they are asserted during catalog validation.
                  owner: BPP
                  type: object
              _description:

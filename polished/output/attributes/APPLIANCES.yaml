                    info: Represents the available stock quantity for a breakup line item in the on_select response; in out-of-stock scenarios the BPP reads this field and, if present, overwrites its count to zero while also zeroing the item price, signalling to the BAP that the item cannot be fulfilled. This container is inherited within the persisted "quote" session object and consumed across subsequent steps.
                    owner: BPP
                    type: object
                maximum:
                  count:
                    _description:
                      required: true
                      usage: "10"
                      info: The BPP returns the upper bound on how many units of this breakup line item a buyer may order in a single transaction; in the Out-of-Stock flow the BPP resets this to zero (gated on the item's maximum quantity object being present, or the item being identified as out-of-stock) to prevent further ordering, and the BAP validates this value. The quote containing this field is anchored in session and reused by later steps.
                      owner: BPP
                      type: string
                  _description:
                    required: true
                    usage: ""
                    info: Container holding the maximum orderable quantity constraints for a breakup line item in the on_select quote; in the Out-of-Stock flow the BPP reads this object to determine whether a maximum count reset is applicable before zeroing it out. The quote ancestor is persisted in session and reused by later steps.
                    owner: BPP
                    type: object
                _description:
                  required: true
                  usage: ""
                  info: The quantity container nested inside a breakup line's item object, conveying the quantity context associated with that priced item in the BPP's on_select response. It is inherited within the persisted "quote" session object and carried into later steps such as on_init.
                  owner: BPP
                  type: object
              price:
                currency:
                  _description:
                    required: true
                    usage: INR
                    info: The BPP returns the ISO currency code that denominates this quote breakup line-item price in on_select. The entire quote object (including this field) is persisted under the session key "quote" and forwarded by reference to on_init, so the BAP should treat this value as fixed for the duration of the transaction.
                    owner: BPP
                    type: string
                value:
                  _description:
                    required: true
                    usage: "2260"
                    info: The BPP returns the monetary amount for each quote breakup line item in on_select; a zero amount is valid for line items such as waived charges or included items at no extra cost. This value is validated against session state across steps, and the full quote is anchored under the session key "quote" for replay at on_init.
                    owner: BPP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Per-breakup-item price container returned by the BPP in the on_select quote, providing the monetary amount for that specific line in the price breakdown; it travels within the quote object that is persisted in session and replayed in downstream steps.
                  owner: BPP
                  type: object
              _description:
                required: true
                usage: ""
                info: The item container within each quote breakup entry, linking a breakup line back to its corresponding catalog item so the BAP can associate pricing components with specific selected items. This container is persisted under the session key "quote" and validated across steps, making it a required anchor for downstream actions such as on_init.
                owner: BPP
                type: object
            parent_item_id:
              _description:
                required: false
                usage: D1
                info: In on_select responses for orders with customizations, the BPP populates this field on a breakup entry to reference the parent catalog item that the customization or add-on belongs to, allowing the BAP to correctly associate each add-on price line with the item it modifies in the quote breakdown.
                owner: BPP
                type: string
            tags:
              code:
                _description:
                  required: false
                  usage: type
                  info: Machine-readable identifier that classifies the tag group attached to a breakup line item, telling the BAP what category of structured metadata the accompanying list conveys. The BPP mints this as part of the quote in on_select; the full quote object is persisted under the session key "quote" and asserted in validation across downstream steps including on_init.
                  owner: BPP
                  type: string
              list:
                code:
                  _description:
                    required: false
                    usage: type
                    info: Key name within a single tag list entry on a breakup line, paired with the sibling value field to express one named attribute of that breakup component. It is set by the BPP as part of the quote in on_select, persisted under the session key "quote", and asserted in validation across downstream steps such as on_init.
                    owner: BPP
                    type: string
                value:
                  _description:
                    required: false
                    usage: item
                    info: Data value paired with the sibling code to complete a key-value attribute within a breakup tag list entry, together describing a specific property of that quote line item. It travels as part of the quote object the BPP sets in on_select, which is persisted and asserted in validation across later steps.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Array of key-value entries that carry the detailed attributes for a single breakup tag group; it is part of the quote object set by the BPP in on_select, persisted under the session key "quote", and consumed across subsequent transaction steps.
                  owner: BPP
                  type: object
              _description:
                required: false
                usage: ""
                info: Tag annotations attached to a breakup entry in on_select that carry structured classification metadata for a line item in customization flows; this container is persisted within the quote session and is both required and validated when customization breakup entries are present.
                owner: BPP
                type: object
          _description:
            required: true
            usage: ""
            info: The BPP constructs and returns the complete quotation for the selected order in on_select, covering item prices, delivery charges, and any applicable taxes or discounts. This quote object is saved to session state under the key 'quote' and is echoed forward into on_init and subsequent steps, so downstream actions rely on the value minted here; validators enforce its presence before processing can continue.

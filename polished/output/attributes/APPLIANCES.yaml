                type: object
            cascaded_level:
              _description:
                required: false
                usage: "1"
                info: A numeric indicator of the escalation tier at which the respondent action was taken within the IGM grievance hierarchy, allowing the BAP to understand whether the response originates from the first-level respondent or a cascaded upstream participant. This value travels inside the persisted latest_issue_payload and is carried forward across subsequent IGM steps.
                owner: BPP
                type: number
            _description:
              required: false
              usage: ""
              info: Array of actions taken by the respondent party in response to the raised issue, persisted as part of the latest_issue_payload session snapshot for replay in downstream IGM steps.
              owner: BPP
              type: object
          _description:
            required: false
            usage: ""
            info: Container that tracks the cumulative action history taken by both the respondent and the complainant over the issue's lifecycle, capturing state transitions as the issue progresses.
            owner: BPP
            type: object
        created_at:
          _description:
            required: true
            usage: 2023-01-15T10:00:00.469Z
            info: The BAP mints this timestamp at the moment the issue is first raised, marking the official creation time of the grievance record. It is asserted during validation and anchored in the persisted `latest_issue_payload`, so the original creation time remains unchanged as the issue progresses through subsequent IGM steps.
            owner: BPP
            type: date-time
        updated_at:
          _description:
            required: true
            usage: 2023-01-15T10:00:00.469Z
            info: The BAP sets this ISO 8601 timestamp to record the exact moment the issue was last modified; it must be updated on every subsequent issue or issue_actions call that mutates the issue, and the full issue payload (including this field) is persisted as latest_issue_payload for replay in downstream IGM steps.

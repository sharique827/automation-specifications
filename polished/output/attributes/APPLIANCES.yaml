                type: string
            updated_at:
              _description:
                required: false
                usage: 2023-01-15T10:10:00.142Z
                info: The ISO 8601 timestamp recording exactly when the respondent party took this particular action on the issue, allowing the BAP to reconstruct a precise chronological audit trail of how the grievance progressed through each respondent response. The entire issue object is persisted as `latest_issue_payload` and this timestamp travels with it, so downstream IGM steps can reference when each respondent action occurred.
                owner: BPP
                type: date-time
            updated_by:
              org:
                name:
                  _description:
                    required: false
                    usage: sellerapp.com/ondc::ONDC:RET10
                    info: Human-readable name of the responding organization combined with their ONDC network domain identifier, allowing the BAP to unambiguously attribute each respondent action to a specific seller app or BPP participant on the network.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Container holding the organization identity of the respondent who took this action, scoping the action to a specific network participant in the grievance resolution chain.
                  owner: BPP
                  type: object
              contact:
                phone:
                  _description:
                    required: false
                    usage: "9450394140"
                    info: Phone number of the respondent party's representative who recorded a specific respondent action, allowing the BAP or grievance system to reach that contact directly if follow-up is needed; this value travels inside the issue object persisted as latest_issue_payload.

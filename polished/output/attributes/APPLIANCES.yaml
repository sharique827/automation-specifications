                _description:
                  required: false
                  usage: "9879879870"
                  info: Phone number of the actor associated with this issue, supplied by the BAP so that grievance handlers can reach the complainant, respondent, or officer during resolution; this value travels inside the persisted issue payload across the IGM flow.
                  owner: BPP
                  type: string
              email:
                _description:
                  required: false
                  usage: sellerapp@interface.com
                  info: Email address of the actor associated with this issue, supplied by the BAP to enable out-of-band communication with the relevant party during grievance processing; it is stored as part of the issue payload and carried through the IGM lifecycle.

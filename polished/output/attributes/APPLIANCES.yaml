              type: string
          ref_id:
            _description:
              required: false
              usage: R_PARENT
              info: A reference identifier linking this resolution entry to a related entity — such as a parent resolution or issue — within the IGM resolution chain, allowing the BAP to trace the hierarchical relationship between resolution records.

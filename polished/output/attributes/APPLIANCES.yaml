              type: object
          _description:
            required: false
            usage: ""
            info: Array of participants involved in the grievance transaction, identifying each party (consumer, interfacing network participant, counterparty, etc.) who has a role in resolving the issue; the entire actors array is persisted within the latest_issue_payload and carried across IGM flows.
            owner: BPP
            type: object
        source_id:
          _description:
            required: false
            usage: CUST1
            info: Identifies the originating party or entity that raised the issue — typically the customer or end-user on whose behalf the grievance is being filed. The BAP places this identifier in the issue request to let the grievance management system trace the issue back to its originating source, and the full issue payload is persisted under `latest_issue_payload` for reference in subsequent IGM flow steps.

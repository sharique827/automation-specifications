              info: A categorical label that classifies the kind of entity whose ID appears in ref_id, indicating whether the issue is anchored to an order, a provider, a fulfillment leg, or a specific item. The BAP sets this in the issue request to tell the BPP and IGM layer which domain object to look up when investigating the complaint.

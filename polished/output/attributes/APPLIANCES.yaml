              info: The identifier of the entity being referenced in the issue — such as the order ID, provider ID, fulfillment ID, or item ID — that contextualizes which specific transactional object the grievance pertains to. The BAP populates this alongside ref_type so that the counterparty can locate the exact record under dispute within the order lifecycle.

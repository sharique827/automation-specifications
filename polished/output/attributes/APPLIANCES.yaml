          info: Error category classifier the BPP sets to indicate the layer at which the failure originated; the BAP is expected to assert this field, and in out-of-stock flows it is always set to signal a domain-layer error rather than a transport or protocol failure.
          owner: BPP
          type: string
      _description:
        required: false
        usage: ""
        info: Error envelope the BPP populates in on_select when it cannot honor the BAP's item selection, present in out-of-stock scenarios to give the BAP a structured rejection object containing the type and code before the BAP attempts further steps.

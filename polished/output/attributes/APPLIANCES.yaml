              type: string
          ref_type:
            _description:
              required: false
              usage: PARENT
              info: Classifies the type of entity that `ref_id` points to within the IGM resolution hierarchy, indicating the nature of the reference (for example, whether it points to a parent-level entity) so the BAP can correctly interpret the resolution linkage.
              owner: BAP
              type: string
          tags:
            descriptor:
              code:
                _description:
                  required: false
                  usage: RESOLUTION_DETAILS
                  info: Machine-readable code that classifies the resolution tag group, allowing the receiving party to interpret the tag list that follows; the BAP sets this in the issue action and it is persisted under latest_issue_payload and validated in subsequent steps.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Descriptor container within each resolution tag group that identifies the tag group's semantic category; it is set by the BAP in the issue action and travels with the persisted issue payload across IGM flows.
                owner: BAP
                type: object
            list:
              descriptor:
                code:
                  _description:
                    required: false
                    usage: ITEM
                    info: Machine-readable code identifying the type of resolution detail being conveyed in this tag list entry, allowing the receiving party to distinguish between different resolution attributes such as the affected item reference or the refund amount; this value is set by the BAP in the issue request and is persisted within the latest_issue_payload session store.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Container holding the key-value descriptor for a single resolution tag entry, used by the BAP to convey structured metadata about the proposed resolution (such as affected item identifiers or refund amounts) within the issue payload that is persisted as both latest_issue_payload and issue_resolution across IGM flows.
                  owner: BAP
                  type: object
              value:
                _description:
                  required: false
                  usage: I1
                  info: The actual value corresponding to the sibling descriptor code in a resolution tag list entry, providing the concrete data (such as an item identifier or a monetary amount) that the BAP supplies to substantiate the proposed resolution; the full resolution payload including this value is persisted as latest_issue_payload and issue_resolution for downstream IGM processing.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Array of key-value entries carrying the actual resolution attributes for the tag group identified by its descriptor; the BAP populates these in the issue action and they are persisted as part of both latest_issue_payload and issue_resolution for downstream validation.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Container holding the structured tag groups that convey resolution details for this issue; the entire resolutions array, including these tags, is set by the BAP in the issue action and persisted as both latest_issue_payload and issue_resolution for subsequent validation steps.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: Array of resolution objects describing the actions taken to address the issue, persisted as `issue_resolution` and consumed across subsequent steps in the IGM flow.
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The root container for the grievance raised by the buyer or a network participant, carrying the full complaint definition — including escalation details and supplementary evidence — that is validated for presence at every step of the IGM lifecycle and persisted as `latest_issue_payload` for replay in subsequent actions.
          owner: BAP
          type: object
      update_target:
        path:
          _description:
            required: false
            usage: issue.actions
            info: The BAP sets this to a dot-notation path within the issue object (e.g., pointing to the actions list) to tell the receiving party exactly which sub-element of the issue this update targets.
            owner: BAP
            type: string
        action:
          _description:
            required: false
            usage: APPENDED
            info: The BAP sets this to the mutation operation type — indicating how the targeted issue sub-path should be modified (e.g., appended rather than replaced) — and because it is both generated by the BAP and validated by the receiver, it is a required signal the receiving party checks before processing the update.
            owner: BAP
            type: string
        _description:
          required: false
          usage: ""
          info: Container that describes the specific portion of the issue payload the BAP intends to update in this call, pairing a dot-notation target path within the issue object with the mutation operation to be applied.
          owner: BAP
          type: object
      _description:
        required: true
        usage: ""
        info: The BPP returns this object in the on_select response to carry the order details selected by the buyer, including fulfillments, quote breakdowns, and item-level information that the BAP uses to present pricing and delivery options before the buyer proceeds to initiate the order.
        owner: BAP
        type: object
  on_issue:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET15
          info: The ONDC domain code that identifies the sector under which this grievance is being raised; the BAP must set this to the same domain code used in the original commerce transaction (e.g., retail grocery, fashion) so that the IGM layer can route the issue to the correct BPP.
          owner: BPP
          type: string
      action:
        _description:
          required: true
          usage: on_issue
          info: Identifies this message as an IGM issue initiation call; the BAP sets this to the literal value for the issue action, and the value is persisted as the session key `last_action` so subsequent IGM flow steps can validate sequencing across the grievance lifecycle.
          owner: BPP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2026-04-10T07:45:40.606Z
          info: RFC 3339 timestamp recording when the BAP generated this issue request; it is saved as `latestTimestamp` in the session and validated across subsequent IGM steps to ensure chronological ordering of grievance messages.
          owner: BPP
          type: date-time
      transaction_id:
        _description:
          required: true
          usage: d7a3735a-e76e-45fd-bad4-764b3be60440
          info: Unique identifier that ties this issue message back to the original commerce transaction being disputed; the BAP carries forward the same transaction ID used during the order flow and it is persisted as `transactionId` so all IGM steps (issue, issue_actions, on_issue, etc.) can be correlated to the same transaction context.
          owner: BPP
          type: string
      message_id:
        _description:
          required: true
          usage: a618733e-a1a0-4a9e-a58e-9ca0a469bce0
          info: A unique identifier scoped to a single request/callback cycle within the IGM flow; the BAP mints a fresh value for each issue action and the value is persisted as `latestMessage_id` so that subsequent steps in the grievance lifecycle can correlate callbacks back to the originating request.
          owner: BPP
          type: string
      bap_id:
        _description:
          required: true
          usage: bap.example.com
          info: Unique identifier of the Buyer App placing this confirm request, defaulting to its fully qualified domain name. The BAP sets this value early in the session (anchored as bapId from select onward) and carries it unchanged through confirm so the BPP can authenticate which buyer platform originated the order.
          owner: BPP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://bap.example.com
          info: Callback URI of the Buyer App to which the BPP will deliver on_confirm and subsequent async responses; its domain must match bap_id. The value is persisted in session from the first request and reused unchanged in confirm so the BPP knows where to POST its reply.
          owner: BPP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: The BPP includes this ISO 8601 duration in on_select to declare how long the quoted response remains valid; ONDC defines PT30S (30 seconds) as the maximum allowed TTL, though a BAP may configure a shorter window to meet its own UX latency requirements but must not exceed that ceiling.
          owner: BPP
          type: string
      bpp_id:
        _description:
          required: true
          usage: bpp.example.com
          info: Unique identifier of the Seller App receiving this confirm request, defaulting to its fully qualified domain name. The BAP populates this from the session-anchored bppId established during select, and it is validated at confirm to ensure the request is addressed to the correct BPP that quoted the order.
          owner: BPP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://bpp.example.com
          info: Endpoint URI of the Seller App to which the BAP directs this confirm call; its domain must match bpp_id. The BAP carries this value forward from the session (persisted as bppUri since select) and it is validated at confirm to ensure routing consistency with the BPP that handled earlier steps in the transaction.
          owner: BPP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: The BAP provides the ISO 3166 Alpha-3 country code in the track request to declare the country context of the transaction.
          owner: BPP
          type: string
      city:
        _description:
          required: true
          usage: "*"
          info: The BAP sets this STD-prefixed city code (e.g., std:080) in the track request to identify the city where the transaction originates, as codified by the ONDC city-code standard. It is minted during request generation, persisted under the session key `city_code`, asserted during validation, and reused by downstream steps including cancellation flows.
          owner: BPP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: Declares the ONDC core API specification version governing this issue message, allowing counterparty systems to apply the correct parsing and validation rules for the IGM payload.
          owner: BPP
          type: string
      _description:
        required: true
        usage: ""
        info: The BPP populates this envelope with the transaction-scoping fields (domain, city, action, version, timestamps, and IDs) that allow the BAP to correlate the on_status response back to the originating status request; validators confirm its presence before processing any other field in the payload.
        owner: BPP
        type: object
    message:
      issue:
        id:
          _description:
            required: true
            usage: ISSUE-1
            info: Unique network-level identifier assigned to a complaint by the originating interfacing application, which remains immutable for the entire lifecycle of the issue across all counterparty and cascaded systems. In on_issue, the BPP echoes back the same id that was minted in the issue request (sourced from session key issue_id at $.message.issue.id), and validators across subsequent IGM steps — including on_issue_processing and on_issue_resolved — assert its presence, making this field a hard dependency for any follow-up grief management flow.
            owner: BPP
            type: string
        issue_actions:
          respondent_actions:
            respondent_action:
              _description:
                required: false

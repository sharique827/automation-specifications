        owner: BPP
        type: object
  catalog_rejection:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET15
          info: Identifies the ONDC domain vertical to which the catalog rejection message applies, such as "ONDC:RET15" for grocery retail, scoping the rejection to the relevant category taxonomy and business rules.
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: catalog_rejection
          info: The action discriminator is explicitly forced to 'catalog_rejection' during generation whenever the context block is present, and the validator asserts this exact value on receipt to confirm the payload represents a catalog rejection notification; it is also required by the flow specification.
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2026-05-28T05:48:21.760Z
          info: The ISO 8601 UTC wall-clock time at which the catalog rejection message was generated; it is required by the flow specification, asserted during validation on receipt, and persisted under the session key 'latestTimestamp' for tracking within the Catalog_Rejection_Flow.
          owner: BAP
          type: date-time
      transaction_id:
        _description:
          required: true
          usage: 7bff96fb-28c1-4b0f-82b0-c6e13beb0cfc
          info: Stable identifier that ties every message in this catalog rejection transaction together. It is minted and validated within this action and persisted as `transactionId` in the session, allowing participants to correlate the rejection with the originating catalog exchange.
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 24be5c97-b8fe-4c05-99ce-5f07c4c25c82
          info: Unique identifier for this specific catalog_rejection message, persisted as `latestMessage_id` and consumed across subsequent steps. It is aliased as `latestMessage_id` in the on_search action, enabling the implementation to link this rejection back to the search that triggered catalog evaluation.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: sample-bap-id
          info: Subscriber ID of the BAP issuing this catalog_rejection, persisted as `bapId` and carried forward across subsequent steps. Later flows such as Buyer_Cancellation_Flow reuse this value in the cancel action to identify the originating BAP throughout the session.
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://bap.example.com
          info: Callback URI of the BAP, persisted as `bapUri` and reused across subsequent steps including the cancel action in Buyer_Cancellation_Flow. Unlike the other context identifiers here, this value is not minted by this action itself but is carried forward from an earlier point in the session.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Declares the validity window of this catalog_rejection message as an ISO 8601 duration so that receiving parties can safely discard the rejection notification if it arrives after the window has elapsed.
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: sample-bpp-id
          info: The BPP's unique network participant identifier set in this catalog_rejection message; it is validated against expected values and anchored in session as the persisted key `bppId`, which is subsequently consumed by downstream steps such as buyer cancellation to identify the correct BPP.
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://bpp.example.com
          info: The base callback URL of the BPP set in this catalog_rejection message; it is validated and persisted in session as `bppUri` so that later steps — including cancel — can route requests to the correct BPP endpoint without re-resolving it.
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: The ISO country code scoping this catalog rejection to the relevant geographic market; the BPP sets it in the message context to declare the jurisdiction under which the rejection applies.
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: "*"
          info: The BAP sets this to the wildcard city value indicating the catalog rejection is not scoped to any specific geographic market, and this write is gated on the context object being present; the value is persisted as `city_code` and is both generated and validated within the Catalog_Rejection_Flow session, making it a stable anchor for the rejection round-trip.
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: The version of the ONDC core specification that governs the structure and rules of this catalog_rejection message, ensuring both the BAP and BPP interpret the payload according to a mutually understood protocol version.
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The metadata envelope for the catalog_rejection notification, generated with the action discriminator and city already stamped in, and validated against those values by the receiving party.
        owner: BAP
        type: object
    message:
      errors:
        type:
          _description:
            required: true
            usage: ITEM-ERROR
            info: Classifies the category of rejection error in this catalog_rejection message, allowing the BPP to triage rejections by domain (e.g., item-level versus provider-level). Set in the rejection payload and asserted during validation, so implementations must include a consistent type value for each error entry.
            owner: BAP
            type: string
        code:
          _description:
            required: true
            usage: "91001"
            info: Machine-readable numeric code that uniquely identifies the specific catalog rule violated, enabling the BPP to programmatically detect and remediate each rejection reason. Set in the rejection payload and asserted during validation, so every error object must carry a stable, recognizable code.
            owner: BAP
            type: string
        message:
          _description:
            required: true
            usage: Item price > MRP
            info: Human-readable explanation of why the catalog entry was rejected, intended to help BPP engineers quickly understand the specific violation without decoding the error code. Set in the rejection payload and asserted during validation alongside the type and code fields.
            owner: BAP
            type: string
        path:
          _description:
            required: true
            usage: message.catalog.bpp/providers[?(@.id=='e2008459-7e90-493e-b02e-cae52ca53214')].items[?(@.id=='1b7ecabd-b5cc-4296-ad98-5c139c0ed7d7')].price.value
            info: JSONPath expression that pinpoints the exact field within the original on_search catalog payload responsible for the rejection, referencing the offending provider and item by their IDs so the BPP can navigate directly to the problematic value and correct it. This field is set in the rejection payload but is not explicitly asserted during validation, so its presence is informational rather than contractually enforced.
            owner: BAP
            type: string
        _description:
          required: true
          usage: ""
          info: Array container that holds the individual error entries describing catalog rejection reasons; its parent message container is removed from the payload during generation, with the error data surfacing at the top level instead.
          owner: BAP
          type: object
      _description:
        required: true
        usage: ""
        info: In the catalog_rejection action this container is explicitly deleted from the outgoing payload, meaning rejection details are not carried in a message body but are instead surfaced through a dedicated top-level errors structure.
        owner: BAP
        type: object
    errors:
      type:
        _description:
          required: true
          usage: ITEM-ERROR
          info: Classifies the domain or category of the catalog validation failure, allowing the BPP to programmatically distinguish the class of rejection (e.g., item-level versus other scopes) before inspecting the accompanying code and message; the value is set during rejection generation and asserted during flow validation.
          owner: BAP
          type: string
      code:
        _description:
          required: true
          usage: "91001"
          info: Machine-readable code that uniquely identifies the specific catalog validation rule that was violated, enabling the BPP to map each rejection entry to a known error definition and apply targeted fixes to the offending catalog data; set during rejection generation and asserted during flow validation.
          owner: BAP
          type: string
      message:
        _description:
          required: true
          usage: Item price > MRP
          info: Human-readable explanation of the catalog rejection reason, giving the BPP engineer a plain-language description of the violated validation rule so they can diagnose and correct the offending catalog data; set during rejection generation and asserted during flow validation.
          owner: BAP
          type: string
      path:
        _description:
          required: true
          usage: sessionData.on_search_items[?(@.id=='I1')].price.value
          info: A JSONPath expression that pinpoints the exact field within the session's catalog data where the rejection-triggering violation was found, allowing the BPP to locate the offending attribute on a specific item without scanning the full payload. This value is generated during the catalog rejection flow and maps directly to the item and field that failed validation, such as a price value on a named item.
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: Top-level array container that replaces the standard message body in a catalog_rejection payload; it is initialised to an empty array when absent and then populated with one or more structured error objects describing why the submitted catalog items failed validation.
        owner: BAP
        type: object

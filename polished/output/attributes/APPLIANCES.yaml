                type: object
            _description:
              required: false
              usage: ""
              info: Container holding identity details for a single actor involved in the IGM issue — each entry in the actors array carries its own info block identifying who (person) and which organization (org) that actor represents. The entire issue payload, including this container, is persisted as latest_issue_payload and validated against in subsequent IGM flow steps.

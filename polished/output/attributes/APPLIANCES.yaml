                    required: false
                    usage: respondentapp@respond.com
                    info: Email address of the respondent party's representative who recorded a specific respondent action, providing an additional channel for the BAP or grievance system to contact that individual; this value travels inside the issue object persisted as latest_issue_payload.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Contact details of the respondent party (BPP or logistics provider) who recorded a particular respondent action on this issue; the entire parent issue object, including this contact container, is persisted as latest_issue_payload so the BAP can audit the full action trail across IGM flows.

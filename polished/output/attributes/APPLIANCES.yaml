                  type: object
              person:
                name:
                  _description:
                    required: false
                    usage: Jane Doe
                    info: The human-readable name of the respondent party (such as a BPP representative or logistics provider agent) who submitted this particular respondent action entry in the IGM issue thread. The BPP populates this field within each element of the respondent_actions array to identify who acted, and the full issue payload including this name is persisted as latest_issue_payload for continuity across subsequent IGM interactions.
                    owner: BPP
                    type: string
                _description:
                  required: false

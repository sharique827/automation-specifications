            info: The BPP returns the current lifecycle state of the issue in on_issue, signalling to the BAP whether the grievance is still being handled (open/processing) or has been brought to a terminal state where no further actions, updates, or resolutions will be accepted (CLOSED). This field is required in the IGM flow and is persisted as part of latest_issue_payload so downstream steps can inspect the last-known status without re-fetching.

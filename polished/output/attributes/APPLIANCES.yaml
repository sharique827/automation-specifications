                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Container holding personal identity details of an individual actor involved in the IGM issue, complementing the org container within the same info entry. It is inherited into the persisted latest_issue_payload but carries no cross-flow validation assertion in this action.

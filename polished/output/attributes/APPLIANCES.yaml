      message:
        _description:
          required: false
          usage: '[{"item_id":"I1","error":"40002"}]'
          info: Human-readable string the BPP returns to describe the error; in out-of-stock scenarios this field carries a JSON-encoded array where each element pairs an item identifier with its error code, allowing the BAP to pinpoint exactly which selected items triggered the rejection.
          owner: BPP
          type: string

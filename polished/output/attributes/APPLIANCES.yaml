              info: Timestamp recording when this resolution entry was last modified, allowing the BAP to detect whether the resolving NP has updated its proposed resolution since the issue was first raised. The entire issue payload, including this field, is persisted as `latest_issue_payload` and validated across IGM flows such as no-action and rejection scenarios.

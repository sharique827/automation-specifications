name: Build and Deploy ONIX Service

# ── Triggers ─────────────────────────────────────────────────────────
# 1. Push to draft-* → auto build + deploy to DEV
# 2. Manual workflow_dispatch (GitHub UI) → build DEV or promote to PROD
on:
  push:
    branches:
      - "release-*"

  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        default: build-dev
        options:
          - build-dev
          - promote-to-prod
      image_tag:
        description: "Dev image tag to promote to prod (required for promote-to-prod)"
        required: false
        type: string
      domain:
        description: "Domain name (e.g. ONDC:TRV11, required for promote-to-prod)"
        required: false
        type: string
      version:
        description: "Domain version (e.g. 2.0.1, required for promote-to-prod)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  REGISTRY_NAMESPACE: ondc-official
  GENERATOR_VERSION: "1.0.2"

jobs:
  # ──────────────────────────────────────────────────────────────────
  # JOB 1: Build image and deploy to DEV
  # Runs on: push to draft-* or manual build-dev dispatch
  # ──────────────────────────────────────────────────────────────────
  build-and-deploy-dev:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'build-dev')
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      domain: ${{ steps.spec.outputs.domain }}
      version: ${{ steps.spec.outputs.version }}

    steps:
      - name: Checkout specification repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Step 1: Parse config → build.yaml ──────────────────────
      - name: Parse spec config
        run: |
          npx -y @ondc/build-tools@latest parse -i config -o build.yaml

      - name: Validate build.yaml
        run: |
          npx -y @ondc/build-tools@latest validate -i build.yaml

      - name: Upload build.yaml artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build.yaml
          retention-days: 7

      # ── Step 2: Read domain + version from build.yaml ──────────
      - name: Read domain and version from spec
        id: spec
        run: |
          DOMAIN=$(python3 -c "import yaml; d=yaml.safe_load(open('build.yaml')); print(d['info']['domain'])")
          VERSION=$(python3 -c "import yaml; d=yaml.safe_load(open('build.yaml')); print(d['info']['version'])")
          echo "domain=${DOMAIN}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Domain: ${DOMAIN} | Version: ${VERSION}"

      # ── Step 3: Calculate image name and tag ───────────────────
      # Single image repo shared by dev and prod — no dev/prod prefix
      # Domain is in the repo name so no need to repeat in tag:
      # dev builds tagged:  dev-v{version}-{sha}   e.g. dev-v2.0.1-abc1234
      # prod builds tagged: prod-v{version}-{sha}  e.g. prod-v2.0.1-abc1234
      #                   + v{version}-latest       e.g. v2.0.1-latest
      - name: Calculate image metadata
        id: meta
        run: |
          DOMAIN="${{ steps.spec.outputs.domain }}"
          VERSION="${{ steps.spec.outputs.version }}"

          # ONDC:TRV11 → ondctrv11  (for image repo name)
          DOMAIN_NORM=$(echo "${DOMAIN}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -d ':')

          # 2.0.1 → 2-0-1  (for image repo name)
          VERSION_NORM=$(echo "${VERSION}" | tr '.' '-')

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Single repo — domain+version in repo name keeps it clean
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/ondc-onix-${DOMAIN_NORM}-${VERSION_NORM}"

          # Short readable tag: env + version + sha
          IMAGE_TAG="dev-v${VERSION}-${SHORT_SHA}"

          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Image: ${IMAGE_NAME}:${IMAGE_TAG}"

      # ── Step 5: Run npx generator → build-output/ ──────────────
      - name: Generate ONIX build output
        env:
          IS_ONIX_ENABLED: "true"
          PORT: ${{ vars.API_SERVICE_PORT }}
          REDIS_HOST: ${{ vars.REDIS_HOST }}
          REDIS_PORT: ${{ vars.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          CONFIG_SERVICE_URL: ${{ vars.CONFIG_SERVICE_URL }}
          MOCK_SERVER_URL: ${{ vars.MOCK_SERVER_URL }}
          RECORDER_SERVICE_HTTP_URL: ${{ vars.RECORDER_SERVICE_HTTP_URL }}
          RECORDER_SERVICE_GRPC_URL: ${{ vars.RECORDER_SERVICE_GRPC_URL }}
        run: |
          npx -y @ondc/api-service-generator@${{ env.GENERATOR_VERSION }} \
            --config ./build.yaml

      # ── Step 5a: Generate RAG table + push to DB ───────────────
      - name: Generate RAG Table
        run: |
          npx -y @ondc/build-tools@latest gen-rag-table -i build.yaml -o generated

      - name: Push to DB
        env:
          API_KEY: ${{ secrets.STAGING_EKS_DB_SERVICE_API_KEY }}
          API_BASE_URL: ${{ vars.STAGING_EKS_DB_SERVICE_BASE_URL }}
        run: |
          npx -y @ondc/build-tools@latest push-to-db -f build.yaml -t generated/raw_table.json -u "$API_BASE_URL" -k "$API_KEY"

      # ── Step 6: Build Docker image ─────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        run: |
          IMAGE_NAME="${{ steps.meta.outputs.image_name }}"
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"

          cd build-output
          docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"

          echo "✅ Pushed dev image: ${IMAGE_NAME}:${IMAGE_TAG}"

      # ── Update automation-iac values-staging.yaml ──────────────────
      - name: Checkout automation-iac
        uses: actions/checkout@v4
        with:
          repository: ondc-official/automation-iac
          token: ${{ secrets.IAC_REPO_PAT }}
          path: automation-iac

      - name: Update values-staging.yaml
        run: |
          cd automation-iac

          DOMAIN="${{ steps.spec.outputs.domain }}"
          VERSION="${{ steps.spec.outputs.version }}"
          NEW_IMAGE="${{ steps.meta.outputs.image_name }}"
          NEW_TAG="${{ steps.meta.outputs.image_tag }}"
          VALUES_FILE="k8/aws/helm/domain-layer/values-staging.yaml"

          python3 - <<EOF
          import yaml, sys

          with open("${VALUES_FILE}", "r") as f:
              values = yaml.safe_load(f)

          updated = False
          for entry in values.get("domains", []):
              if (entry.get("domain") == "${DOMAIN}" and
                      str(entry.get("version")) == "${VERSION}"):
                  entry["api"]["image"]["repository"] = "${NEW_IMAGE}"
                  entry["api"]["image"]["tag"] = "${NEW_TAG}"
                  updated = True
                  print(f"✅ Updated {entry['domain']} {entry['version']} → ${NEW_TAG}")
                  break

          if not updated:
              normalized = ("${DOMAIN}" + "${VERSION}").lower().replace(":", "").replace(".", "-")
              values.setdefault("domains", []).append({
                  "domain": "${DOMAIN}",
                  "version": "${VERSION}",
                  "enabled": True,
                  "api": {
                      "enabled": True,
                      "image": {"repository": "${NEW_IMAGE}", "tag": "${NEW_TAG}"},
                      "service": {"type": "ClusterIP", "port": 7039},
                      "env": {"SERVICE_NAME": f"automation-api-service-dev-{normalized}"}
                  },
                  "mock": {"enabled": True, "mode": "playground"}
              })
              print("✅ Added new domain entry for ${DOMAIN} ${VERSION}")

          with open("${VALUES_FILE}", "w") as f:
              yaml.dump(values, f, default_flow_style=False,
                        allow_unicode=True, sort_keys=False)
          EOF

          git config user.email "ci-bot@ondc.org"
          git config user.name "CI Bot"
          git add k8/aws/helm/domain-layer/values-staging.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(dev): ${{ steps.spec.outputs.domain }} ${{ steps.spec.outputs.version }} → ${{ steps.meta.outputs.image_tag }}"
          git push
          echo "✅ DEV updated — ArgoCD will auto-sync"

  # ──────────────────────────────────────────────────────────────────
  # JOB 2: Promote to PROD — triggered manually from GitHub Actions UI
  #
  # How to trigger:
  #   Go to Actions tab → "Build and Deploy ONIX Service"
  #   → Run workflow → fill in:
  #       action:    promote-to-prod
  #       image_tag: dev-abc1234    (copy from DEV deploy run)
  #       domain:    ONDC:TRV11
  #       version:   2.0.1
  #   → Run workflow
  #
  # This re-tags the dev image as prod-{sha} and :latest in the same
  # GHCR package, then updates values-prod.yaml in automation-iac.
  # ──────────────────────────────────────────────────────────────────
  promote-to-prod:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'promote-to-prod'
    environment: production   # ← requires approval from designated reviewers
                              #   Settings → Environments → production
                              #   → Required reviewers → add approvers
    permissions:
      contents: read
      packages: write

    steps:
      - name: Validate promote-to-prod inputs
        run: |
          test -n "${{ inputs.image_tag }}" || { echo "image_tag is required for promote-to-prod"; exit 1; }
          test -n "${{ inputs.domain }}" || { echo "domain is required for promote-to-prod"; exit 1; }
          test -n "${{ inputs.version }}" || { echo "version is required for promote-to-prod"; exit 1; }

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Re-tag dev image as prod-v{version}-{sha} and v{version}-latest
      - name: Re-tag image for prod
        run: |
          DOMAIN="${{ inputs.domain }}"
          VERSION="${{ inputs.version }}"
          DEV_TAG="${{ inputs.image_tag }}"

          DOMAIN_NORM=$(echo "${DOMAIN}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -d ':')
          VERSION_NORM=$(echo "${VERSION}" | tr '.' '-')

          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/ondc-onix-${DOMAIN_NORM}-${VERSION_NORM}"

          # dev-v2.0.1-abc1234 → prod-v2.0.1-abc1234
          PROD_TAG="${DEV_TAG/dev-/prod-}"

          echo "Pulling: ${IMAGE_NAME}:${DEV_TAG}"
          docker pull "${IMAGE_NAME}:${DEV_TAG}"

          docker tag "${IMAGE_NAME}:${DEV_TAG}" "${IMAGE_NAME}:${PROD_TAG}"
          docker push "${IMAGE_NAME}:${PROD_TAG}"

          # v{version}-latest — scoped per version, no cross-domain collision
          LATEST_TAG="v${VERSION}-latest"
          docker tag "${IMAGE_NAME}:${DEV_TAG}" "${IMAGE_NAME}:${LATEST_TAG}"
          docker push "${IMAGE_NAME}:${LATEST_TAG}"

          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "PROD_TAG=${PROD_TAG}" >> $GITHUB_ENV
          echo "LATEST_TAG=${LATEST_TAG}" >> $GITHUB_ENV
          echo "✅ Pushed: ${IMAGE_NAME}:${PROD_TAG}"
          echo "✅ Pushed: ${IMAGE_NAME}:${LATEST_TAG}"

      - name: Checkout automation-iac
        uses: actions/checkout@v4
        with:
          repository: ondc-official/automation-iac
          token: ${{ secrets.IAC_REPO_PAT }}
          path: automation-iac

      - name: Update values-prod.yaml
        run: |
          cd automation-iac

          DOMAIN="${{ inputs.domain }}"
          VERSION="${{ inputs.version }}"
          VALUES_FILE="k8/aws/helm/domain-layer/values-preprod.yaml"

          python3 - <<EOF
          import yaml, sys

          with open("${VALUES_FILE}", "r") as f:
              values = yaml.safe_load(f)

          updated = False
          for entry in values.get("domains", []):
              if (entry.get("domain") == "${DOMAIN}" and
                      str(entry.get("version")) == "${VERSION}"):
                  entry["api"]["image"]["repository"] = "${{ env.IMAGE_NAME }}"
                  entry["api"]["image"]["tag"] = "${{ env.PROD_TAG }}"
                  updated = True
                  print(f"✅ Promoted {entry['domain']} {entry['version']} → ${{ env.PROD_TAG }}")
                  break

          if not updated:
              print("❌ ${DOMAIN} ${VERSION} not found in values-prod.yaml")
              print("Add the domain entry to values-prod.yaml first.")
              sys.exit(1)

          with open("${VALUES_FILE}", "w") as f:
              yaml.dump(values, f, default_flow_style=False,
                        allow_unicode=True, sort_keys=False)
          EOF

          git config user.email "ci-bot@ondc.org"
          git config user.name "CI Bot"
          git add k8/aws/helm/domain-layer/values-preprod.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(prod): promote ${{ inputs.domain }} ${{ inputs.version }} → ${{ env.PROD_TAG }} (${{ env.LATEST_TAG }})"
          git push
          echo "✅ PROD updated — ArgoCD will auto-sync"

meta:
  domain: ONDC:RET11
  version: 1.2.5
  flowId: RTO_PLUS_PART_CANCELLATION
  description: An F&B order undergoes seller-initiated partial item cancellation post-confirmation, after which the remaining items are packed and dispatched for delivery but the delivery attempt fails, triggering a Return to Origin (RTO) and culminating in full cancellation of the residual order by the seller. The flow exercises the complete lifecycle from catalogue selection through order confirmation, partial cancellation, failed last-mile delivery, RTO initiation, and terminal cancellation, with intermediate status transitions covering packing, out-for-delivery, and return-in-transit states.

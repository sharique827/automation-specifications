  flowId: DELIVERY_FLOW_WITH_IGM(v-2.0.0)
  description: Covers a complete Food & Beverage delivery order lifecycle — from item selection and order confirmation through real-time delivery tracking and multi-stage fulfillment status updates — followed by multiple Issue and Grievance Management (IGM) cycles in which the buyer raises successive post-order complaints, the seller app acknowledges and responds to each grievance, and the final issue triggers an order update to reflect the resolution.

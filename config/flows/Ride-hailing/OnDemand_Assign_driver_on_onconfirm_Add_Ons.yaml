  version: 2.1.0
  flowId: on_demand_add_ons_flow
  config_version: 0.0.0001
  description: On-demand ride-hailing transaction where the rider may optionally
    attach add-ons (child seat, luggage carrier) to the selected ride at select
    time. Driver assignment occurs on booking confirmation; the add-ons and
    their fare component persist through the quote, confirmation and status
    updates.
  use_case_id: Ride-hailing
  flowName: OnDemand Assign driver on onconfirm (Add Ons)

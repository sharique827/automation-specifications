  version: 2.0.3
  flowId: Personal_Loan_missed_emi_payment_Offline
  config_version: 0.0.0001
  description: The "Personal_Loan_missed_emi_payment_Offline" flow represents a
    manual repayment process for overdue EMIs when automatic collections fail,
    allowing borrowers to settle pending dues, penalties, and charges through an
    offline reconciliation pathway while maintaining synchronized status updates
    across the network until the payment is confirmed and the loan account state
    is updated.
  use_case_id: PERSONAL LOAN
  flowName: Personal Loan missed_emi_payment Offline

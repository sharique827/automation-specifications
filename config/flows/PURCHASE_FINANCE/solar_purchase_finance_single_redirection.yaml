meta:
  domain: ONDC:FIS12
  version: 2.3.0
  flowId: solar_purchase_finance_single_redirection
  config_version: 0.0.0001
  description: "Solar Purchase Finance origination flow on ONDC:FIS12. Discovery
    uses a 3-round search/on_search pattern (per PRD sections 5.1/5.2): each
    round resubmits the previously completed inline form (field-based
    xinput.form.data, no hosted form URL) so the BPP can progressively reveal
    Merchant & Product Details (F01), then Personal Information (F02), and
    finally return a personalized, binding solar loan offer. Ordering proceeds
    through select/on_select, an offline single-redirection verification journey
    (KYC, eMandate, Bank Account Verification, eSign) surfaced via unsolicited
    on_status callbacks and a dynamic form wizard, and concludes with
    LOAN_SANCTIONED confirmation. Disbursal to the merchant is contingent on a
    later BAP-attested installation confirmation."
  use_case_id: ""

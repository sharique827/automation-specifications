  - api: on_search
    action_id: on_search
    owner: BPP
    responseFor: search
    unsolicited: false
    description: The BPP responds to the BAP's earlier search request by
      transmitting the on_search callback, which carries the seller's catalog —
      including provider details, available appliance items, fulfillment modes,
      and payment terms — scoped to the matching transaction and message IDs so
      the BAP can correlate and surface the offerings to the buyer. In this
      Catalog Rejection Flow, the items returned by the BPP are subsequently
      evaluated for compliance, making this step the entry point at which
      potentially non-conformant catalog data is ingested for downstream
      validation and rejection processing.

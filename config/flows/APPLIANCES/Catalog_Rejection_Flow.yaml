    action_id: search
    owner: BAP
    responseFor: null
    unsolicited: false
    description: The BAP initiates the Catalog Rejection Flow by broadcasting a
      search request within the Appliances domain (ONDC:RET15), signaling its
      intent to discover available sellers and their catalog offerings in a
      specified city or region. This step establishes the transaction context —
      including transaction ID, message ID, BAP identity, and BAP feature tags —
      that all subsequent steps in the flow will reference.

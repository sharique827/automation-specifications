meta:
  domain: ONDC:RET15
  version: 1.2.5
  flowId: Catalog_Rejection_Flow
  description: A buyer platform issues a search request for appliances, the seller
    platform responds with a catalog via on_search, and the network validates
    and rejects that catalog due to non-compliance or data quality failures,
    exercising the end-to-end catalog rejection pathway in the ONDC retail 1.2.5
    protocol.

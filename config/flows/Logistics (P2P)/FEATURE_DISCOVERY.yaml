                  type: boolean
                  title: Rate Card for P2P (003)
                00B:
                  type: boolean
                  title: Updated cancellation codes (00B)
                00C:
                  type: boolean
                  title: FIFO orders (00C)
                00E:
                  type: boolean
                  title: Pickup & delivery attempt trail (P2H2P) (00E)
                00F:
                  type: boolean
                  title: ePOD (00F)
                "017":
                  type: boolean
                  title: Surge fee (017)
                01A:
                  type: boolean
                  title: Cancellation terms (01A)
                01C:
                  type: boolean
                  title: SLA metrics (01C)
                01D:
                  type: boolean
                  title: Publish special capabilities (01D)
                01E:
                  type: boolean
                  title: RCM self-declaration (01E)
                01F:
                  type: boolean
                  title: Codified static terms (01F)
                "020":
                  type: boolean
                  title: Exchange customer support contact details (020)
                "021":
                  type: boolean
                  title: Differential weight charges (021)
          required:
            - retailCategory
            - category
            - paymentType
            - city_code
            - start_gps
            - end_gps
            - start_code
            - end_code
          additionalProperties: false

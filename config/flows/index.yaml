    description: Health and wellness buyer initiates product selection for an out-of-stock item, testing the seller's out-of-stock error communication and the system's mandatory error reporting protocol. This flow validates the seller's ability to inform buyers of inventory constraints and exercises the required error handling path.
    config:
      $ref: ./HEALTH&WELLNESS/Out_of_Stock_Error_code_.yaml

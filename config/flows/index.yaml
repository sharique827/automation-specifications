    description: Health and wellness product discovery where a buyer searches for available offerings and receives the seller's complete catalog tailored to their specified city, enabling full-catalog exploration at the locality level.
    config:
      $ref: ./HEALTH&WELLNESS/Search_and_Custom_Menu__Full_Catalog_City_.yaml
  - type: playground
    id: Search_and_Custom_Menu_(Incremental_Push)
    usecase: HEALTH&WELLNESS
    tags:
      - WORKBENCH
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
    description: Discovery and incremental presentation of health and wellness products in response to buyer search queries, simulating progressive catalog delivery as sellers match and push items to interested buyers.
    config:
      $ref: ./HEALTH&WELLNESS/Search_and_Custom_Menu__Incremental_Push_.yaml
  - type: playground
    id: Discovery_Flow_incremental_catalog_refresh_pull
    usecase: HEALTH&WELLNESS
    tags:
      - WORKBENCH
    description: A health and wellness buyer discovers and incrementally pulls updated product listings from a seller through successive search interactions, synchronizing only new or modified items. This efficient, pull-based discovery flow enables real-time catalog refresh while minimizing data transfer.
    config:
      $ref: ./HEALTH&WELLNESS/Discovery_Flow_incremental_catalog_refresh_pull.yaml


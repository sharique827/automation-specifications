      $ref: ./Logistics (P2H2P)/ORDER_FLOW_BASE_LINE_WITH_IGM_NO_ACTION_v-2_0_0_.yaml
  - type: playground
    id: ORDER_FLOW_BASE_LINE_WITH_IGM_REJECTION(v-2.0.0)

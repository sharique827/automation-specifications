      - REPORTABLE
    description: An end-to-end purchase finance flow where a buyer discovers, selects, and applies for financing through a single redirection journey without Account Aggregator access, including form capture, order confirmation, status tracking, and post-confirmation updates. It also exercises cancellation handling and the corresponding cancellation and status update callbacks across the transaction lifecycle.
    config:
      $ref: ./PURCHASE FINANCE/Purchase_Finance_Single_Redirection_Without_AA_Cancellation.yaml
  - type: playground

flows:
  - type: playground
    id: Personal_Loan_Offline
    meta:
      order: 0
    usecase: PERSONAL LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A personal loan origination process where borrowers initiate applications through digital search and form completion, then await asynchronous status updates as the lender conducts offline verification and underwriting to reach a final lending decision.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Offline.yaml
  - type: playground
    id: Personal_Loan_Single_Redirection
    meta:
      order: 1
    usecase: PERSONAL LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A borrower searches for and selects a personal loan offer within the Buyer App, then completes the loan origination process through a single redirect to the lender's platform for KYC verification, account validation, mandate setup, and agreement signing, with real-time status updates provided throughout the application lifecycle.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Single_Redirection.yaml
  - type: playground
    id: Personal_Loan_Dedupe_Check
    meta:
      order: 2
    usecase: PERSONAL LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: The flow verifies a borrower's identity against existing personal loan records during application intake to prevent duplicate submissions, enabling efficient onboarding and reducing redundant credit assessments.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Dedupe_Check.yaml
  - type: playground
    id: Gold_Loan_Offline
    usecase: GOLD LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: The Gold Loan Offline flow represents a loan application process where initial digital steps are followed by offline verification or manual underwriting, with the lender asynchronously updating the application status through multiple on_status callbacks until the loan is finalized, rejected, or completed.
    config:
      $ref: ./GOLD LOAN/Gold_Loan_Offline.yaml
  - type: playground
    id: Personal_Loan_Foreclosure_Offline
    usecase: PERSONAL LOAN
    meta:
      order: 3
    tags:
      - WORKBENCH
      - REPORTABLE
    description: Enables borrowers to request and process full early repayment of a personal loan through offline channels, with lender verification and official account foreclosure. The flow manages borrower notification, manual verification, and lender-side processing through to final account closure.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Foreclosure_Offline.yaml
  - type: playground
    id: Personal_Loan_missed_emi_payment_Offline
    meta:
      order: 5
    usecase: PERSONAL LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A borrower initiates offline settlement of a missed EMI payment including applicable penalties through a manual form-based process. The lender validates, reconciles, and confirms the payment before updating the loan account status.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Missed_EMI_Offline.yaml
  - type: playground
    id: Personal_Loan_Pre_Part_Payment_Offline
    usecase: PERSONAL LOAN
    meta:
      order: 4
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A borrower initiates a partial prepayment of their outstanding personal loan principal outside the regular EMI schedule, with the lender validating the request, recalculating repayment terms and charges, and updating the loan status upon successful payment execution.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Pre_Part_Payment_Offline.yaml

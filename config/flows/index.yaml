flows:
  - type: playground
    id: B2B_ORDER_CANCELLATION
    usecase: Logistics (P2H2P)
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: This flow demonstrates the complete B2B logistics order lifecycle from service discovery through cancellation in a point-to-hub-to-point distribution network, enabling participants to search for carriers, place orders, confirm fulfillment, update status, and cancel transactions.
    config:
      $ref: ./Logistics (P2H2P)/B2B_ORDER_CANCELLATION.yaml
  - type: playground
    id: BUYER_SIDE_ORDER_CANCELLATION
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer discovers, confirms, and then cancels a logistics order in a point-to-hub-to-point delivery network before shipment completion.
    config:
      $ref: ./Logistics (P2H2P)/BUYER_SIDE_ORDER_CANCELLATION.yaml
  - type: playground
    id: CANCELLATION_TERMS_FLOW

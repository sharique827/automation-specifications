  - type: playground
    id: ORDER_FLOW_BASE_LINE_WITH_IGM_NO_ACTION(v-2.0.0)
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: Baseline logistics flow demonstrating point-to-hub-to-point delivery operations from order placement through final tracking, including issue reporting and grievance tracking without automatic remediation.

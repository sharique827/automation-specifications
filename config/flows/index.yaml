      - MANDATORY
      - REPORTABLE
    description: End-to-end logistics delivery flow from order placement through tracked delivery completion, with privacy-masked communication channels protecting direct contact between customer and fulfillment provider.
    config:
      $ref: ./Logistics (P2H2P)/Call-Masking.yaml
  - type: playground
    id: E-POD
    usecase: Logistics (P2H2P)
    tags:

      $ref: ./Logistics (P2H2P)/ORDER_FLOW_BASE_LINE_WITH_IGM_REJECTION_v-2_0_0_.yaml
  - type: playground
    id: ORDER_FLOW_CODIFIED_STATIC_TERMS
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: Complete point-to-point delivery transaction encompassing service discovery, shipment confirmation, and multi-stage tracking from origin through distribution hubs to final delivery. Pre-established service terms and pricing enable streamlined booking and fulfillment across the logistics network.
    config:
      $ref: ./Logistics (P2H2P)/ORDER_FLOW_CODIFIED_STATIC_TERMS.yaml
  - type: playground
    id: ORDER_FLOW_EXCHANGE_CUSTOMER_SUPPORT_DETAILS
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: End-to-end point-to-point logistics flow encompassing order discovery, confirmation, real-time tracking, and integrated customer support access throughout the shipment lifecycle.
    config:
      $ref: ./Logistics (P2H2P)/ORDER_FLOW_EXCHANGE_CUSTOMER_SUPPORT_DETAILS.yaml
  - type: playground
    id: ORDER_FLOW_RCM
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A complete logistics transaction flow for point-to-hub-to-point delivery, encompassing order placement, confirmation, shipment tracking, and reverse contract management self-declaration.
    config:
      $ref: ./Logistics (P2H2P)/ORDER_FLOW_RCM.yaml
  - type: playground
    id: PICKUP_DELIVERY_ATTEMPT
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A logistics provider executes a pickup or delivery attempt, tracking progress through multiple status updates from initiation to completion or failure, with provisions for rescheduling when the attempt cannot be completed due to customer unavailability or access constraints. This flow maintains a complete audit trail of all attempts and their outcomes for transparency and operational reporting.
    config:
      $ref: ./Logistics (P2H2P)/PICKUP_DELIVERY_ATTEMPT.yaml
  - type: playground
    id: PREPAID_PAYMENT_FLOW
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A prepaid wallet flow enabling logistics buyers to establish credit with service providers and automatically settle logistics charges as services are delivered and tracked.
    config:
      $ref: ./Logistics (P2H2P)/PREPAID_PAYMENT_FLOW.yaml
  - type: playground
    id: RATE_CARD (P2H2P)
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A shipper searches for available rate cards for their point-to-hub-to-point logistics requirements. The logistics provider responds with applicable rates and service parameters, enabling transparent pricing for hub-routed multi-leg deliveries.
    config:
      $ref: ./Logistics (P2H2P)/RATE_CARD__P2H2P_.yaml
  - type: playground
    id: REVERSE_QC
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: This flow manages the Reverse Quality Check process for handling failed deliveries, where goods must be returned to the logistics hub due to buyer unavailability, accidents, or other unforeseen circumstances. It encompasses provider search, return order confirmation, and continuous status tracking throughout the reverse logistics journey.
    config:
      $ref: ./Logistics (P2H2P)/REVERSE_QC.yaml
  - type: playground
    id: RTO_FLOW
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: This flow manages the Return to Origin (RTO) process for Logistics Service Providers when delivery cannot be completed due to buyer unavailability or unforeseen circumstances, enabling the shipment to be returned to its origin point through the complete order lifecycle. The LSP searches for and initiates a return order, confirms the RTO, tracks its status through transit, and handles any cancellations.
    config:
      $ref: ./Logistics (P2H2P)/RTO_FLOW.yaml
  - type: playground
    id: SELLER_SIDE_ORDER_CANCELLATION
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: Enables sellers to cancel orders in a point-to-home-to-point logistics network following order confirmation, with mandatory status reporting and tracking throughout the cancellation process.
    config:
      $ref: ./Logistics (P2H2P)/SELLER_SIDE_ORDER_CANCELLATION.yaml
  - type: playground
    id: STATIC_OTP_PICKUP_DELIVERY
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: This flow enables a Logistics Buyer Network Partner to place and confirm a logistics order with a Logistics Service Provider, with static OTP verification codes securing the pickup and delivery handoff points throughout the shipment journey.
    config:
      $ref: ./Logistics (P2H2P)/STATIC_OTP_PICKUP_DELIVERY.yaml
  - type: playground
    id: STATIC_OTP_RTO_DELIVERY
    usecase: Logistics (P2H2P)
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: When forward delivery fails or is refused, a return-to-origin fulfillment is triggered where the logistics provider manages the reverse shipment with static OTP-based verification to securely complete the order.
    config:
      $ref: ./Logistics (P2H2P)/STATIC_OTP_RTO_DELIVERY.yaml
  - type: playground

    description: End-to-end Purchase Finance journey for a missed EMI payment, where the buyer discovers, selects, and repays the overdue installment through a single redirection flow without Account Aggregator consent. It covers offer discovery, form-based intake, loan selection, order initiation and confirmation, and subsequent status and update handling through settlement.

flows:
  - type: playground
    id: BUYER INSTRUCTIONS AND ADDRESS UPDATE FLOW
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer selects and confirms a food and beverage order with specific delivery instructions and address details, then initiates mid-order updates (such as modifying delivery instructions or the drop-off address), after which the seller acknowledges the changes and progresses the order through preparation and fulfillment, with status updates reflecting each stage through to delivery completion.
    config:
      $ref: ./F&B/BUYER_INSTRUCTIONS_AND_ADDRESS_UPDATE_FLOW.yaml
  - type: playground
    id: BUYER_CANCEL
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer-initiated cancellation flow for a Food & Beverage order on ONDC, covering the full transaction lifecycle from item selection and checkout through order confirmation, followed by an explicit cancel request from the buyer and the corresponding cancellation acknowledgment from the seller.
    config:
      $ref: ./F&B/BUYER_CANCEL.yaml
  - type: playground
    id: BUYER_DELIVERY
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer selects food and beverage items for home delivery, progresses through order initialisation and confirmation with the seller, receives real-time fulfillment status updates, and then applies post-confirmation order modifications (such as quantity changes or add-ons) that are acknowledged by the seller, completing the full delivery lifecycle.
    config:
      $ref: ./F&B/BUYER_DELIVERY.yaml
  - type: playground
    id: COMMERCIAL_MODEL_FOR_BNP/SNP_FLOW
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: This flow exercises the end-to-end buyer-side negotiated pricing journey in Food & Beverage retail under ONDC's BNP (Buyer Network Participant) and SNP (Seller Network Participant) commercial model, covering item selection through order confirmation. It validates that negotiated pricing terms, commercial agreements, and mandatory compliance attributes (PRAMAAN) are correctly propagated and acknowledged across the discovery-to-confirmation lifecycle.
    config:
      $ref: ./F&B/COMMERCIAL_MODEL_FOR_BNP_SNP_FLOW.yaml
  - type: playground
    id: DELIVERY_FLOW_WITH_IGM(v-1.0.0)
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: A complete Food & Beverage order lifecycle on ONDC covering buyer-initiated item selection, order initialization, and confirmation, followed by real-time delivery tracking via repeated status updates, and culminating in post-delivery grievance redressal through the IGM protocol where a delivery-related complaint is raised, acknowledged, and resolved between the buyer app and seller app.
    config:
      $ref: ./F&B/DELIVERY_FLOW_WITH_IGM_v-1_0_0_.yaml
  - type: playground
    id: DELIVERY_FLOW_WITH_IGM(v-2.0.0)
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: Covers a complete Food & Beverage delivery order lifecycle — from item selection and order confirmation through real-time delivery tracking and multi-stage fulfillment status updates — followed by multiple Issue and Grievance Management (IGM) cycles in which the buyer raises successive post-order complaints, the seller app acknowledges and responds to each grievance, and the final issue triggers an order update to reflect the resolution.
    config:
      $ref: ./F&B/DELIVERY_FLOW_WITH_IGM_v-2_0_0_.yaml
  - type: playground
    id: DELIVERY_FLOW_WITH_IGM_No_Action(v-2.0.0)
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
    description: A complete Food & Beverage delivery order lifecycle covering selection, initialization, and confirmation through multi-stage fulfillment status tracking, followed by three IGM grievance issue cycles raised by the buyer without any seller response or resolution action, concluding with a final order status update reflecting the unresolved complaint.
    config:
      $ref: ./F&B/DELIVERY_FLOW_WITH_IGM_No_Action_v-2_0_0_.yaml
  - type: playground
    id: DELIVERY_FLOW_WITH_IGM_Rejection(v-2.0.0)
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: A complete F&B delivery order lifecycle — from item selection through order confirmation and real-time delivery tracking across multiple status transitions — culminating in a multi-round Issue and Grievance Management (IGM) scenario where the buyer raises a post-order grievance that is rejected by the counterparty, with the final rejection resolution acknowledged via an order update.
    config:
      $ref: ./F&B/DELIVERY_FLOW_WITH_IGM_Rejection_v-2_0_0_.yaml
  - type: playground
    id: FORCE_CANCEL
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer initiates a force cancellation of a confirmed F&B order after progressing through the full placement lifecycle (select through on_confirm) and multiple intermediate status updates, culminating in an explicit cancel request and a final update acknowledging the forced cancellation outcome.
    config:
      $ref: ./F&B/FORCE_CANCEL.yaml
  - type: playground
    id: FULL_CATALOG
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: A buyer application broadcasts a full catalog discovery request across the ONDC network, and participating F&B seller applications respond with their complete menu offerings, including all available items, categories, and fulfillment options, enabling end-to-end catalog visibility for browsing and selection.
    config:
      $ref: ./F&B/FULL_CATALOG.yaml
  - type: playground
    id: INCREMENTAL_CATALOG
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: Validates the F&B incremental catalog discovery mechanism where a buyer network participant initiates a search request and the seller network participant responds with an initial full catalog followed by successive incremental delta updates, enabling the buyer app to progressively synchronize only changed or newly available items without requiring a complete catalog refresh.
    config:
      $ref: ./F&B/INCREMENTAL_CATALOG.yaml
  - type: playground
    id: MULTI_OPTION_FULFILLMENT_FLOW
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
    description: A food and beverage buyer selects an item that supports multiple fulfillment modes (such as dine-in, takeaway, or home delivery), completes the full order negotiation and confirmation lifecycle, and tracks the order through a series of seller-initiated status updates reflecting its progression from acceptance to fulfillment completion.
    config:
      $ref: ./F&B/MULTI_OPTION_FULFILLMENT_FLOW.yaml
  - type: playground
    id: OFFERS_FLOW
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: This flow exercises the end-to-end offer discovery and order placement journey in an F&B transaction, where a buyer selects an item with applicable offers, initiates and confirms the order, and receives a system-triggered update reflecting offer-adjusted pricing or fulfillment details from the seller.
    config:
      $ref: ./F&B/OFFERS_FLOW.yaml
  - type: playground
    id: ORDER_FLOW
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: End-to-end Food & Beverage ordering flow covering buyer-initiated item selection, order initialisation, and seller confirmation, followed by real-time order lifecycle status progression through acceptance, preparation, pickup, and delivery, with in-flight package tracking provided by the logistics provider.
    config:
      $ref: ./F&B/ORDER_FLOW.yaml
  - type: playground
    id: OUT_OF_STOCK
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
    description: A buyer placing an F&B order encounters an out-of-stock response during item selection, revises the cart to available items, and completes the order through initialisation and confirmation, with the seller progressively updating fulfillment status and the buyer actively tracking delivery until the order is fulfilled.
    config:
      $ref: ./F&B/OUT_OF_STOCK.yaml
  - type: playground
    id: OUT_OF_STOCK(ERROR-CODE)
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: The buyer selects an out-of-stock item from a Food & Beverage catalog, and the seller platform rejects the selection via on_select with an error code indicating item unavailability, enabling the buyer app to communicate the out-of-stock condition to the end customer.
    config:
      $ref: ./F&B/OUT_OF_STOCK_ERROR-CODE_.yaml
  - type: playground
    id: RETURN_FLOW
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: Covers the end-to-end lifecycle of an F&B order that undergoes a post-delivery return, beginning with item selection and order confirmation, progressing through multiple seller-side status transitions (accepted, packed, picked up, out for delivery, delivered), and concluding with a buyer-initiated return request followed by seller acknowledgement and liquidation disposition of the returned goods.
    config:
      $ref: ./F&B/RETURN_FLOW.yaml
  - type: playground
    id: RTO_PLUS_PART_CANCELLATION
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: An F&B order undergoes seller-initiated partial item cancellation post-confirmation, after which the remaining items are packed and dispatched for delivery but the delivery attempt fails, triggering a Return to Origin (RTO) and culminating in full cancellation of the residual order by the seller. The flow exercises the complete lifecycle from catalogue selection through order confirmation, partial cancellation, failed last-mile delivery, RTO initiation, and terminal cancellation, with intermediate status transitions covering packing, out-for-delivery, and return-in-transit states.
    config:
      $ref: ./F&B/RTO_PLUS_PART_CANCELLATION.yaml
  - type: playground
    id: SELF_PICKUP
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer selects food and beverage items from an outlet and places an order for self-pickup, confirming it without a delivery agent; the seller accepts, prepares, and marks the order ready for collection, with progressive status updates tracking the order through acceptance, preparation, and fulfillment at the pickup point.
    config:
      $ref: ./F&B/SELF_PICKUP.yaml
  - type: playground
    id: SLOTTED_DELIVERY
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer browses an F&B catalog, selects items, and schedules delivery within a preferred time slot before confirming the order; the platform then tracks the complete fulfillment lifecycle through successive status transitions covering order acceptance, preparation, dispatch, out-for-delivery, and final doorstep delivery within the committed slot.
    config:
      $ref: ./F&B/SLOTTED_DELIVERY.yaml

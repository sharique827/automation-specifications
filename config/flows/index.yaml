flows:
  - type: playground
    id: Buyer_App_Fulfilling_Code_On_Confirm
    usecase: gift-card
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A buyer initiates a gift card purchase by entering a code during confirmation, triggering end-to-end fulfillment validation and status update in the gift card ecosystem.
    config:
      $ref: ./gift-card/Buyer_App_Fulfilling_Code_On_Confirm.yaml
  - type: playground
    id: Buyer_App_Fulfilling_Code_On_Update
    usecase: gift-card
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A buyer initiates a gift card purchase flow by selecting a gift card, initializing the transaction, confirming the details, and then updating the fulfillment code within the buyer app to complete the order.
    config:
      $ref: ./gift-card/Buyer_App_Fulfilling_Code_On_Update.yaml
  - type: playground
    id: Physical_Store_Based_Gift_Cards
    usecase: gift-card
    tags:
      - WORKBENCH
      - REPORTABLE
    description: This flow enables customers to browse, select, and purchase physical gift cards in-store, complete with real-time confirmation and status updates throughout the transaction lifecycle.
    config:
      $ref: ./gift-card/Physical_Store_Based_Gift_Cards.yaml
  - type: playground
    id: Seller_App_Fulfilling
    usecase: gift-card
    tags:
      - WORKBENCH
      - REPORTABLE
    description: This flow represents the end-to-end process of a seller initiating and fulfilling a gift card purchase, from product discovery to confirmation and status update, enabling real-time tracking and reporting of gift card transactions.
    config:
      $ref: ./gift-card/Seller_App_Fulfilling.yaml
  - type: playground
    id: Seller_Cancellation
    usecase: gift-card
    tags:
      - WORKBENCH
      - REPORTABLE
    description: This flow represents a seller-initiated cancellation of a gift card purchase, exercising the end-to-end process from product discovery through confirmation and final cancellation, enabling timely resolution of customer requests within the seller's operational workflow.
    config:
      $ref: ./gift-card/Seller_Cancellation.yaml
  - type: playground
    id: Update_Receiver_Info
    usecase: gift-card
    tags:
      - WORKBENCH
      - REPORTABLE
    description: This flow enables a user to update the recipient details for a gift card purchase, ensuring the correct recipient information is recorded and confirmed before finalizing the transaction.
    config:
      $ref: ./gift-card/Update_Receiver_Info.yaml

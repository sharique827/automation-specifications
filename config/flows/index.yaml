    usecase: Logistics (P2H2P)
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: This flow represents the logistics workflow where an LSP identifies a weight discrepancy between declared and actual shipment weight and communicates the resulting differential charges to involved parties through multiple order updates and status confirmations.

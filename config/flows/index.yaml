      - REPORTABLE
      - WORKBENCH
    description: This flow demonstrates the complete Cash on Delivery logistics transaction where retail customers search for and place orders with deferred payment, and the logistics provider executes shipment pickup, transport, and delivery with payment collection at the point of receipt.

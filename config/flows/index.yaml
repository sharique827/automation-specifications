      $ref: ./PURCHASE FINANCE/Purchase_Finance_Single_Redirection_Without_AA_Loan_Foreclosure.yaml
  - type: playground
    id: Purchase_Finance_Single_Redirection_Without_AA_Missed_EMI_Payment

      - WORKBENCH
      - WITHOUT_AA
      - SINGLE_REDIRECTION
      - REPORTABLE
    description: End-to-end purchase finance journey without Account Aggregator, where the buyer searches and compares financing offers, completes the lender’s single redirection application flow, and proceeds through selection, dynamic form capture, init, confirm, and post-confirmation updates. It exercises a reportable purchase finance transaction from discovery to fulfillment and status tracking.
    config:
      $ref: ./PURCHASE FINANCE/Purchase_Finance_Single_Redirection_Without_AA.yaml
  - type: playground
    id: Purchase_Finance_Single_Redirection_Without_AA_Cancellation

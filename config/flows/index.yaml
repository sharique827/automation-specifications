flows:
  - type: playground
    id: ORDER_TO_CONFIRM_TO_JOURNEY_COMPLETION
    usecase: Bus
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: User uses station code for searching bus
    config:
      $ref: ./Bus/ORDER_TO_CONFIRM_TO_JOURNEY_COMPLETION.yaml
  - type: playground
    id: STATION_CODE_FLOW_CATALOG
    usecase: Bus
    tags:
      - WORKBENCH
      - MANDATORY
    description: User uses station code for searching bus
    config:
      $ref: ./Bus/STATION_CODE_FLOW_CATALOG.yaml
  - type: playground
    id: TECHNICAL_CANCELLATION_FLOW
    usecase: Bus
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: User cancels the bus booking
    config:
      $ref: ./Bus/TECHNICAL_CANCELLATION_FLOW.yaml
  - type: playground
    id: USER_CANCELLATION_FLOW
    usecase: Bus
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: User cancels the bus booking
    config:
      $ref: ./Bus/USER_CANCELLATION_FLOW.yaml


      
  # ________________METRO_____________


  - type: playground
    id: ORDER_TO_CONFIRM_TO_JOURNEY_COMPLETION_RJT
    meta:
      order: 7
    usecase: Metro
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description:
      This flow illustrates a typical purchase journey where the journey
      starts with searching for a specific pair of stations all the way to
      getting the ticket and completion of the journey
    config:
      $ref: ./Metro/ORDER_TO_CONFIRM_TO_JOURNEY_COMPLETION_RJT.yaml
  - type: playground
    id: ORDER_TO_CONFIRM_TO_JOURNEY_COMPLETION_SJT
    meta:
      order: 6
    usecase: Metro
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description:
      This flow illustrates a Single Journey Ticket purchase from search
      to journey completion
    config:
      $ref: ./Metro/ORDER_TO_CONFIRM_TO_JOURNEY_COMPLETION_SJT.yaml
  - type: playground
    id: STATION_CODE_FLOW_CATALOG
    meta:
      order: 0
    usecase: Metro
    tags:
      - WORKBENCH
      - OPTIONAL
    description:
      This flow illustrates the first search operation where the buyer
      app fetches for the catalog of metro providers consisting of routes and
      station codes available
    config:
      $ref: ./Metro/STATION_CODE_FLOW_CATALOG.yaml
  - type: playground
    id: TECHNICAL_CANCELLATION_FLOW
    meta:
      order: 8
    usecase: Metro
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: This flow illustrates the technical cancellation flow where the
      buyer app attempts to cancel the order transaction due to technical
      issues/ failures (viz. on_confirm response beyond ttl)
    config:
      $ref: ./Metro/TECHNICAL_CANCELLATION_FLOW.yaml
  - type: playground
    id: USER_CANCELLATION_FLOW
    meta:
      order: 9
    usecase: Metro
    tags:
      - WORKBENCH
      - OPTIONAL
      - REPORTABLE
    description:
      This flow illustrates the user cancellation flow where the buyer
      intends to cancel their metro ticket
    config:
      $ref: ./Metro/USER_CANCELLATION_FLOW.yaml


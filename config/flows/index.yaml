  - type: playground
    id: Merchant_Side_RTO_and_Part_Order_Cancellation_Flow
    usecase: BPC
    tags:
      - WORKBENCH
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
    description: This flow handles the end-to-end process for Return to Origin (RTO) and partial order cancellations within the BPC domain, covering everything from initial selection and confirmation to final status updates.

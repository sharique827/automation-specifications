flows:
  - type: playground
    id: Personal_Loan_Offline
    meta:
      order: 0
    usecase: PERSONAL LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A personal loan origination flow enabling borrowers to search, apply, and track their application while lenders perform offline verification and underwriting to deliver a lending decision.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Offline.yaml
  - type: playground
    id: Personal_Loan_Single_Redirection
    meta:
      order: 1
    usecase: PERSONAL LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A borrower discovers and selects a personal loan offer within an ONDC marketplace, then completes the full loan origination process—including KYC verification, account validation, mandate setup, and documentation—through seamless single-platform redirection with continuous status updates throughout the application lifecycle.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Single_Redirection.yaml
  - type: playground
    id: Personal_Loan_Dedupe_Check
    meta:
      order: 2
    usecase: PERSONAL LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A borrower searches for and selects a personal loan product while the system verifies against existing loan records to prevent duplicate submissions. This deduplication check ensures efficient loan origination by identifying and filtering redundant applications during the intake workflow.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Dedupe_Check.yaml
  - type: playground
    id: Gold_Loan_Offline
    usecase: GOLD LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A gold loan application flow where customers digitally search for loan products, configure their terms, and submit applications online, while lenders conduct offline verification and underwriting with periodic status updates to borrowers until final approval or rejection.
    config:
      $ref: ./GOLD LOAN/Gold_Loan_Offline.yaml
  - type: playground
    id: Personal_Loan_Foreclosure_Offline
    usecase: PERSONAL LOAN
    meta:
      order: 3
    tags:
      - WORKBENCH
      - REPORTABLE
    description: Enables borrowers to request and process early settlement of a personal loan through offline channels, incorporating lender verification and official account closure.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Foreclosure_Offline.yaml
  - type: playground
    id: Personal_Loan_missed_emi_payment_Offline
    meta:
      order: 5
    usecase: PERSONAL LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A borrower settles a missed personal loan EMI payment offline, including applicable penalties, while the lender validates the settlement and updates the loan account status.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Missed_EMI_Offline.yaml
  - type: playground
    id: Personal_Loan_Pre_Part_Payment_Offline
    usecase: PERSONAL LOAN
    meta:
      order: 4
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A borrower initiates a partial prepayment of their personal loan principal outside the regular EMI schedule to reduce outstanding debt, with the lender validating the prepayment amount, recalculating revised repayment terms and associated charges, and updating the loan account status upon successful payment completion.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Pre_Part_Payment_Offline.yaml



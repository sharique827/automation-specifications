    usecase: BPC
    tags:
      - WORKBENCH
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
    description: A comprehensive transaction flow for Buyer-initiated returns in the BPC domain, covering the end-to-end lifecycle of both full and partial order returns from initial selection and confirmation through to status tracking and final updates.
    config:
      $ref: ./BPC/Buyer_Initiated_Return__Full_Order_and_Partial_Order_.yaml

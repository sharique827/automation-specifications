    owner: BAP
    responseFor: null
    unsolicited: false
    description: The BAP sends a select action specifying items, fulfillments, offers, and provider details to establish the order context for out-of-stock error handling in eB2B commerce.
    mock:
      generate: 
      validate: 
      requirements: ZnVuY3Rpb24gbWVldHNSZXF1aXJlbWVudHMoc2Vzc2lvbkRhdGEpIHsKICByZXR1cm4geyB2YWxpZDogdHJ1ZSwgY29kZTogMjAwLCBkZXNjcmlwdGlvbjogIlJlcXVpcmVtZW50cyBtZXQiIH07Cn0=
      defaultPayload:
        context:
          domain: ONDC:RETeB2B
          action: select
          timestamp: 2025-12-29T06:22:03.809Z
          transaction_id: T1
          message_id: M1
          bap_id: sample-bap-id
          bap_uri: https://bap.example.com
          ttl: PT30S
          bpp_id: sample-bpp-id
          bpp_uri: https://bpp.example.com
          country: IND
          city: std:080
          core_version: 1.2.5
        message:
          order:
            provider:
              id: P1
              locations:
                - id: L1
            items:
              - id: I1
                location_id: L1
                quantity:
                  count: 20
            offers:
              - id: discp10
            fulfillments:
              - end:
                  location:
                    gps: 19.129076,72.825803
                    address:
                      area_code: "400053"
      saveData:
        bapId: $.context.bap_id
        message_id: $.context.message_id
        selected_items: $.message.order.items[*]
        payload_city: $.context.city
        selected_fulfillments: $.message.order.fulfillments[*]
        selected_offers: $.message.order.offers[*]
        provider: $.message.order.provider
      inputs:
        id: reteb2b_select
        jsonSchema:
          $schema: "http://json-schema.org/draft-07/schema#"
          type: object
          additionalProperties: false
          properties:
            type:
              type: string
              description: Retailer registration type
              enum:
                - new
                - existing
              default: existing
            customer_id:
              type: string
              title: Customer ID
              default: CUST-2024-0015421
            city_code:
              type: string
              title: City Code
              default: "std:060"
            live_catalog:
              type: object
              title: Live Catalog Session Data
              description: Captures the live on_search catalog payload dynamically
              additionalProperties: true
            items:
              type: array
              title: 🛒 Cart Items
              minItems: 1
              maxItems: 5
              items:
                type: object
                properties:
                  itemId:
                    type: string
                    title: Item
                    default: I1
                  quantity:
                    type: number
                    title: Quantity
                    minimum: 1
                    default: 1
                  location:
                    type: string
                    title: Location
                    default: L1
                  fulfillment_id:
                    type: string
                    title: Fulfillment
                    default: F1
                required:
                  - itemId
                  - quantity
            available_offers:
              type: array
              title: 🎁 available_offers
              description: Click 'Add Offer' to apply promotions
              minItems: 0
              maxItems: 5
              items:
                type: object
                properties:
                  offerId:
                    type: string
                    title: Select Offer
                    oneOf:
                      - const: discp10
                        title: 10% Discount (discp10)
                      - const: flat150
                        title: Flat ₹150 Off (flat150)
                      - const: slab1
                        title: 15% Bulk Slab (slab1)
                      - const: slab2
                        title: 10% High Volume (slab2)
                      - const: freebie1
                        title: Free Gift (freebie1)
                      - const: buy2get3
                        title: Buy 2 Get 3 (buy2get3)
                required:
                  - offerId
            phone_number:
              type: string
              title: Phone Number
            email:
              type: string
              format: email
              title: Email Address
            tax_number:
              type: string
              title: GSTIN
            provider_tax_number:
              type: string
              title: PAN
            shop_name:
              type: string
              title: Shop Name
              default: kirana store
            address:
              type: string
              title: Address
              default: chandni chowk
            state_code:
              type: string
              title: State Code
              default: KA
            provider_id:
              type: string
              title: Provider ID
              default: P1
            provider_name:
              type: string
              title: Provider Name
              default: ABC Manufacturer
            provider_code:
              type: string
              title: Provider Code
              default: distributor
            provider_short_desc:
              type: string
              title: Provider Short Description
              default: FMCG Wholesale Distributor
          required:
            - type
            - city_code
            - items
            - state_code
            - address
            - shop_name
            - provider_id
            - provider_name
            - provider_code
            - provider_short_desc

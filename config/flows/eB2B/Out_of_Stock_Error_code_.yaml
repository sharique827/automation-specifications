meta:
  domain: ONDC:RETeB2B
  version: 1.2.5
  flowId: Out_of_Stock(Error_code)
  description: An eB2B order transaction demonstrating out-of-stock error handling, where a buyer's selected items are rejected at confirmation with mandatory tracking and status reporting across the supply network.
  flowName: Out of Stock(Error code)
  use_case_id: eB2B
transaction_data:
  transaction_id: 70023cc5-3fe9-4b68-9205-aa2ae40f7d96
  latest_timestamp: 1970-01-01T00:00:00.000Z
  bap_id: sample-bap-id
  bap_uri: https://bap.example.com
  bpp_id: sample-bpp-id
  bpp_uri: https://bpp.example.com
steps:
  - api: select

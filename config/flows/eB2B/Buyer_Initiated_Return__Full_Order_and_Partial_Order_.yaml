        selected_offers: $.message.order.offers[*]
        provider: $.message.order.provider
        RET10Catalog: EVAL#
      inputs:
        id: reteb2b_select
        jsonSchema:
          $schema: http://json-schema.org/draft-07/schema#
          type: object
          additionalProperties: false
          properties:
            type:
              type: string
              enum:
                - new
                - existing
              description: Retailer type
              default: existing
            customer_id:
              type: string
              description: Customer ID
              default: CUST-2024-001234
            phone_number:
              type: string
              description: Retailer phone number
            email:
              type: string
              format: email
              description: Retailer email address
            tax_number:
              type: string
              description: GST / Tax number
            provider_tax_number:
              type: string
              description: PAN / Provider tax number
            shop_name:
              type: string
              description: Retailer shop name
              default: kriana store
            address:
              type: string
              description: Retailer address
              default: chandni chowk
            city_code:
              type: string
              description: City code
              default: std:060
            state_code:
              type: string
              description: State code (default KA)
              default: KA
            items:
              type: array
              minItems: 1
              maxItems: 3
              default: []
              items:
                type: object
                additionalProperties: true
                properties:
                  itemId:
                    type: string
                    default: I1
                  quantity:
                    type: number
                    default: 1
                    minimum: 1
                  location:
                    type: string
                    default: L1
                  fulfillment_id:
                    type: string
                    description: Fulfillment ID (e.g., F1, F2)
                    default: F1
                default: {}
          required:
            - type
            - city_code
            - shop_name
            - address
            - state_code
          allOf:
            - if:
                properties:
                  type:
                    const: new
              then:
                required:
                  - phone_number
                  - email
                  - tax_number
                  - provider_tax_number
                  - shop_name
                  - address
                  - state_code

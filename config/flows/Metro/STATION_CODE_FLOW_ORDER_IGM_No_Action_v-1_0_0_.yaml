    owner: BAP
    responseFor: null
    unsolicited: false
    description: The BAP searches for available metro journeys in a specified city by providing station codes for the origin and destination, along with preferred vehicle type and payment terms. This search intent enables the BPP to identify and offer matching transit services.
    mock:
      generate: 
      validate: 
      requirements: 
      defaultPayload:
        context:
          action: search
          bap_id: dev-automation.ondc.org
          bap_uri: https://dev-automation.ondc.org/api-service/ONDC:TRV11/2.0.1/buyer
          domain: ONDC:TRV11
          location:
            city:
              code: std:011
            country:
              code: IND
          message_id: 3fb5a2dd-eee3-4e2c-92a6-5855ba881dc3
          timestamp: 2026-03-12T11:57:08.871Z
          transaction_id: 6401b2af-29d8-48a3-9259-de9ad0ff5db5
          ttl: PT30S
          version: 2.0.1
        message:
          intent:
            fulfillment:
              vehicle:
                category: METRO
            payment:
              collected_by: BAP
              tags:
                - descriptor:
                    code: BUYER_FINDER_FEES
                  display: false
                  list:
                    - descriptor:
                        code: BUYER_FINDER_FEES_PERCENTAGE
                      value: "1"
                - descriptor:
                    code: SETTLEMENT_TERMS
                  display: false
                  list:
                    - descriptor:
                        code: DELAY_INTEREST
                      value: "2.5"
                    - descriptor:
                        code: STATIC_TERMS
                      value: https://www.abc.com/settlement-terms/

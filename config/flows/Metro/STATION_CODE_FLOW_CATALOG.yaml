        vehicle_type: $.message.intent.fulfillment.vehicle.category
        buyer_app_fee: $.message.intent.payment.tags[?(@.descriptor.code=='BUYER_FINDER_FEES')].list[?(@.descriptor.code=='BUYER_FINDER_FEES_PERCENTAGE')].value

openapi: 3.1.0
info:
  title: ONDC Generated API
  version: 1.0.0
paths:
  /confirm:
    post:
      operationId: confirm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: &context
                  type: object
                  properties:
                    domain:
                      type: string
                    action:
                      type: string
                    timestamp:
                      type: string

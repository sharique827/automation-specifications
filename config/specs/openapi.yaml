openapi: 3.1.0
info:
  title: ONDC Specification
  description: ONDC Specification
  version: 2.2.1
  domain: ONDC:FIS12
paths:
  /cancel:
    post:
      operationId: cancel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: &context
                  type: object
                  properties:
                    location:
                      type: object
                      properties:
                        country: &country
                          type: object
                          properties:
                            code:
                              type: string
                        city: *country
                    domain:
                      type: string
                    timestamp:
                      type: string
                    bap_id:
                      type: string
                    bap_uri:
                      type: string
                    bpp_id:
                      type: string
                    bpp_uri:
                      type: string
                    transaction_id:
                      type: string
                    message_id:
                      type: string
                    version:
                      type: string
                    ttl:
                      type: string
                message:
                  type: object
                  properties:
                    order_id:
                      type: string
                    cancellation_reason_id:
                      type: string
                    descriptor: &descriptor_2
                      type: object
                      properties:
                        name:
                          type: string
                        code:
                          type: string
      responses: &responses
        "200":
          description: Synchronous ACK/NACK response
          content:
            application/json:
              schema: &a1
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        properties:
                          status:
                            enum:
                              - ACK
                              - NACK
                          tags:
                            description: A list of tags containing any additional information sent along
                              with the Acknowledgement.
                            type: array
                            items:
                              description: A collection of tag objects with group level attributes. For
                                detailed documentation on the Tags and Tag
                                Groups schema go to
                                https://github.com/beckn/protocol-specifications/discussions/316
                              type: object
                              additionalProperties: false
                              properties:
                                display:
                                  description: Indicates the display properties of the tag group. If display is
                                    set to false, then the group will not be
                                    displayed. If it is set to true, it should
                                    be displayed. However, group-level display
                                    properties can be overriden by individual
                                    tag-level display property. As this schema
                                    is purely for catalog display purposes, it
                                    is not recommended to send this value during
                                    search.
                                  type: boolean
                                  default: true
                                descriptor:
                                  description: Description of the TagGroup, can be used to store detailed
                                    information.
                                  properties: &properties
                                    name:
                                      type: string
                                    code:
                                      type: string
                                    short_desc:
                                      type: string
                                    long_desc:
                                      type: string
                                    additional_desc:
                                      type: object
                                      additionalProperties: false
                                      properties:
                                        url:
                                          type: string
                                        content_type:
                                          type: string
                                          enum:
                                            - text/plain
                                            - text/html
                                            - application/json
                                    media:
                                      type: array
                                      items:
                                        description: This object contains a url to a media file.
                                        type: object
                                        additionalProperties: false
                                        properties:
                                          mimetype:
                                            description: indicates the nature and format of the document, file, or
                                              assortment of bytes. MIME types
                                              are defined and standardized in
                                              IETF's RFC 6838
                                            type: string
                                          url:
                                            description: The URL of the file
                                            type: string
                                            format: uri
                                          signature:
                                            description: The digital signature of the file signed by the sender
                                            type: string
                                          dsa:
                                            description: The signing algorithm used by the sender
                                            type: string
                                    images:
                                      type: array
                                      items:
                                        description: Describes an image
                                        type: object
                                        additionalProperties: false
                                        properties:
                                          url:
                                            description: URL to the image. This can be a data url or an remote url
                                            type: string
                                            format: uri
                                          size_type:
                                            description: The size of the image. The network policy can define the default
                                              dimensions of each type
                                            type: string
                                            enum:
                                              - xs
                                              - sm
                                              - md
                                              - lg
                                              - xl
                                              - custom
                                          width:
                                            description: Width of the image in pixels
                                            type: string
                                          height:
                                            description: Height of the image in pixels
                                            type: string
                                  type: object
                                list:
                                  description: An array of Tag objects listed under this group. This property can
                                    be set by BAPs during search to narrow the
                                    `search` and achieve more relevant results.
                                    When received during `on_search`, BAPs must
                                    render this list under the heading described
                                    by the `name` property of this schema.
                                  type: array
                                  items:
                                    description: Describes a tag. This is used to contain extended metadata. This
                                      object can be added as a property to any
                                      schema to describe extended attributes.
                                      For BAPs, tags can be sent during search
                                      to optimize and filter search results.
                                      BPPs can use tags to index their catalog
                                      to allow better search functionality. Tags
                                      are sent by the BPP as part of the catalog
                                      response in the `on_search` callback. Tags
                                      are also meant for display purposes. Upon
                                      receiving a tag, BAPs are meant to render
                                      them as name-value pairs. This is
                                      particularly useful when rendering tabular
                                      information about a product or service.
                                    type: object
                                    additionalProperties: false
                                    properties:
                                      descriptor:
                                        description: Description of the Tag, can be used to store detailed information.
                                        properties: *properties
                                        type: object
                                      value:
                                        description: The value of the tag. This set by the BPP and rendered as-is by the
                                          BAP.
                                        type: string
                                      display:
                                        description: This value indicates if the tag is intended for display purposes.
                                          If set to `true`, then this tag must
                                          be displayed. If it is set to `false`,
                                          it should not be displayed. This value
                                          can override the group display value.
                                        type: boolean
                        description: Describes the acknowledgement sent in response to an API call. If
                          the implementation uses HTTP/S, then Ack must be
                          returned in the same session. Every API call to a BPP
                          must be responded to with an Ack whether the BPP
                          intends to respond with a callback or not. This has
                          one property called `status` that indicates the status
                          of the Acknowledgement.
                        type: object
                    required:
                      - ack
                  error:
                    description: Describes an error object that is returned by a BAP, BPP or BG as a
                      response or callback to an action by another network
                      participant. This object is sent when any request received
                      by a network participant is unacceptable. This object can
                      be sent either during Ack or with the callback.
                    type: object
                    additionalProperties: false
                    properties:
                      code:
                        type: string
                        description: Standard error code. For full list of error codes, refer to
                          docs/protocol-drafts/BECKN-005-ERROR-CODES-DRAFT-01.md
                          of this repo"
                      paths:
                        type: string
                        description: Path to json schema generating the error. Used only during json
                          schema validation errors
                      message:
                        type: string
                        description: Human readable message describing the error. Used mainly for
                          logging. Not recommended to be shown to the user.
                required:
                  - message
  /confirm:
    post:
      operationId: confirm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        provider: &provider
                          type: object
                          properties:
                            id:
                              type: string
                        items: &items
                          type: array
                          items: *provider
                        payments:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              type:
                                type: string
                              collected_by:
                                type: string
                              status:
                                type: string
                              params:
                                type: object
                                properties:
                                  transaction_id:
                                    type: string
                                  amount:
                                    type: string
                              tags: &tags
                                type: array
                                items: &items_2
                                  type: object
                                  properties:
                                    descriptor: *country
      responses: *responses
  /init:
    post:
      operationId: init
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        provider: *provider
                        items: *items
                        payments:
                          type: array
                          items:
                            type: object
                            properties:
                              collected_by:
                                type: string
                              type:
                                type: string
                              status:
                                type: string
                              params:
                                type: object
                                properties:
                                  bank_code:
                                    type: string
                                  bank_account_number:
                                    type: string
                                  virtual_payment_address:
                                    type: string
                              tags: &tags_3
                                type: array
                                items:
                                  type: object
                                  properties:
                                    descriptor: *country
                                    list:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          descriptor: *country
                                          value:
                                            type: string
      responses: *responses
  /on_cancel:
    post:
      operationId: on_cancel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                        provider: *provider
                        fulfillments:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              state: *items_2
                        quote:
                          type: object
                          properties:
                            price: &price
                              type: object
                              properties:
                                value:
                                  type: string
                            breakup: &breakup
                              type: array
                              items:
                                type: object
                                properties:
                                  title:
                                    type: string
                        cancellation_terms: &cancellation_terms
                          type: array
                          items:
                            type: object
                            properties:
                              fulfillment_state: *items_2
                        created_at:
                          type: string
                        updated_at:
                          type: string
      responses: *responses
  /on_confirm:
    post:
      operationId: on_confirm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                        provider: &provider_2
                          type: object
                          properties:
                            id:
                              type: string
                            descriptor: &descriptor
                              type: object
                              properties:
                                name:
                                  type: string
                            tags: *tags
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              descriptor: *country
                              price: *price
                              fulfillment_ids: &fulfillment_ids
                                type: array
                                items:
                                  type: string
                              tags: *tags
                        fulfillments:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              type:
                                type: string
                              state: *items_2
                              customer:
                                type: object
                                properties:
                                  person: *descriptor
                        payments:
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                type: string
                              status:
                                type: string
                              id:
                                type: string
                              params: &params
                                type: object
                                properties:
                                  amount:
                                    type: string
                                  currency:
                                    type: string
                              time:
                                type: object
                                properties:
                                  label:
                                    type: string
                                  range:
                                    type: object
                                    properties:
                                      start:
                                        type: string
                                      end:
                                        type: string
                              tags: &tags_2
                                type: array
                                items:
                                  type: object
                                  properties:
                                    descriptor: *country
                                    list: *tags
                        quote:
                          type: object
                          properties:
                            id:
                              type: string
                            price: *price
                            breakup: *breakup
                        cancellation_terms: *cancellation_terms
                        documents:
                          type: array
                          items:
                            type: object
                            properties:
                              descriptor: *country
                              url:
                                type: string
                              mime_type:
                                type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
      responses: *responses
  /on_init:
    post:
      operationId: on_init
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        provider: *provider_2
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              descriptor: *country
                              price: &price_2
                                type: object
                                properties:
                                  value:
                                    type: string
                                  currency:
                                    type: string
                              fulfillment_ids: *fulfillment_ids
                              tags: *tags
                        fulfillments:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              type:
                                type: string
                              customer:
                                type: object
                                properties:
                                  person: *descriptor
                                  contact:
                                    type: object
                                    properties:
                                      phone:
                                        type: string
                                      email:
                                        type: string
                              state: *items_2
                        payments:
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                type: string
                              status:
                                type: string
                              tags: *tags
                              params: *params
                        cancellation_terms:
                          type: array
                          items:
                            type: object
                            properties:
                              fulfillment_state: *items_2
                              cancellation_fee:
                                type: object
                                properties:
                                  percentage:
                                    type: string
                        quote:
                          type: object
                          properties:
                            id:
                              type: string
                            price: *price_2
                            ttl:
                              type: string
                            breakup: *breakup
      responses: *responses
  /on_search:
    post:
      operationId: on_search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    catalog:
                      type: object
                      properties:
                        descriptor: *descriptor
                        providers:
                          type: array
                          items:
                            type: object
                            properties:
                              categories:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    descriptor: *descriptor_2
                                    id:
                                      type: string
                                    parent_category_id:
                                      type: string
                              id:
                                type: string
                              descriptor:
                                type: object
                                properties:
                                  name:
                                    type: string
                                  images:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        url:
                                          type: string
                                        size_type:
                                          type: string
                              tags: *tags_2
                              payments:
                                type: array
                                items: &items_3
                                  type: object
                                  properties:
                                    collected_by:
                                      type: string
                                    tags: *tags_3
                              items:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    category_ids: *fulfillment_ids
                                    descriptor: *descriptor_2
      responses: *responses
  /on_select:
    post:
      operationId: on_select
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        provider:
                          type: object
                          properties:
                            id:
                              type: string
                            descriptor: *descriptor
                            tags: *tags_2
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              descriptor: *descriptor_2
                              category_ids: *fulfillment_ids
                              price: *price_2
                              tags: *tags_3
                        quote:
                          type: object
                          properties:
                            id:
                              type: string
                            price: *price_2
                            breakup:
                              type: array
                              items:
                                type: object
                                properties:
                                  title:
                                    type: string
                                  price: *price_2
                            ttl:
                              type: string
      responses: *responses
  /on_status:
    post:
      operationId: on_status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        provider: *provider
                        items: *items
                        quote:
                          type: object
                          properties:
                            breakup: *breakup
      responses: *responses
  /on_update:
    post:
      operationId: on_update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                        provider: *provider
                        items: *items
                        fulfillments:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              type:
                                type: string
                              state: *items_2
                        payments:
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                type: string
                              status:
                                type: string
                        quote:
                          type: object
                          properties:
                            breakup:
                              type: array
                              items:
                                type: object
                                properties:
                                  title:
                                    type: string
                                  price: *price
                        documents: *tags
                        updated_at:
                          type: string
      responses: *responses
  /search:
    post:
      operationId: search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    intent:
                      type: object
                      properties:
                        category: *items_2
                        payment: *items_3
      responses: *responses
  /select:
    post:
      operationId: select
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        provider: *provider
                        items: *items
      responses: *responses
  /status:
    post:
      operationId: status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    ref_id:
                      type: string
      responses: *responses
  /update:
    post:
      operationId: update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order: *provider
                    update_target:
                      type: string
      responses: *responses

openapi: 3.1.0
info:
  title: ONDC Protocol API for eB2B
  description: ONDC Protocol API specification, which includes statutory
    requirements for packaged commodities and pre-packaged food This is an
    adaptation of Beckn Core version 0.9.3
  version: 1.2.5
  domain: ONDC:RETeB2B
paths:
  /search:
    post:
      tags:
        - ONDC Seller App
        - ONDC Gateway
      description: Search for services by intent
      requestBody:
        description: Buyer searches for products and services
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    intent:
                      $ref: '#/components/schemas/Intent'
              required:
                - context
                - message
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /select:
    post:
      tags:
        - ONDC Seller App
      description: Select items from the catalog and build your order
      requestBody:
        description: Buyer selects one or more catalog items
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    order:
                      description: Describes the details of an order
                      type: object
                      properties:
                        provider:
                          type: object
                          properties:
                            id:
                              $ref: '#/components/schemas/Provider/properties/id'
                            descriptor:
                              $ref: '#/components/schemas/ProviderDescriptor'
                            locations:
                              type: array
                              maxItems: 1
                              items:
                                type: object
                                properties:
                                  id:
                                    $ref: >-
                                      #/components/schemas/Location/properties/id
                        items:
                          type: array
                          items:
                            description: >-
                              Describes a product or a service offered to the
                              end consumer by the provider
                            type: object
                            properties:
                              id:
                                description: >-
                                  This is the most unique identifier of a
                                  service item. An example of an Item ID could
                                  be the SKU of a product.
                                type: string
                              descriptor:
                                description: >-
                                  Describes the description of a real-world
                                  object.
                                type: object
                                properties:
                                  tags:
                                    type: array
                                    items:
                                      $ref: '#/components/schemas/TagGroup'
                              location_id:
                                description: >-
                                  This is the most unique identifier of a
                                  location item.
                                type: string
                              quantity:
                                description: quantity
                                type: object
                                properties:
                                  count:
                                    type: integer
                                    minimum: 0
                              tags:
                                type: array
                                items:
                                  $ref: '#/components/schemas/TagGroup'
                              fulfillment_id:
                                type: string
                                description: Modes through which this item can be fulfilled
                        offers:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                $ref: '#/components/schemas/Offer/properties/id'
                              tags:
                                type: array
                                items:
                                  $ref: '#/components/schemas/TagGroup'
                        fulfillments:
                          type: array
                          items:
                            type: object
                            properties:
                              customer:
                                allOf:
                                  - $ref: '#/components/schemas/Customer'
                                  - type: object
                                    required:
                                      - id
                              end:
                                $ref: '#/components/schemas/FulfillmentLocation'
                        
                        tags:
                          type: array
                          items:
                            $ref: '#/components/schemas/TagGroup'
                  required:
                    - order
              required:
                - context
                - message
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /init:
    post:
      tags:
        - ONDC Seller App
      description: Initialize an order by providing billing and/or shipping details
      requestBody:
        description: Buyer initializes order checkout
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    order:
                      $ref: '#/components/schemas/Order'
                  required:
                    - order
              required:
                - context
                - message
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /confirm:
    post:
      tags:
        - ONDC Seller App
      description: Initialize an order by providing billing and/or shipping details
      requestBody:
        description: Buyer confirms an order
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    order:
                      description: Describes the details of an order
                      type: object
                      properties:
                        id:
                          type: string
                          description: Unique identifier for Order across the network
                        state:
                          type: string
                        provider:
                          type: object
                          properties:
                            id:
                              $ref: '#/components/schemas/Provider/properties/id'
                            descriptor:
                              $ref: '#/components/schemas/ProviderDescriptor'
                            locations:
                              type: array
                              maxItems: 1
                              items:
                                type: object
                                properties:
                                  id:
                                    $ref: >-
                                      #/components/schemas/Location/properties/id
                        items:
                          type: array
                          items:
                            $ref: '#/components/schemas/Item'
                        offers:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                $ref: '#/components/schemas/Offer/properties/id'
                        documents:
                          type: array
                          items:
                            $ref: '#/components/schemas/Document'
                        billing:
                          $ref: '#/components/schemas/Billing'
                        fulfillments:
                          type: array
                          items:
                            $ref: '#/components/schemas/OrderFulfillment'
                        cancellation_terms:
                          description: >-
                            The cancellation terms of this order. This can be
                            overriden at the item level cancellation terms.
                          type: array
                          items:
                            $ref: '#/components/schemas/CancellationTerm'
                        quote:
                          $ref: '#/components/schemas/Quotation'
                        payments:
                          $ref: '#/components/schemas/Payments'
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        tags:
                          type: array
                          items:
                            $ref: '#/components/schemas/TagGroup'
                  required:
                    - order
              required:
                - context
                - message
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /status:
    post:
      tags:
        - ONDC Seller App
      description: Fetch the latest order object
      requestBody:
        description: Buyer checks for status of order
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    order_id:
                      $ref: '#/components/schemas/Order/properties/id'
                  required:
                    - order_id
              required:
                - context
                - message
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /track:
    post:
      tags:
        - ONDC Seller App
      description: Track an active order
      requestBody:
        description: Buyer tracks fulfillment of an order
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    order_id:
                      $ref: '#/components/schemas/Order/properties/id'
                  required:
                    - order_id
              required:
                - context
                - message
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /cancel:
    post:
      tags:
        - ONDC Seller App
      description: Cancel an order
      requestBody:
        description: Buyer cancels an order
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    order_id:
                      $ref: '#/components/schemas/Order/properties/id'
                    cancellation_reason_id:
                      $ref: '#/components/schemas/Option/properties/id'
                    descriptor:
                      description: Describes the description of a real-world object.
                      type: object
                      properties:
                        name:
                          type: string
                        short_desc:
                          type: string
                        tags:
                          type: array
                          items:
                            $ref: '#/components/schemas/TagGroup'
                  required:
                    - order_id
              required:
                - context
                - message
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /update:
    post:
      tags:
        - ONDC Seller App
      description: Update an order
      requestBody:
        description: Buyer updates an order
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    update_target:
                      description: >-
                        Comma separated values of order objects being updated.
                        For example:
                        ```"update_target":"item,billing,fulfillment,payment"```
                      type: string
                    order:
                      description: Describes the details of an order
                      type: object
                      properties:
                        id:
                          type: string
                          description: Unique identifier for Order across the network
                        items:
                          type: array
                          items:
                            $ref: '#/components/schemas/OrderItem'
                        fulfillments:
                          type: array
                          items:
                            description: >-
                              Describes how a single product/service will be
                              rendered/fulfilled to the end customer
                            type: object
                            properties:
                              id:
                                type: string
                                description: >-
                                  Unique reference ID to the fulfillment of an
                                  order
                              type:
                                type: string
                                description: >-
                                  This describes the type of fulfillment
                                  ("Pickup" - Buyer picks up from store by
                                  themselves or through their logistics
                                  provider; "Delivery" - seller delivers to
                                  buyer)
                                enum:
                                  - Delivery
                                  - Return
                              end:
                                type: object
                                properties:
                                  instructions:
                                    type: object  
                                    properties:
                                      additional_desc:
                                        type: object
                                        properties:
                                          content_type:
                                            type: string
                                            enum:
                                              - text/plain
                                              - text/html
                              tags:
                                type: array
                                items:
                                  $ref: '#/components/schemas/TagGroup'
                        payments:
                          $ref: '#/components/schemas/Payments'
                  required:
                    - update_target
                    - order
              required:
                - context
                - message
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /on_search:
    post:
      tags:
        - ONDC Buyer App
      description: Send catalog
      requestBody:
        description: Sellers provide their catalog in response to buyer search
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    catalog:
                      $ref: '#/components/schemas/Catalog'
              required:
                - context
                - message
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - context
  /on_select:
    post:
      tags:
        - ONDC Buyer App
      description: Send draft order object with quoted price for selected items
      requestBody:
        description: Seller provides quote for selected items
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    order:
                      description: Describes the details of an order
                      type: object
                      properties:
                        provider:
                          type: object
                          properties:
                            id:
                              $ref: '#/components/schemas/Provider/properties/id'
                            descriptor:
                              $ref: '#/components/schemas/ProviderDescriptor'
                            locations:
                              type: array
                              maxItems: 1
                              items:
                                type: object
                                properties:
                                  id:
                                    $ref: >-
                                      #/components/schemas/Location/properties/id
                        items:
                          type: array
                          items:
                            description: >-
                              Describes a product or a service offered to the
                              end consumer by the provider
                            type: object
                            properties:
                              id:
                                description: >-
                                  This is the most unique identifier of a
                                  service item. An example of an Item ID could
                                  be the SKU of a product.
                                type: string
                              parent_item_id:
                                description: >-
                                  This is the most unique identifier of a
                                  service item. An example of an Item ID could
                                  be the SKU of a product.
                                type: string
                              location_id:
                                type: string
                                description: Unique identifier for location
                              quantity:
                                description: quantity
                                type: object
                                properties:
                                  count:
                                    type: integer
                                    minimum: 0
                              fulfillment_id:
                                type: string
                                description: >-
                                  Unique reference ID to the fulfillment of an
                                  order
                              fulfillment_ids:
                                type: array
                                items:
                                  type: string
                                  description: >-
                                    Unique reference ID to the fulfillment of an
                                    order
                              tags:
                                type: array
                                items:
                                  $ref: '#/components/schemas/TagGroup'
                        offers:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                $ref: '#/components/schemas/Offer/properties/id'
                              tags:
                                $ref: '#/components/schemas/TagGroup'
                        fulfillments:
                          type: array
                          items:
                            description: >-
                              Describes how a single product/service will be
                              rendered/fulfilled to the end customer
                            type: object
                            properties:
                              id:
                                type: string
                                description: >-
                                  Unique reference ID to the fulfillment of an
                                  order
                              type:
                                type: string
                                description: >-
                                  This describes the type of fulfillment
                                  ("Pickup" - Buyer picks up from store by
                                  themselves or through their logistics
                                  provider; "Delivery" - seller delivers to
                                  buyer)
                                enum:
                                  - Delivery
                                  - Pickup
                                  - Delivery and Pickup
                                  - Reverse QC
                              '@ondc/org/category':
                                type: string
                                description: Fulfillment Category
                              '@ondc/org/provider_name':
                                type: string
                                description: Fulfillment Provider Name
                              '@ondc/org/TAT':
                                description: >-
                                  fulfillment turnaround time in ISO8601
                                  durations format e.g. 'PT24H' indicates 24
                                  hour TAT
                                type: string
                              state:
                                $ref: '#/components/schemas/State'
                              customer:
                                allOf:
                                  - $ref: '#/components/schemas/Customer'
                                  - type: object
                                    required:
                                      - id
                              tracking:
                                type: boolean
                                description: >-
                                  Indicates whether the fulfillment allows
                                  tracking
                                default: false
                              start:
                                description: Details on the end of fulfillment
                                type: object
                                properties:
                                  time:
                                    description: >-
                                      Describes time in its various forms. It
                                      can be a single point in time; duration;
                                      or a structured timetable of operations
                                    type: object
                                    properties:
                                      range:
                                        type: object
                                        properties:
                                          start:
                                            type: string
                                            format: date-time
                                          end:
                                            type: string
                                            format: date-time
                              end:
                                description: Details on the start of fulfillment
                                type: object
                                properties:
                                  location:
                                    $ref: '#/components/schemas/Location'
                                  time:
                                    description: >-
                                      Describes time in its various forms. It
                                      can be a single point in time; duration;
                                      or a structured timetable of operations
                                    type: object
                                    properties:
                                      range:
                                        type: object
                                        properties:
                                          start:
                                            type: string
                                            format: date-time
                                          end:
                                            type: string
                                            format: date-time
                              tags:
                                type: array
                                items:
                                  $ref: '#/components/schemas/TagGroup'
                            required:
                              - id
                              - type
                        quote:
                          $ref: '#/components/schemas/Quotation'
                  required:
                    - order
                error:
                  $ref: '#/components/schemas/Error'
              required:
                - context
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /on_init:
    post:
      tags:
        - ONDC Buyer App
      description: Send order object with payment details updated
      requestBody:
        description: Seller provides terms and conditions for an order
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    order:
                      $ref: '#/components/schemas/Order'
                  required:
                    - order
                error:
                  $ref: '#/components/schemas/Error'
              required:
                - context
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /on_confirm:
    post:
      tags:
        - ONDC Buyer App
      description: Send active order object
      requestBody:
        description: Seller confirms order
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    order:
                      $ref: '#/components/schemas/Order'
                  required:
                    - order
                error:
                  $ref: '#/components/schemas/Error'
              required:
                - context
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /on_track:
    post:
      tags:
        - ONDC Buyer App
      description: Send tracking details of an active order
      requestBody:
        description: Seller provides tracking details for an order
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    tracking:
                      $ref: '#/components/schemas/Tracking'
                  required:
                    - tracking
                error:
                  $ref: '#/components/schemas/Error'
              required:
                - context
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /on_cancel:
    post:
      tags:
        - ONDC Buyer App
      description: >-
        Send cancellation request_id with reasons list in case of cancellation
        request. Else send cancelled order object
      requestBody:
        description: Seller provides response to cancellation request
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    order:
                      $ref: '#/components/schemas/Order'
                  required:
                    - order
                error:
                  $ref: '#/components/schemas/Error'
              required:
                - context
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /on_update:
    post:
      tags:
        - ONDC Buyer App
      description: Returns updated service with updated runtime object
      requestBody:
        description: Seller provides response to order update
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                context:
                  $ref: '#/components/schemas/Context'
                message:
                  type: object
                  properties:
                    order:
                      $ref: '#/components/schemas/Order'
                  required:
                    - order
                error:
                  $ref: '#/components/schemas/Error'
              required:
                - context
      responses:
        '200':
          description: Acknowledgement of message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        $ref: '#/components/schemas/Ack'
                    required:
                      - ack
                  error:
                    $ref: '#/components/schemas/Error'
                required:
                  - message
  /on_status:
    post:
      tags:
        - ONDC Buyer App
      description: Fetch the status of a Service
      requestBody:
        description: Seller provides status information for order
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:

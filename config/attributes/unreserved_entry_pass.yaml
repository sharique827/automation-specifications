        info: The container holds the top-level message structure that persists across multiple actions in the transaction flow, providing a unified context for downstream operations such as selection, confirmation, and cancellation. The BAP generates this object on the initial search request and ensures it is carried through all subsequent actions in the journey, enabling consistent state tracking across steps.

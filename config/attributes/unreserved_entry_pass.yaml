meta:
  use_case_id: unreserved-entry-pass
attribute_set:
  search:
    context:
      location:
        _description:
          required: true
          usage: ""
          info: The BAP populates the context.location object with the intended fulfillment location during the search action, ensuring it is consistent across all subsequent steps of the transaction flow. This value is set by the BAP at the start of the search and is used as a reference point for downstream actions, though it is not persisted or reused across steps.
          owner: BAP
          type: object
        country:
          _description:
            required: true
            usage: ""
            info: The BAP populates this field with the country code or name associated with the user's location during the search request, providing contextual geographic information for downstream processing. This value is not persisted across steps or shared with the BPP in any cross-flow mechanism.
            owner: BAP
            type: object
          code:
            _description:
              required: Mandatory
              usage: IND
              owner: BAP
              type: string
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
        city:
          _description:
            required: true
            usage: ""
            info: The BAP populates the city component of the location context during search and ensures it is consistent across all messages in the transaction, as the value is set in generate and asserted in validate, forming a stable reference for downstream flows.
            owner: BAP
            type: object
          code:
            _description:
              required: Mandatory
              usage: "*"
              owner: BAP
              type: string
              info: Describes the city code this location is, or is located within
      domain:
        _description:
          required: Mandatory
          usage: ONDC:FIS13
          owner: BAP
          type: string
          info: Describes domain code that is relevant to this transaction context
      timestamp:
        _description:
          required: Mandatory
          usage: 2023-03-23T04:41:16Z
          owner: BAP
          type: string
          info: Describes tme of request generation in RFC3339 format
      bap_id:
        _description:
          required: Mandatory
          usage: fis.test.bap.io
          owner: BAP
          type: string
          info: Describes subscriber ID of the BAP
      transaction_id:
        _description:
          required: Mandatory
          usage: 6743e9e2
          owner: BAP
          type: string
          info: Describes  a unique value which persists across all API calls
      message_id:
        _description:
          required: Mandatory
          usage: 13ba8018f176
          owner: BAP
          type: string
          info: Describes a unique value which persists during a request / callback cycle.
      version:
        _description:
          required: Mandatory
          usage: 2.0.0
          owner: BAP
          type: integer
          info: Describes the version of transaction protocol being used by the sender.
      action:
        _description:
          required: Mandatory
          usage: search
          owner: BAP
          type: string
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
      bap_uri:
        _description:
          required: Mandatory
          usage: https://fis.test.bap.io/
          owner: BAP
          type: string
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
      ttl:
        _description:
          required: Mandatory
          usage: PT30S
          owner: BAP
          type: string
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
      _description:
        required: true
        usage: ""
        info: Every API call in the ONDC protocol includes a context object that provides a high-level overview of the transaction, typically set by the BAP based on the consumer's location and UI actions. The BAP initializes and populates this context on the first request, and it is carried forward in all subsequent interactions within the same transaction, ensuring consistency across the flow.
        owner: BAP
        type: object
    message:
      intent:
        _description:
          required: true
          usage: ""
          info: The BAP defines and sends the user's intent to buy or avail a product or service in the search request, including details like desired location, time, provider, payment method, and item type, which the BPP uses to find matching offerings. This intent is preserved across flows and steps, anchored in session under the key on_search2_message, and reused in subsequent actions like on_select and on_init to maintain context.
          owner: BAP
          type: object
        category:
          _description:
            required: true
            usage: ""
            info: The BAP sets the intent category in the search request to convey the user's interest or purpose for browsing, and this value is persisted across all subsequent steps of the transaction using the key on_search2_message, ensuring consistency in the flow from search to confirmation.
            owner: BAP
            type: object
          descriptor:
            _description:
              required: true
              usage: ""
              info: The BAP sets the intent category descriptor in the search request to define the type of service or product being sought, and this value is carried across all subsequent steps of the transaction flow, anchored in the session via the persisted key on_search2_message, ensuring consistency across search, selection, and fulfillment phases.
              owner: BAP
              type: object
            code:
              _description:
                required: Mandatory
                usage: CULTURE_HERITAGE
                owner: BAP
                type: string
                info: Describes the intent category
        fulfillment:
          _description:
            required: true
            usage: ""
            info: The BAP populates and sends the fulfillment intent in search, specifying how the customer wants their order delivered or processed, and this intent is preserved across downstream steps and reused in subsequent actions like on_search and on_confirm through the persisted key on_search2_message.
            owner: BAP
            type: object
          stops:
            _description:
              required: true
              usage: ""
              info: The BAP populates the list of fulfillment stops during search, with each stop representing a logical location in the delivery or service journey, and this data is carried across multiple message exchanges in the transaction, anchored in the session via the persisted key on_search2_message for reuse in subsequent steps.
              owner: BAP
              type: object
            type:
              _description:
                required: Mandatory
                usage: START
                owner: BAP
                type: string
                info: Describes the fulfillment type
            location:
              _description:
                required: true
                usage: ""
                info: BAP sets the fulfillment location details in the search request, and these values are persisted across flows and reused in subsequent steps through the persisted key on_search2_message, ensuring consistency in location data throughout the transaction lifecycle.
                owner: BAP
                type: object
              gps:
                _description:
                  required: optional
                  usage: 28.666576, 77.233332
                  owner: BAP
                  type: string
                  info: Describes the locaiton cordiantes
              circle:
                _description:
                  required: optional
                  type: object
                  owner: BAP
                  usage: --
                  info: Describes the info about the location descriptor.
                radius:
                  _description:
                    required: optional
                    type: object
                    owner: BAP
                    usage: --
                    info: Describes the info about the location raidus.
                  value:
                    _description:
                      required: optional
                      usage: 10.12
                      owner: BAP
                      type: string
                      info: Describes the locaiton radius
              city:
                _description:
                  required: true
                  usage: ""
                  info: The BAP sets the city-level location details in the intent fulfillment stops during search and carries them across all subsequent steps of the transaction, with the value preserved and reused in downstream flows through the persisted key on_search2_message. This ensures consistency in location context across cancellation, incremental pull, and purchase journeys where the city is part of the fulfillment stop metadata.
                  owner: BAP
                  type: object
                code:
                  _description:
                    required: optional
                    usage: std:040
                    owner: BAP
                    type: string
                    info: Describes the locaiton city code.
            time:
              _description:
                required: true
                usage: ""
                info: The BAP initializes the stop time details as a structured object in the search request, and this value is persisted across the transaction flow with the key on_search2_message, ensuring consistency and reuse in subsequent steps like incremental pull and cancellation workflows.
                owner: BAP
                type: object
              timestamp:
                _description:
                  required: optional
                  usage: 2024-06-27T04:41:16.000Z
                  owner: BAP
                  type: string
                  info: Describes the timestamp for fulfillment
              range:
                start:
                  _description:
                    required: true
                    usage: 2026-06-28T05:00:16.000Z
                    info: The BAP populates this field with a start timestamp in ISO 8601 format during the search request, and the value is preserved across subsequent messages in the transaction. This timestamp is anchored in the session under the key start_time and reused across flows such as cancellation and incremental pulls to ensure temporal alignment of fulfillment stop times.
                    owner: BAP
                    type: date-time
                end:
                  _description:
                    required: true
                    usage: 2026-06-28T06:00:16.000Z
                    info: The BAP sets the end time of a fulfillment stop's time range in the search request, and this value is persisted across flows and reused in subsequent steps as a key tied to the fulfillment stop's start time. The value is anchored in session and carried forward through multiple actions, including cancellation and incremental pulls, where it is validated and referenced in the fulfillment stop's time window.
                    owner: BAP
                    type: date-time
                _description:
                  required: true
                  usage: ""
                  info: The BAP sets the time range for fulfillment stops in the search request, and this value is preserved across subsequent steps of the journey, anchored in session under the key on_search2_message, ensuring consistency in stop timing expectations across all flows.
                  owner: BAP
                  type: object
          vehicle:
            _description:
              required: true
              usage: ""
              info: The BAP sets the vehicle details in the intent fulfillment field during search, defining the type of vehicle available for service, and this value is preserved across subsequent steps of the journey, anchored in session under the key on_search2_message for continuity and consistency.
              owner: BAP
              type: object
            category:
              _description:
                required: Mandatory
                usage: SITE
                owner: BAP
                type: string
                info: Describes the vechilce category
        payment:
          _description:
            required: true
            usage: ""
            info: The BAP populates the payment intent with details on how the customer wishes to pay for the order, and this intent is preserved across all subsequent steps of the transaction, including cancellation and order flow, where it is reused by the BPP to ensure consistent payment preferences. The value is anchored in the session under the key `on_search2_message` and carried forward through all flows to maintain continuity in payment decisioning.
            owner: BAP
            type: object
          collected_by:
            _description:
              required: optional
              usage: BAP
              owner: BAP
              type: string
              info: Describes the payment collector
        tags:
          BAP_TERMS:
            _description:
              required: Mandatory
              usage: --
              owner: BAP
              type: object
              info: Describes the BAP terms
            list:
              BUYER_FINDER_FEES_PERCENTAGE:
                _description:
                  required: Mandatory
                  usage: --
                  owner: BAP
                  type: string
                  info: Describes the Buyer finder fee percentage
              BUYER_FINDER_FEES_TYPE:
                _description:
                  required: Mandatory
                  usage: --
                  owner: BAP
                  type: string
                  info: Describes the Buyer finder fee type
              STATIC_TERMS:
                _description:
                  required: optional
                  usage: --
                  owner: BAP
                  type: object
                  info: Describes the static terms
              SETTLEMENT_BASIS:
                _description:
                  required: optional
                  usage: --
                  owner: BAP
                  type: string
                  info: Describes the settlement basis
              SETTLEMENT_WINDOW:
                _description:
                  required: optional
                  usage: --
                  owner: BAP
                  type: string
                  info: Describes the sttlement window
          descriptor:
            code:
              _description:
                required: true
                usage: BAP_TERMS
                info: The BAP sets the intent tag code in the search request to signal the type of journey or flow, such as terms negotiation or incremental pull, and this value is persisted across the transaction and reused in subsequent steps like on_search2_message and on_init to ensure consistent context. The value is carried through the flow and anchored in session so that downstream actions inherit the same tag for continuity and behavioral alignment.
                owner: BAP
                type: string
            name:
              _description:
                required: true
                usage: BAP Terms of Engagement
                info: The BAP populates this field with a human-readable descriptor name indicating the intent context, such as "BAP Terms of Engagement" or "Incremental Pull", and this value is carried across message exchanges in the transaction and reused in subsequent steps, anchored in session via the persisted key "tags" for continuity and context tracking.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: The BAP initializes the intent tags array in the search request, and the BPP echoes the same tags in its response, with the entire set preserved across flows and reused in subsequent steps through the persisted key tags. The value is anchored in session and carried forward in all downstream actions, ensuring consistency across cancellation, purchase, and incremental pull journeys.
              owner: BAP
              type: object
          display:
            _description:
              required: true
              usage: "false"
              info: The BAP sets the display tag flag to indicate whether the search results should be shown to the user, and this value is preserved across flows and reused in subsequent steps via the persisted key "tags" to ensure consistent rendering behavior.
              owner: BAP
              type: boolean
          list:
            descriptor:
              code:
                _description:
                  required: true
                  usage: BUYER_FINDER_FEES_PERCENTAGE
                  info: The BAP includes the intent tags list in the search request, with each tag's descriptor.code identifying a specific business rule or condition, and the value is persisted across flows and reused in downstream steps such as init and confirm to ensure consistent evaluation of terms and conditions. The tags are anchored in session and carried forward through the transaction lifecycle so that any BPP can validate or apply the same business logic across all relevant actions.
                  owner: BAP
                  type: string
              name:
                _description:
                  required: true
                  usage: Register
                  info: The BAP populates this field with a human-readable tag indicating the user's intent, such as "Register", which is then carried forward across message flows and preserved in the session for reuse in subsequent steps like on_search2_message, ensuring consistency in user intent tracking. The value is inherited and anchored in the session, allowing it to be reused across multiple flows and steps without redefinition.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: The BAP initializes the intent tags list in the search request, and the value is persisted under the key "tags" across all subsequent steps in the flow, ensuring consistency and reuse across cancellation, form submission, and incremental pull journeys. The tags are inherited and anchored in the session, allowing the BPP to reference and preserve them across message exchanges without re-minting.
                owner: BAP
                type: object
            value:
              _description:
                required: true
                usage: https://api.example-bap.com/booking/terms
                info: The BAP initializes the intent tags list with a URL or identifier that points to a terms and conditions document, and this value is preserved across all downstream messages in the transaction. The value is inherited and reused by subsequent steps, anchored in session state under the key "tags" so that both BAP and BPP maintain consistency in the terms reference throughout the flow.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: The BAP initializes the intent tags list in the search request, and the BPP echoes the same tags in its response to maintain consistency across flows; the value is anchored in session and reused by subsequent steps through the persisted key tags.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: The BAP populates the message.intent.tags array with a list of user-defined or system-defined tags to signal intent or context, and this value is persisted across message flows and reused in subsequent steps through the session. The tags are carried forward in every message of the transaction and are validated against the same criteria in each flow to ensure consistency and alignment of intent.
            owner: BAP
            type: object

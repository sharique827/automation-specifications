              required: false
              usage: P1
              info: BAP specifies the user-selected provider identifier, anchored in the session for reuse across subsequent transaction steps.
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: The BAP designates a specific provider to search, causing the search to be filtered to that provider's offerings instead of querying across the entire catalog.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: The BAP places its search intent in the message object, declaring what products or services it seeks and any relevant preferences such as payment terms or item characteristics that should be matched against available offerings.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object

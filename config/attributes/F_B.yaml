meta:
  use_case_id: F&B
attribute_set:
  search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET10
          info: Specifies the domain in which the transaction operates
          owner: BAP
          type: enum
          enums:
            - code: ONDC:RET10
              description: Grocery
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET11
              description: F&B
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET12
              description: Fashion
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET13
              description: BPC
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET14
              description: Electronics
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET15
              description: Appliances
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET16
              description: Home & Kitchen
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET17
              description: Toys & Games
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET18
              description: Agriculture
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET19
              description: Health & Wellness
              reference: <PR/Issue/Discussion Links md format text>
      action:
        _description:
          required: true
          usage: search
          info: Specifies the action being performed in the transaction
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: Specifies the country in which the transaction is occurring
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: "*"
          info: Specifies the city or region of the transaction
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: Specifies the ONDC core version being used
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: buyerNP.com
          info: Specifies the ID of the Buyer App participating in the transaction
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://buyerNP.com/ondc
          info: Specifies the URI where the Buyer App is hosted
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: a4b24113-7c05-495b-9249-f33482bf3493
          info: Helps track a specific transaction across ONDC
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 6aae986b-37c2-47d2-a26c-daaf8ccbd764
          info: Used for tracking and logging purposes
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2023-06-03T09:00:00.000Z
          info: Ensures synchronization across different ONDC participants
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Specifies how long the request remains valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The routing and transaction-correlation envelope that the BAP populates before crafting the update payload; it is generated and validated on every update call across post-order modification flows such as address changes, buyer instructions, returns, force-cancels, and delivery status updates.
        owner: BAP
        type: object
    message:
      intent:
        payment:
          "@ondc/org/buyer_app_finder_fee_type":
            _description:
              required: true
              usage: percent
              info: Indicates whether the fee is a fixed amount or a percentage
              owner: BAP
              type: string
          "@ondc/org/buyer_app_finder_fee_amount":
            _description:
              required: true
              usage: "3"
              info: Represents the value of the fee applied
              owner: BAP
              type: string
          _description:
            required: true
            usage: ""
            info: Payment preferences the BAP includes in the search intent to signal to the BPP the buyer's intended mode of settlement, enabling the BPP to return only catalog results that are compatible with those payment terms.
            owner: BAP
            type: object
        fulfillment:
          type:
            _description:
              required: false
              usage: Delivery
              info: Specifies how the order will be fulfilled (e.g., Delivery, Pickup)
              owner: BAP
              type: string
          end:
            location:
              gps:
                _description:
                  required: false
                  usage: 12.974002,77.613458
                  info: Indicates where the item is to be delivered
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: false
                    usage: "560001"
                    info: Specifies the postal code of the delivery location
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        item:
          descriptor['name']:
            _description:
              required: false
              usage: coffee
              info: Specifies the product name in the order
              owner: BAP
              type: string
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: Top-level container the BAP constructs in a search request to express the buyer's discovery intent, and also the carrier for the BAP's finder fee type and amount so BPPs receiving the broadcast can factor those commercial terms into their catalog responses.
          owner: BAP
          type: object
        tags:
          code:
            _description:
              required: true
              usage: catalog_inc
              info: The BAP places this code inside the intent's tag list on search to declare its catalog-mode preferences or platform capabilities to the BPP, and the value is asserted during request validation to confirm a recognised intent type was sent. It appears in both full and incremental catalog discovery flows, signalling which catalog variant or BAP feature set the search request is anchored to.
              owner: BAP
              type: string
          list:
            code:
              _description:
                required: true
                usage: mode
                info: The BAP sets this code to name the specific search parameter or catalog-pull criterion being expressed within the enclosing tag group, and the BPP validates it when processing the request to correctly interpret the accompanying value for both full and incremental catalog flows.
                owner: BAP
                type: string
            value:
              _description:
                required: true
                usage: yes
                info: The BAP places the value for each tag list entry here, with its meaning determined by the associated descriptor code. In the INCREMENTAL_CATALOG flow, this field is overwritten with the session's search_mode when one is supplied, which gates how the BPP should scope or filter the catalog it returns.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: Collection of individual key-value descriptor entries within a tag group that the BAP populates on search to qualify catalog intent parameters, validated across both full and incremental catalog flows.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: A list of tag groups attached to the search intent that conveys BAP-specific protocol terms to the BPP, such as the buyer app's static terms and conditions URL and their effective date, enabling the BPP to validate or acknowledge the BAP's operating conditions before responding with catalog results.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: Top-level payload envelope the BAP populates in an update call to convey post-confirmation order modifications, covering scenarios such as delivery address or buyer instruction changes, force cancellations, return initiations, and RTO-plus-partial-cancellation events.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET10
          info: Represents the ONDC domain version used in the transaction
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: on_search
          info: Specifies the event type in the ONDC protocol
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: Identifies the country for the transaction
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: ONDC core version used
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: buyerNP.com
          info: Unique identifier of the buyer app
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://buyerNP.com/ondc
          info: URL for the buyer app
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: sellerNP.com
          info: Unique identifier of the seller app
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://sellerNP.com/ondc
          info: URL for the seller app
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 7c7aa709-a05e-4ad5-a49d-22bd64282e71
          info: ID used to track the transaction
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: bc167440-16e7-4ba6-9132-9b25518f1da2
          info: ID used for message correlation
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2024-12-23T06:55:45.035Z
          info: Time of the request
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: std:022
          info: Identifies the city
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The routing and transaction-correlation envelope that the BAP populates before crafting the update payload; it is generated and validated on every update call across post-order modification flows such as address changes, buyer instructions, returns, force-cancels, and delivery status updates.
        owner: BPP
        type: object
      ttl:
        _description:
          required: true
          usage: PT30S
          info: ISO 8601 duration declaring how long this on_select response remains valid; the BPP sets it to signal the BAP the window within which the quoted prices and fulfillment options can be acted upon. The hard ceiling across all ONDC actions including on_select is PT30S, though a buyer app may configure a shorter value to match its own UX latency requirements.
          owner: BPP
          type: string
    message:
      catalog:
        bpp/fulfillments:
          id:
            _description:
              required: true
              usage: F1
              info: Represents fulfillment details
              owner: BAP
              type: string
          type:
            _description:
              required: true
              usage: Delivery
              info: Defines the method of fulfillment
              owner: BAP
              type: enum
              enums:
                - code: Delivery
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Self-Pickup
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Delivery and Self-Pickup
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        bpp/descriptor:
          name:
            _description:
              required: true
              usage: Seller NP
              info: Seller business name
              owner: BAP
              type: string
          symbol:
            _description:
              required: true
              usage: https://sellerNP.com/images/np.png
              info: Seller brand icon URL
              owner: BAP
              type: string
          short_desc:
            _description:
              required: true
              usage: Seller Marketplace
              info: Short description of the seller
              owner: BAP
              type: string
          long_desc:
            _description:
              required: true
              usage: Seller Marketplace
              info: Detailed description of the seller
              owner: BAP
              type: string
          images:
            _description:
              required: true
              usage: https://sellerNP.com/images/np.png
              info: Image URL of the seller
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: Describes the BPP (Seller Network Participant) platform itself — its display name, short and long descriptions, logo images, and operational tags such as platform type and BAP terms acceptance — returned by the BPP in an on_search response so the BAP can identify and present the selling platform's branding and policy information to the buyer.
            owner: BPP
            type: object
          tags:
            code:
              _description:
                required: false
                usage: bpp_terms
                info: Tag-group identifier on the BPP's catalog descriptor that the BPP populates in the on_search response to label a named set of platform-level metadata; the BAP is expected to assert this code when validating the catalog payload.
                owner: BPP
                type: string
            list:
              code:
                _description:
                  required: false
                  usage: np_type
                  info: Machine-readable key identifying which network-participant attribute the BPP is declaring within this tag list entry on its catalog descriptor. The BPP populates these codes in the on_search response, and the BAP is expected to validate that the required codes are present and carry acceptable values before proceeding.
                  owner: BPP
                  type: string
              value:
                _description:
                  required: false
                  usage: MSN
                  info: The actual value associated with a BPP descriptor tag list entry, conveying provider-level metadata such as the network participant type (for example, whether the BPP operates as a Managed Service Node) or policy acceptance flags that the BAP uses to understand the BPP's capabilities and operational context.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Each entry in this list is a key-value pair that conveys a specific term or policy attribute of the BPP, such as the network participant type or whether the BPP accepts BAP terms, together forming a structured tag group that describes the BPP's operational conditions in the catalog response.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: Structured metadata tags attached to the BPP's catalog descriptor, used to communicate network-participant-level terms and classifications such as the seller NP type and whether it accepts BAP terms, enabling the BAP to understand the seller platform's operational role and policy agreements.
              owner: BPP
              type: object
        bpp/providers:
          id:
            _description:
              required: true
              usage: P1
              info: Unique identifier for provider
              owner: BAP
              type: string
          descriptor:
            name:
              _description:
                required: true
                usage: Store 1
                info: Name of the provider store
                owner: BAP
                type: string
            symbol:
              _description:
                required: true
                usage: https://sellerNP.com/images/store1.png
                info: URL for provider logo
                owner: BAP
                type: string
            short_desc:
              _description:
                required: true
                usage: Store 1
                info: Short description of the provider
                owner: BAP
                type: string
            long_desc:
              _description:
                required: true
                usage: Store 1
                info: Detailed description of the provider
                owner: BAP
                type: string
            images:
              _description:
                required: true
                usage: https://sellerNP.com/images/store1.png
                info: URL for provider image
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: Describes the provider's identity details as returned by the BPP in a full catalog response, including the name, short and long descriptions, and images that the BAP uses to display the seller or restaurant to end users.
              owner: BPP
              type: object
          ttl:
            _description:
              required: true
              usage: P1D
              info: Time-To-Live for provider data
              owner: BAP
              type: string
          items:
            descriptor:
              name:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Name of the item
                  owner: BAP
                  type: string
              code:
                _description:
                  required: false
                  usage: 1:XXXXXXXXXXXXX
                  info: Unique code for the item
                  owner: BAP
                  type: string
              symbol:
                _description:
                  required: true
                  usage: https://sellerNP.com/images/i1.png
                  info: URL for product image
                  owner: BAP
                  type: string
              short_desc:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Short description of the item
                  owner: BAP
                  type: string
              long_desc:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Detailed description of the item
                  owner: BAP
                  type: string
              images:
                _description:
                  required: true
                  usage: https://sellerNP.com/images/i1.png
                  info: URL for product image
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Descriptive metadata container for a catalog item that the BPP populates in both full and incremental on_search catalog flows, and whose presence is validated on receipt by the BAP.
                owner: BPP
                type: object
            price:
              currency:
                _description:
                  required: true
                  usage: INR
                  info: Currency for the item price
                  owner: BAP
                  type: string
              value:
                _description:
                  required: true
                  usage: "100"
                  info: Price of the item
                  owner: BAP
                  type: string
              maximum_value:
                _description:
                  required: true
                  usage: "100"
                  info: Maximum price for the item
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: The pricing details for a catalog item returned by the BPP, encapsulating the item's listed cost including the currency and value, which the BAP uses to display the item price to the buyer during catalog browsing.
                owner: BPP
                type: object
              tags:
                code:
                  _description:
                    required: true
                    usage: range
                    info: Label that identifies the pricing scheme conveyed by this tag group within the item's price tags; the BPP sets it in the on_search catalog payload, and the validator asserts its presence to confirm the pricing structure is explicitly declared for every catalogued item.
                    owner: BPP
                    type: string
                list:
                  code:
                    _description:
                      required: true
                      usage: lower
                      info: Identifies the boundary type of a price range tag, distinguishing whether the associated value represents the lower or upper bound of the item's acceptable price range returned by the BPP in the catalog response.
                      owner: BPP
                      type: string
                  value:
                    _description:
                      required: true
                      usage: "894.00"
                      info: The numeric monetary amount corresponding to a price boundary in the item's price range tag, where sibling entries define the lower and upper bounds of the item's price (for example, the minimum and maximum price across variants or offers) as returned by the BPP in its catalog response.
                      owner: BPP
                      type: string
                  _description:
                    required: true
                    usage: ""
                    info: A collection of key-value pair entries that together define the bounds or breakdown of a price tag, such as the lower and upper limits of a price range communicated by the BPP for a catalog item during search response.
                    owner: BPP
                    type: object
                _description:
                  required: true
                  usage: ""
                  info: Supplementary pricing metadata returned by the BPP for an item, used to communicate structured price range information such as the lower and upper bounds of the item's price band alongside the base price value.
                  owner: BPP
                  type: object
            quantity:
              unitized:
                measure:
                  unit:
                    _description:
                      required: true
                      usage: kilogram
                      info: Unit of measurement for the item
                      owner: BAP
                      type: enum
                      enums:
                        - code: unit
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: gram
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: dozen
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: kilogram
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: tonne
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: litre
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: millilitre
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                  value:
                    _description:
                      required: true
                      usage: "3"
                      info: Measured quantity of the item
                      owner: BAP
                      type: string
                  _description:
                    required: true
                    usage: ""
                    info: The physical measurement of a single unitized quantity of the item, expressed as a numeric value paired with its unit, indicating how much one unit of the item contains or weighs for the purpose of display and comparison.
                    owner: BPP
                    type: object
                count:
                  _description:
                    required: true
                    usage: "3"
                    info: Measured Unitized count of the item
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Represents the per-unit packaging or measurement of a single sellable unit of the item, allowing the BPP to communicate how each individual unit of the item is measured or packaged (for example, one bottle of 500ml or one pack containing a single unit) so that buyers can understand the standardized unit size being offered.
                  owner: BPP
                  type: object
              available:
                count:
                  _description:
                    required: true
                    usage: "99"
                    info: Available stock count
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Represents the currently available stock quantity for a catalog item, returned by the BPP in both full and incremental catalog responses so the BAP can display real-time availability to buyers.
                  owner: BPP
                  type: object
              maximum:
                count:
                  _description:
                    required: true
                    usage: "99"
                    info: Max items per order
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: The upper bound on how many units of this item a buyer may purchase in a single order, returned by the BPP in catalog responses so the BAP can enforce or display per-order quantity caps during item selection.
                  owner: BPP
                  type: object
              minimum:
                count:
                  _description:
                    required: true
                    usage: "1"
                    info: Min items per order
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: true
                usage: ""
                info: Communicates the available and maximum orderable quantity details for a catalog item returned by the BPP, enabling the BAP to display stock availability and enforce ordering limits for that item.
                owner: BPP
                type: object
            category_id:
              _description:
                required: true
                usage: Atta, Flours and Sooji
                info: Item category classification
                owner: BAP
                type: string
            "@ondc/org/returnable":
              _description:
                required: true
                usage: "1"
                info: Indicates if the item is returnable
                owner: BAP
                type: string
            rating:
              _description:
                required: true
                usage: "4"
                info: The BPP returns the rating for an individual catalog item in the search response, present across both full and incremental catalog flows so the BAP can surface item-level quality scores to buyers at discovery time.
                owner: BPP
                type: string
            "@ondc/org/cancellable":
              _description:
                required: true
                usage: "1"
                info: Indicates if the item can be canceled
                owner: BAP
                type: string
            "@ondc/org/available_on_cod":
              _description:
                required: true
                usage: "False"
                info: Whether Cash on Delivery is available
                owner: BAP
                type: string
            "@ondc/org/statutory_reqs_packaged_commodities":
              manufacturer_or_packer_name:
                _description:
                  required: false
                  usage: ITC
                  info: Name of the manufacturer
                  owner: BAP
                  type: string
              manufacturer_or_packer_address:
                _description:
                  required: false
                  usage: ITC Quality Care Cell, P.O Box No.592, Bangalore-560005
                  info: Address of the manufacturer
                  owner: BAP
                  type: string
              mfg_license_no:
                _description:
                  required: false
                  usage: 51/UA/SC/P-2013
                  info: Manufacturing License number
                  owner: BAP
                  type: string
              multiple_products_name_number_or_qty:
                _description:
                  required: false
                  usage: "15"
                  info: Multiple products name,number or quantity
                  owner: BAP
                  type: string
              common_or_generic_name_of_commodity:
                _description:
                  required: false
                  usage: Electric Sewing Machine
                  info: The common or generic name of the packaged commodity
                  owner: BAP
                  type: string
              month_year_of_manufacture_packing_import:
                _description:
                  required: false
                  usage: 2024-08-06 00:00:00
                  info: The date of manufacture, packing, or import of the commodity
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            time:
              timestamp:
                _description:
                  required: true
                  usage: 2024-12-23T06:55:45.035Z
                  info: Time of item update
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: A time object associated with an item returned by the BPP, used to convey scheduling or availability constraints for that item, such as a validity window or fulfillment time range during which the item can be ordered or delivered.
                owner: BPP
                type: object
              label:
                _description:
                  required: true
                  usage: enable
                  info: A lifecycle or availability state marker for the item's time specification, indicating whether the item's scheduled time window is currently active or inactive — for example, "enable" signals that the associated time range is in effect and the item should be treated as available during that period.
                  owner: BPP
                  type: string
            tags:
              list:
                code:
                  _description:
                    required: true
                    usage: channel_margin_type
                    info: Type of channel margin
                    owner: BAP
                    type: string
                value:
                  _description:
                    required: true

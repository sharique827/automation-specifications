              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET11
              description: F&B
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET12
              description: Fashion
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET13

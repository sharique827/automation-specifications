        _description:
          required: true
          usage: PT30S
          info: Specifies how long the request remains valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: Container for transaction-level context that the BAP includes in the search request to establish the session.
        owner: BAP
        type: object
      bpp_id:
        _description:
          required: false
          usage: bpp.example.com
          info: The BAP specifies which BPP to search by including its identifier in the request; the value persists in context state for the transaction.
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: false
          usage: https://bpp.example.com

  issue:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET11
          info: The BAP sets this to the ONDC domain code of the original order against which the grievance is being raised, so the issue is scoped and routed to the correct domain participants on the network. It must match the domain value carried in the originating transaction flow that the complaint pertains to.
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: issue
          info: Identifies the specific ONDC API call being made in this context envelope; for an IGM grievance initiation the BAP sets this to the fixed value for the issue action, and the protocol layer persists it as last_action to validate that each message in the IGM flow carries a permitted, recognized action name.
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2026-03-20T11:36:11.485Z
          info: The BAP sets this to the RFC3339 wall-clock time at which the issue request is generated. Across all IGM delivery flows, the value is continuously overwritten into the session as the latest timestamp, so the system always holds the most recent message time and can establish chronological ordering throughout the grievance resolution chain.
          owner: BAP
          type: date-time
      transaction_id:
        _description:
          required: true
          usage: 70023cc5-3fe9-4b68-9205-aa2ae40f7d96
          info: The BAP places here the transaction identifier established during the original commerce flow, linking the grievance raised in this issue call to the specific order being disputed. This value is persisted as a session anchor and carried unchanged across all subsequent IGM calls — on_issue, issue_status, on_issue_status — so that all participants can correlate every grievance message back to the originating order transaction.
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: b5b13772-0818-4dd9-b5b9-d8185c5ba59f
          info: Unique identifier the BAP mints for this issue request that scopes the request/callback cycle, allowing the corresponding on_issue callback to be matched against it. Across IGM flows it is also persisted as the session key latestMessage_id, so downstream steps such as on_track can reference the most recent message in the grievance chain without re-transmitting the full context.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: sample-bap-id
          info: The BAP places its own unique identifier here — typically its fully qualified domain name — to identify itself as the originating buyer application in the confirm request. This value is anchored in session as bapId and reused across downstream steps including cancel, return, and IGM flows throughout the order lifecycle.
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://bap.example.com
          info: The BAP places its callback endpoint here so the BPP knows where to deliver the on_confirm response and all subsequent asynchronous callbacks; the domain of this URI must match the bap_id declared in the same context. The BPP persists this value across post-confirm flows — including cancellation, status, return, and IGM flows — to ensure callbacks from any later action in the order lifecycle are routed back to the correct Buyer App endpoint.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: ISO 8601 duration declaring how long this on_select response remains valid; the BPP sets it to signal the BAP the window within which the quoted prices and fulfillment options can be acted upon. The hard ceiling across all ONDC actions including on_select is PT30S, though a buyer app may configure a shorter value to match its own UX latency requirements.
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: sample-bpp-id
          info: The BAP places the target Seller App's unique identifier — by default its fully qualified domain name — in this field when sending the confirm request, where it is mandatory for this peer-to-peer call. The value is persisted as bppId in session state and reused across all subsequent post-confirmation flows, including cancel, update, return, and IGM interactions, to route those calls back to the correct BPP.
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://bpp.example.com
          info: Network endpoint of the Seller App (BPP) that the BAP directs this confirm request to; its domain must match the bpp_id, and the field is mandatory on all peer-to-peer calls except search and on_search. The BAP persists this value under the session key bppUri at confirm time so that all downstream post-order calls — including cancellation, update, IGM grievance, return, and RTO flows — can resolve the correct BPP endpoint without re-deriving it.
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: The BAP sets this to the ISO 3166 Alpha-3 country code identifying the market context for the tracking request, scoping the session to a specific national network.
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: "*"
          info: The BAP places the STD-prefixed city code here when raising an issue, identifying the city scope of the grievance using the telephone STD code format defined in the ONDC context spec. This value is anchored in the IGM session as city_code and carried forward across all subsequent issue-resolution steps in the grievance flow.
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: Version of the ONDC core API specification under which the BAP is raising this issue. The BAP sets this on the issue call to signal to the BPP and the IGM network which spec version governs message structure and expected behavior for this grievance flow.
          owner: BAP
          type: string
      _description:

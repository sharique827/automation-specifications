              info: Specifies the product name in the order
              owner: BAP
              type: string
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The BAP declares the consumer's intent to buy or avail a product or service in this container.
          owner: BAP
          type: object
        tags:
          code:
            _description:
              required: true
              usage: catalog_full
              info: Code tag the BAP specifies in the search intent; the BPP echoes it in the search response. This code is required but does not persist across subsequent transaction steps.
              owner: BAP
              type: string
          list:
            code:
              _description:
                required: true
                usage: auto
                info: Specifies the category of tag in the search request, such as configuration modes (like 'auto') or document and metadata references (like 'static_terms' and 'effective_date') that the BPP should recognize.
                owner: BAP
                type: string
            value:
              _description:
                required: true
                usage: "true"
                info: Control signal that the BAP sends in search requests to manage the incremental catalog cycle. The BAP writes this field only when in incremental search mode (gated by sessionData.inc_mode), and the value is persisted in the session for reference in subsequent requests.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: Array of tag objects the BAP specifies to qualify the search intent with buyer preferences, conditions, or additional requirements.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: The BAP specifies its applicable terms documentation and effective dates to establish the contractual framework governing the transaction.
            owner: BAP
            type: object
        provider:

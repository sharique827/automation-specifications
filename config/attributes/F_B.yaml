                    info: The monetary amount the BPP assigns to a single line entry in the quote breakup during on_select, expressing that item's price contribution toward the overall order total. The enclosing quote object is persisted in session and carried forward by the BAP into init, confirm, and downstream update and cancel calls, so the BAP must retain these values exactly as received.

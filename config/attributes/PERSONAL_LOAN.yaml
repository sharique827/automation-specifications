                type: string
            transaction_id:
              _description:
                required: false
                usage: 4429e52c-5d41-4e24-ac2e-42eb2fa8f72b
                info: <placeholder description>
                owner: BPP
                type: string
            _description:
              required: true
              usage: ""
              info: Container for the payment parameters carried forward in the saved order payload; at on_status the BPP echoes the same session-anchored values back as part of the order snapshot so the BAP can reuse them when reconstructing the transaction state in later steps.
              owner: BPP
              type: object
          status:
            _description:
              required: true
              usage: PAID
              info: Status of each payment entry in the updated order, showing whether that payment has been paid, not paid, deferred, or delayed. In on_update the BPP returns the refreshed order with these payment statuses so the BAP can reconcile repayment progress, and because the order is persisted across steps the same payment state is carried forward into later actions.
              owner: BPP
              type: string
          time:
            label:
              _description:
                required: true
                usage: INSTALLMENT
                info: Label that distinguishes the payment leg as the loan disbursal or an installment. In on_status, the BPP echoes the label on the saved order’s payments so the BAP can match the same payment entry across steps, and when the label is INSTALLMENT the response keeps the default status but refreshes the installment timeline from session data.
                owner: BPP
                type: string
            timestamp:
              _description:
                required: false
                usage: 2023-05-25T05:23:03.443000Z
                info: The BPP records the payment timestamp in on_status to indicate when each payment was recorded; this value is persisted and referenced in subsequent order updates and fulfillment tracking.
                owner: BPP
                type: date-time
            range:
              start:
                _description:
                  required: true
                  usage: 2023-08-01T00:00:00.000Z
                  info: Start timestamp for the payment’s time range, used to anchor the payment period that this order update is carrying. In on_update, the BPP returns this date as part of the updated payment object, and the value is stored with the order so later steps reuse the same persisted payment state.
                  owner: BPP
                  type: date-time
              end:
                _description:
                  required: true
                  usage: 2023-08-31T23:59:59.999Z
                  info: Upper bound of the payment schedule window carried in the order update response; the BPP returns this end timestamp in on_update, and because the order is persisted in session, later steps reuse the same value when reading or replaying the saved order.
                  owner: BPP
                  type: date-time
              _description:
                required: true
                usage: ""
                info: The BPP returns the confirmed payment window for the order here, making it the binding schedule the BAP should rely on after confirmation. The order payload is persisted in session and reused in later steps, so this timing information stays anchored to the same transaction as the flow continues.
                owner: BPP
                type: object
            _description:
              required: true
              usage: ""
              info: Carries the order’s agreed payment timing in confirm, so the BAP forwards the timing it received earlier and keeps it attached to the persisted order across later steps. The timing is expressed as a single date, duration, or operational schedule rather than an ad hoc free-form note.
              owner: BPP
              type: object
          type:
            _description:
              required: true
              usage: POST_FULFILLMENT
              info: Payment mode for each order payment entry. In confirm, the BAP carries forward the same value it already set earlier in the order payload, and that persisted order/payment data is reused across later steps so the BPP can validate the payment type stays unchanged.

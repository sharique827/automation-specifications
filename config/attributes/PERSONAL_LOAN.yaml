meta:
  use_case_id: PERSONAL LOAN
attribute_set:
  search:
    context:
      action:
        _description:
          required: true
          usage: search
          info: |+
            Describes the Beckn protocol method being called by the sender and executed at the receiver. 

          owner: BAP
          type: string
      location:
        country:
          code:
            _description:
              required: false
              usage: IND
              info: Country code in ISO 3166-1 or ISO 3166-2 format that the BAP provides to define the geographic scope for the search request.
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The BAP includes the country for the location in the search context so the search is scoped to the jurisdiction the service is being discovered in.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: "*"
              info: |
                This attribute describes the city code relevant to the location or the area in which seller is situated. In case of '*' it will fetch all the cities where service is being provided.
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Represent the city code that identifies the cities. In case of '*' it will fetch all the cities where service is being provided.
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: Carries the city associated with the location the BAP is searching for, so the request is scoped to the intended geography.
            owner: BAP
            type: object
        _description:
          required: false
          usage: ""
          info: The BAP uses this container in search to state the location where the transaction is intended to be fulfilled, and the BPP carries that location forward in on_search.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:FIS12
          info: This is the domain code relevant to the context of this transaction. Here, it is "ONDC:FIS12".
          owner: BAP
          type: enum
          enums:
            - code: ONDC:FIS12
              description: Updated domain namespace
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16
          info: Describes time of request generation in RFC3339 format. This specifies the time when request is being made.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: bap.credit.becknprotocol.io
          info: This the subscriber ID of the BAP. It is the unique id for the buyer app.
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: false
          usage: e182db8d-997e-4d45-a29c-4827ae8943d5
          info: Unique identifier minted by the BAP on the search request to indicate an active user session; it persists across all API calls from search through confirm, enabling BPPs to correlate requests and deliver personalized recommendations and dynamic offerings despite not knowing the user on the BAP.
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: |-
            This is a mandatory and unique identifier that persists consistently throughout a request/callback cycle.
             This value can be utilized to filter out and ignore duplicate messages coming from the BPP.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.3
          info: It explains the transaction protocol version utilized by the sender.
          owner: BAP
          type: integer
      bap_uri:
        _description:
          required: true
          usage: https://bap.credit.becknprotocol.io/
          info: This is the subscriber URL of the Buyer App (BAP) is the endpoint that accepts callbacks from Seller App (BPPs).
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: |
            Specifies the validity duration of this message in ISO8601 format, after timestamp.
          owner: BAP
          type: string
      _description:
        required: false
        usage: ""
        info: The BAP populates context on search to frame the transaction with the domain, routing, protocol, and session metadata that identifies the end-to-end interaction, and this same context must accompany the exchange so later callbacks can be correlated back to the request.
        owner: BAP
        type: object
    message:
      intent:
        category:
          descriptor:
            code:
              _description:
                required: false
                usage: PERSONAL_LOAN
                info: The BAP uses this code in search to declare that the lookup is for the personal-loan category, and the same value is generated upstream and then asserted in validation. In the captured flows, the request is accepted only when this field is PERSONAL_LOAN; any other category code is rejected as invalid.
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: Descriptor that names the product category the BAP wants to search for, so the BPP can match the catalog against that category in the search response.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: The BAP includes the item category details in the search request so the BPP can filter search results to the requested category.
            owner: BAP
            type: object
        payment:
          collected_by:
            _description:
              required: false
              usage: BPP
              info: "BAP declares its preferred payment collection model: BAP handles upfront collection and settlement to the BPP, or the BPP collects directly. The BPP honors this by omitting a payment URL if the BAP assumes collection."
              owner: BAP
              type: string
          tags:
            descriptor:
              code:
                _description:
                  required: false
                  usage: BUYER_FINDER_FEES
                  info: Payment tag descriptor codes the BAP mints in its search intent to communicate which fee types and settlement terms are relevant. The BPP echoes these codes in on_search to confirm understanding.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Container for the payment-term descriptor the BAP includes in search to describe the requested payment configuration, and the BPP echoes it back in on_search to confirm it recognized the requested payment term.
                owner: BAP
                type: object
            display:
              _description:
                required: false
                usage: "false"
                info: <no-enough-data>
                owner: BAP
                type: boolean
            list:
              descriptor:
                code:
                  _description:
                    required: false
                    usage: BUYER_FINDER_FEES_TYPE
                    info: BAP specifies the payment condition type code in the search request to filter offerings by the loan's applicable fee structure or interest terms.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Descriptor wrapper for each payment tag that the BAP includes in search so the BPP can validate the tag metadata in on_search.
                  owner: BAP
                  type: object
              value:
                _description:
                  required: false
                  usage: percent-annualized
                  info: The BAP specifies payment tag values in the search intent to communicate payment-related parameters or constraints. These tag values are validated to ensure they meet system requirements.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: A set of payment-related tags the BAP includes in the search intent to convey commercial terms such as buyer finder fees and settlement conditions. The BPP uses these tag entries to understand the proposed payment structure, charges, and any delay-interest or similar settlement details during discovery.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Container for the payment tags the BAP includes in the search intent, and the request is rejected in validation if this collection is empty.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: Container for the payment choice the BAP includes in search to tell the BPP how the customer wants to pay; the BPP mirrors this information back in on_search so the quoted order can reflect the same payment mode.
            owner: BAP
            type: object
        _description:
          required: false
          usage: ""
          info: Container the BAP uses to declare the consumer’s search intent so the BPP can match relevant loan offerings; in this personal-loan search flow, validation checks that the declared category is PERSONAL_LOAN before the request is accepted.
          owner: BAP
          type: object
      _description:
        required: false
        usage: ""
        info: The BAP mints this search request envelope to carry the inquiry details, and the BPP’s validation checks that the message block is present before processing the search.
        owner: BAP
        type: object
  on_search:
    context:
      action:
        _description:
          required: true
          usage: search
          info: |+
            Describes the Beckn protocol method being called by the sender and executed at the receiver. 

          owner: BAP
          type: string
      location:
        country:
          code:
            _description:
              required: false
              usage: IND
              info: Country code in ISO 3166-1 or ISO 3166-2 format that the BAP provides to define the geographic scope for the search request.
              owner: BPP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The BAP includes the country for the location in the search context so the search is scoped to the jurisdiction the service is being discovered in.
            owner: BPP
            type: object
        city:
          code:
            _description:
              required: true
              usage: "*"
              info: |
                This attribute describes the city code relevant to the location or the area in which seller is situated. In case of '*' it will fetch all the cities where service is being provided.
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Represent the city code that identifies the cities. In case of '*' it will fetch all the cities where service is being provided.
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: Carries the city associated with the location the BAP is searching for, so the request is scoped to the intended geography.
            owner: BPP
            type: object
        _description:
          required: false
          usage: ""
          info: The BAP uses this container in search to state the location where the transaction is intended to be fulfilled, and the BPP carries that location forward in on_search.
          owner: BPP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:FIS12
          info: This is the domain code relevant to the context of this transaction. Here, it is "ONDC:FIS12".
          owner: BAP
          type: enum
          enums:
            - code: ONDC:FIS12
              description: Updated domain namespace
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16
          info: Describes time of request generation in RFC3339 format. This specifies the time when request is being made.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: bap.credit.becknprotocol.io
          info: This the subscriber ID of the BAP. It is the unique id for the buyer app.
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: false
          usage: e182db8d-997e-4d45-a29c-4827ae8943d5
          info: Unique session identifier that the BAP mints in search and the BPP echoes in on_search and all subsequent responses, allowing the BPP to correlate requests and send personalized recommendations or dynamic offerings without needing to know the BAP user's identity.
          owner: BPP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: |-
            This is a mandatory and unique identifier that persists consistently throughout a request/callback cycle.
             This value can be utilized to filter out and ignore duplicate messages coming from the BPP.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.3
          info: It explains the transaction protocol version utilized by the sender.
          owner: BAP
          type: integer
      bap_uri:
        _description:
          required: true
          usage: https://bap.credit.becknprotocol.io/
          info: This is the subscriber URL of the Buyer App (BAP) is the endpoint that accepts callbacks from Seller App (BPPs).
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: |
            Specifies the validity duration of this message in ISO8601 format, after timestamp.
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://bpp.credit.becknprotocol.org
          info: |2-
            
              The subscriber URL of the Seller App (BPP) is the endpoint that accepts callbacks from the Buyer App (BAP).
          owner: BPP
          type: string
      bpp_id:
        _description:
          required: true
          usage: bpp.credit.becknprotocol.org
          info: The subscriber ID of the Seller App (BPP) is the endpoint that accepts callbacks from the Buyer App (BAP).
          owner: BPP
          type: string
      _description:
        required: false
        usage: ""
        info: The BAP populates context on search to frame the transaction with the domain, routing, protocol, and session metadata that identifies the end-to-end interaction, and this same context must accompany the exchange so later callbacks can be correlated back to the request.
        owner: BPP
        type: object
    message:
      catalog:
        descriptor:
          name:
            _description:
              required: false
              usage: ICICI Bank
              info: Display name of the catalog returned in on_search, used by the BAP to identify which provider or product catalog it is looking at. In these loan flows the BPP returns this name, and the same value is then carried forward and checked in later validation.
              owner: BPP
              type: string
          _description:
            required: false
            usage: ""
            info: Physical description of the cataloged offering that the BPP returns in on_search, where it packages the metadata used to describe what is being presented and the same object is then checked in downstream validation.
            owner: BPP
            type: object
        providers:
          id:
            _description:
              required: false
              usage: PROVIDER_ID
              info: The BPP returns a unique identifier for each provider in the search response; if the ID is missing or is the placeholder 'PROVIDER_ID', the BPP auto-generates a UUID-based identifier. This ID is saved to the session as 'provider_id' and reused across select, confirm, and later steps.
              owner: BPP
              type: string
          descriptor:
            images:
              url:
                _description:
                  required: false
                  usage: https://www.icicibank.com/content/dam/icicibank/india/assets/images/header/logo.png
                  info: Public image URL for the provider’s descriptor, typically its logo or brand asset, returned in on_search so the BAP can render and distinguish the provider in the catalog. In these flows the selected provider is anchored in session as selected_provider and reused by later steps, so this URL travels with that persisted provider entry.
                  owner: BPP
                  type: string
              size_type:
                _description:
                  required: false
                  usage: sm
                  info: BPP returns the size label for a provider image variant in the catalog, and the BAP uses it to distinguish which image rendition belongs to that provider entry. Because the provider object is saved as `selected_provider` and reused later, this value stays attached to the chosen provider across subsequent steps rather than being rederived.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: The BPP includes provider imagery in each catalog provider descriptor, and the BAP uses it to identify and retain the selected provider’s image set in session so the same provider context can be reused in later steps.
                owner: BPP
                type: object
            name:
              _description:
                required: false
                usage: ICICI Bank
                info: Human-readable name of the provider or lender returned by the BPP in search so the BAP can identify which catalog entry it is choosing. That provider is persisted as the selected_provider across the flow, so the name should stay stable and be reused consistently in later steps.
                owner: BPP
                type: string
            short_desc:
              _description:
                required: false
                usage: ICICI Bank Ltd
                info: Short display name of the provider returned in the search catalog so the BAP can present and carry forward the chosen lender. This value is persisted as the selected provider from the search response and reused in later steps, so it should stay stable and match the provider entry the BAP selects.
                owner: BPP
                type: string
            long_desc:
              _description:
                required: false
                usage: ICICI Bank Ltd, India.
                info: Human-readable long description of the provider returned in search results, so the BAP can recognize which lender or seller is being offered and persist the chosen provider as the selected_provider for later steps.
                owner: BPP
                type: string
            _description:
              required: false
              usage: ""
              info: Provider identifying information the BPP returns in on_search so the BAP can select a provider; the chosen provider is persisted as selected_provider and reused in later steps across the flow.
              owner: BPP
              type: object
          categories:
            id:
              _description:
                required: false
                usage: "100001"
                info: BPP returns a unique category identifier that anchors each loan category in the session; this ID persists with the selected provider across subsequent steps.
                owner: BPP
                type: string
            descriptor:
              code:
                _description:
                  required: false
                  usage: LOAN
                  info: BPP uses this code to label each catalog category in the on_search response, so the BAP can recognize the category type when comparing providers and carrying the selected provider forward. The chosen provider is saved as session state, and this category code stays attached to that provider across later steps, where the same value is expected to remain consistent.
                  owner: BPP
                  type: string
              name:
                _description:
                  required: false
                  usage: Loan
                  info: Human-readable category label for the provider entry in the search catalog, used to show what kind of loan or pre-qualifier is being offered. In on_search the BPP returns it inside the provider object, and the BAP carries that chosen provider forward as selected_provider across later steps, so the same provider record is reused rather than treated as a separate free-form label.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Carries the loan product category details that the BPP returns in on_search for each provider, so the BAP can anchor the chosen provider as selected_provider and reuse that same catalog entry in later validation and follow-up steps.
                owner: BPP
                type: object
            parent_category_id:
              _description:
                required: false
                usage: "100001"
                info: BPP includes this value to establish category hierarchy within the catalog; the field is part of the persisted provider and may be remapped when category deduplication applies across flows.
                owner: BPP
                type: string
            _description:
              required: false
              usage: ""
              info: The BPP returns the provider’s category list in on_search so the BAP can retain a category-aware provider snapshot for later item-to-category matching, and when provider.categories is present as an array it is normalized before being stored with selected_provider for reuse in downstream steps.
              owner: BPP
              type: object
          items:
            id:
              _description:
                required: false
                usage: ITEM_ID_PERSONAL_LOAN_1
                info: Stable identifier for a catalog item in the BPP’s on_search response; the BPP generates a real item id when the incoming item is missing one or still has an ITEM_ID_ placeholder, and that item is then carried forward as the same session key for later steps.
                owner: BPP
                type: string
            descriptor:
              code:
                _description:
                  required: false
                  usage: PERSONAL_LOAN
                  info: Code that identifies each catalog item returned by the BPP in on_search, so the BAP can distinguish one loan offering from another. This value is carried in the saved item object and reused across later steps, so it must stay consistent for the same offering throughout the flow.
                  owner: BPP
                  type: string
              name:
                _description:
                  required: false
                  usage: Personal Loan without AA - Offline Journey
                  info: Human-readable name of the catalog item or loan journey shown in search results so the BAP can identify the offering it will act on next. In `on_search`, the BPP returns this label for each item, and the selected item is carried forward in session as the anchored `item` value for later steps.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Container for the descriptor attached to each catalog item the BPP returns in on_search; the chosen item is persisted as session key `item` and reused in later steps, so this descriptor stays anchored to that stored item across the flow.
                owner: BPP
                type: object
            category_ids:
              _description:
                required: false
                usage: "101123"
                info: The BPP returns category IDs with each item in the catalog to identify the product category; the BAP persists these IDs and uses them to route and process offerings across subsequent steps.
                owner: BPP
                type: string
            fulfillment_ids:
              _description:
                required: false
                usage: F1
                info: Fulfillment identifiers the BPP returns for each item, anchored in session and reused in subsequent transaction steps.
                owner: BPP
                type: string
            tags:
              descriptor:
                code:
                  _description:
                    required: false
                    usage: GENERAL_INFO
                    info: Code that identifies each item's tag descriptor type, provided by the BPP in the catalog. The value persists with the item throughout the transaction session for validation in downstream steps.
                    owner: BPP
                    type: string
                name:
                  _description:
                    required: false
                    usage: General Information
                    info: Semantic category label for the attributes grouped within an item tag descriptor. The BPP provides this name in on_search, and the BAP preserves it across subsequent transaction steps as part of the persisted items payload.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: BPP publishes the descriptor metadata that explains the item tags in its catalog response, and the BAP caches the returned item context so the same tagged item can be reused consistently in later select, init, and confirm steps.
                  owner: BPP
                  type: object
              list:
                descriptor:
                  code:
                    _description:
                      required: false
                      usage: MIN_INTEREST_RATE
                      info: The BPP returns descriptor codes in on_search to identify each loan product's key attributes or constraints—such as interest rates, tenure, and loan amounts—enabling the BAP to reference these product terms throughout the transaction; the codes persist in the catalog items array across subsequent steps.
                      owner: BPP
                      type: string
                  name:
                    _description:
                      required: false
                      usage: Minimum Loan Amount
                      info: The BPP provides names of loan parameters (like interest rate or tenure bounds) in item tag descriptors on_search; these values persist within the items structure across select and confirm steps.
                      owner: BPP
                      type: string
                  short_desc:
                    _description:
                      required: false
                      usage: Loans starting from 9% (p.a)
                      info: The BPP includes brief summaries of key offer terms in the item tag descriptor during search, such as interest rates, tenure options, and minimum loan amounts. These descriptions persist in the session for reference when items are used in subsequent steps.
                      owner: BPP
                      type: string
                  _description:
                    required: false
                    usage: ""
                    info: In on_search, the BPP returns this container as the descriptor metadata for each item tag so the BAP can render the lender’s tag labels and product attributes correctly in the offer list. The item payload is anchored in session and reused by later steps, so this descriptor travels with the saved item context.
                    owner: BPP
                    type: object
                value:
                  _description:
                    required: false
                    usage: 9%
                    info: Tag values the BPP returns in on_search to characterize loan offer terms for each item. The BAP receives these values, which persist in the session and are reused across subsequent transaction steps.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Container for the tag list the BPP returns in on_search to describe each loan product in the catalog, and that catalog data is kept in session as reference for later selection and follow-up steps.
                  owner: BPP
                  type: object
              display:
                _description:
                  required: false
                  usage: "true"
                  info: BPP sets this boolean flag in on_search to indicate whether the item should be displayed to the buyer; the flag persists across subsequent steps as part of the item session state.
                  owner: BPP
                  type: boolean
              _description:
                required: false
                usage: ""
                info: Container for the loan-offer tags the BPP returns in on_search; the chosen offer is persisted as the session item and reused and validated in later steps through confirmation.
                owner: BPP
                type: object
            xinput:
              head:
                descriptor:
                  name:
                    _description:
                      required: false
                      usage: Customer Information
                      info: Human-readable heading for the x-input section in the catalog item returned by the BPP in on_search, used by the BAP to present the customer-information prompt to the user. The item is persisted in session and reused in later steps, so this label should stay aligned with the same saved item across the flow.
                      owner: BPP
                      type: string
                  _description:
                    required: false
                    usage: ""
                    info: Header metadata for the additional-information form attached to this catalog item, which the BPP returns in on_search and the BAP carries forward unchanged through the saved item in later steps.
                    owner: BPP
                    type: object
                index:
                  min:
                    _description:
                      required: false
                      usage: "0"
                      info: The BPP declares in on_search the minimum index of additional input fields required from the customer to avail this item. This value persists within the item catalog and is referenced in subsequent transaction steps.
                      owner: BPP
                      type: number
                  cur:
                    _description:
                      required: false
                      usage: "0"
                      info: The BPP returns this number in on_search to represent the current index within the xinput.head, which describes additional information the customer must provide for this item. The value persists through the transaction session as part of the saved item payload.
                      owner: BPP
                      type: number
                  max:
                    _description:
                      required: false
                      usage: "0"
                      info: The BPP declares the maximum integer value of the xinput header needed for this item; the value is anchored in the session and reused by the BAP across subsequent steps to determine the scope of additional customer inputs.
                      owner: BPP
                      type: number
                  _description:
                    required: false
                    usage: ""
                    info: Carries the loan item entry in the search response catalog, and the BAP keeps the chosen item anchored in session so the same item can be reused in later steps of the flow.
                    owner: BPP
                    type: object
                headings:
                  _description:
                    required: false
                    usage: PERSONAL_INFORMATION
                    info: Heading label used by the BPP to describe the XInput section for a catalog item in search, so the BAP can recognize what kind of information the item asks the buyer to provide. Because the whole item is persisted and reused in later steps, this label should remain stable across the flow rather than being rewritten later.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Header block in the BPP’s on_search response that tells the BAP what extra customer inputs will be needed for each catalog item, and that requirement detail is kept anchored in the session so later steps can refer back to it when the chosen item is carried forward.
                  owner: BPP
                  type: object
              form:
                id:
                  _description:
                    required: false
                    usage: F01
                    info: Identifier for the xinput form the BPP exposes in search so the BAP can open the correct questionnaire for that item. In this action the BPP writes the form ID only when the form container is present, reuses a session-stored `form_id` if one already exists, otherwise mints a new one, and that same value is carried forward across later steps such as select and validate.
                    owner: BPP
                    type: string
                mime_type:
                  _description:
                    required: false
                    usage: text/html
                    info: The MIME type of the xinput form payload, telling the BAP how to interpret the form content returned in search. Because this item is persisted as part of the saved item, the same value is carried forward and reused in later steps.
                    owner: BPP
                    type: string
                url:
                  _description:
                    required: false
                    usage: https://bpp.credit.becknprotocol.org/xinput/formid/F01

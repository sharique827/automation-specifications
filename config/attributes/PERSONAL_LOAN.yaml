                  type: string
              _description:
                required: false
                usage: ""
                info: The BPP returns provider-level payment timing constraints in on_search, and the BAP uses the selected provider from that response as the session anchor that is carried forward into later steps.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""

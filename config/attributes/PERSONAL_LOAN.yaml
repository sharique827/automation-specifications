              type: string
          _description:
            required: false
            usage: ""
            info: The BAP writes this object in select to identify the provider whose offer it is choosing from the search results, and the BPP uses it to validate that the selected catalog item belongs to that provider. The provider selection is then anchored in session as `selected_provider` and reused by later steps such as confirm.

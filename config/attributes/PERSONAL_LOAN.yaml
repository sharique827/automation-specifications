                  type: string
              _description:
                required: false
                usage: ""
                info: Carries the provider tag metadata the BPP returns in on_search so the BAP can identify and persist the chosen provider entry; that selected provider is then reused in later steps of the same transaction.
                owner: BPP
                type: object
            list:
              descriptor:
                code:
                  _description:
                    required: false
                    usage: GRO_NAME
                    info: Descriptor code identifies the type of metadata each provider tag represents (name, email, support contact) that the BPP advertises in on_search. The provider selected by the BAP persists as selected_provider with all its tag codes across subsequent transaction steps.
                    owner: BPP
                    type: string
                name:
                  _description:
                    required: false
                    usage: Gro name
                    info: Label identifying the type of provider metadata each tag represents, such as provider name, contact, or support information. The BPP supplies these in on_search; they persist within the selected_provider object anchored in session through subsequent steps.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: The BPP returns this descriptor in on_search to explain a provider tag, and the BAP keeps it inside the selected provider snapshot for reuse later in the flow.

                type: string
            currency:
              _description:
                required: true
                usage: INR
                info: Currency code for the payment parameters attached to the order, indicating the denomination used for the loan-related amount. In on_status, the BPP returns the same currency within the saved order/payment payload so the BAP can match the status response back to the session’s persisted order.

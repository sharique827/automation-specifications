            type: object
        documents:
          descriptor:
            code:
              _description:
                required: true
                usage: LOAN_AGREEMENT
                info: BPP uses this to label which loan document the on_status response is surfacing, such as the agreement or a cancellation document, so the BAP can tell what the returned document represents. The value stays anchored in the saved order session and must remain consistent across later steps where that order is reused.
                owner: BPP
                type: string
            name:
              _description:
                required: true
                usage: Loan Agreement Document
                info: Human-readable title of each document attached to the returned order, such as the agreement or cancellation paper the BPP is exposing in status. The BPP carries it inside the persisted order payload, and the BAP reuses that saved order across later steps when it needs to inspect the document list again.
                owner: BPP
                type: string
            short_desc:
              _description:
                required: true
                usage: Download your Loan Agreement document here
                info: Human-readable label for the document entry, so the BPP can tell the BAP which downloadable loan document that status item refers to. In on_status, the BPP returns it as part of the persisted order payload and should keep it stable across later steps for the same document within the session.
                owner: BPP
                type: string
            long_desc:
              _description:
                required: true
                usage: A Loan Agreement Document is a legal contract outlining terms such as loan amount, interest rate, repayment schedule, and collateral, binding a lender and borrower in a formal financial arrangement.
                info: Human-readable description of the document carried inside the order. In on_status, the BPP returns it as part of the saved order object, and the BAP reuses that persisted order in later steps, so the same document narrative stays anchored in session across the flow.
                owner: BPP
                type: string
            _description:
              required: true
              usage: ""
              info: Carries the descriptor for each document in the status response so the BPP can keep the document set aligned with the saved order and the BAP can match the returned documents to the same session-long transaction.
              owner: BPP
              type: object
          mime_type:
            _description:
              required: true
              usage: application/pdf
              info: Media type of an attached order document that the BPP returns in on_status as part of the persisted order payload; the BAP consumes it from the saved order object rather than treating it as a one-off field. Because the order is carried forward across steps, this document metadata stays anchored in session and should remain consistent when reused later.
              owner: BPP
              type: string
          url:
            _description:
              required: true
              usage: https://lender.com/loan/loan-agreement/O1.pdf
              info: URL where the BPP exposes the document tied to the order status being reported, such as the agreement or cancellation document that the BAP can fetch after the status update. In on_status, this value is returned as part of the persisted order payload and should stay stable across later steps because the same order object is reused throughout the flow.
              owner: BPP
              type: string
          _description:
            required: true
            usage: ""
            info: Documents attached to the order that are carried forward from earlier session state, and in on_status the BPP clears this field in its response rather than retaining the stored documents.
            owner: BPP
            type: object
        created_at:

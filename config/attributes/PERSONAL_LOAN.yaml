          _description:
            required: false
            usage: ""
            info: The BAP sends this array to identify the items the consumer is choosing to avail, and the BPP validates the selection in select, anchors it as selected_items for the session, and reuses the same set in later transaction steps.
            owner: BAP
            type: object
        fulfillments:
          id:
            _description:
              required: false
              usage: F3

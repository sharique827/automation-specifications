              value:
                _description:
                  required: false
                  usage: 1860 266 7766
                  info: Provider contact and identity information including institution name, support phone numbers, email addresses, and support portal URLs. The BPP returns these tag values for each provider in the search response; they persist as part of the selected provider across subsequent transaction steps.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Groups the tags attached to each provider in on_search, so the BPP can return provider metadata that stays with the selected provider. The BAP persists that provider object as selected_provider and reuses it in later steps.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: Structured tags attached to each provider in the BPP’s on_search response, used by the BAP to carry the chosen provider forward; the selected_provider value is anchored in session and reused across later steps.
              owner: BPP
              type: object
          _description:
            required: false
            usage: ""
            info: Collection of providers returned by the BPP in on_search, from which the BAP picks a provider and stores it as selected_provider for reuse in later steps.
            owner: BPP
            type: object
        _description:
          required: false

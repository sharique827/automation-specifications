              type: string
          _description:
            required: true
            usage: ""
            info: BPP returns this array as the order’s settlement terms in on_update, and the BAP carries the same order payload forward through later steps. It must be present and non-empty, and in missed-EMI flows the session payment_id is patched into the existing entries, while pre-part-payment flows leave the array untouched.

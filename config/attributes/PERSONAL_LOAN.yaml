              type: object
          _description:
            required: true
            usage: ""
            info: BPP returns the order’s cancellation terms in on_status so the BAP can understand the conditions that govern cancelling the order. The enclosing order payload is session-anchored and reused by later steps, so this information stays consistent across the flow.

                  info: Customer date of birth provided by the BAP when selecting a fulfillment option; this value is stored within the selected fulfillment's customer record.
                  owner: BAP
                  type: string
              creds:
                id:
                  _description:
                    required: false
                    usage: RKUIS4815T
                    info: Credential identifier of the customer person in the selected fulfillment. The BAP includes this ID when selecting a fulfillment in select, and it persists with the selected fulfillment object through subsequent flow steps.
                    owner: BAP
                    type: string
                type:
                  _description:

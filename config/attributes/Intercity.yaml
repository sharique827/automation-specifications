meta:
  use_case_id: Intercity
attribute_set:
  search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The country object identifies which country's jurisdiction applies to the location in the BAP's search request.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: std:080
              info: Describes the city code this location is, or is located within
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Bangalore
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The city where the BAP intends to complete the transaction, enabling the BPP to scope results to that location.
            owner: BAP
            type: object
        _description:
          required: false
          usage: ""
          info: In the search request, the BAP specifies the location where the transaction is intended to be fulfilled.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:TRV13
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:TRV10
              description: mobility domain Ride
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:TRV11
              description: mobility domain Public Transit
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:TRV12
              description: mobility domain airline
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: enum
          enums:
            - code: search
              description: Buyer app indicates the search intent
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      _description:
        required: false
        usage: ""
        info: The BAP establishes the transaction context in search, providing a high-level overview combining demographic, addressing, interoperability, and transaction-level information for the BPP.
        owner: BAP
        type: object
      bpp_id:
        _description:
          required: false
          usage: dev-automation.ondc.org
          info: Subscriber ID of the BPP handling the issue; included in the on_issue response so the BAP can identify which provider is managing the resolution.
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: false
          usage: https://dev-automation.ondc.org/api-service/ONDC:TRV12/2.0.0/seller
          info: The BPP's subscriber URL for receiving BAP requests. The BAP does not populate this in search since search is a discovery step that precedes the selection of a specific BPP.
          owner: BAP
          type: string
    message:
      intent:
        fulfillment:
          stops:
            type:
              _description:
                required: true
                usage: START
                info: A logical point in space and time during the fulfillment of an order.
                owner: BAP
                type: string
            location:
              gps:
                _description:
                  required: true
                  usage: 12.979759, 77.590427
                  info: Describes a GPS coordinate
                  owner: BAP
                  type: string
              descriptor:
                code:
                  _description:
                    required: false
                    usage: std:080
                    info: Physical description of code.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Container for descriptive information about each stop's location within the fulfillment, provided by the BAP during search and persisted through subsequent transaction steps.
                  owner: BAP
                  type: object
                name:
                  _description:
                    required: false
                    usage: Bangalore
                    info: The name of each stop location in the fulfillment leg specified by the BAP in search to define service routing. The value is anchored in the session and reused by later steps.
                    owner: BAP
                    type: string
              _description:
                required: false
                usage: ""
                info: Location information for each fulfillment stop that the BAP includes in search to identify waypoints along the service journey.
                owner: BAP
                type: object
            time:
              label:
                _description:
                  required: false
                  usage: DATE_OF_JOURNEY
                  info: Label for denoting stop time or date
                  owner: BAP
                  type: string
              timestamp:
                _description:
                  required: false
                  usage: 2023-09-06T00:00:00.000Z
                  info: Timestamp for denoting time at stop
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Holds departure times for each fulfillment leg's origin point, set by the BAP in search and persisted across transaction steps for downstream fulfillment planning.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Ordered list of logical stops the BAP specifies on search to define the fulfillment route. This value persists throughout the transaction and is referenced in subsequent steps.
              owner: BAP
              type: object
            id:
              _description:
                required: false
                usage: S2
                info: Stop identifier provided by the BAP in the search request to indicate which fulfillment stops are being queried; the value persists through the transaction as part of the fulfillment specification.
                owner: BAP
                type: string
          vehicle:
            category:
              _description:
                required: true
                usage: BUS
                info: Describes category of a vehicle
                owner: BAP
                type: enum
                enums:
                  - code: METRO
                    description: Describes the vehicle category as Metro
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: AUTO_RICKSHAW
                    description: Describes the vehicle category as Auto Rickshaw
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: CAB
                    description: Describes the vehicle category as Cab
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: BUS
                    description: Describes the vehicle category as Bus
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: AIRLINE
                    description: Describes the vehicle category as Airline
                    reference: <PR/Issue/Discussion Links md format text>
            _description:
              required: false
              usage: ""
              info: Vehicle specification the BAP defines in the fulfillment requirement during search to indicate transport device characteristics (category, capacity, make, model, size, variant, color, energy type, registration) expected for fulfillment. This specification anchors in the session and is consumed across subsequent transaction steps.
              owner: BAP
              type: object
            variant:
              _description:
                required: false
                usage: AC
                info: BAP specifies the desired vehicle variant as a search criterion. The variant is anchored in the session and reused across subsequent transaction steps.
                owner: BAP
                type: string
            capacity:
              _description:
                required: false
                usage: "47"
                info: BAP specifies the vehicle capacity required for fulfillment in search; the value is anchored in the session and reused by later steps.
                owner: BAP
                type: number
            wheels_count:
              _description:
                required: false
                usage: "6"
                info: The number of wheels on the vehicle type the BAP is searching for, used to filter available vehicles matching the specified wheel count.
                owner: BAP
                type: string
            energy_type:
              _description:
                required: false
                usage: DIESEL
                info: The BAP specifies the vehicle energy type in search to filter fulfillment options by their power source. The value is anchored in the session and reused across subsequent transaction steps.
                owner: BAP
                type: string
          _description:
            required: false
            usage: ""
            info: The BAP specifies fulfillment preferences in the search request to indicate how the customer wants their order fulfilled. This object is anchored in the session and reused across subsequent transaction steps.
            owner: BAP
            type: object
          id:
            _description:
              required: false
              usage: F1
              info: The BAP includes the fulfillment ID in search to specify which fulfillment leg is being queried; this value is anchored in the session and reused across subsequent steps.
              owner: BAP
              type: string
        payment:
          _description:
            required: false
            usage: ""
            info: BAP specifies payment details in search to communicate how the customer wants to pay for the order; this value is anchored in session and consumed by subsequent steps.
            owner: BAP
            type: object
          collected_by:
            _description:
              required: false
              usage: BPP
              info: This field indicates the payment collector. If set to 'bap,' BAP collects first and settles with BPP. If BPP agrees, no payment link is sent. If set to 'bpp,' BPP collects payment directly.
              owner: BAP
              type: string
          tags:
            descriptor:
              code:
                _description:
                  required: false
                  usage: BUYER_FINDER_FEES
                  info: The BAP mints the payment descriptor code in search to indicate which payment term applies. The BPP validates it in on_search, and the code persists in the session for reuse across subsequent steps.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Identifies the category of payment metadata through a coded descriptor, allowing the BAP to specify and categorize payment conditions such as fees, settlement terms, and interest rates.
                owner: BAP
                type: object
            display:
              _description:
                required: false
                usage: "false"
                info: Indicates whether the payment tag should be displayed in the user interface during search. When false, the tag is hidden from the customer's view.
                owner: BAP
                type: boolean
            list:
              descriptor:
                code:
                  _description:
                    required: false
                    usage: BUYER_FINDER_FEES_PERCENTAGE
                    info: Identifies the type of payment condition or fee being searched for. The BAP includes these codes in search; the BPP echoes them back in on_search to confirm applicability, and the codes persist as session context across downstream order steps.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Container for a payment tag's metadata within the BAP's search intent; this payment specification is persisted across transaction steps and is not validated by the BPP in on_search.
                  owner: BAP
                  type: object
              value:
                _description:
                  required: false
                  usage: "1"
                  info: BAP declares this tag value in search to express payment intent; the payment object is retained and propagated through subsequent steps to maintain consistency.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Payment tags that the BAP specifies in search and which persist across the transaction session for reference in subsequent steps.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Array of payment configuration tags specifying fees, settlement terms, and payment conditions the buyer applies in the search intent.
              owner: BAP
              type: object
        _description:
          required: false
          usage: ""
          info: The BAP declares the consumer's intent to purchase or avail a service, specifying what they seek, their preferred provider, location and timing for fulfillment, and payment preference, so the BPP can identify matching offerings.
          owner: BAP
          type: object
        provider:
          id:
            _description:
              required: false
              usage: P1
              info: Provider identifier the BAP specifies in the search request to narrow results to a specific BPP.
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: The BAP specifies which provider to search from, enabling discovery of services from a specific merchant or operator.
            owner: BAP
            type: object
      _description:
        required: false
        usage: ""
        info: The message container in which the BAP places the search request.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
    error:
      code:
        _description:
          required: false
          usage: "90203"
          info: A numeric code that identifies the error type (such as '90203' for invalid order identifiers), enabling programmatic handling of different error conditions.
          owner: BAP
          type: string
      message:
        _description:
          required: false
          usage: The buyer app provides the invalid order_id
          info: A descriptive message indicating what validation failed or which parameter was invalid in the request.
          owner: BAP
          type: string
      _description:
        required: false
        usage: ""
        info: Error details returned by the BPP when the search request cannot be processed, specifying the reason for failure.
        owner: BAP
        type: object
  on_search:
    context:
      location:
        country:
          code:
            _description:
              required: false
              usage: IND
              info: Country code per ISO 3166-1 and ISO 3166-2 format defining the geographic scope of the search. The BAP mints this on search; the BPP echoes it in on_search to confirm the location context of the results.
              owner: BPP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The country object identifies which country's jurisdiction applies to the location in the BAP's search request.
            owner: BPP
            type: object
        city:
          code:
            _description:
              required: false
              usage: std:080
              info: BPP echoes the city code from the BAP's search request in the on_search response to maintain geographic context for the search results.
              owner: BPP
              type: enum
              enums:
                - code: std:080
                  description: Bangalore
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The city where the BAP intends to complete the transaction, enabling the BPP to scope results to that location.
            owner: BPP
            type: object
        _description:
          required: false
          usage: ""
          info: In the search request, the BAP specifies the location where the transaction is intended to be fulfilled.
          owner: BPP
          type: object
      domain:
        _description:
          required: false
          usage: ONDC:TRV12
          info: The BPP returns a domain code identifying the service category, enabling the BAP to apply the correct domain-specific interpretation to the response.
          owner: BPP
          type: enum
          enums:
            - code: ONDC:TRV10
              description: mobility domain Ride
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:TRV11
              description: mobility domain Public Transit
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:TRV12
              description: mobility domain airline
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: false
          usage: 2026-03-17T09:52:24.484Z
          info: Timestamp when the BAP generated the cancellation request, in RFC3339 format.
          owner: BPP
          type: date-time
      bap_id:
        _description:
          required: false
          usage: bap.example.com
          info: Subscriber ID of the BAP requesting the order cancellation.
          owner: BPP
          type: string
      transaction_id:
        _description:
          required: false
          usage: cfa220c9-5118-4bd4-88f5-70e1574c514a
          info: Stable identifier minted by the BAP at search and carried unchanged through every subsequent message, including this cancel request, so the BPP can identify which transaction is being cancelled.
          owner: BPP
          type: string
      message_id:
        _description:
          required: false
          usage: 1b0f57cc-e279-490b-a4be-554d3fbe2969
          info: Unique identifier the BAP generates for this cancel request to correlate the BPP's asynchronous response and filter duplicate messages.
          owner: BPP
          type: string
      version:
        _description:
          required: false
          usage: 2.0.0
          info: ONDC transaction protocol version that the BAP declares with its cancel request, enabling the BPP to validate and process the message correctly.
          owner: BPP
          type: string
      action:
        _description:
          required: false
          usage: on_search
          info: The BPP includes this field in the on_search response to identify the response method. The BAP uses it to route the callback to the appropriate handler.
          owner: BPP
          type: enum
          enums:
            - code: on_search
              description: Seller app provides catalog based on search intent.
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: false
          usage: https://bap.example.com
          info: BAP provides its callback endpoint URL so the BPP can deliver the on_cancel response.
          owner: BPP
          type: string
      ttl:
        _description:
          required: false
          usage: PT30S
          info: ISO8601 duration specifying how long this cancel request is valid from its timestamp. The BAP sets it when initiating cancellation.
          owner: BPP
          type: string
      bpp_id:
        _description:
          required: false
          usage: bpp.example.com
          info: Subscriber ID of the BPP. The BAP includes this in the cancel request to route the order cancellation to the correct BPP.
          owner: BPP
          type: string
      bpp_uri:
        _description:
          required: false
          usage: https://bpp.example.com
          info: The BPP returns its subscriber URL in on_search; the BAP caches and reuses it to route subsequent transaction requests.
          owner: BPP
          type: string
      _description:
        required: false
        usage: ""
        info: The BAP establishes the transaction context in search, providing a high-level overview combining demographic, addressing, interoperability, and transaction-level information for the BPP.
        owner: BPP
        type: object
    message:
      catalog:
        descriptor:
          name:
            _description:
              required: false
              usage: ABC Bus Services Solutions
              info: The BPP returns the catalog's name in the on_search response, which the BAP stores in session.
              owner: BPP
              type: string
          images:
            url:
              _description:
                required: false
                usage: https://abc-bus.in/logos/logo.ico
                info: The BPP provides image URLs in the catalog descriptor during on_search response, enabling the BAP to display provider or catalog branding using either data URLs or remote URLs.
                owner: BPP
                type: string
            _description:
              required: false
              usage: ""
              info: Visual branding assets supplied by the BPP in the catalog descriptor, including logos and icons with specified URLs and size types for display by the BAP.
              owner: BPP
              type: object
          _description:
            required: false
            usage: ""
            info: BPP returns the catalog descriptor in the search response and echoes this descriptor in subsequent searches within the same transaction session.
            owner: BPP
            type: object
        providers:
          id:
            _description:
              required: false
              usage: P1
              info: The BPP returns this unique identifier for each provider in its catalog; the BAP uses it to identify and reference the provider across the transaction lifecycle.
              owner: BPP
              type: string
          descriptor:
            name:
              _description:
                required: false
                usage: ABC Operator 1 Bus Services
                info: The BPP includes the provider's name in the on_search catalog for buyer identification.
                owner: BPP
                type: string
            images:
              url:
                _description:
                  required: false
                  usage: https://operator1.com/logos/logo.ico
                  info: The BPP provides image URLs (either data URLs or remote HTTP/HTTPS endpoints) in the provider descriptor for displaying operator branding and identification.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Collection of visual assets that the BPP includes in the provider's descriptor to enable the BAP to display the provider's branding in search results.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: Provider identification object that the BPP includes in search results and the BAP retains throughout the transaction for reference in subsequent steps.
              owner: BPP
              type: object
          categories:
            descriptor:
              name:
                _description:
                  required: false
                  usage: Seater
                  info: BPP returns the category name to identify different seat types or service options available from the provider; the BAP uses this name to display category choices to the buyer.
                  owner: BPP
                  type: string
              code:
                _description:
                  required: false
                  usage: SEATER
                  info: The BPP returns a unique code identifier for each category in the on_search catalog; the BAP stores this code to reference the customer's selected category in downstream select, confirm, and later transaction steps.
                  owner: BPP
                  type: enum
                  enums:
                    - code: ECONOMY
                      description: Represents type of seat category
                      reference: <PR/Issue/Discussion Links md format text>
                    - code: PREMIUM_ECONOMY
                      description: Represents type of seat category
                      reference: <PR/Issue/Discussion Links md format text>
                    - code: BUSINESS
                      description: Represents type of seat category
                      reference: <PR/Issue/Discussion Links md format text>
                    - code: FIRST_CLASS
                      description: Represents type of seat category
                      reference: <PR/Issue/Discussion Links md format text>
              _description:
                required: false
                usage: ""
                info: The BPP returns metadata in this container to describe and identify each category the provider offers in the catalog.
                owner: BPP
                type: object
            id:
              _description:
                required: false
                usage: C1
                info: Unique identifier the BPP assigns to each category in its catalog, enabling the BAP to reference categories in subsequent operations.
                owner: BPP
                type: string
            _description:
              required: false
              usage: ""
              info: Categories for each provider, populated by BPP in on_search and persisted with the provider data for use in subsequent transaction steps.
              owner: BPP
              type: object
          items:
            id:
              _description:
                required: false
                usage: I1
                info: Unique identifier the BPP assigns to this item; the BAP uses it to reference the item in subsequent transaction steps.
                owner: BPP
                type: string
            descriptor:
              name:
                _description:
                  required: false
                  usage: Seater Ticket
                  info: The BPP returns the name for each item in the catalog search; this value is persisted in session for reuse in later steps.
                  owner: BPP
                  type: string
              code:
                _description:
                  required: false
                  usage: SEAT
                  info: The BPP returns this code in on_search to classify each catalog item—for example, as a ticket type (adult, child, infant), ticket product (single-journey, return, pass), or journey type (non-stop, connecting).
                  owner: BPP
                  type: enum
                  enums:
                    - code: ADULT_TICKET
                      description: Describes the item type
                      reference: <PR/Issue/Discussion Links md format text>
                    - code: CHILD_TICKET
                      description: Describes the item type
                      reference: <PR/Issue/Discussion Links md format text>
                    - code: INFANT_TICKET
                      description: Describes the item type
                      reference: <PR/Issue/Discussion Links md format text>
                    - code: RIDE
                      description: Describes the type of ride.
                      reference: <PR/Issue/Discussion Links md format text>
                    - code: SJT
                      description: Describes the kind of ticket Single Journey Ticket
                      reference: <PR/Issue/Discussion Links md format text>
                    - code: SFSJT
                      description: Describes the kind of ticket special fare Single Journey Ticket
                      reference: <PR/Issue/Discussion Links md format text>
                    - code: RJT
                      description: Describes the kind of ticket Return Journey Ticket
                      reference: <PR/Issue/Discussion Links md format text>
                    - code: PASS
                      description: Describes the kind of ticket Pass (multiple use ticket)
                      reference: <PR/Issue/Discussion Links md format text>
                    - code: SEAT
                      description: Describes the kind of ticket seat
                      reference: <PR/Issue/Discussion Links md format text>
                    - code: NON_STOP
                      description: Describes the type of journey as non-stop
                      reference: <PR/Issue/Discussion Links md format text>
                    - code: CONNECT
                      description: Describes the type of journey as connecting
                      reference: <PR/Issue/Discussion Links md format text>
              _description:
                required: false
                usage: ""
                info: The BPP returns a descriptor for each item in on_search that describes the offering. This descriptor persists in the session and is reused across subsequent transaction steps.
                owner: BPP
                type: object
            price:
              currency:
                _description:
                  required: false
                  usage: INR
                  info: Currency code for each item price that the BPP returns in on_search; the BAP anchors this value in session for reuse across later transaction steps.
                  owner: BPP
                  type: string
              value:
                _description:
                  required: false
                  usage: "899"
                  info: BPP returns the per-item price value in the on_search catalog response; the BAP persists this in session and carries it forward through subsequent transaction steps.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: The BPP includes pricing information for items in the catalog response, which persists in the session during the transaction.
                owner: BPP
                type: object
              minimum_value:
                _description:
                  required: false
                  usage: "500"
                  info: Lowest price point for an item, returned by the BPP in the on_search catalog response as part of the item's price descriptor.
                  owner: BPP
                  type: string
              maximum_value:
                _description:
                  required: false
                  usage: "1900"
                  info: The BPP returns the maximum price per item in on_search, and this value is carried forward as part of the provider catalog structure through subsequent transaction steps.
                  owner: BPP
                  type: string
            quantity:
              available:
                count:
                  _description:
                    required: false
                    usage: "1"
                    info: The available quantity of this item, which the BPP specifies in the on_search response.
                    owner: BPP
                    type: number
                _description:
                  required: false
                  usage: ""
                  info: Contains the count of units currently available for this catalog item; the BPP returns this in search responses to communicate real-time inventory to the BAP for availability verification before booking.
                  owner: BPP
                  type: object
              maximum:
                count:
                  _description:
                    required: false
                    usage: "1"
                    info: The BPP declares the maximum quantity allowed for purchase per item in the on_search catalog response.
                    owner: BPP

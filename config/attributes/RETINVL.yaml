                  _description:
                    required: false
                    usage: "560001"
                    info: Specifies the postal code of the delivery location
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: The BAP populates this address object during search to provide the end-delivery location details as part of the offer discovery process, and the value is set once at the start of the search flow and remains unchanged across subsequent messages in the same transaction.
                  owner: BAP
                  type: object
              _description:
                required: true
                usage: ""
                info: The BAP populates this field with an address object describing the end location where fulfillment is expected to conclude, and this value is set during the search phase to support downstream discovery and matching in the offers flow. The value is not carried across steps and does not persist in session.
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: BAP populates the end-of-fulfillment details in the search response to signal the expected conclusion of service delivery, such as delivery completion or service termination, and this information is used by downstream flows to determine fulfillment scope.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: BAP writes the fulfillment strategy for how a product or service will be delivered to the end customer, specifying details like delivery method and endpoint, and this definition is used to guide downstream actions in the flow.
            owner: BAP
            type: object
        item:
          descriptor['name']:
            _description:
              required: false
              usage: coffee
              info: Specifies the product name in the order
              owner: BAP
              type: string
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The BAP populates the message.intent object to express the user's intent to buy or avail a service, including contextual preferences like city or category, during search requests across flows such as OFFERS_FLOW and RETINVL_DISCOVERY_FLOW; the BAP sets this intent and may include finder fee details like type and amount under specified ONDC extensions.
          owner: BAP
          type: object
        category:
          id:
            _description:
              required: true
              usage: Mobile Phone
              info: Unique id of the category identified in the search request. The BAP sets this value on the search request and it is persisted across flows under the key search_category, ensuring consistency in downstream actions like on_search_1 where it is reused to identify the category.
              owner: BAP
              type: string
          _description:
            required: true
            usage: ""
            info: The BAP sets the intent category only when the mode is "CATEGORY", and the BPP must preserve this value across flows as it is persisted under the key search_category and reused in subsequent steps of the transaction.
            owner: BAP
            type: object
        tags:
          code:
            _description:
              required: true
              usage: bap_terms
              info: The BAP includes the intent tag code "bap_terms" in the search request to signal that the buyer is viewing terms and conditions, and the BPP removes this tag during its own search generation to avoid duplication, ensuring only relevant tags are passed downstream. This tag is consistently set by the BAP and confirmed by the BPP in the validation phase, acting as a signal for conditional rendering of terms in the offer discovery flow.
              owner: BAP
              type: string
          list:
            code:
              _description:
                required: true
                usage: static_terms
                info: The BAP populates this field with a code indicating the type of intent tag, such as "static_terms" or "effective_date", and ensures it is consistent across all messages in the search flow. This value is set by the BAP during the search request and echoed by the BPP in subsequent responses to maintain alignment in intent tagging, with the BAP minting the value once and reusing it across all messages in the flow.
                owner: BAP
                type: string
            value:
              _description:
                required: true
                usage: ""
                info: The BAP populates this field with a list of tag values indicating intent-specific metadata, such as terms of service URLs or timestamps, for each search request. These values are set at the time of search initiation and are not reused or validated across subsequent steps.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: The BAP populates this list with tags that categorize or label the intent behind the search, such as product type, audience, or commercial context, and these tags are used by downstream BPPs to filter or prioritize response content. The list is indexed, allowing dynamic expansion or filtering of tag sets during discovery.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: BAP writes an array of tag objects to message.intent.tags during search, each representing a contextual annotation for the offer, and filters out any tag with code "bap_terms" before finalizing the payload. The tags are set and read in each flow to ensure consistent filtering and propagation of non-BAP-specific metadata.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: The BAP populates and manages the message object in the search request, using it as a container to carry transaction-level metadata and intent, which is then reused across flows like OFFERS_FLOW and RETINVL_DISCOVERY_FLOW for consistency in intent representation.

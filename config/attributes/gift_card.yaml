meta:
  use_case_id: gift-card
attribute_set:
  search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: |-
                It Explains the country code in accordance with the ISO 3166-1 and ISO 3166-2 formats.
                 
                 The ISO 3166-1 standard includes 249 countries, with 193 sovereign states as UN members. Dependent territories in ISO 3166-1 are often detailed as subdivisions in ISO 3166-2 under their administering state.
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The BAP populates this field with the country code of the location where the transaction is intended to be completed, and it is used to gate downstream flows such as fulfillment or delivery options that are country-specific. This value is not persisted across steps and does not serve as a session anchor.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: "*"
              info: This attribute describes the city code relevant to the location or the area in which it is situated.
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Represent the city code that identifies the cities. In case of '*' it will fetch all the cities where service is being provided.
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The BAP populates the city of the location where the transaction is intended to be completed during the search action, and this value is used to filter or target available offerings in that geographic region. The value is set once at the start of the transaction and remains consistent across all subsequent messages in the flow, enabling downstream services to align with the intended location.
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The BAP populates the context.location object with the intended fulfillment location at the time of search, providing a structured address or coordinate set for downstream processing. This value is not persisted across steps or echoed in later actions, and does not serve as a session anchor for reuse.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:FIS10
          info: This is the domain code relevant to the context of this transaction. Here, it is "ONDC:FIS10".
          owner: BAP
          type: enum
          enums:
            - code: ONDC:FIS10
              description: Updated domain namespace
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: |-
            It specifies the time of request generation in RFC3339 format. RFC3339 is a date and time format defined by the Internet Engineering Task Force (IETF) in the RFC 3339 standard.
             YYYY: Four-digit year
             MM: Two-digit month (01-12)
             DD: Two-digit day of the month (01-31)
             T: Separator between the date and time
             HH: Two-digit hour (00-23)
             MM: Two-digit minute (00-59)
             SS: Two-digit second (00-59)
             .sss: Fractional seconds (optional)
             Z: Indicates the time is in UTC (optional; the time may also include an offset)
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: bap.credit.becknprotocol.io
          info: This the subscriber ID of the BAP. It is the unique id for the buyer app.
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: e10f5ab4-241c-4702-8cb8-4ccc3bd98dbd
          info: Stable identifier shared across every message of one ONDC transaction. The BAP mints it on the first request and every later request and response carries the same value so participants can correlate the chain.
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: |-
            This is a mandatory and unique identifier that persists consistently throughout a request/callback cycle.
             This value can be utilized to filter out and ignore duplicate messages coming from the BPP.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: It explains the transaction protocol version utilized by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: search
          info: |-
            The sender initiates the Beckn protocol method, which is then carried out by the receiver.
             Beckn is an open, interoperable and universal transaction protocol to enable a decentralised digital economy.
          owner: BAP
          type: enum
          enums:
            - code: search
              description: buyer app specifies the search intent
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_search
              description: seller app responds with the catalog based on the search intent
              reference: <PR/Issue/Discussion Links md format text>
            - code: select
              description: buyer app specifies the items & quantity selected by a buyer
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_select
              description: seller app responds with the serviceability info, quote & O2D TAT for selected items;
              reference: <PR/Issue/Discussion Links md format text>
            - code: init
              description: buyer & seller app specify & agree to the terms & conditions prior to placing the order;
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_init
              description: buyer & seller app specify & agree to the terms & conditions prior to placing the order;
              reference: <PR/Issue/Discussion Links md format text>
            - code: confirm
              description: buyer app places the order on behalf of the buyer;
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_confirm
              description: seller app responds to the order placed either through auto-acceptance or deferred acceptance or rejection of the order
              reference: <PR/Issue/Discussion Links md format text>
            - code: update
              description: updates in the serviceable loc happens here
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_update
              description: seller app responds with serviceable
              reference: <PR/Issue/Discussion Links md format text
            - code: cancel
              description: Cancellation of ride
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_cancel
              description: Specifiy the cancellation of the state
              reference: <PR/Issue/Discussion Links md format text>
            - code: track
              description: Track the order
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_track
              description: Return tracking infomation of the order
              reference: <PR/Issue/Discussion Links md format text
            - code: status
              description: Request for status of the vehicle
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_status
              description: Return order with status , Driver pickup - driver drop
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://bap.credit.becknprotocol.io/
          info: This is the subscriber URL of the Buyer App (BAP) is the endpoint that accepts callbacks from Seller App (BPPs).
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The BAP sets the transaction context at the start of a session, defining the overall nature of the interaction, including domain, region, platform identifiers, and transaction-level metadata like the transaction_id and timestamp. This context is validated at every subsequent interaction to ensure consistency and is required to be present in all search requests and responses across flows, serving as a binding reference for the entire transaction lifecycle.
        owner: BAP
        type: object
      ttl:
        _description:
          required: true
          usage: PT30S
          info: The duration in ISO8601 format after the timestamp for which this search message remains valid, specified as PT30S, is passed from the BAP to the BPP in the search request to indicate the time window during which the search results are considered active and actionable.
          owner: BAP
          type: string
    message:
      intent:
        category:
          descriptor:
            code:
              _description:
                required: false
                usage: search from categories defined
                info: This attribute refers to categorizing loans based on whether they are intended for personal use or are meant for invoices.

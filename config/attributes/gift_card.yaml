                usage: search from categories defined
                info: This attribute refers to categorizing loans based on whether they are intended for personal use or are meant for invoices.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: The BAP sets the intent category descriptor in the search request to indicate the type of service or product being sought, and the BPP must echo this value in subsequent steps like confirm and update to maintain consistency across the transaction flow. This value is generated and asserted by the BAP during the search and is required to be present for downstream validation, ensuring alignment between the buyer's intent and the BPP's service offering.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: The BAP populates this field with category-specific metadata during the search action to signal the type of item being sought, and the BPP validates this data during on_init to ensure alignment with available inventory, though the value is not persisted or reused across steps.
            owner: BAP
            type: object
        payment:
          tags:
            BUYER_FINDER_FEES:
              _description:
                required: true
                usage: --
                info: Describes Buyer finder fee
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: BAP initializes the payment tags array in the search request to signal intended payment preferences or constraints, and the BPP echoes this array in subsequent messages like confirm and update, ensuring consistent payment intent across the flow.
              owner: BAP
              type: object
            descriptor:
              code:
                _description:
                  required: true
                  usage: BUYER_FINDER_FEES
                  info: The BAP populates this field with a payment descriptor code, such as "BUYER_FINDER_FEES", to indicate the type of fee being charged, and the BPP must echo the same value in subsequent steps like on_update or on_confirm to maintain consistency across the transaction flow.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: The BAP initializes the payment descriptor tags on search and passes them to the BPP for use in subsequent steps, with the BPP confirming the values during validation and the BAP using them to ensure consistency across fulfillment and update flows.
                owner: BAP
                type: object
            list:
              descriptor:
                code:
                  _description:
                    required: true
                    usage: BUYER_FINDER_FEES_PERCENTAGE
                    info: The BAP populates this field with a payment tag descriptor code during search, such as BUYER_FINDER_FEES_PERCENTAGE or BUYER_FINDER_FEES_VALUE, and the BPP must echo the same value in subsequent steps like on_update or on_confirm, as it is required in the cross-flow and asserted during validation to ensure consistent payment tagging across the transaction.
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: The BAP initializes the payment tags list descriptor during search and passes it to the BPP for potential use in subsequent fulfillment or cancellation flows; the BPP may later echo the same descriptor value in on_init or on_update as part of a round-trip validation.
                  owner: BAP
                  type: object
              value:
                _description:
                  required: true
                  usage: "3"
                  info: The BAP initializes the payment tag list value during search and sets it to a string value like "3" or "100", which is then echoed by the BPP in subsequent steps, ensuring consistency across the transaction flow.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: BAP populates the list of payment tags during search to indicate which payment methods or schemes are available for selection, and this list is carried forward to subsequent steps for context, though it is not validated or echoed back by the BPP.
                owner: BAP
                type: object
          _description:
            required: true
            usage: ""
            info: BAP populates the payment intent details in the search request to indicate how the buyer intends to pay for the order, and the BPP echoes these details in its response during subsequent actions like confirm or update, ensuring payment preferences are consistently propagated across the transaction flow.
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The BAP populates the intent to buy or avail a product or a service, specifying details such as what the consumer wants, who they want, where and when they want it, and how they want to pay, which the BPP uses to identify matching offerings. This intent is read and validated at every search-initiated flow to ensure the BPP receives a structured request for product or service discovery.
          owner: BAP
          type: object
      _description:
        required: true
        usage: ""
        info: The BAP populates the message attribute in the search action to convey the transaction context, including the intent and business logic, and ensures it is consistently passed across all downstream actions for cross-flow validation and coordination. The value is minted by the BAP on the initial search request and must be present in all subsequent requests and responses to maintain transaction integrity and enable downstream validation.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object

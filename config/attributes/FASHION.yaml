          owner: BAP
          type: object
        tags:
          code:
            _description:
              required: true
              usage: bap_terms
              info: Code that identifies which intent tag this entry represents in the search request, so the BPP can distinguish the purpose of each tag block when interpreting the BAP’s discovery intent. In this action, the BAP sets it on each tag object and validation checks that the expected tag categories are present, including the tags used for incremental catalog refresh pull and BAP-specific terms.

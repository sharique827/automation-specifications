              type: object
          _description:
            required: true
            usage: ""
            info: Container for discovery tag filters that the BAP places in the search intent when it wants catalog results scoped by selected feature-discovery inputs. In the observed flows, the BAP populates this only when feature-discovery codes are present, and the same tag block is then expected again during incremental catalog refresh pull validation.

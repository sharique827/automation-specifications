                _description:
                  required: false
                  usage: id
                  info: The machine-readable key that identifies what fulfillment-level property a given tag list entry is conveying in the BPP's on_status response; observed values span tracking capability flags, tracking endpoint details, and cancellation or return reason identifiers, letting the BAP parse each tag entry by switching on this code. The entire fulfillments block containing these tags is anchored in session from the confirm round-trip and carried forward into on_status, so the codes the BAP receives here must be interpreted alongside the fulfillment state established earlier in the flow.

meta:
  use_case_id: FASHION
attribute_set:
  search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET10
          info: Specifies the domain in which the transaction operates
          owner: BAP
          type: enum
          enums:
            - code: ONDC:RET10
              description: Grocery
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET11
              description: F&B
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET12
              description: Fashion
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET13
              description: BPC
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET14
              description: Electronics
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET15
              description: Appliances
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET16
              description: Home & Kitchen
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET17
              description: Toys & Games
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET18
              description: Agriculture
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET19
              description: Health & Wellness
              reference: <PR/Issue/Discussion Links md format text>
      action:
        _description:
          required: true
          usage: search
          info: Specifies the action being performed in the transaction
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: Specifies the country in which the transaction is occurring
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: "*"
          info: Specifies the city or region of the transaction
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.0
          info: Specifies the ONDC core version being used
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: buyerNP.com
          info: Specifies the ID of the Buyer App participating in the transaction
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://buyerNP.com/ondc
          info: Specifies the URI where the Buyer App is hosted
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: a4b24113-7c05-495b-9249-f33482bf3493
          info: Helps track a specific transaction across ONDC
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 6aae986b-37c2-47d2-a26c-daaf8ccbd764
          info: Used for tracking and logging purposes
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2023-06-03T09:00:00.000Z
          info: Ensures synchronization across different ONDC participants
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Specifies how long the request remains valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The envelope the BAP populates with routing, session, and network metadata before dispatching a search request; its presence is validated on receipt, and child fields such as timestamp govern constraints on other parts of the same payload.
        owner: BAP
        type: object
    message:
      intent:
        payment:
          "@ondc/org/buyer_app_finder_fee_type":
            _description:
              required: true
              usage: percent
              info: Indicates whether the fee is a fixed amount or a percentage
              owner: BAP
              type: string
          "@ondc/org/buyer_app_finder_fee_amount":
            _description:
              required: true
              usage: "3"
              info: Represents the value of the fee applied
              owner: BAP
              type: string
          _description:
            required: true
            usage: ""
            info: The BAP includes this container in the search intent to signal the buyer's preferred payment terms, allowing BPPs to surface only those catalog offerings or fulfillment options that align with the intended payment arrangement.
            owner: BAP
            type: object
        fulfillment:
          type:
            _description:
              required: false
              usage: Delivery
              info: Specifies how the order will be fulfilled (e.g., Delivery, Pickup)
              owner: BAP
              type: string
          end:
            location:
              gps:
                _description:
                  required: false
                  usage: 12.974002,77.613458
                  info: Indicates where the item is to be delivered
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: false
                    usage: "560001"
                    info: Specifies the postal code of the delivery location
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        item:
          descriptor['name']:
            _description:
              required: false
              usage: coffee
              info: Specifies the product name in the order
              owner: BAP
              type: string
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The top-level container the BAP constructs to express what the consumer wants to find or avail, and optionally to declare the finder fee type and amount that the Buyer App is proposing for this search.
          owner: BAP
          type: object
        tags:
          code:
            _description:
              required: true
              usage: bap_terms
              info: Discriminator key that identifies the semantic category of each tag group within the intent tags array, allowing the BPP to locate and interpret specific intent signals by name. The BAP sets this in the search request and the value is asserted in validation to confirm the expected tag groups are present.
              owner: BAP
              type: string
          list:
            code:
              _description:
                required: true
                usage: static_terms
                info: Machine-readable key that identifies which search-intent qualifier a tag list entry carries, allowing the BPP to interpret the accompanying value field correctly. The BAP populates this in the search request and the value is validated by the BPP, making the code the binding label for catalog-discovery parameters such as terms references, effective date windows, or delivery mode preferences.
                owner: BAP
                type: string
            value:
              _description:
                required: true
                usage: https://github.com/ONDC-Official/NP-Static-Terms/buyerNP_BNP/1.0/tc.pdf
                info: "The BAP populates these values to parameterize the catalog discovery intent: one list entry carries a forward-looking ISO timestamp (set ten days ahead) that signals the intended validity window for the search, while a separate list entry controls the catalog refresh mode and is overwritten to a stop signal when the session is already running in incremental mode."
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: A collection of key-value descriptor entries within a tag group that convey structured policy or terms metadata from the BAP, such as links to static terms documents and their effective dates, scoping the intent of the search request with buyer platform-specific agreement context.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: Carries the structured qualifiers the BAP attaches to the search intent — including time-scoped parameters used in incremental catalog refresh pulls — and must be present in the payload for the request to pass validation.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: The payload body of a select request sent by the BAP, containing the order object that specifies the chosen provider, items, quantities, and fulfillment details the buyer intends to proceed with.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET10
          info: Represents the ONDC domain version used in the transaction
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: on_search
          info: Specifies the event type in the ONDC protocol
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: Identifies the country for the transaction
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.0
          info: ONDC core version used
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: buyerNP.com
          info: Unique identifier of the buyer app
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://buyerNP.com/ondc
          info: URL for the buyer app
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: sellerNP.com
          info: Unique identifier of the seller app
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://sellerNP.com/ondc
          info: URL for the seller app
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 7c7aa709-a05e-4ad5-a49d-22bd64282e71
          info: ID used to track the transaction
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: bc167440-16e7-4ba6-9132-9b25518f1da2
          info: ID used for message correlation
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2024-12-23T06:55:45.035Z
          info: Time of the request
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: std:022
          info: Identifies the city
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The envelope the BAP populates on every select call to carry the routing, domain, and correlation metadata — transaction ID, message ID, BAP/BPP identifiers, action name, and timestamp — that the network uses to route the request and that validators assert for correctness before the BPP processes the item selection.
        owner: BPP
        type: object
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Duration for which this on_select response remains valid, expressed as an ISO 8601 duration. The BPP sets this to signal how long the quoted catalog details, prices, and fulfillment options can be trusted by the BAP before the response expires; the hard ceiling across all ONDC actions including on_select is PT30S, though a BAP may configure a shorter window to match its own UX needs.
          owner: BPP
          type: string
    message:
      catalog:
        bpp/fulfillments:
          id:
            _description:
              required: true
              usage: F1
              info: Represents fulfillment details
              owner: BAP
              type: string
          type:
            _description:
              required: true
              usage: Delivery
              info: Defines the method of fulfillment
              owner: BAP
              type: enum
              enums:
                - code: Delivery
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Self-Pickup
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Delivery and Self-Pickup
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: List of fulfillment options supported by the BPP, returned in the on_search response so the BAP knows which delivery or fulfillment types (such as home delivery or self-pickup) are available across the provider's catalog before the buyer proceeds to item selection.
            owner: BPP
            type: object
        bpp/descriptor:
          name:
            _description:
              required: true
              usage: Seller NP
              info: Seller business name
              owner: BAP
              type: string
          symbol:
            _description:
              required: true
              usage: https://sellerNP.com/images/np.png
              info: Seller brand icon URL
              owner: BAP
              type: string
          short_desc:
            _description:
              required: true
              usage: Seller Marketplace
              info: Short description of the seller
              owner: BAP
              type: string
          long_desc:
            _description:
              required: true
              usage: Seller Marketplace
              info: Detailed description of the seller
              owner: BAP
              type: string
          images:
            _description:
              required: true
              usage: https://sellerNP.com/images/np.png
              info: Image URL of the seller
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: The BPP's self-identifying descriptor returned in an on_search response, containing the seller network participant's display name, logo image, and short and long descriptions that allow the BAP to present and identify the responding BPP to the buyer.
            owner: BPP
            type: object
          tags:
            code:
              _description:
                required: false
                usage: bpp_terms
                info: Identifies the semantic category of a tag group on the BPP's own platform-level descriptor within the on_search catalog response, letting the BAP locate and interpret the correct block of platform metadata by name. The BPP sets this value in on_search and it is asserted against expected values during catalog validation.
                owner: BPP
                type: string
            list:
              code:
                _description:
                  required: false
                  usage: np_type
                  info: The machine-readable key that names a specific platform-level attribute being declared in the BPP's own descriptor tag group during catalog discovery. The BPP sets this code in the on_search response and the value is validated by the receiving party to confirm that the required network participant metadata has been asserted.
                  owner: BPP
                  type: string
              value:
                _description:
                  required: false
                  usage: MSN
                  info: The specific value associated with a descriptor tag attribute for the BPP, such as the network participant type (for example, indicating whether the seller node operates as a Managed Seller Network participant), used by the BAP to understand the capabilities or classification of the responding provider platform.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Collection of key-value pair entries that together define a specific tag group, where each entry carries a code identifying the attribute (such as network participant type) and a value expressing the BPP's declared policy or classification for that tag.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: Collection of structured metadata tags the BPP attaches to its own catalog descriptor in the on_search response; the BPP sets these during catalog generation and they are validated on ingestion.
              owner: BPP
              type: object
        bpp/providers:
          id:
            _description:
              required: true
              usage: P1
              info: Unique identifier for provider
              owner: BAP
              type: string
          descriptor:
            name:
              _description:
                required: true
                usage: Store 1
                info: Name of the provider store
                owner: BAP
                type: string
            symbol:
              _description:
                required: true
                usage: https://sellerNP.com/images/store1.png
                info: URL for provider logo
                owner: BAP
                type: string
            short_desc:
              _description:
                required: true
                usage: Store 1
                info: Short description of the provider
                owner: BAP
                type: string
            long_desc:
              _description:
                required: true
                usage: Store 1
                info: Detailed description of the provider
                owner: BAP
                type: string
            images:
              _description:
                required: true
                usage: https://sellerNP.com/images/store1.png
                info: URL for provider image
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: The BPP returns this object to describe a provider (seller or restaurant) in the catalog, conveying its human-readable identity details such as name, short description, symbol, and images so the BAP can display the provider to the buyer during discovery.
              owner: BPP
              type: object
          ttl:
            _description:
              required: true
              usage: P1D
              info: Time-To-Live for provider data
              owner: BAP
              type: string
          items:
            descriptor:
              name:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Name of the item
                  owner: BAP
                  type: string
              code:
                _description:
                  required: false
                  usage: 1:XXXXXXXXXXXXX
                  info: Unique code for the item
                  owner: BAP
                  type: string
              symbol:
                _description:
                  required: true
                  usage: https://sellerNP.com/images/i1.png
                  info: URL for product image
                  owner: BAP
                  type: string
              short_desc:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Short description of the item
                  owner: BAP
                  type: string
              long_desc:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Detailed description of the item
                  owner: BAP
                  type: string
              images:
                _description:
                  required: true
                  usage: https://sellerNP.com/images/i1.png
                  info: URL for product image
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Contains the human-readable and visual identification details for a catalog item returned by the BPP, including its name, short and long descriptions, images, and classification code, enabling the BAP to render product listings to the buyer during search discovery.
                owner: BPP
                type: object
            price:
              currency:
                _description:
                  required: true
                  usage: INR
                  info: Currency for the item price
                  owner: BAP
                  type: string
              value:
                _description:
                  required: true
                  usage: "100"
                  info: Price of the item
                  owner: BAP
                  type: string
              maximum_value:
                _description:
                  required: true
                  usage: "100"
                  info: Maximum price for the item
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: The pricing details for this item as returned by the BPP in its catalog, encapsulating fields such as the listed amount, currency, and any applicable maximum or offered price that the BAP uses to display cost information to the buyer.
                owner: BPP
                type: object
            quantity:
              unitized:
                measure:
                  unit:
                    _description:
                      required: true
                      usage: kilogram
                      info: Unit of measurement for the item
                      owner: BAP
                      type: enum
                      enums:
                        - code: unit
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: gram
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: dozen
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: kilogram
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: tonne
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: litre
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: millilitre
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                  value:
                    _description:
                      required: true
                      usage: "3"
                      info: Measured quantity of the item
                      owner: BAP
                      type: string
                  _description:
                    required: true
                    usage: ""
                    info: The physical measurement (value and unit) that defines the size or quantity of a single unitized portion of the item, as returned by the BPP in the catalog so the BAP can display per-unit weight, volume, or count to the buyer.
                    owner: BPP
                    type: object
                count:
                  _description:
                    required: true
                    usage: "3"
                    info: Measured Unitized count of the item
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Describes the per-unit quantity representation for an item, grouping the measure object that specifies the standard unit and numeric value by which a single unit of the item is sold or dispensed, as returned by the BPP in catalog responses.
                  owner: BPP
                  type: object
              available:
                count:
                  _description:
                    required: true
                    usage: "99"
                    info: Available stock count
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Indicates the currently available stock quantity for the item, returned by the BPP in catalog responses so the BAP can surface real-time inventory availability to the buyer.
                  owner: BPP
                  type: object
              maximum:
                count:
                  _description:
                    required: true
                    usage: "99"
                    info: Max items per order
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Specifies the maximum purchasable quantity allowed per order for this item, enabling the BPP to cap how many units a buyer can add in a single transaction.
                  owner: BPP
                  type: object
              minimum:
                count:
                  _description:
                    required: true
                    usage: "1"
                    info: Min items per order
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: true
                usage: ""
                info: Conveys the available stock and unit-based ordering constraints for this catalog item as published by the BPP, giving the BAP the information needed to display purchasable quantities and enforce any minimum or maximum order limits when the buyer selects the item.
                owner: BPP
                type: object
            category_id:
              _description:
                required: true
                usage: Atta, Flours and Sooji
                info: Item category classification
                owner: BAP
                type: string
            "@ondc/org/returnable":
              _description:
                required: true
                usage: "1"
                info: Indicates if the item is returnable
                owner: BAP
                type: string
            rating:
              _description:
                required: true
                usage: "4"
                info: Item Rating
                owner: BAP
                type: string
            "@ondc/org/cancellable":
              _description:
                required: true
                usage: "1"
                info: Indicates if the item can be canceled
                owner: BAP
                type: string
            "@ondc/org/available_on_cod":
              _description:
                required: true
                usage: "False"
                info: Whether Cash on Delivery is available
                owner: BAP
                type: string
            "@ondc/org/statutory_reqs_packaged_commodities":
              manufacturer_or_packer_name:
                _description:
                  required: false
                  usage: ITC
                  info: Name of the manufacturer
                  owner: BAP
                  type: string
              manufacturer_or_packer_address:
                _description:
                  required: false
                  usage: ITC Quality Care Cell, P.O Box No.592, Bangalore-560005
                  info: Address of the manufacturer
                  owner: BAP
                  type: string
              mfg_license_no:
                _description:
                  required: false
                  usage: 51/UA/SC/P-2013
                  info: Manufacturing License number
                  owner: BAP
                  type: string
              multiple_products_name_number_or_qty:
                _description:
                  required: false
                  usage: "15"
                  info: Multiple products name,number or quantity
                  owner: BAP
                  type: string
              common_or_generic_name_of_commodity:
                _description:
                  required: false
                  usage: Electric Sewing Machine
                  info: The common or generic name of the packaged commodity
                  owner: BAP
                  type: string
              month_year_of_manufacture_packing_import:
                _description:
                  required: false
                  usage: 2024-08-06 00:00:00
                  info: The date of manufacture, packing, or import of the commodity
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Statutory compliance details that the BPP must provide for packaged commodities under applicable regulations, such as the Legal Metrology (Packaged Commodities) Rules, including information like net quantity, manufacturer details, and country of origin, enabling the BAP to display legally mandated packaging disclosures to buyers.
                owner: BPP
                type: object
            time:
              timestamp:
                _description:
                  required: true
                  usage: 2024-12-23T06:55:45.035Z
                  info: Time of item update
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Represents the timing event associated with an item's lifecycle state in the BPP's catalog, carrying a label such as "enable" alongside a timestamp to indicate when the item's status became effective. In incremental catalog refresh flows, this allows the BAP to determine precisely when a given item was activated or modified within the provider's inventory.
                owner: BPP
                type: object
              label:
                _description:
                  required: true
                  usage: enable
                  info: Indicates the current availability state of an item at a given point in time, signaling to the BAP whether the item is active and eligible to be displayed or ordered by the buyer.
                  owner: BPP
                  type: string
            tags:
              list:
                code:
                  _description:
                    required: true
                    usage: channel_margin_type
                    info: Type of channel margin
                    owner: BAP
                    type: string
                value:
                  _description:
                    required: true
                    usage: percent
                    info: Value of channel margin type
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: The array of key-value descriptor pairs within a tag group that together convey a specific category of item metadata, such as origin details (e.g., country of manufacture) or product attributes (e.g., colour, size, base metal, plating) that the BPP includes in the catalog response to help BAPs surface accurate product characteristics to buyers.
                  owner: BPP
                  type: object
              _description:
                required: true
                usage: ""
                info: A list of tag groups returned by the BPP for each catalog item, carrying structured supplementary metadata — such as product attributes, category-specific details, or classification codes — that extend the item's standard descriptor fields with additional key-value information.
                owner: BPP
                type: object
              code:
                _description:
                  required: true
                  usage: origin
                  info: The BPP sets this field to identify the category of a tag group attached to an item in the catalog, signaling what kind of supplementary metadata the group encapsulates. It is set by the BPP in the on_search response and is asserted during validation, meaning the consuming side checks this value to correctly interpret and route the tag group's contents.
                  owner: BPP
                  type: string
            replacement_terms:
              replace_within:
                duration:
                  _description:

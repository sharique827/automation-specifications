meta:
  use_case_id: Logistics (P2P)
attribute_set:
  search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:LOG10
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:LOG10
              description: Hyperlocal logistics domain code (P2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:LOG11
              description: Intercity logistics domain code (P2H2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: nic2004:60232
              description: Logistics domain code (deprecated)
              reference: <PR/Issue/Discussion Links md format text>
      country:
        _description:
          required: true
          usage: IND
          info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: std:080
          info: |
            Describes the city code this location is, or is located within, city code should match the city for fulfillment start location;
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: Holds transaction-level metadata that the BAP establishes when initiating a search, enabling message correlation and identification across the transaction chain.
        owner: BAP
        type: object
    message:
      intent:
        category:
          id:
            _description:
              required: true
              usage: Immediate Delivery
              info: |
                Express Delivery" - by air (for P2H2P); "Standard Delivery" - by surface (for P2P, P2H2P): "Immediate Delivery" is for S2D <= 60 min; "Same Day Delivery" "Next Day Delivery" If id="Standard Delivery": all possible options should be returned in /on_search (including for "Immediate Delivery", "Same Day Delivery", "Next Day Delivery"); If id="Express Delivery": all possible P2H2P options should be returned in /on_search;
              owner: BAP
              type: enum
              enums:
                - code: Express Delivery
                  description: Delivery will be done by Air
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Standard Delivery
                  description: Delivery will be done by Surface
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Immediate Delivery
                  description: Delivery will be done within S2D (Shipment to Delivery) <= 60 min
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Next Day Delivery
                  description: Delivery will be done on the Next Day with respect to context timestamp
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Same Day Delivery
                  description: Delivery will be done on the Same Day with respect to context timestamp
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Instant Delivery
                  description: Delivery will be done withing 10 minutes (S2D TAT <= 10 min)
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: Object encapsulating category details the BAP specifies in the search request intent.
            owner: BAP
            type: object
        item:
          descriptor:
            code:
              _description:
                required: false
                usage: false
                info: Describes the type of order, point to point (P2P) or via hub (P2H2P), deprecated, not to be used.
                owner: BAP
                type: string
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        provider:
          time:
            days:
              _description:
                required: true
                usage: 1,2,3,4,5,6,7
                info: |
                  store pickup timings; days of week: 1 - Monday till 7 - Sunday;
                owner: BAP
                type: string
            schedule:
              holidays:
                _description:
                  required: true
                  usage: |-
                    [ "2023-06-29",
                                  "2023-08-15"
                    ]
                  info: list of future dated holidays;
                  owner: BAP
                  type: array
              _description:
                required: true
                usage: ""
                info: Specifies provider holidays and unavailable dates that the buyer uses to filter search results to providers with compatible service availability.
                owner: BAP
                type: object
            duration:
              _description:
                required: true
                usage: PT30M
                info: order preparation time (indicates estimate timing for logistics ready_to_ship) - may be used by LSP to optimize scheduling of task allocation;
                owner: BAP
                type: string
            range:
              start:
                _description:
                  required: true
                  usage: "1100"
                  info: Start time of the provider availability window the BAP specifies in the search; works with end time to define the provider's operating hours.
                  owner: BAP
                  type: string
              end:
                _description:
                  required: true
                  usage: "2100"
                  info: End time of the provider availability window the BAP specifies in the search; must exceed start time and the span must be less than 24 hours.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: The start and end times within which the buyer seeks service availability or intends to transact with the provider in a search request.
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: Specifies provider availability times the BAP is searching for—as a single point, duration, or timetable.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: Container identifying the service provider (restaurant, store, hospital, etc.) from which the BAP is requesting fulfillment.
            owner: BAP
            type: object
        fulfillment:
          type:
            _description:
              required: true
              usage: Delivery
              info: Type of fulfillment (Delivery or Return).
              owner: BAP
              type: enum
              enums:
                - code: Delivery
                  description: Describes the type of fulfillment.
                  reference: <PR/Issue/Discussion Links md format text
                - code: Return
                  description: Describes the type of fulfillment.
                  reference: <PR/Issue/Discussion Links md format text
                - code: RTO
                  description: Describes the type of fulfillment.
                  reference: <PR/Issue/Discussion Links md format text
          start:
            location:
              id:
                _description:
                  required: false
                  usage: S1
                  info: unique id for store - optional;
                  owner: BAP
                  type: string
              gps:
                _description:
                  required: true
                  usage: 12.4535,77.9283
                  info: |
                    GPS coordinates for pickup location, minimum 4 digit decimal precision;
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: true
                    usage: "560001"
                    info: The BAP specifies the postal code (pincode, ZIP, or equivalent) of the pickup location; the value is anchored in the session as `start_area_code` and reused across transaction steps.
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: The address where fulfillment begins (pickup point), which the BAP specifies in the search intent to enable the BPP to determine service coverage and calculate fulfillment feasibility.
                  owner: BAP
                  type: object
              _description:
                required: true
                usage: ""
                info: The starting or origin location from which the buyer requests fulfillment to begin, specified using geographic coordinates, postal address, or location identifier to enable the seller to determine service feasibility.
                owner: BAP
                type: object
            authorization:
              type:
                _description:
                  required: false
                  usage: OTP
                  info: |
                    Authorization type for pickup. optional, only required if LBNP wants pickup authorization, using dynamic OTP; if LSP doesn’t support authorization, they should not respond to the search request;
                  owner: BAP
                  type: enum
                  enums:
                    - code: OTP
                      description: Describes OTP as an authorization mechanism used to start the fulfillment of an order.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            instructions:
              code:
                _description:
                  required: false
                  usage: "5"
                  info: BAP specifies the pickup confirmation method in search (static OTP); the value persists as `static_pickup_otp` and is reused across subsequent transaction steps.
                  owner: BAP
                  type: enum
                  enums:
                    - code: "2"
                      description: Describes merchant order number.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "3"
                      description: Describes any other pickup confirmation code.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "4"
                      description: Describes OTP for pickup confirmation.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "5"
                      description: Describes Static OTP for pickup confirmation.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: ""
                info: BAP conditionally populates pickup instruction details during search when static OTP requirements are detected; the parent fulfillment object persists across the transaction.
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: Container for the fulfillment start point the BAP specifies in search.
              owner: BAP
              type: object
          end:
            location:
              gps:
                _description:
                  required: true
                  usage: 12.4535,77.9283
                  info: GPS coordinates for delivery location.
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: false
                    usage: "560001"
                    info: Area code for the BAP's intended delivery location (pincode, ZIP, or equivalent); retained across fulfillment steps.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Specifies the address where the BAP intends fulfillment to conclude.
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: ""
                info: Specifies the geographic location where the BAP expects fulfillment to conclude.
                owner: BAP
                type: object
            authorization:
              type:
                _description:
                  required: false
                  usage: OTP
                  info: |
                    Authorization type for delivery. optional, only required if LBNP wants delivery authorization, using dynamic OTP; if LSP doesn’t support authorization, they should not respond to the search request;
                  owner: BAP
                  type: enum
                  enums:
                    - code: OTP
                      description: Describes OTP as an authorization mechanism used to end the fulfillment of an order.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            instructions:
              code:
                _description:
                  required: false
                  usage: "5"
                  info: BAP specifies the delivery confirmation method in search (static OTP); the value persists as `static_delivery_otp` and is reused across subsequent transaction steps.
                  owner: BAP
                  type: enum
                  enums:
                    - code: "1"
                      description: Describes OTP for delivery confirmation.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "2"
                      description: Describes any other delivery confirmation code (DCC).
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "3"
                      description: Describes no delivery code.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "5"
                      description: Describes Static OTP for delivery confirmation.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: ""
                info: Instructions for how the fulfillment endpoint should be handled, specified by the BAP in search and inherited across the entire order lifecycle for downstream steps to reference.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Specifies endpoint details—destination location and timing—where the BAP expects fulfillment to conclude.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: Describes how a single product/service will be rendered or fulfilled to the customer; in search, the BAP declares the fulfillment modality (delivery, pickup, or service) and this intent persists across the transaction.
            owner: BAP
            type: object
          tags:
            code:
              _description:
                required: true
                usage: linked_provider
                info: Semantic code identifying the fulfillment tag type; the BAP specifies codes (like 'linked_order') in search and the system validates and persists them across transaction steps.
                owner: BAP
                type: string
            list:
              code:
                _description:
                  required: true
                  usage: id
                  info: Tag code identifying which fulfillment property is being described; BAP includes it in search to surface relevant attributes, is validated in subsequent responses, and persists across the entire order.
                  owner: BAP
                  type: string
              value:
                _description:
                  required: true
                  usage: "1.0"
                  info: Specific value for the fulfillment property identified by the tag code; included by BAP in search to express preferences and persists within the fulfillment object throughout the order.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Fulfillment attribute tags the buyer specifies in a search request to indicate desired logistics capabilities, service features, or delivery conditions.
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: Fulfillment metadata tags supplied by the BAP in search; each tag is identified by a code (such as 'linked_order') and the system validates and preserves them across steps.
              owner: BAP
              type: object
        payment:
          type:
            _description:
              required: true
              usage: ON-ORDER
              info: "Type of payment for the logistics order. ON-ORDER - Prepaid mode via wallet system, ON-FULFILLMENT - payment on delivery, POST-FULFILLMENT - payment post delivery, invoice to be raised after agreed number of days. "
              owner: BAP
              type: enum
              enums:
                - code: ON-ORDER
                  description: Prepaid payment via wallet system enabled by LSP.
                  reference: <PR/Issue/Discussion Links md format text
                - code: ON-FULFILLMENT
                  description: Payment occurs when order is Delivered.
                  reference: <PR/Issue/Discussion Links md format text
                - code: POST-FULFILLMENT
                  description: Payment occurs after invoice is raised.
                  reference: <PR/Issue/Discussion Links md format text
          "@ondc/org/collection_amount":
            _description:
              required: false
              usage: "300.00"
              info: The cash-on-delivery amount the BAP expects to be collected from the buyer; this field is deprecated and will be removed in future versions.
              owner: BAP
              type: string
          _description:
            required: true
            usage: ""
            info: Container for the payment terms and methods the BAP is seeking or willing to use for fulfillment.
            owner: BAP
            type: object
        "@ondc/org/payload_details":
          weight:
            unit:
              _description:
                required: true
                usage: kilogram
                info: Weight unit of the payload, deprecated, will be removed in future version;
                owner: BAP
                type: string
            value:
              _description:
                required: false
                usage: "3"
                info: Deprecated numeric weight value the BAP specifies in the search request's payload details; marked for future removal.
                owner: BAP
                type: number
            _description:
              required: false
              usage: ""
              info: Object encapsulating weight specifications the BAP provides in the search request payload.
              owner: BAP
              type: object
          dimensions:
            length:
              unit:
                _description:
                  required: true
                  usage: centimeter
                  info: Unit for length dimension, deprecated, will be removed in future version;
                  owner: BAP
                  type: string
              value:
                _description:
                  required: false
                  usage: "1"
                  info: Numeric length measurement of the package; deprecated and will be removed in a future version.
                  owner: BAP
                  type: number
              _description:
                required: false
                usage: ""
                info: Container for the package length dimension in the search request.
                owner: BAP
                type: object
            breadth:
              unit:
                _description:
                  required: true
                  usage: centimeter
                  info: Unit for breadth dimension, deprecated, will be removed in future version;
                  owner: BAP
                  type: string
              value:
                _description:
                  required: false
                  usage: "1"
                  info: Breadth value of the package; deprecated and will be removed in future versions.
                  owner: BAP
                  type: number
              _description:
                required: false
                usage: ""
                info: Object representing the breadth scalar quantity.
                owner: BAP
                type: object
            height:
              unit:
                _description:
                  required: true
                  usage: centimeter
                  info: Unit for height dimension, deprecated, will be removed in future version;
                  owner: BAP
                  type: string
              value:
                _description:
                  required: false
                  usage: "1"
                  info: Numeric height measurement of the package; deprecated and will be removed in a future version.
                  owner: BAP
                  type: number
              _description:
                required: false
                usage: ""
                info: Object representing the height scalar quantity.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Container for object dimensions that the BAP provides as search criteria.
              owner: BAP
              type: object
          category:
            _description:
              required: true
              usage: Grocery
              info: Category of linked order, deprecated, will be removed in future version;
              owner: BAP
              type: string
          value:
            currency:
              _description:
                required: true
                usage: INR
                info: Currency of payload value, deprecated, will be removed in future version;
                owner: BAP
                type: string
            value:
              _description:
                required: false
                usage: "300.00"
                info: Deprecated decimal monetary value the BAP specifies in the search request's payload details; marked for future removal.
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: Container for price information in the search payload; allows domain extension.
              owner: BAP
              type: object
          dangerous_goods:
            _description:
              required: true
              usage: '"false"'
              info: Indicates if payload contains dangerous goods, deprecated, will be removed in future version;
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: Contains shipment physical characteristics such as weight and dimensions that the BAP includes for logistics providers to assess serviceability.
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: Specifies the consumer's intent to buy or avail a product or service that the BAP declares when initiating a search.
          owner: BAP
          type: object
        tags:
          code:
            _description:
              required: false
              usage: lbnp_features
              info: Code identifying the tag's category; indicates what type of search criterion this tag represents.
              owner: BAP
              type: string
          list:
            code:
              _description:
                required: false
                usage: metric
                info: Classifier code identifying the semantic category of this tag entry (metric, base_unit, linked_order, category, etc.), used by the BAP to structure search filters and help the BPP determine which commercial or operational terms apply to the request.
                owner: BAP
                type: string
            value:
              _description:
                required: false
                usage: yes
                info: The value component of a search tag, enabling the BAP to filter the search based on relevant business parameters.
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: Array of values for this tag, populated with the specific criteria relevant to the tag's category code.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: Array of tags the BAP includes in search to specify filter criteria such as feature requirements or SLA terms.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: The message object carries the buyer's search intent, containing the service requirements and cargo details required to find matching logistics providers.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:LOG10
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:LOG10
              description: Hyperlocal logistics domain code (P2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:LOG11
              description: Intercity logistics domain code (P2H2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: nic2004:60232
              description: Logistics domain code (deprecated)
              reference: <PR/Issue/Discussion Links md format text>
      country:
        _description:
          required: true
          usage: IND
          info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: std:080
          info: Describes the city code this location is, or is located within
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: on_search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: api.example-bpp.com
          info: Describes subscriber ID of the BPP
          owner: BPP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://api.example-bpp.com/dobpp/7f7896dd-787e-4a0b-8675-e9e6fe93bb8f
          info: Describes subscriber URL of the BPP for accepting calls from BAPs.
          owner: BPP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BPP
          type: string
      ttl:
        _description:
          required: false
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: Holds transaction-level metadata that the BAP establishes when initiating a search, enabling message correlation and identification across the transaction chain.
        owner: BPP
        type: object
    message:
      catalog:
        bpp/descriptor:
          name:
            _description:
              required: true
              usage: LSP Aggregator Inc
              info: name of logistics aggregator or logistics provider, as applicable;
              owner: BPP
              type: string
          _description:
            required: true
            usage: ""
            info: Container providing identifying and descriptive metadata about the BPP in the on_search response.
            owner: BPP
            type: object
          tags:
            code:
              _description:
                required: true
                usage: bpp_terms
                info: Identifies the tag container for BPP policy terms; set by the BPP in on_search and validated by the BAP.
                owner: BPP
                type: string
            list:
              code:
                _description:
                  required: true
                  usage: static_terms
                  info: Identifier code for each policy term attribute; the BPP generates this in on_search and the BAP validates it.
                  owner: BPP
                  type: string
              value:
                _description:
                  required: true
                  usage: ""
                  info: Value content for each policy term attribute, generated by the BPP in on_search.
                  owner: BPP
                  type: string
              _description:
                required: true
                usage: ""
                info: Collection of policy term attributes that the BPP generates in on_search.
                owner: BPP
                type: object
            _description:
              required: true
              usage: ""
              info: Array of tags providing additional metadata about the BPP or catalog in the on_search response.
              owner: BPP
              type: object
          images:
            _description:
              required: false
              usage: https://lspaggregator.com/logo.png
              info: URLs to images representing the BPP provider, such as logos or branding assets. The BAP displays these images in search results and listings to identify the logistics service to end users.
              owner: BPP
              type: string
          long_desc:
            _description:
              required: false
              usage: Aggregated courier services for hyperlocal delivery
              info: BPP provides a longer text description of the provider in the catalog descriptor; set during generation as background information but not validated or reused in downstream transaction steps.
              owner: BPP
              type: string

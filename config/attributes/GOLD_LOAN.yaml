                  info: This attribute defines the code for an item.
                  owner: BPP
                  type: enum
                  enums:
                    - code: PERSONAL_LOAN
                      description: Describes an unsecured credit provided by financial institutions based on criteria like employment history, repayment capacity, income level, profession and credit history
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: ""
                info: Container for the descriptor attached to each catalog item the BPP returns in on_search; the chosen item is persisted as session key `item` and reused in later steps, so this descriptor stays anchored to that stored item across the flow.
                owner: BPP
                type: object
            category_ids:
              _description:
                required: false
                usage: "101123"
                info: The BPP returns category IDs with each item in the catalog to identify the product category; the BAP persists these IDs and uses them to route and process offerings across subsequent steps.
                owner: BPP
                type: string
            xinput:
              head:
                descriptor:
                  name:
                    _description:
                      required: false
                      usage: Customer Information
                      info: This describes the heading of the form where we are taking additioal information from the customer to purchase / avail this item.
                      owner: BPP
                      type: string
                  _description:
                    required: false
                    usage: ""
                    info: Header metadata for the additional-information form attached to this catalog item, which the BPP returns in on_search and the BAP carries forward unchanged through the saved item in later steps.
                    owner: BPP
                    type: object
                index:
                  min:
                    _description:
                      required: false
                      usage: "0"
                      info: The BPP declares in on_search the minimum index of additional input fields required from the customer to avail this item. This value persists within the item catalog and is referenced in subsequent transaction steps.
                      owner: BPP
                      type: number
                  max:
                    _description:
                      required: false
                      usage: "0"
                      info: The BPP declares the maximum integer value of the xinput header needed for this item; the value is anchored in the session and reused by the BAP across subsequent steps to determine the scope of additional customer inputs.
                      owner: BPP
                      type: number
                  cur:
                    _description:
                      required: false
                      usage: "0"
                      info: The BPP returns this number in on_search to represent the current index within the xinput.head, which describes additional information the customer must provide for this item. The value persists through the transaction session as part of the saved item payload.
                      owner: BPP
                      type: number
                  _description:
                    required: false
                    usage: ""
                    info: Carries the loan item entry in the search response catalog, and the BAP keeps the chosen item anchored in session so the same item can be reused in later steps of the flow.
                    owner: BPP
                    type: object
                headings:
                  _description:
                    required: false
                    usage: Personal Information
                    info: This is the forms heading names.
                    owner: BPP
                    type: enum
                    enums:
                      - code: KYC
                        description: Describes the form heading as KYC
                        reference: <PR/Issue/Discussion Links md format text
                      - code: KYC_OFFLINE
                        description: Describes the form heading as KYC_OFFLINE
                        reference: <PR/Issue/Discussion Links md format text
                      - code: JOURNEY_OFFLINE
                        description: Describes the form heading as JOURNEY_OFFLINE
                        reference: <PR/Issue/Discussion Links md format text
                      - code: SET_LOAN_AMOUNT
                        description: Describes the form heading as JOURNEY_OFFLINE
                        reference: <PR/Issue/Discussion Links md format text
                      - code: PERSONAL_INFORMATION
                        description: Describes the form heading as PERSONAL_INFORMATION
                        reference: <PR/Issue/Discussion Links md format text
                      - code: ACCOUNT_INFORMATION
                        description: Describes the form heading as ACCOUNT_INFORMATION
                        reference: <PR/Issue/Discussion Links md format text
                      - code: EMANDATE
                        description: Describes the form heading as EMANDATE
                        reference: <PR/Issue/Discussion Links md format text
                      - code: LOAN_AGREEMENT
                        description: Describes the form heading as LOAN_AGREEMENT
                        reference: <PR/Issue/Discussion Links md format text
                _description:
                  required: false
                  usage: ""
                  info: Header block in the BPP’s on_search response that tells the BAP what extra customer inputs will be needed for each catalog item, and that requirement detail is kept anchored in the session so later steps can refer back to it when the chosen item is carried forward.
                  owner: BPP
                  type: object
              form:
                url:
                  _description:
                    required: false
                    usage: https://6vs8xnx5i7.icicibank.co.in/loans/xinput/formid/a23f2fdfbbb8ac402bf259d75
                    info: This refers to the current integer value of the xinput header which describes the additional information required from the customer to purchase/avail the item.
                    owner: BPP
                    type: string
                mime_type:
                  _description:
                    required: false
                    usage: text/html
                    info: This describes the type of the form generated.
                    owner: BPP
                    type: string
                resubmit:
                  _description:
                    required: false
                    usage: Optional
                    info: After reopening the form, this attribute keeps in check whether the form has been resubmitted or not
                    owner: BPP
                    type: boolean
                multiple_sumbissions:
                  _description:

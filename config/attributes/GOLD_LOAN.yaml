              usage: cat_gold_loan_ec6cc82b-286d-435c-ba7d-f1fcc4af1d5d
              info: Category identifiers for the selected item, used to keep the item’s classification consistent across the flow. In on_select, the BPP echoes the selected item’s category_ids onto the saved order payload only when the selected item provides them, and the same values are then expected to persist and be reused in later steps.
              owner: BPP
              type: string
        quote:
          id:
            _description:
              required: false
              usage: b469bb12-9f67-4898-8f39-ea7816f54289
              info: This refers to the id of the mutully agreed upon quotation for this order.
              owner: BPP
              type: string
          price:
            value:
              _description:
                required: false
                usage: "442300"
                info: BPP returns the rupee amount of the total quoted price in on_select, persisting it under session key quote_price for consistency throughout the transaction.
                owner: BPP
                type: string
            currency:
              _description:
                required: false
                usage: INR
                info: This refers to the value of used currency of quoted price.
                owner: BPP
                type: string
            _description:
              required: false
              usage: ""
              info: The BPP returns the total quoted price object in on_select, and the BAP reuses the saved quote in later confirm and update steps.
              owner: BPP
              type: object
          breakup:
            title:
              _description:
                required: false
                usage: Principal
                info: This attribute describes the breakup of the total quoted price.
                owner: BPP
                type: string
            price:
              value:
                _description:
                  required: false
                  usage: "0"
                  info: Rupee amount for each breakup item that the BPP returns in the on_select quote; this quote persists in the session and is referenced through confirm and update steps.
                  owner: BPP
                  type: string
              currency:
                _description:
                  required: false
                  usage: INR
                  info: This refers to the value of used currency of that particular quoted price breakup.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: The BPP returns the quote breakup as part of on_select, and this order-level quote snapshot is anchored in session so the BAP can reuse it unchanged in later confirm and update steps.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: BPP returns the breakup of the total quoted price in on_select, and the value is anchored in the saved order so the BAP can replay the same quote through later confirm and update steps.
              owner: BPP
              type: object
          ttl:
            _description:
              required: false
              usage: PT15D
              info: |-
                It explains the time-to-live (TTL) value for a quote, detailing the duration in ISO8601 format.
                 
                 Example: In this context, "PT15D" is given as an example, where "PT" indicates a duration period, and "15D" signifies 15 days. Therefore, the quote, in this case, is valid for 15 days from the specified timestamp or starting point.
              owner: BPP
              type: string
          _description:
            required: false
            usage: ""
            info: The BPP returns the mutually agreed quotation for the order in on_select, and the BAP treats it as the persisted order context that is carried forward into later steps such as on_confirm, on_update, and validation.
            owner: BPP
            type: object
        fulfillments:
          _description:
            required: false
            usage: ""
            info: The BAP uses this container in select to describe the fulfillment arrangement needed to complete the order, and the BPP echoes or confirms that plan in on_select. The same order payload is persisted in session and reused in later steps, so this structure must remain consistent across the round trip.
            owner: BPP
            type: object
          type:
            _description:
              required: false
              usage: LOAN
              info: BPP returns fulfillments[].type in on_select to denote the fulfillment service category; when existing fulfillments are detected (the deduplication gate), the type is set to DEDUPE, otherwise LOAN. The fulfillments are persisted in session and replayed by the BAP in downstream confirm and update requests.
              owner: BPP
              type: string
          agent:
            person:
              name:
                _description:
                  required: false
                  usage: Rajesh Sharma
                  info: BPP provides the fulfillment agent's name in on_select to identify the person handling this transaction stage. Validation for on_select checks both name and contact phone, failing if either is missing.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: The BPP returns the fulfillment agent’s personal details inside the on_select order payload, and that order object is persisted for reuse in later steps such as on_confirm and on_update.
                owner: BPP
                type: object
            contact:
              phone:
                _description:
                  required: false
                  usage: +91-99xx99xx99xx
                  info: Phone number of the fulfillment agent. The BPP provides this in the on_select response within the selected fulfillment; the BAP validates its presence alongside agent name and persists the fulfillment in session for reuse during confirm and update.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: The BPP uses this object in on_select to return the fulfillment agent’s contact details for the selected fulfillment, so the BAP can reach the representative who will actually handle the order. Because the order payload is persisted across steps, this contact information stays anchored in the saved order and can be reused later without being regenerated.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: In on_select, the BPP returns the fulfillment-side agent details for the selected order, validates them before fulfillment can be confirmed, and the same order payload is persisted for reuse in later steps.
              owner: BPP
              type: object
          id:
            _description:
              required: false
              usage: F1
              info: Identifier of a fulfillment entry inside the order, used to keep the status response aligned with the fulfillment the BAP already selected and the BPP saved earlier in the session. In on_status, the BPP echoes this ID back from the persisted order payload so the BAP can match each reported fulfillment to the same object across later steps.
              owner: BPP
              type: string
          tags:
            descriptor:
              name:
                _description:
                  required: false
                  usage: Checklist
                  info: Human-readable label for a fulfillment tag descriptor in the BPP’s on_select response; it is carried inside the persisted order payload so the BAP can reuse the same value in later steps.
                  owner: BPP
                  type: string
              code:
                _description:
                  required: false
                  usage: CHECKLISTS
                  info: Code that identifies which fulfillment tag category is attached to the selected order. In on_select, the BPP returns it as part of the fulfillment details, and the BAP persists the order so the same value can be reused and checked in later steps; where the flow generates and then validates this field, it must round-trip unchanged.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Descriptor metadata inside the selected fulfillment’s tags that the BPP returns in on_select so the BAP can carry the chosen fulfillment forward. It stays anchored in the saved order payload and is reused unchanged in later on_confirm and on_update steps.
                owner: BPP
                type: object
            display:
              _description:
                required: false
                usage: "false"
                info: Boolean display flag on a fulfillment tag in the BPP’s on_select response, indicating whether that tag should be surfaced to the BAP. The value is saved inside the order payload and carried forward with the persisted order across later steps, so it should stay stable once set.
                owner: BPP
                type: boolean
            list:
              descriptor:
                code:
                  _description:
                    required: false
                    usage: PERSONAL_INFORMATION
                    info: Code that identifies the meaning of a fulfillment tag entry. In on_select, the BPP returns it inside the selected fulfillments, and the BAP uses it to interpret which tag category applies to that fulfillment; the value is anchored in the saved order payload and carried into later steps.
                    owner: BPP
                    type: string
                name:
                  _description:
                    required: false
                    usage: Personal Information
                    info: Human-readable label for a fulfillment tag entry. In on_select, the BPP returns this name inside the selected fulfillments so the BAP can identify each tag, and because the order object is persisted across steps, the same label is reused and checked again later during validation.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: The BPP returns the fulfillment-tag descriptor metadata in on_select, and this object is anchored in the saved order so later confirm and update steps can reuse the same session state.
                  owner: BPP
                  type: object
              value:
                _description:
                  required: false
                  usage: PENDING
                  info: Status-style value carried in a fulfillment tag list entry, used here as the consent_handler round-trip token that the BAP creates earlier and the BPP echoes back in on_select for validation. Keep it consistent across the exchange; the downstream consumer checks this returned value to confirm the expected consent handling state.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Metadata tags attached to each fulfillment in the BPP’s on_select response, carried forward with the selected fulfillments and persisted in the saved order so later steps can reuse the same fulfillment details.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: Container for the fulfillment metadata the BPP returns in on_select; the selected fulfillment set is persisted with the saved order so the BAP can carry it forward into confirm and later update.
              owner: BPP
              type: object
        _description:
          required: false
          usage: ""
          info: The BPP returns the complete order object as the negotiated legal purchase contract for the transaction, and the BAP stores it as the session anchor for confirm and later steps. This round-trip is important because the same order payload is validated here and then reused unchanged across the rest of the flow.
          owner: BPP
          type: object
      _description:
        required: false
        usage: ""
        info: The BPP uses this response envelope in on_select to return the selected transaction state back to the BAP. This same message container is minted in generate and checked again in validate, so its structure and contents must stay consistent across that round-trip.
        owner: BPP
        type: object

    message:
      catalog:
        descriptor:
          name:
            _description:
              required: true
              usage: ICICI Bank
              info: It refers to the financial institution that is involved in providing the loan.
              owner: BPP
              type: string
          _description:
            required: false
            usage: ""
            info: Physical description of the cataloged offering that the BPP returns in on_search, where it packages the metadata used to describe what is being presented and the same object is then checked in downstream validation.
            owner: BPP
            type: object
        providers:
          id:
            _description:
              required: false
              usage: PROVIDER_ID
              info: The BPP returns a unique identifier for each provider in the search response; if the ID is missing or is the placeholder 'PROVIDER_ID', the BPP auto-generates a UUID-based identifier. This ID is saved to the session as 'provider_id' and reused across select, confirm, and later steps.
              owner: BPP
              type: string
          descriptor:
            name:
              _description:
                required: true
                usage: ICICI Bank
                info: It refers to the financial institution that is involved in providing the loan.
                owner: BPP
                type: string
            short_desc:
              _description:
                required: false
                usage: ICICI Bank Ltd
                info: This is the concised description of the loan provider.
                owner: BPP
                type: string
            long_desc:
              _description:
                required: false
                usage: ICICI Bank Ltd, India
                info: This is the detailed description of the loan provider.
                owner: BPP
                type: string
            images:
              url:
                _description:
                  required: false
                  usage: https://www.icicibank.com/content/dam/icicibank/india/assets/images/header/logo.png
                  info: This attribute defines the image url of the loan provider.
                  owner: BPP
                  type: string
              size_type:
                _description:
                  required: false
                  usage: sm
                  info: It defines the image size, and the network policy can determine the default dimensions for each type.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: The BPP includes provider imagery in each catalog provider descriptor, and the BAP uses it to identify and retain the selected provider’s image set in session so the same provider context can be reused in later steps.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: Provider identifying information the BPP returns in on_search so the BAP can select a provider; the chosen provider is persisted as selected_provider and reused in later steps across the flow.
              owner: BPP
              type: object
          categories:
            id:
              _description:
                required: false
                usage: "101123"
                info: BPP returns a unique category identifier that anchors each loan category in the session; this ID persists with the selected provider across subsequent steps.
                owner: BPP
                type: string
            descriptor:
              code:
                _description:
                  required: true
                  usage: GOLD_LOAN
                  info: It refers to the explanation of the type of the loan. Describes a secured credit provided by financial institutions based on value of the gold declared by the customer
                  owner: BPP
                  type: enum
                  enums:
                    - code: PERSONAL_LOAN
                      description: Describes an unsecured credit provided by financial institutions based on criteria like employment history, repayment capacity, income level, profession and credit history
                      reference: <PR/Issue/Discussion Links md format text
                    - code: BUREAU_LOAN
                      description: Describes the child category as Bureau Loan
                      reference: <PR/Issue/Discussion Links md format text
                    - code: AA_PERSONAL_LOAN
                      description: Describes the child category as Account Aggregator Loan
                      reference: <PR/Issue/Discussion Links md format text
                    - code: GOLD_LOAN
                      description: Describes the category as GOLD_LOAN
                      reference: <PR/Issue/Discussion Links md format text
                    - code: AA_LOAN
                      description: Describes the child category as Account Aggregator Loan
                      reference: <PR/Issue/Discussion Links md format text
              name:
                _description:
                  required: true
                  usage: Gold Loan
                  info: It refers to the explanation of the type of the loan.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Carries the loan product category details that the BPP returns in on_search for each provider, so the BAP can anchor the chosen provider as selected_provider and reuse that same catalog entry in later validation and follow-up steps.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: The BPP returns the provider’s category list in on_search so the BAP can retain a category-aware provider snapshot for later item-to-category matching, and when provider.categories is present as an array it is normalized before being stored with selected_provider for reuse in downstream steps.
              owner: BPP
              type: object
            parent_category_id:
              _description:
                required: false
                usage: "101123"
                info: BPP includes this value to establish category hierarchy within the catalog; the field is part of the persisted provider and may be remapped when category deduplication applies across flows.
                owner: BPP
                type: string
          items:
            id:
              _description:
                required: true
                usage: 66b7b9bad166-4a3f-ada6-ca063dc9d321
                info: This describes the unique id of the the availed product or service generated by the system.

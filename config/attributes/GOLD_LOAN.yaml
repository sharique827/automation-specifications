meta:
  use_case_id: GOLD LOAN
attribute_set:
  search:
    context:
      action:
        _description:
          required: true
          usage: search
          info: |+
            Describes the Beckn protocol method being called by the sender and executed at the receiver. 

          owner: BAP
          type: string
      location:
        country:
          code:
            _description:
              required: false
              usage: IND
              info: Country code in ISO 3166-1 or ISO 3166-2 format that the BAP provides to define the geographic scope for the search request.
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The BAP includes the country for the location in the search context so the search is scoped to the jurisdiction the service is being discovered in.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: "*"
              info: |
                This attribute describes the city code relevant to the location or the area in which seller is situated. In case of '*' it will fetch all the cities where service is being provided.
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Represent the city code that identifies the cities. In case of '*' it will fetch all the cities where service is being provided.
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: Carries the city associated with the location the BAP is searching for, so the request is scoped to the intended geography.
            owner: BAP
            type: object
        _description:
          required: false
          usage: ""
          info: The BAP uses this container in search to state the location where the transaction is intended to be fulfilled, and the BPP carries that location forward in on_search.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:FIS12
          info: This is the domain code relevant to the context of this transaction. Here, it is "ONDC:FIS12".
          owner: BAP
          type: enum
          enums:
            - code: ONDC:FIS12
              description: Updated domain namespace
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes time of request generation in RFC3339 format. This specifies the time when request is being made.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: bap.credit.becknprotocol.io
          info: This the subscriber ID of the BAP. It is the unique id for the buyer app.
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: false
          usage: e182db8d-997e-4d45-a29c-4827ae8943d5
          info: Unique identifier minted by the BAP on the search request to indicate an active user session; it persists across all API calls from search through confirm, enabling BPPs to correlate requests and deliver personalized recommendations and dynamic offerings despite not knowing the user on the BAP.
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: |-
            This is a mandatory and unique identifier that persists consistently throughout a request/callback cycle.
             This value can be utilized to filter out and ignore duplicate messages coming from the BPP.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.3
          info: It explains the transaction protocol version utilized by the sender.
          owner: BAP
          type: integer
      bap_uri:
        _description:
          required: true
          usage: https://bap.credit.becknprotocol.io/
          info: This is the subscriber URL of the Buyer App (BAP) is the endpoint that accepts callbacks from Seller App (BPPs).
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: |
            Specifies the validity duration of this message in ISO8601 format, after timestamp.
          owner: BAP
          type: string
      _description:
        required: false
        usage: ""
        info: The BAP populates context on search to frame the transaction with the domain, routing, protocol, and session metadata that identifies the end-to-end interaction, and this same context must accompany the exchange so later callbacks can be correlated back to the request.
        owner: BAP
        type: object
    message:
      intent:
        category:
          descriptor:
            code:
              _description:
                required: true
                usage: GOLD_LOAN
                info: This attribute refers to categorizing loans based on whether they are intended for personal use or are meant for invoices.
                owner: BAP
                type: enum
                enums:
                  - code: PERSONAL_LOAN
                    description: Describes an unsecured credit provided by financial institutions based on criteria like employment history, repayment capacity, income level, profession and credit history
                    reference: <PR/Issue/Discussion Links md format text
                  - code: BUREAU_LOAN
                    description: Describes the child category as Bureau Loan
                    reference: <PR/Issue/Discussion Links md format text
                  - code: AA_PERSONAL_LOAN
                    description: Describes the child category as Account Aggregator Loan
                    reference: <PR/Issue/Discussion Links md format text
                  - code: GOLD_LOAN
                    description: Describes the category as GOLD_LOAN
                    reference: <PR/Issue/Discussion Links md format text
                  - code: AA_LOAN
                    description: Describes the child category as Account Aggregator Loan
                    reference: <PR/Issue/Discussion Links md format text
            _description:
              required: false
              usage: ""
              info: Descriptor that names the product category the BAP wants to search for, so the BPP can match the catalog against that category in the search response.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: The BAP includes the item category details in the search request so the BPP can filter search results to the requested category.
            owner: BAP
            type: object
        payment:
          collected_by:
            _description:
              required: true
              usage: BPP
              info: This field indicates the payment collector. If set to 'bap,' BAP collects first and settles with BPP. If BPP agrees, no payment link is sent. If set to 'bpp,' BPP collects payment directly.
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: Container for the payment choice the BAP includes in search to tell the BPP how the customer wants to pay; the BPP mirrors this information back in on_search so the quoted order can reflect the same payment mode.
            owner: BAP
            type: object
          tags:
            descriptor:
              code:
                _description:
                  required: false
                  usage: BUYER_FINDER_FEES
                  info: Payment tag descriptor codes the BAP mints in its search intent to communicate which fee types and settlement terms are relevant. The BPP echoes these codes in on_search to confirm understanding.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: BAP specifies the descriptor to characterize the payment term being searched. BPP echoes this descriptor in on_search to confirm recognition of the requested payment configuration.
                owner: BAP
                type: object
            display:
              _description:
                required: false
                usage: "false"
                info: <no-enough-data>
                owner: BAP
                type: boolean
            list:
              descriptor:
                code:
                  _description:
                    required: false
                    usage: BUYER_FINDER_FEES_TYPE
                    info: BAP specifies the payment condition type code in the search request to filter offerings by the loan's applicable fee structure or interest terms.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Descriptor within each payment tag that the BAP provides during search and the BPP validates in its on_search response.
                  owner: BAP
                  type: object
              value:
                _description:
                  required: false
                  usage: percent-annualized
                  info: The BAP specifies payment tag values in the search intent to communicate payment-related parameters or constraints. These tag values are validated to ensure they meet system requirements.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: ""
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Array of payment tags the BAP includes in the search intent; must be non-empty.
              owner: BAP
              type: object
        provider:
          id:
            _description:
              required: false
              usage: b9e9a97c0fa5
              info: It refers to the unique id of the loan provider
              owner: BPP
              type: string
          items:
            id:
              _description:
                required: false
                usage: 66b7b9bad166-4a3f-ada6-ca063dc9d321
                info: This describes the unique id of the the availed product or service generated by the system.
                owner: BPP
                type: string
            xinput:
              form:
                id:
                  _description:
                    required: false
                    usage: d097c2f5-cb8d-42fe-900e-dfecdede16fb
                    info: Describes unique form id.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: Describes the form details
                  owner: BAP
                  type: object
              form_response:
                status:
                  _description:
                    required: false
                    usage: SUCCESS
                    info: |
                      Describes the status of form 
                    owner: BPP
                    type: string
                submission_id:
                  _description:
                    required: false
                    usage: cb8d-42fe-900e-dfecdede16fb
                    info: "Unique submission id which a borrower got as a reponse after successful submission of form "
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: --
                info: Describes the additional input required from the seller to purchase / avail this item
                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: Describe the details of the item that the consumer wants to order
              owner: BAP
              type: object
          _description:
            required: false
            usage: --
            info: Describe the provider from which the customer wants to place to the order from
            owner: BAP
            type: object
        _description:
          required: false
          usage: ""
          info: Container the BAP uses to declare the consumer’s search intent so the BPP can match relevant loan offerings; in this personal-loan search flow, validation checks that the declared category is PERSONAL_LOAN before the request is accepted.
          owner: BAP
          type: object
      _description:
        required: false
        usage: ""
        info: The BAP mints this search request envelope to carry the inquiry details, and the BPP’s validation checks that the message block is present before processing the search.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      action:
        _description:

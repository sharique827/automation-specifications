                info: Explains the virtual payment address.
                owner: BPP
                type: string
            _description:
              required: true
              usage: ""
              info: During init, the BAP supplies payment parameters in this container. These values are anchored in the session and reused across subsequent transaction steps.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: Array of settlement terms the BAP provides on init describing how the order will be paid; must be non-empty and persists with the order through subsequent steps.
            owner: BAP
            type: object
          tags:
            descriptor:
              code:
                _description:
                  required: true
                  usage: BUYER_FINDER_FEES

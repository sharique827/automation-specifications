              required: true
              usage: Delivery
              info: Defines the method of fulfillment
              owner: BAP
              type: enum
              enums:
                - code: Delivery
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Self-Pickup
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Delivery and Self-Pickup
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: Array of fulfillment methods the BPP offers in its catalog, each with contact details, enabling the BAP to present available delivery and pickup options to customers during order placement.
            owner: BPP
            type: object
          contact:
            phone:
              _description:
                required: false
                usage: "9876543210"
                info: Phone number of the fulfillment contact that the BPP includes in the search response, enabling the BAP to facilitate customer communication regarding order fulfillment.
                owner: BPP
                type: string
            email:
              _description:
                required: false
                usage: test@gmail.com
                info: Email address of the contact person or support team for a fulfillment option, provided by the BPP in search results. This allows the BAP to reach out with questions or issues related to that specific fulfillment method.
                owner: BPP
                type: string

meta:
  use_case_id: APPLIANCES
attribute_set:
  search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET10
          info: Specifies the domain in which the transaction operates
          owner: BAP
          type: enum
          enums:
            - code: ONDC:RET10
              description: Grocery
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET11
              description: F&B
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET12
              description: Fashion
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET13
              description: BPC
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET14
              description: Electronics
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET15
              description: Appliances
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET16
              description: Home & Kitchen
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET17
              description: Toys & Games
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET18
              description: Agriculture
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET19
              description: Health & Wellness
              reference: <PR/Issue/Discussion Links md format text>
      action:
        _description:
          required: true
          usage: search
          info: Specifies the action being performed in the transaction
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: Specifies the country in which the transaction is occurring
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: "*"
          info: Specifies the city or region of the transaction
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.0
          info: Specifies the ONDC core version being used
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: buyerNP.com
          info: Specifies the ID of the Buyer App participating in the transaction
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://buyerNP.com/ondc
          info: Specifies the URI where the Buyer App is hosted
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: a4b24113-7c05-495b-9249-f33482bf3493
          info: Helps track a specific transaction across ONDC
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 6aae986b-37c2-47d2-a26c-daaf8ccbd764
          info: Used for tracking and logging purposes
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2023-06-03T09:00:00.000Z
          info: Ensures synchronization across different ONDC participants
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Specifies how long the request remains valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: Container for message context that the BAP populates in the search request with transaction metadata such as timestamp, which the receiving system validates for transaction tracking and protocol enforcement.
        owner: BAP
        type: object
    message:
      intent:
        payment:
          "@ondc/org/buyer_app_finder_fee_type":
            _description:
              required: true
              usage: percent
              info: Indicates whether the fee is a fixed amount or a percentage
              owner: BAP
              type: string
          "@ondc/org/buyer_app_finder_fee_amount":
            _description:
              required: true
              usage: "3"
              info: Represents the value of the fee applied
              owner: BAP
              type: string
          _description:
            required: true
            usage: ""
            info: The BAP includes payment details in search to specify payment methods and terms the buyer can accommodate.
            owner: BAP
            type: object
        fulfillment:
          type:
            _description:
              required: false
              usage: Delivery
              info: Specifies how the order will be fulfilled (e.g., Delivery, Pickup)
              owner: BAP
              type: string
          end:
            location:
              gps:
                _description:
                  required: false
                  usage: 12.974002,77.613458
                  info: Indicates where the item is to be delivered
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: false
                    usage: "560001"
                    info: Specifies the postal code of the delivery location
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        item:
          descriptor['name']:
            _description:
              required: false
              usage: coffee
              info: Specifies the product name in the order
              owner: BAP
              type: string
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: Container for the buyer's search intent and finder fee configuration that the BAP declares in search, which the BPP processes when responding with on_search.
          owner: BAP
          type: object
        tags:
          code:
            _description:
              required: true
              usage: bap_terms
              info: Code identifier for each tag in the search request that signals discovery requirements from the BAP to the BPP. The BAP includes codes like catalog_inc and bap_terms to indicate required discovery modes and transaction terms.
              owner: BAP
              type: string
          list:
            code:
              _description:
                required: true
                usage: static_terms
                info: Identifier for a metadata tag that the BAP includes in their search intent to specify operational parameters, constraints, or filtering requirements such as terms of service, effective dates, or operational modes. Each code is paired with a corresponding value that provides the specific detail for that metadata category.
                owner: BAP
                type: string
            value:
              _description:
                required: true
                usage: https://github.com/ONDC-Official/NP-Static-Terms/buyerNP_BNP/1.0/tc.pdf
                info: BAP provides tag values including terms-and-conditions document URLs and ISO timestamp expiries; the first value is retained in session to govern whether subsequent incremental catalog searches should continue or stop.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: ""
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: Array of tags that the BAP specifies in the search request; values are validated during message validation.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: Container for the selected order details that the BAP submits in the select action.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET10
          info: Represents the ONDC domain version used in the transaction
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: on_search
          info: Specifies the event type in the ONDC protocol
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: Identifies the country for the transaction
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.0
          info: ONDC core version used
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: buyerNP.com
          info: Unique identifier of the buyer app
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://buyerNP.com/ondc
          info: URL for the buyer app
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: sellerNP.com
          info: Unique identifier of the seller app
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://sellerNP.com/ondc
          info: URL for the seller app
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 7c7aa709-a05e-4ad5-a49d-22bd64282e71
          info: ID used to track the transaction
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: bc167440-16e7-4ba6-9132-9b25518f1da2
          info: ID used for message correlation
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2024-12-23T06:55:45.035Z
          info: Time of the request
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: std:022
          info: Identifies the city
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: Container for transaction context that the BAP includes in the select request to enable message correlation within the transaction.
        owner: BPP
        type: object
      ttl:
        _description:
          required: true
          usage: PT30S
          info: The BPP sets this ISO8601 duration to indicate how long the on_select response and selected item details remain valid; the value must not exceed the outer limit of PT30S (30 seconds).
          owner: BPP
          type: string
    message:
      catalog:
        bpp/fulfillments:
          id:
            _description:
              required: true
              usage: F1
              info: Represents fulfillment details
              owner: BAP
              type: string
          type:

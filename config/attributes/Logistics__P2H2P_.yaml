meta:
  use_case_id: Logistics (P2H2P)
attribute_set:
  search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:LOG10
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:LOG10
              description: Hyperlocal logistics domain code (P2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:LOG11
              description: Intercity logistics domain code (P2H2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: nic2004:60232
              description: Logistics domain code (deprecated)
              reference: <PR/Issue/Discussion Links md format text>
      country:
        _description:
          required: true
          usage: IND
          info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: std:080
          info: |
            Describes the city code this location is, or is located within, city code should match the city for fulfillment start location;
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: Transaction context the BAP populates with identifiers and metadata to frame the search request.
        owner: BAP
        type: object
    message:
      intent:
        category:
          id:
            _description:
              required: true
              usage: Immediate Delivery
              info: |
                Express Delivery" - by air (for P2H2P); "Standard Delivery" - by surface (for P2P, P2H2P): "Immediate Delivery" is for S2D <= 60 min; "Same Day Delivery" "Next Day Delivery" If id="Standard Delivery": all possible options should be returned in /on_search (including for "Immediate Delivery", "Same Day Delivery", "Next Day Delivery"); If id="Express Delivery": all possible P2H2P options should be returned in /on_search;
              owner: BAP
              type: enum
              enums:
                - code: Express Delivery
                  description: Delivery will be done by Air
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Standard Delivery
                  description: Delivery will be done by Surface
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Immediate Delivery
                  description: Delivery will be done within S2D (Shipment to Delivery) <= 60 min
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Next Day Delivery
                  description: Delivery will be done on the Next Day with respect to context timestamp
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Same Day Delivery
                  description: Delivery will be done on the Same Day with respect to context timestamp
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Instant Delivery
                  description: Delivery will be done withing 10 minutes (S2D TAT <= 10 min)
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: Identifies the product or service category that the BAP intends to search for, allowing filtering of results to a specific category type.
            owner: BAP
            type: object
        item:
          descriptor:
            code:
              _description:
                required: false
                usage: false
                info: Describes the type of order, point to point (P2P) or via hub (P2H2P), deprecated, not to be used.
                owner: BAP
                type: string
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        provider:
          time:
            days:
              _description:
                required: true
                usage: 1,2,3,4,5,6,7
                info: |
                  store pickup timings; days of week: 1 - Monday till 7 - Sunday;
                owner: BAP
                type: string
            schedule:
              holidays:
                _description:
                  required: true
                  usage: |-
                    [ "2023-06-29",
                                  "2023-08-15"
                    ]
                  info: list of future dated holidays;
                  owner: BAP
                  type: array
              _description:
                required: true
                usage: ""
                info: The BAP includes the provider's availability schedule in search to filter providers by their operating hours.
                owner: BAP
                type: object
            duration:
              _description:
                required: true
                usage: PT30M
                info: order preparation time (indicates estimate timing for logistics ready_to_ship) - may be used by LSP to optimize scheduling of task allocation;
                owner: BAP
                type: string
            range:
              start:
                _description:
                  required: true
                  usage: "1100"
                  info: Start time of the store's daily pickup window; BAP includes this in search to filter providers by availability at the requested time.
                  owner: BAP
                  type: string
              end:
                _description:
                  required: true
                  usage: "2100"
                  info: The end time in HHMM format of the provider's availability window the BAP searches for; must exceed start time and the span cannot exceed 24 hours.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: A time window bounded by start and end times that specifies the operational or service availability hours for the provider that the BAP requires when searching for services.
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: The time object specifies when the BAP wants to search for provider availability, whether as a point in time, duration, or operating schedule.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: The provider object specifies which service provider the BAP is searching for.
            owner: BAP
            type: object
        fulfillment:
          type:
            _description:
              required: true
              usage: Delivery
              info: Type of fulfillment (Delivery or Return).
              owner: BAP
              type: enum
              enums:
                - code: Delivery
                  description: Describes the type of fulfillment.
                  reference: <PR/Issue/Discussion Links md format text
                - code: Return
                  description: Describes the type of fulfillment.
                  reference: <PR/Issue/Discussion Links md format text
                - code: RTO
                  description: Describes the type of fulfillment.
                  reference: <PR/Issue/Discussion Links md format text
          start:
            location:
              id:
                _description:
                  required: false
                  usage: S1
                  info: unique id for store - optional;
                  owner: BAP
                  type: string
              gps:
                _description:
                  required: true
                  usage: 12.4535,77.9283
                  info: |
                    GPS coordinates for pickup location, minimum 4 digit decimal precision;
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: true
                    usage: "560001"
                    info: The BAP specifies the pickup location's area code (pincode, ZIP, or equivalent); this value is anchored in the session as start_area_code and reused in subsequent fulfillment steps.
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: The BAP provides the structured address of the pickup location in the search request.
                  owner: BAP
                  type: object
              _description:
                required: true
                usage: ""
                info: The BAP specifies the pickup location when searching for fulfillment services.
                owner: BAP
                type: object
            authorization:
              type:
                _description:
                  required: false
                  usage: OTP
                  info: |
                    Authorization type for pickup. optional, only required if LBNP wants pickup authorization, using dynamic OTP; if LSP doesn’t support authorization, they should not respond to the search request;
                  owner: BAP
                  type: enum
                  enums:
                    - code: OTP
                      description: Describes OTP as an authorization mechanism used to start the fulfillment of an order.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: ""
                info: Authorization mechanism for fulfillment start, maintained throughout the order lifecycle.
                owner: BAP
                type: object
            instructions:
              code:
                _description:
                  required: false
                  usage: "5"
                  info: The BAP specifies the type of confirmation code required at pickup—such as static OTP—and this choice is retained throughout the order lifecycle.
                  owner: BAP
                  type: enum
                  enums:
                    - code: "2"
                      description: Describes merchant order number.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "3"
                      description: Describes any other pickup confirmation code.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "4"
                      description: Describes OTP for pickup confirmation.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "5"
                      description: Describes Static OTP for pickup confirmation.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: ""
                info: Container for fulfillment start-point instructions; BAP populates this in search when fulfillment conditions require start-point handling specifications, and the value persists through order steps.
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: Details on the start of fulfillment, maintained throughout the order lifecycle.
              owner: BAP
              type: object
            time:
              range:
                end:
                  _description:
                    required: false
                    usage: 2026-02-24T18:47:07.094Z
                    info: Upper-bound ISO 8601 timestamp for fulfillment start; BAP sets this in search and the value persists in the fulfillment object across subsequent steps.
                    owner: BAP
                    type: date-time
                start:
                  _description:
                    required: false
                    usage: 2026-02-24T15:47:07.094Z
                    info: Lower-bound ISO 8601 timestamp for fulfillment start; BAP sets this in search and the value persists in the fulfillment object across subsequent steps.
                    owner: BAP
                    type: date-time
                _description:
                  required: false
                  usage: ""
                  info: Time range with start and end timestamps specifying when the fulfillment start should occur, used by the BAP to filter fulfillment options.
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: ""
                info: The BAP specifies time constraints for the pickup, expressed as a point in time, duration window, or operational schedule.
                owner: BAP
                type: object
          end:
            location:
              gps:
                _description:
                  required: true
                  usage: 12.4535,77.9283
                  info: GPS coordinates for delivery location.
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: true
                    usage: "560001"
                    info: Area code (pincode, ZIP, or equivalent) of the delivery end location, provided by the BAP in search and anchored in the fulfillment session for reuse across subsequent steps.
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Container for the end-delivery location address specified by the BAP in search, persisted through the fulfillment session.
                  owner: BAP
                  type: object
              _description:
                required: true
                usage: ""
                info: BAP specifies the delivery location on search, defining the destination where the product or service will reach the customer.
                owner: BAP
                type: object
            authorization:
              type:
                _description:
                  required: false
                  usage: OTP
                  info: |
                    Authorization type for delivery. optional, only required if LBNP wants delivery authorization, using dynamic OTP; if LSP doesn’t support authorization, they should not respond to the search request;
                  owner: BAP
                  type: enum
                  enums:
                    - code: OTP
                      description: Describes OTP as an authorization mechanism used to end the fulfillment of an order.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: ""
                info: BAP describes an authorization mechanism for the fulfillment end-point.
                owner: BAP
                type: object
            instructions:
              code:
                _description:
                  required: false
                  usage: "5"
                  info: Delivery end-point confirmation method code BAP specifies in search (e.g., static OTP); the value is validated in subsequent steps and persists as session state throughout the order lifecycle.
                  owner: BAP
                  type: enum
                  enums:
                    - code: "1"
                      description: Describes OTP for delivery confirmation.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "2"
                      description: Describes any other delivery confirmation code (DCC).
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "3"
                      description: Describes no delivery code.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "5"
                      description: Describes Static OTP for delivery confirmation.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: ""
                info: Container for delivery end-point instructions; BAP populates this in search when fulfillment conditions require end-point handling specifications, and the value persists through order steps.
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: BAP specifies end-of-fulfillment details on search, defining the destination and conditions where the product or service will reach the customer.
              owner: BAP
              type: object
            time:
              range:
                end:
                  _description:
                    required: false
                    usage: 2026-02-25T18:47:07.094Z
                    info: The latest acceptable timestamp for fulfillment completion that the BAP specifies in the search request.
                    owner: BAP
                    type: date-time
                start:
                  _description:
                    required: false
                    usage: 2026-02-25T15:47:07.094Z
                    info: The earliest timestamp in the fulfillment end-time window, representing when the buyer expects the delivery to be completed.
                    owner: BAP
                    type: date-time
                _description:
                  required: false
                  usage: ""
                  info: Time window indicating when the buyer expects fulfillment to be completed, specified through start and end timestamps that define the acceptable range for the fulfillment end time.
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: ""
                info: Container for the intended end-fulfillment time, which can represent a specific point, duration, or scheduled window, specified by the BAP during search.
                owner: BAP
                type: object
          _description:
            required: true
            usage: ""
            info: BAP specifies fulfillment intent on search to describe how the product or service will be delivered to the customer.
            owner: BAP
            type: object
          tags:
            code:
              _description:
                required: true
                usage: linked_provider
                info: The BAP includes fulfillment tag codes (e.g., linked_provider, linked_order, special_req) to classify constraint types in the search request; the value persists in session across subsequent steps.
                owner: BAP
                type: string
            list:
              code:
                _description:
                  required: true
                  usage: weight_unit
                  info: The BAP specifies fulfillment constraint codes (e.g., dangerous_goods, fragile_handling, insurance_required) to classify handling or risk requirements the BPP must address during fulfillment.
                  owner: BAP
                  type: string
              value:
                _description:
                  required: true
                  usage: "1.0"
                  info: "The BAP provides the constraint value (format varies by code: yes/no flags, numeric quantities, category strings) specifying what the BPP must apply during fulfillment."
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: List of metadata pairs that detail the specific requirements associated with the parent tag.
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: Metadata tags for fulfillment properties; BAP provides these in search and they persist across subsequent transaction steps.
              owner: BAP
              type: object
          vehicle:
            category:
              _description:
                required: false
                usage: truck
                info: Vehicle type classification the BAP specifies in search to filter logistics providers by transport mode; persists within fulfillment for use in subsequent transaction steps.
                owner: BAP
                type: string
            size:
              _description:
                required: false
                usage: ""
                info: The vehicle size category or capacity designation that the buyer specifies during search to indicate their freight handling requirements.
                owner: BAP
                type: string
            variant:
              _description:
                required: false
                usage: open
                info: The vehicle body type, such as open for an open truck bed, specified by the BAP when searching for fulfillment to indicate the required truck configuration for cargo handling.
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: Container for vehicle specifications the BAP provides during search to filter and match appropriate logistics providers, with specifications persisted across the transaction for use in subsequent operations.
              owner: BAP
              type: object
        payment:
          type:
            _description:
              required: true
              usage: ON-ORDER
              info: Type of payment for the logistics order. ON-ORDER - Prepaid mode via wallet system, ON-FULFILLMENT - payment on delivery, POST-FULFILLMENT - payment post delivery, invoice to be raised after agreed number of days.
              owner: BAP
              type: enum
              enums:
                - code: ON-ORDER
                  description: Prepaid payment via wallet system enabled by LSP.
                  reference: <PR/Issue/Discussion Links md format text
                - code: ON-FULFILLMENT
                  description: Payment occurs when order is Delivered.
                  reference: <PR/Issue/Discussion Links md format text
                - code: POST-FULFILLMENT
                  description: Payment occurs after invoice is raised.
                  reference: <PR/Issue/Discussion Links md format text
          "@ondc/org/collection_amount":
            _description:
              required: false
              usage: "300.00"
              info: Cash-on-delivery collection amount BAP includes in search to specify what should be collected from the customer upon delivery; this field is deprecated and will be removed in future versions.
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: Container for payment details that the BAP specifies in the search request.
            owner: BAP
            type: object
        "@ondc/org/payload_details":
          weight:
            unit:
              _description:
                required: true
                usage: kilogram
                info: Weight unit of the payload, deprecated, will be removed in future version;
                owner: BAP
                type: string
            value:
              _description:
                required: false
                usage: "3"
                info: Numeric weight value in the search request; deprecated and scheduled for future removal.
                owner: BAP
                type: number
            _description:
              required: false
              usage: ""
              info: Container for weight magnitude in the search request.
              owner: BAP
              type: object
          dimensions:
            length:
              unit:
                _description:
                  required: true
                  usage: centimeter
                  info: Unit for length dimension, deprecated, will be removed in future version;
                  owner: BAP
                  type: string
              value:
                _description:
                  required: false
                  usage: "1"
                  info: Numeric length value of the package dimension; provided by BAP in search and marked deprecated for future removal.
                  owner: BAP
                  type: number
              _description:
                required: false
                usage: ""
                info: Container for package length dimension expressed as a scalar quantity, provided by BAP during search to specify item physical attributes.
                owner: BAP
                type: object
            breadth:
              unit:
                _description:
                  required: true
                  usage: centimeter
                  info: Unit for breadth dimension, deprecated, will be removed in future version;
                  owner: BAP
                  type: string
              value:
                _description:
                  required: false
                  usage: "1"
                  info: Breadth value of the package; deprecated and will be removed in future versions.
                  owner: BAP
                  type: number
              _description:
                required: false
                usage: ""
                info: Container for the package's breadth scalar quantity.
                owner: BAP
                type: object
            height:
              unit:
                _description:
                  required: true
                  usage: centimeter
                  info: Unit for height dimension, deprecated, will be removed in future version;
                  owner: BAP
                  type: string
              value:
                _description:
                  required: false
                  usage: "1"
                  info: Height value of the package; deprecated and will be removed in future versions.
                  owner: BAP
                  type: number
              _description:
                required: false
                usage: ""
                info: Container for the package's height scalar quantity.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: The BAP includes the shipment's dimensions in search to enable logistics providers to assess delivery feasibility.
              owner: BAP
              type: object
          category:
            _description:
              required: true
              usage: Grocery
              info: Category of linked order, deprecated, will be removed in future version;
              owner: BAP
              type: string
          value:
            currency:
              _description:
                required: true
                usage: INR
                info: Currency of payload value, deprecated, will be removed in future version;
                owner: BAP
                type: string
            value:
              _description:
                required: false
                usage: "300.00"
                info: String-formatted decimal monetary value of the payload; provided by BAP in search and marked deprecated for future removal.
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: Container for pricing information of the payload, supporting domain-specific price extensions for the item.
              owner: BAP
              type: object
          dangerous_goods:
            _description:
              required: true
              usage: '"false"'
              info: Indicates if payload contains dangerous goods, deprecated, will be removed in future version;
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: Physical characteristics of the shipment the BAP specifies in search to help logistics providers determine their service feasibility.
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The consumer's intent to search for or obtain specific products or services, as declared by the BAP.
          owner: BAP
          type: object
        tags:
          code:
            _description:
              required: false
              usage: lbnp_features
              info: Code identifying the category of logistics feature or SLA term being queried. The BAP mints this code in the search request and it is validated downstream to ensure the requested category is recognized.
              owner: BAP
              type: string
          list:
            code:
              _description:
                required: false
                usage: 01A
                info: Code identifying the specific parameter or attribute dimension within the feature or SLA category. The BAP includes these codes to specify which aspects of the logistics capability are relevant to the search.
                owner: BAP
                type: string
            value:
              _description:
                required: false
                usage: yes
                info: The value corresponding to the parameter code specified in the same list item; the BAP includes this to communicate the requirement or threshold for the logistics feature being queried.
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: List of parameter specifications that define the logistics feature or SLA requirement indicated by the parent tag code.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: Array of tags that the BAP includes in the search request to communicate feature and capability requirements; conditionally written when feature codes are available.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: Container for the BAP's search payload, expressing the consumer's intent and search criteria.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:LOG10
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:LOG10
              description: Hyperlocal logistics domain code (P2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:LOG11
              description: Intercity logistics domain code (P2H2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: nic2004:60232
              description: Logistics domain code (deprecated)
              reference: <PR/Issue/Discussion Links md format text>
      country:
        _description:
          required: true
          usage: IND
          info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: std:080
          info: Describes the city code this location is, or is located within
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: on_search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: api.example-bpp.com
          info: Describes subscriber ID of the BPP
          owner: BPP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://api.example-bpp.com/dobpp/7f7896dd-787e-4a0b-8675-e9e6fe93bb8f
          info: Describes subscriber URL of the BPP for accepting calls from BAPs.
          owner: BPP
          type: string
      transaction_id:
        _description:
          required: true

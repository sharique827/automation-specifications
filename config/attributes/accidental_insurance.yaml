meta:
  use_case_id: accidental-insurance
attribute_set:
  search:
    context:
      action:
        _description:
          required: false
          usage: search
          info: The BAP sets this to 'search' to indicate which protocol method the BPP should execute.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: false
          usage: dev-automation.ondc.org
          info: Unique identifier of the BAP making the search request. The BAP includes this in every request so the BPP can track the requester and correlate messages within the session.
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: false
          usage: https://dev-automation.ondc.org/api-service/ONDC:FIS13/2.0.0/buyer
          info: The BAP provides its callback subscriber URL in the search request so that BPPs know where to route their responses and invoke subsequent callbacks.
          owner: BAP
          type: string
      domain:
        _description:
          required: false
          usage: ONDC:FIS13
          info: Domain code identifying the business vertical for this transaction. The BAP includes this in search so the BPP can route to the correct product catalog and return matching offerings.
          owner: BAP
          type: string
      location:
        city:
          code:
            _description:
              required: false
              usage: "*"
              info: City code for the geographic location in which the BAP seeks products or services. The BPP uses this to filter available catalog results by the specified location.
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: The BAP specifies the city to narrow provider discovery to a particular geographic area.
            owner: BAP
            type: object
        country:
          code:
            _description:
              required: false
              usage: IND
              info: ISO 3166-1 and ISO 3166-2 country code that the BAP provides in the search request to define the geographic scope for discovery; the BPP validates this value.
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: The BAP specifies the country to establish the geographic context for the location being searched.
            owner: BAP
            type: object
        _description:
          required: false
          usage: ""
          info: The location where the BAP intends the transaction to be fulfilled.
          owner: BAP
          type: object
      message_id:
        _description:
          required: false
          usage: f4a40953-19cf-44f3-b5a6-3d3a03c19e63
          info: Unique message identifier that the BAP generates for this search request so that the BPP's on_search response can be correlated to this call and duplicates can be rejected. Use a fresh value for each new interaction.
          owner: BAP
          type: string
      timestamp:
        _description:
          required: false
          usage: 2026-02-11T12:06:15.006Z
          info: The BAP generates this RFC3339-formatted timestamp when issuing the search request to mark the request time. The timestamp is captured as latestTimestamp and retained for audit and tracking.
          owner: BAP
          type: date-time
      transaction_id:
        _description:
          required: false
          usage: 081cdf69-d8c3-465b-9d54-1d5f0bcf9f6b
          info: The BAP generates this unique identifier for a transaction and includes it in every message from search through confirm, enabling BPPs to recognize the ongoing transaction and deliver personalized recommendations despite not knowing the buyer's identity.
          owner: BAP
          type: string
      ttl:
        _description:
          required: false
          usage: PT30S
          info: Time-to-live duration in ISO8601 format that the BAP includes in the search request to indicate how long the message remains valid after transmission. The BPP uses this window to determine whether the request should still be processed or has become stale.
          owner: BAP
          type: string
      version:
        _description:
          required: false
          usage: 2.0.0
          info: Protocol version the BAP sends in the search request so the BPP can respond with compatible message structures.
          owner: BAP
          type: string
      _description:
        required: false
        usage: ""
        info: Context is the BAP-provided transaction metadata in the search request—domain, location, platform identities, and a stable transaction_id—that the BPP uses for routing and message correlation.
        owner: BAP
        type: object
    message:
      intent:
        category:
          descriptor:
            code:
              _description:
                required: false
                usage: MICRO_ACCIDENTAL_INSURANCE
                info: A code identifying the insurance category or product type the BAP is searching for, enabling providers to filter responses to relevant micro-insurance offerings such as accidental or transit coverage.
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: Object by which the BAP identifies the product category being searched.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: Specifies the product or service category the BAP is searching for.
            owner: BAP
            type: object
        provider:
          id:
            _description:
              required: false
              usage: P1
              info: The BAP specifies which provider to search from by including this identifier in the search request. The BPP echoes it in on_search, and the value is anchored in the session to coordinate subsequent order steps.
              owner: BAP
              type: string
          items:
            id:
              _description:
                required: false
                usage: I1
                info: The BAP specifies provider item IDs in the search request to indicate which items to discover; the system persists these as parent_item_id for reuse across subsequent select, init, and confirm steps, maintaining product context through the transaction.
                owner: BAP
                type: string
            tags:
              descriptor:
                code:
                  _description:
                    required: false
                    usage: BAP_INPUTS
                    info: The BAP provides this tag descriptor code in the search request; the value is persisted in session as user_tags and reused in subsequent steps.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Container for tag descriptors that the BAP specifies in search, anchored in the user's session and reused across subsequent purchase steps.
                  owner: BAP
                  type: object
              list:
                descriptor:
                  code:
                    _description:
                      required: false
                      usage: BUYER_NAME
                      info: The BAP declares these codes on search to specify which buyer information fields are in scope for the insurance product. The BPP validates them and the codes persist as user_tags through subsequent steps to ensure consistent field mapping across the transaction.
                      owner: BAP
                      type: string
                  short_desc:
                    _description:
                      required: false
                      usage: Describes the PED details, which can be set to either true or false.
                      info: BAP includes a short description for each item tag in the search request; the values are anchored in the session as user_tags and referenced in subsequent transaction steps.
                      owner: BAP
                      type: string
                  _description:
                    required: false
                    usage: ""
                    info: Metadata describing the buyer's tags that the BAP specifies during search. These persist as user_tags throughout the purchase journey to maintain intent context for provider and item selection.
                    owner: BAP
                    type: object
                value:
                  _description:
                    required: false
                    usage: Mr. | Joe | Wick | Adams
                    info: BAP specifies user profile attributes (name, phone number, ID, date of birth) as tag values in the search; these values are validated by the BPP and persist as user_tags throughout the transaction for use in subsequent steps.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: User-provided tags the BAP includes in the search request; anchored in the session and reused across subsequent steps.
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: ""
                info: Tags on items within the search intent that the BAP provides to identify or filter products; anchored in the search request, these values are reused across steps of the transaction.
                owner: BAP
                type: object
            category_ids:
              _description:
                required: false
                usage: C2
                info: Item categories the BAP specifies in the search request to indicate which products from the provider are of interest.
                owner: BAP
                type: string
            descriptor:
              name:
                _description:
                  required: false
                  usage: Micro Accidental Insurance
                  info: Item name the BAP specifies in search to indicate which products they are looking for from the provider.
                  owner: BAP
                  type: string
              short_desc:
                _description:
                  required: false
                  usage: ABC Individual Insurance Class
                  info: A brief description of the insurance item or product class that the BAP specifies when searching for provider offerings.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Contains the name and short description of each product or service item the BAP is searching for from the provider.
                owner: BAP
                type: object
            time:
              duration:
                _description:
                  required: false
                  usage: P1Y
                  info: The tenure or coverage period duration that the BAP specifies when searching for insurance items, expressed in ISO 8601 format (e.g., P1Y for one year).
                  owner: BAP
                  type: string
              label:
                _description:
                  required: false
                  usage: TENURE
                  info: A label designating the semantic category or purpose of the associated duration when searching for provider items (e.g., TENURE to indicate an insurance coverage validity period).
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Specifies the tenure duration and period label of an insurance product, allowing the BAP to search for or filter plans by their validity periods.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Items the BAP is searching for or requesting information about from the specified provider.
              owner: BAP
              type: object
          tags:
            descriptor:
              code:
                _description:
                  required: false
                  usage: MASTER_POLICY
                  info: BAP specifies a provider tag code in the search request to indicate the insurance policy classification; the code is validated and persists through the session for reuse in downstream steps.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Descriptor metadata for each provider tag that the BAP supplies during search and preserves across subsequent transaction steps.
                owner: BAP
                type: object
            list:
              descriptor:
                code:
                  _description:
                    required: false
                    usage: POLICY_ID
                    info: BAP specifies provider tag descriptor codes in search to filter providers by tag classification; these codes persist in the provider intent and are validated throughout the transaction.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: The BAP includes tag descriptors in the search request to specify provider attributes being sought; these descriptors persist in the session and are reused across subsequent transaction steps.
                  owner: BAP
                  type: object
              value:
                _description:
                  required: false
                  usage: e103b4a5-10f8-42c7-b888-dbf0e2edd696
                  info: The BAP includes this provider tag value in the search request to identify or filter providers. The value is anchored in the session and reused across subsequent steps.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Provider tags the BAP includes in search, persisting through the transaction for downstream use.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Tags the BAP includes to filter providers in the search intent, persisted across the transaction and reused in subsequent steps.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: When the customer specifies a provider preference, the BAP includes this provider specification in the search request to indicate which provider they want to source from.
            owner: BAP
            type: object
        payment:
          collected_by:
            _description:
              required: false
              usage: BPP
              info: "The BAP sets this to declare who collects the payment: 'bap' for BAP collection with later settlement to the BPP (in which case the BPP should not send a payment URL), or 'bpp' for direct BPP collection. BAP mints this in search; the BPP validates and echoes it in on_search, anchoring the choice for all subsequent steps."
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: Payment method preferences that the BAP specifies in search; the BPP echoes in on_search.
            owner: BAP
            type: object
        tags:
          descriptor:
            code:
              _description:
                required: false
                usage: BAP_TERMS
                info: BAP provides this descriptor code in search intent to categorize applicable terms or conditions; the code is validated during request processing.
                owner: BAP
                type: string
            name:
              _description:
                required: false
                usage: BAP Terms of Engagement
                info: The human-readable label for the tag descriptor that the BAP specifies during search to identify the category or type of terms and conditions applicable to the transaction.
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: Classification metadata for each tag in the search intent, identifying through codes and names what categories or filtering criteria the BAP applies to its search.
              owner: BAP
              type: object
          display:
            _description:
              required: false
              usage: "false"
              info: The BAP sets this to control whether the tag (containing terms, conditions, or policy details) should be displayed in search results.
              owner: BAP
              type: boolean
          list:
            descriptor:
              code:
                _description:
                  required: false
                  usage: STATIC_TERMS
                  info: The BAP specifies a classification code in the tag descriptor to indicate what types of terms or conditions they wish to discover. STATIC_TERMS identifies fixed contract terms, while OFFLINE_CONTRACT identifies offline contract handling.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Classifies each tag in the BAP's search intent, identifying the type of search criterion or filter being applied such as contract terms or offline availability conditions.
                owner: BAP
                type: object
            value:
              _description:
                required: false
                usage: https://api.example-bap.com/booking/terms
                info: In search requests, the BAP specifies tag values to establish product filters based on criteria such as policy terms documentation URLs or contract type preferences.
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: Array of tag objects that the BAP includes in a search request to specify filtering criteria and preferences for the insurance products or policies being sought.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: An array of categorized input parameters and criteria that the BAP supplies during search to specify the search intent, enabling the BPP to filter providers or products based on the BAP's requirements.
            owner: BAP
            type: object
        fulfillment:
          agent:
            person:
              id:
                _description:
                  required: false
                  usage: 0120TRVK
                  info: Identifier of the person serving as the fulfillment agent in the search request.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Details the individual person serving as fulfillment agent, specified by the BAP during search.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: In the search request, the BAP specifies the agent type or instance required to handle fulfillment, enabling BPPs to filter offerings based on agent availability and assigned capabilities.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: The BAP expresses fulfillment preferences in the search request to specify how the customer wants their order delivered or provided. The BPP echoes these preferences in the search response to confirm understanding.
            owner: BAP
            type: object
        _description:
          required: false
          usage: ""
          info: The BAP declares the consumer's search intent—their desired product or service, preferred provider, location, fulfillment timing, and payment method—which the BPP uses to identify matching offerings.
          owner: BAP
          type: object
      _description:
        required: false
        usage: ""
        info: Contains the BAP's search criteria and intent, including product category and other attributes needed to discover matching products or services from the BPP.
        owner: BAP
        type: object
  on_search:
    context:
      action:
        _description:
          required: false
          usage: on_search
          info: The BAP sets this to 'search' to indicate which protocol method the BPP should execute.
          owner: BPP
          type: string
      bap_id:
        _description:
          required: false
          usage: dev-automation.ondc.org
          info: Unique identifier of the BAP making the search request. The BAP includes this in every request so the BPP can track the requester and correlate messages within the session.
          owner: BPP
          type: string
      bap_uri:
        _description:
          required: false
          usage: https://dev-automation.ondc.org/api-service/ONDC:FIS13/2.0.0/buyer
          info: The BAP provides its callback subscriber URL in the search request so that BPPs know where to route their responses and invoke subsequent callbacks.
          owner: BPP
          type: string
      bpp_id:
        _description:
          required: false
          usage: dev-automation.ondc.org
          info: BPP's subscriber identifier, included in the on_search response to identify the responding provider.
          owner: BPP
          type: string
      bpp_uri:
        _description:
          required: false
          usage: https://dev-automation.ondc.org/api-service/ONDC:FIS13/2.0.0/seller
          info: The BPP returns its subscriber endpoint in on_search, which the BAP persists to route all subsequent requests in the transaction.
          owner: BPP
          type: string
      domain:
        _description:
          required: false
          usage: ONDC:FIS13
          info: Domain code identifying the business vertical for this transaction. The BAP includes this in search so the BPP can route to the correct product catalog and return matching offerings.
          owner: BPP
          type: string
      location:
        city:
          code:
            _description:
              required: false
              usage: "*"
              info: City code for the geographic location in which the BAP seeks products or services. The BPP uses this to filter available catalog results by the specified location.
              owner: BPP
              type: string
          _description:
            required: false
            usage: ""
            info: The BAP specifies the city to narrow provider discovery to a particular geographic area.
            owner: BPP
            type: object
        country:
          code:
            _description:
              required: false
              usage: IND
              info: ISO 3166-1 and ISO 3166-2 country code that the BAP provides in the search request to define the geographic scope for discovery; the BPP validates this value.
              owner: BPP
              type: string
          _description:
            required: false
            usage: ""
            info: The BAP specifies the country to establish the geographic context for the location being searched.
            owner: BPP
            type: object
        _description:
          required: false
          usage: ""
          info: The location where the BAP intends the transaction to be fulfilled.
          owner: BPP
          type: object
      message_id:
        _description:
          required: false
          usage: f4a40953-19cf-44f3-b5a6-3d3a03c19e63
          info: Unique message identifier that the BAP generates for this search request so that the BPP's on_search response can be correlated to this call and duplicates can be rejected. Use a fresh value for each new interaction.
          owner: BPP
          type: string
      timestamp:
        _description:
          required: false
          usage: 2026-02-11T12:06:15.166Z
          info: The BAP generates this RFC3339-formatted timestamp when issuing the search request to mark the request time. The timestamp is captured as latestTimestamp and retained for audit and tracking.
          owner: BPP
          type: date-time
      transaction_id:
        _description:
          required: false
          usage: 081cdf69-d8c3-465b-9d54-1d5f0bcf9f6b
          info: The BAP generates this unique identifier for a transaction and includes it in every message from search through confirm, enabling BPPs to recognize the ongoing transaction and deliver personalized recommendations despite not knowing the buyer's identity.
          owner: BPP
          type: string
      ttl:
        _description:
          required: false
          usage: PT30S
          info: Time-to-live duration in ISO8601 format that the BAP includes in the search request to indicate how long the message remains valid after transmission. The BPP uses this window to determine whether the request should still be processed or has become stale.
          owner: BPP
          type: string
      version:
        _description:
          required: false
          usage: 2.0.0
          info: Protocol version the BAP sends in the search request so the BPP can respond with compatible message structures.
          owner: BPP
          type: string
      _description:
        required: false
        usage: ""
        info: Context is the BAP-provided transaction metadata in the search request—domain, location, platform identities, and a stable transaction_id—that the BPP uses for routing and message correlation.
        owner: BPP
        type: object
    message:
      catalog:
        descriptor:
          name:
            _description:
              required: false
              usage: ABC Insurance Ltd
              info: The BPP includes the provider or seller's name in the catalog descriptor to identify the organization offering products or services in the search response.
              owner: BPP
              type: string
          _description:
            required: false
            usage: ""
            info: The BPP returns this descriptor in on_search to provide identifying information about the catalog, enabling the BAP to recognize and display the offerings.
            owner: BPP
            type: object
        providers:
          id:
            _description:
              required: false
              usage: P1
              info: Unique identifier for each insurance provider returned by BPP in the on_search response. The BAP persists the first provider's id in session; BPP sources this persisted identifier in subsequent on_search calls to maintain provider continuity across discovery and purchase flows.
              owner: BPP
              type: string
          descriptor:
            name:
              _description:
                required: false
                usage: ABC Insurance Ltd.
                info: BPP returns the provider's name in the search catalog; the BAP anchors this identifier in the session and reuses it in downstream selection and confirmation steps.
                owner: BPP
                type: string
            short_desc:
              _description:
                required: false
                usage: ABC Insurance Ltd. India
                info: The BPP returns the provider's display name—typically the insurer or service provider identifier—in each catalog provider record during search. The BAP retains this value with the provider context and uses it for identification across subsequent workflow steps.
                owner: BPP
                type: string
            long_desc:
              _description:
                required: false
                usage: ABC Insurance Ltd. Deals in multiple Insurance Services like Health, Motor, Marine etc
                info: Detailed textual description of the insurance provider's range of services; included by the BPP in on_search and persisted by the BAP across the discovery and selection journey.
                owner: BPP
                type: string
            images:
              url:
                _description:
                  required: false
                  usage: https://www.abcinsurance.com/content/dam/abc/india/assets/images/header/logo.png
                  info: BPP provides the provider's image URL in on_search for display purposes. The provider data is anchored in session and reused in select and confirm to maintain visual consistency.
                  owner: BPP
                  type: string
              size_type:
                _description:
                  required: false
                  usage: xs
                  info: Image size type for provider descriptors returned by the BPP in catalog search; the provider object carrying this value is persisted and reused in subsequent transaction steps.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Provider images in the BPP's on_search response; the provider data is anchored in session under 'on_search_provider' and consumed across subsequent discovery and transaction steps.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: Identification and descriptive attributes for each insurance provider, returned in on_search and persisted for reuse across the session.
              owner: BPP
              type: object
          categories:
            id:
              _description:
                required: false
                usage: C1
                info: The BPP returns a category identifier within each provider's catalog in on_search. The BAP references these IDs when making selections in subsequent operations, with values persisting in the session-anchored provider data across steps.
                owner: BPP
                type: string
            descriptor:
              name:
                _description:
                  required: false
                  usage: Micro Insurance
                  info: BPP returns the insurance product category name in on_search (e.g., Micro Insurance, Micro Accidental Insurance); the BAP retains this descriptor value across the session for use in select and confirm.
                  owner: BPP
                  type: string
              code:
                _description:
                  required: false
                  usage: MICRO_INSURANCE
                  info: The BPP includes this category code in on_search to classify each insurance category offered. The BAP anchors this code in its session during discovery, then uses it throughout the purchase journey to maintain consistent category references for product selection.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: The BPP returns this object with the category's display name and standardized code identifier, enabling the BAP to recognize and present insurance product categories in the provider's catalog.
                owner: BPP
                type: object
            parent_category_id:
              _description:
                required: false
                usage: C1
                info: Identifier linking a product category to its parent in the provider's hierarchy, returned by the BPP in on_search. The BAP persists this as part of the provider object and reuses it across subsequent operations like on_select.
                owner: BPP
                type: string
            _description:
              required: false
              usage: ""
              info: BPP returns categories for each provider in the on_search catalog response; this provider data is persisted in the session and consumed by subsequent steps.
              owner: BPP
              type: object
          items:
            id:
              _description:
                required: false
                usage: I1
                info: Unique identifier for each item the BPP includes in the on_search catalog. When an item is linked to a parent product (parent_item_id present), the BPP generates a UUID for that item; the id persists in session and is reused in later steps.
                owner: BPP
                type: string
            category_ids:
              _description:
                required: false
                usage: C2
                info: Category identifiers returned by the BPP to classify each item in the catalog; these are anchored in the session and reused across select and subsequent transaction steps.
                owner: BPP
                type: string
            descriptor:
              name:
                _description:
                  required: false
                  usage: Micro Accidental Insurance
                  info: BPP returns the product name for each insurance item in the catalog response; these names persist in session so the BAP can identify and select products in downstream steps.
                  owner: BPP
                  type: string
              short_desc:
                _description:
                  required: false
                  usage: ABC Individual Insurance Class
                  info: A brief categorical identifier that classifies the insurance product by its type or policy class. The BPP includes this in the on_search response to help the BAP distinguish between different insurance offerings in the provider's catalog.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: The BPP returns a descriptor for each product item, which persists through the session and is consumed in downstream steps.
                owner: BPP
                type: object
            time:
              duration:
                _description:
                  required: false
                  usage: P1Y
                  info: The BPP includes the item duration in ISO 8601 format in the on_search catalog response. The value is anchored in the buyer's session and reused by later transaction steps.
                  owner: BPP
                  type: string
              label:
                _description:
                  required: false
                  usage: TENURE
                  info: BPP provides a label for the time attribute of items in the catalog; this label is persisted in the session and consumed during downstream selection and confirmation steps.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Temporal information specifying the validity period or tenure of an insurance product; the BPP returns this in on_search responses to communicate the product's duration and term label to customers.
                owner: BPP
                type: object
            parent_item_id:
              _description:
                required: false
                usage: I1
                info: The BPP includes this field for child items in its catalog to identify the parent item they depend on. The value is the parent item's id within the same provider; the field persists in the session items array across subsequent purchase steps.
                owner: BPP
                type: string
            price:
              currency:
                _description:
                  required: false
                  usage: INR
                  info: Currency code of the item's price returned by the BPP in on_search. The value is anchored in session and reused by later steps.
                  owner: BPP
                  type: string

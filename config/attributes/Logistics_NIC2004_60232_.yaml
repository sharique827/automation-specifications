meta:
  use_case_id: Logistics (NIC2004:60232)
attribute_set:
  search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:LOG10
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:LOG10
              description: Hyperlocal logistics domain code (P2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:LOG11
              description: Intercity logistics domain code (P2H2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: nic2004:60232
              description: Logistics domain code (deprecated)
              reference: <PR/Issue/Discussion Links md format text>
      country:
        _description:
          required: true
          usage: IND
          info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: std:080
          info: |
            Describes the city code this location is, or is located within, city code should match the city for fulfillment start location;
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: Stable identifier shared across every message of one ONDC transaction. The BAP mints it on the first request and every later request and response carries the same value so participants can correlate the chain.
        owner: BAP
        type: object
    message:
      intent:
        category:
          id:
            _description:
              required: true
              usage: Immediate Delivery
              info: |
                Express Delivery" - by air (for P2H2P); "Standard Delivery" - by surface (for P2P, P2H2P): "Immediate Delivery" is for S2D <= 60 min; "Same Day Delivery" "Next Day Delivery" If id="Standard Delivery": all possible options should be returned in /on_search (including for "Immediate Delivery", "Same Day Delivery", "Next Day Delivery"); If id="Express Delivery": all possible P2H2P options should be returned in /on_search;
              owner: BAP
              type: enum
              enums:
                - code: Express Delivery
                  description: Delivery will be done by Air
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Standard Delivery
                  description: Delivery will be done by Surface
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Immediate Delivery
                  description: Delivery will be done within S2D (Shipment to Delivery) <= 60 min
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Next Day Delivery
                  description: Delivery will be done on the Next Day with respect to context timestamp
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Same Day Delivery
                  description: Delivery will be done on the Same Day with respect to context timestamp
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Instant Delivery
                  description: Delivery will be done withing 10 minutes (S2D TAT <= 10 min)
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The BAP sets the intent category during search to define the type of item being sought, and this value is persisted under the key retail_category and reused across subsequent steps in the order flow, including cancellation and confirm, to ensure consistent categorization of the product intent.
            owner: BAP
            type: object
        item:
          descriptor:
            code:
              _description:
                required: false
                usage: false
                info: Describes the type of order, point to point (P2P) or via hub (P2H2P), deprecated, not to be used.
                owner: BAP
                type: string
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        provider:
          time:
            days:
              _description:
                required: true
                usage: 1,2,3,4,5,6,7
                info: |
                  store pickup timings; days of week: 1 - Monday till 7 - Sunday;
                owner: BAP
                type: string
            schedule:
              holidays:
                _description:
                  required: true
                  usage: |-
                    [ "2023-06-29",
                                  "2023-08-15"
                    ]
                  info: list of future dated holidays;
                  owner: BAP
                  type: array
              _description:
                required: true
                usage: ""
                info: The BAP populates this object with a schedule describing available time slots for provider service during the search phase, and the value is generated once per transaction and remains consistent across subsequent messages in the flow.
                owner: BAP
                type: object
            duration:
              _description:
                required: true
                usage: PT30M
                info: order preparation time (indicates estimate timing for logistics ready_to_ship) - may be used by LSP to optimize scheduling of task allocation;
                owner: BAP
                type: string
            range:
              start:
                _description:
                  required: true
                  usage: "0700"
                  info: BAP specifies the start time of the store's order pickup window in 24-hour format, such as 0700, and this value is included in the search request to indicate when the store is open for pickups.
                  owner: BAP
                  type: string
              end:
                _description:
                  required: true
                  usage: "2355"
                  info: The BAP specifies the end time of the preferred service window in the search request, ensuring it is greater than the start time and within a 24-hour duration, serving as a critical temporal boundary for service availability.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: The BAP populates this object with the intended time window for provider availability during the search request, and it is used to guide the BPP in filtering or ranking available providers, though no value is carried forward across subsequent steps.
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: The BAP sets the provider's intended time window for service delivery in the search request, and the BPP must echo this same time structure in its search response to ensure alignment across the flow. This time information is generated by the BAP and validated by the BPP during the search lifecycle, forming a round-trip to establish temporal expectations for order processing.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: The BAP populates this field with the identifier of the service provider (e.g., a restaurant, hospital, or store) that the buyer intends to engage with for the order. This value is set during the search action and remains consistent across subsequent steps of the order flow, serving as a reference point for downstream actions like selection and confirmation.
            owner: BAP
            type: object
        fulfillment:
          type:
            _description:
              required: true
              usage: Delivery
              info: Type of fulfillment (Delivery or Return).
              owner: BAP
              type: enum
              enums:
                - code: Delivery
                  description: Describes the type of fulfillment.
                  reference: <PR/Issue/Discussion Links md format text
                - code: Return
                  description: Describes the type of fulfillment.
                  reference: <PR/Issue/Discussion Links md format text
                - code: RTO
                  description: Describes the type of fulfillment.
                  reference: <PR/Issue/Discussion Links md format text
          start:
            location:
              id:
                _description:
                  required: false
                  usage: S1
                  info: unique id for store - optional;
                  owner: BAP
                  type: string
              gps:
                _description:
                  required: true
                  usage: 12.4535,77.9283
                  info: |
                    GPS coordinates for pickup location, minimum 4 digit decimal precision;
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: true
                    usage: "560001"
                    info: BAP populates the area code for the pickup location address during search and carries it forward across subsequent steps in the flow, where it is reused by later actions as part of the session context under the persisted key start_area_code.
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: The BAP initializes the fulfillment location address in the search request, and this value is preserved across subsequent steps of the order flow and carried into downstream actions such as on_search and on_confirm, where it is reused by the BPP to maintain consistency in the fulfillment plan. The value is anchored in session under the key fulfillment and persists across flows including BUYER_SIDE_ORDER_CANCELLATION and ORDER_FLOW_BASELINE, ensuring continuity in the fulfillment intent.
                  owner: BAP
                  type: object
              _description:
                required: true
                usage: ""
                info: The BAP initializes the fulfillment location in the search request, and this value is preserved across subsequent steps of the order flow, anchored in session under the key fulfillment, enabling consistent reference throughout the transaction lifecycle.
                owner: BAP
                type: object
            authorization:
              type:
                _description:
                  required: false
                  usage: OTP
                  info: |
                    Authorization type for pickup. optional, only required if LBNP wants pickup authorization, using dynamic OTP; if LSP doesn’t support authorization, they should not respond to the search request;
                  owner: BAP
                  type: enum
                  enums:
                    - code: OTP
                      description: Describes OTP as an authorization mechanism used to start the fulfillment of an order.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            instructions:
              code:
                _description:
                  required: false
                  usage: 5
                  info: static OTP for pickup, other values in the contract remain as is;
                  owner: BAP
                  type: enum
                  enums:
                    - code: "2"
                      description: Describes merchant order number.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "3"
                      description: Describes any other pickup confirmation code.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "4"
                      description: Describes OTP for pickup confirmation.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "5"
                      description: Describes Static OTP for pickup confirmation.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: BAP initializes the fulfillment start details in the search request, and the value is preserved across subsequent steps of the order flow, including cancellation and RTO, where it is reused from the session context to maintain consistency in fulfillment intent.
              owner: BAP
              type: object
          end:
            location:
              gps:
                _description:
                  required: true
                  usage: 12.4535,77.9283
                  info: GPS coordinates for delivery location.
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: true
                    usage: "560001"
                    info: The BAP populates this field with the area code for the delivery location address, which is then reused across multiple steps of the order flow and preserved in session under the key start_area_code for continuity. This value is carried forward in subsequent messages, including cancellation and fulfillment flows, and is anchored in the session for consistency across actions.
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: The BAP initializes the fulfillment end location address in the search request and carries it through subsequent steps, where it is persisted under the session key fulfillment and reused across flows such as order cancellation and baseline order processing to maintain consistency in the fulfillment intent.
                  owner: BAP
                  type: object
              _description:
                required: true
                usage: ""
                info: The BAP initializes the fulfillment end location in the search request, and this value is persisted across the transaction flow and reused in subsequent steps such as order confirmation and cancellation, where it is anchored under the session's fulfillment context.
                owner: BAP
                type: object
            authorization:
              type:
                _description:
                  required: false
                  usage: OTP
                  info: |
                    Authorization type for delivery. optional, only required if LBNP wants delivery authorization, using dynamic OTP; if LSP doesn’t support authorization, they should not respond to the search request;
                  owner: BAP
                  type: enum
                  enums:
                    - code: OTP
                      description: Describes OTP as an authorization mechanism used to end the fulfillment of an order.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            instructions:
              code:
                _description:
                  required: false
                  usage: 5
                  info: |
                    static OTP for delivery, other values in the contract remain as is;
                  owner: BAP
                  type: enum
                  enums:
                    - code: "1"
                      description: Describes OTP for delivery confirmation.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "2"
                      description: Describes any other delivery confirmation code (DCC).
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "3"
                      description: Describes no delivery code.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "5"
                      description: Describes Static OTP for delivery confirmation.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: The BAP sets the fulfillment end details in the search request, and these details are preserved across subsequent steps of the order flow, with the value anchored in session and reused in later actions such as on_search and on_confirm. The BPP inherits this value during the order lifecycle and ensures consistency across flows including buyer-side cancellation and RTO, where the fulfillment end is carried forward as part of the session context.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: BAP populates the fulfillment intent with details on how a product or service will be delivered to the end customer, and this value is persisted across steps of the order flow and reused in subsequent actions like select and confirm. The fulfillment intent is written during the search action and carried forward through the transaction, anchored in session under the key fulfillment for continuity and consistency.
            owner: BAP
            type: object
        payment:
          type:
            _description:
              required: true
              usage: ON-ORDER
              info: Type of payment for the logistics order. ON-ORDER - Prepaid mode via wallet system, ON-FULFILLMENT - payment on delivery, POST-FULFILLMENT - payment post delivery, invoice to be raised after agreed number of days.
              owner: BAP
              type: enum
              enums:
                - code: ON-ORDER
                  description: Prepaid payment via wallet system enabled by LSP.
                  reference: <PR/Issue/Discussion Links md format text
                - code: ON-FULFILLMENT
                  description: Payment occurs when order is Delivered.
                  reference: <PR/Issue/Discussion Links md format text
                - code: POST-FULFILLMENT
                  description: Payment occurs after invoice is raised.
                  reference: <PR/Issue/Discussion Links md format text
          "@ondc/org/collection_amount":
            _description:
              required: false
              usage: 300
              info: Collection amount for the retail order, deprecated, will be removed in future version;
              owner: BAP
              type: string
          _description:
            required: true
            usage: ""
            info: The BAP populates the payment intent details in the search request to convey expected payment preferences or requirements to the BPP, and this field is set during the initial request and remains consistent across subsequent steps in the flow.
            owner: BAP
            type: object
        "@ondc/org/payload_details":
          weight:
            unit:
              _description:
                required: true
                usage: kilogram
                info: Weight unit of the payload, deprecated, will be removed in future version;
                owner: BAP
                type: string
            value:
              _description:
                required: true
                usage: "1"
                info: Weight value of the payload as specified in the intent, set by the BAP during search and carried through the transaction for downstream processing. The BAP populates this value at search time and retains it for use in subsequent flows, though it is deprecated and will be removed in future versions.
                owner: BAP
                type: number
            _description:
              required: true
              usage: ""
              info: <no-enough-data>
              owner: BAP
              type: object
          dimensions:
            length:
              unit:
                _description:
                  required: true
                  usage: centimeter
                  info: Unit for length dimension, deprecated, will be removed in future version;
                  owner: BAP
                  type: string
              value:
                _description:
                  required: true
                  usage: "0.1"
                  info: Length value of the package in meters, set by the BAP during search and carried through the transaction for downstream processing. The value is generated at search time and not echoed back to the BAP in any subsequent step.
                  owner: BAP
                  type: number
              _description:
                required: true
                usage: ""
                info: The BAP sets the dimensions length in the intent payload during search and ensures it is carried forward in subsequent messages of the same transaction, serving as a scalar quantity descriptor for the order scope. This value is generated and asserted by the BAP at search time and is preserved across the flow for consistency, though it is not required in the requirements.
                owner: BAP
                type: object
            breadth:
              unit:
                _description:
                  required: true
                  usage: centimeter
                  info: Unit for breadth dimension, deprecated, will be removed in future version;
                  owner: BAP
                  type: string
              value:
                _description:
                  required: true
                  usage: "0.1"
                  info: Breadth value of the package, specified as a number, set by the BAP in the search request to describe the physical width of the item being ordered. This value is not carried across steps or validated by the BPP and does not persist in session.
                  owner: BAP
                  type: number
              _description:
                required: true
                usage: ""
                info: The BAP initializes the intent dimensions breadth as a scalar object in the search request, setting it to define the spatial scope of the product offering, and this value is created at the point of search initiation and remains consistent across downstream steps within the same transaction.
                owner: BAP
                type: object
            height:
              unit:
                _description:
                  required: true
                  usage: centimeter
                  info: Unit for height dimension, deprecated, will be removed in future version;
                  owner: BAP
                  type: string
              value:
                _description:
                  required: true
                  usage: "0.1"
                  info: Height of the package in centimeters as specified by the BAP in the search request, passed directly to the BPP for use in order processing. This value is set by the BAP during search and is not echoed or validated by the BPP.
                  owner: BAP
                  type: number
              _description:
                required: true
                usage: ""
                info: The BAP initializes the height dimension as a scalar object in the search intent payload, setting it to describe the vertical dimension of the product being searched for, and this value is not carried forward or reused in subsequent steps.
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: The BAP populates this object with metadata describing the real-world dimensions of the item being ordered, such as height, width, and depth, and passes it through the search flow for downstream use in order processing and fulfillment planning. This data is set once at the search stage and is not carried forward to subsequent steps or flows.
              owner: BAP
              type: object
          category:
            _description:
              required: true
              usage: Grocery
              info: Category of linked order, deprecated, will be removed in future version;
              owner: BAP
              type: string
          value:
            currency:
              _description:
                required: true
                usage: INR
                info: Currency of payload value, deprecated, will be removed in future version;
                owner: BAP
                type: string
            value:
              _description:
                required: true
                usage: "388.5"
                info: Monetary value of the payload as a decimal string, set by the BAP in the search request and used to represent the price of the payload being offered.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: BAP populates this field with a domain-extended payload describing the item's pricing structure, allowing for custom extensions beyond standard price fields, and this payload is set during the search request to enable downstream BPPs to interpret and respond to item-specific pricing logic.
              owner: BAP
              type: object
          dangerous_goods:
            _description:
              required: true
              usage: '"false"'
              info: Indicates if payload contains dangerous goods, deprecated, will be removed in future version;
              owner: BAP
              type: string
          _description:
            required: true
            usage: ""
            info: BAP populates this field with payload details that enable the logistics provider to assess serviceability, including weight in kilogram or gram and dimensions in meter or centimeter, and this data is set during the search request to support downstream service evaluation.
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The BAP defines the user's intent to buy or avail a product or service in the search request, enabling BPPs to filter and match relevant services based on that intent. This intent is set by the BAP at the time of search initiation and is used as a contextual filter for service discovery across the order flow.
          owner: BAP
          type: object
      _description:
        required: true
        usage: ""
        info: The BAP populates this object with the transaction-level message context at the start of the search flow and carries it through all subsequent actions in the same transaction, ensuring consistency across search, select, and downstream steps.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:LOG10
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:LOG10
              description: Hyperlocal logistics domain code (P2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:LOG11
              description: Intercity logistics domain code (P2H2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: nic2004:60232
              description: Logistics domain code (deprecated)
              reference: <PR/Issue/Discussion Links md format text>
      country:
        _description:
          required: true
          usage: IND
          info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: std:080
          info: Describes the city code this location is, or is located within
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: on_search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: api.example-bpp.com
          info: Describes subscriber ID of the BPP
          owner: BPP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://api.example-bpp.com/dobpp/7f7896dd-787e-4a0b-8675-e9e6fe93bb8f
          info: Describes subscriber URL of the BPP for accepting calls from BAPs.
          owner: BPP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BPP
          type: string
      ttl:
        _description:
          required: false
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: Stable identifier shared across every message of one ONDC transaction. The BAP mints it on the first request and every later request and response carries the same value so participants can correlate the chain.
        owner: BPP
        type: object
    message:
      catalog:
        bpp/descriptor:
          name:
            _description:
              required: true
              usage: LSP Aggregator Inc
              info: name of logistics aggregator or logistics provider, as applicable;
              owner: BPP
              type: string
          _description:
            required: true
            usage: ""
            info: The BPP returns a descriptor object that describes the real-world object being offered in the catalog, and this value is preserved across subsequent steps of the order flow and is anchored in session under the key on_search_providers for reuse in later actions.
            owner: BPP
            type: object
          tags:
            code:
              _description:
                required: true
                usage: bpp_terms
                info: The BPP sets the tag code in the search response to identify its catalog metadata, and this value is preserved across the transaction lifecycle through the persisted key on_search_providers, ensuring consistent identification of the BPP’s catalog across all downstream steps including search, select, and cancellation flows.
                owner: BPP
                type: string
            list:
              code:
                _description:

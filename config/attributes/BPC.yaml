                  type: string
              images:
                _description:
                  required: true
                  usage: https://sellerNP.com/images/i1.png
                  info: URL for product image
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Contains the item's identifying and display information (name, product code, image reference, and text descriptions) that the BPP provides so the BAP can present full product details to customers.
                owner: BPP
                type: object
            price:
              currency:
                _description:
                  required: true
                  usage: INR
                  info: Currency for the item price
                  owner: BAP
                  type: string
              value:
                _description:
                  required: true
                  usage: "100"
                  info: Price of the item
                  owner: BAP
                  type: string
              maximum_value:
                _description:
                  required: true
                  usage: "100"
                  info: Maximum price for the item
                  owner: BAP
                  type: string

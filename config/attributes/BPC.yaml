                          reference: <PR/Issue/Discussion Links md format text>
                        - code: gram
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: dozen
                          description: about the enum
                          reference: <PR/Issue/Discussion Links md format text>
                        - code: kilogram

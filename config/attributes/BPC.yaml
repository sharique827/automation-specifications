                  info: The current stock quantity for this item variant, which the BPP provides in the product catalog to communicate inventory status and help the BAP determine purchasing options.
                  owner: BPP
                  type: object
              maximum:
                count:
                  _description:
                    required: true
                    usage: "99"
                    info: Max items per order
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: The maximum quantity limit per order for this product, constraining the number of units a customer can purchase in a single transaction.
                  owner: BPP
                  type: object
              minimum:
                count:
                  _description:
                    required: true
                    usage: "1"
                    info: Min items per order
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: true
                usage: ""
                info: Object containing the available quantity and unit of measurement for each item offered by the BPP, enabling the BAP to convey stock availability to consumers during catalog discovery.
                owner: BPP
                type: object
            category_id:
              _description:
                required: true
                usage: Atta, Flours and Sooji
                info: Item category classification
                owner: BAP
                type: string
            "@ondc/org/returnable":
              _description:
                required: true
                usage: "1"

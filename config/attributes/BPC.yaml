                required: true
                usage: ""
                info: The price object provides the pricing details for each item in the catalog that the BPP returns during search, allowing the BAP to display cost information to customers.
                owner: BPP
                type: object
            quantity:
              unitized:
                measure:
                  unit:
                    _description:
                      required: true
                      usage: kilogram
                      info: Unit of measurement for the item
                      owner: BAP
                      type: enum
                      enums:
                        - code: unit

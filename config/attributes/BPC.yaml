                  required: true
                  usage: ""
                  info: Specifies the item quantity using standardized measurement units (e.g., volume, weight, length) rather than just counts, with both the unit type and numeric value. Enables BPPs to express quantities in non-count formats in their search responses.
                  owner: BPP
                  type: object

meta:
  use_case_id: BPC
attribute_set:
  search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET10
          info: Specifies the domain in which the transaction operates
          owner: BAP
          type: enum
          enums:
            - code: ONDC:RET10
              description: Grocery
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET11
              description: F&B
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET12
              description: Fashion
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET13
              description: BPC
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET14
              description: Electronics
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET15
              description: Appliances
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET16
              description: Home & Kitchen
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET17
              description: Toys & Games
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET18
              description: Agriculture
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:RET19
              description: Health & Wellness
              reference: <PR/Issue/Discussion Links md format text>
      action:
        _description:
          required: true
          usage: search
          info: Specifies the action being performed in the transaction
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: Specifies the country in which the transaction is occurring
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: "*"
          info: Specifies the city or region of the transaction
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: Specifies the ONDC core version being used
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: buyerNP.com
          info: Specifies the ID of the Buyer App participating in the transaction
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://buyerNP.com/ondc
          info: Specifies the URI where the Buyer App is hosted
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: a4b24113-7c05-495b-9249-f33482bf3493
          info: Helps track a specific transaction across ONDC
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 6aae986b-37c2-47d2-a26c-daaf8ccbd764
          info: Used for tracking and logging purposes
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2023-06-03T09:00:00.000Z
          info: Ensures synchronization across different ONDC participants
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Specifies how long the request remains valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The BPP includes context in the on_status response to provide transaction information that the BAP uses to correlate the status update.
        owner: BAP
        type: object
    message:
      intent:
        payment:
          "@ondc/org/buyer_app_finder_fee_type":
            _description:
              required: true
              usage: percent
              info: Indicates whether the fee is a fixed amount or a percentage
              owner: BAP
              type: string
          "@ondc/org/buyer_app_finder_fee_amount":
            _description:
              required: true
              usage: "3"
              info: Represents the value of the fee applied
              owner: BAP
              type: string
          _description:
            required: true
            usage: ""
            info: The BAP includes payment information in this container to communicate the buyer's payment requirements to the BPP.
            owner: BAP
            type: object
        fulfillment:
          type:
            _description:
              required: false
              usage: Delivery
              info: Specifies how the order will be fulfilled (e.g., Delivery, Pickup)
              owner: BAP
              type: string
          end:
            location:
              gps:
                _description:
                  required: false
                  usage: 12.974002,77.613458
                  info: Indicates where the item is to be delivered
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: false
                    usage: "560001"
                    info: Specifies the postal code of the delivery location
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: BAP specifies fulfillment preferences in the search intent to communicate how products or services should be rendered or delivered to the customer.
            owner: BAP
            type: object
        item:
          descriptor['name']:
            _description:
              required: false
              usage: coffee
              info: Specifies the product name in the order
              owner: BAP
              type: string
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The BAP declares the buyer's search intent—what product or service to discover—optionally specifying buyer app finder fee type and amount.
          owner: BAP
          type: object
        tags:
          code:
            _description:
              required: true
              usage: bap_terms
              info: Tag code signals the type of search the BAP is requesting—such as incremental catalog updates or preference-based searches. The BAP includes this code to inform the BPP how to respond.
              owner: BAP
              type: string
          list:
            code:
              _description:
                required: true
                usage: static_terms
                info: Identifies the type of metadata attribute in the tag, such as static terms policies, effective dates, or organization codes.
                owner: BAP
                type: string
            value:
              _description:
                required: true
                usage: https://github.com/ONDC-Official/NP-Static-Terms/buyerNP_BNP/1.0/tc.pdf
                info: The BAP places control values here to direct discovery behavior; when incremental catalog discovery is active, the BAP sets this to 'stop' to signal termination of incremental catalog fetches.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: List of tags that the BAP includes in search intent to specify search filters and constraints; the BPP validates them.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: Tags array contains feature discovery codes from user selections; the BAP populates it in search to indicate which product or service features the buyer is seeking.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: The message object contains the buyer's selected items with quantities, fulfillment location and preferences, billing address, and payment method that the BAP submits to the BPP to initialize order processing.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:RET10
          info: Represents the ONDC domain version used in the transaction
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: on_search
          info: Specifies the event type in the ONDC protocol
          owner: BAP
          type: string
      country:
        _description:
          required: true
          usage: IND
          info: Identifies the country for the transaction
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: ONDC core version used
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: buyerNP.com
          info: Unique identifier of the buyer app
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://buyerNP.com/ondc
          info: URL for the buyer app
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: sellerNP.com
          info: Unique identifier of the seller app
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://sellerNP.com/ondc
          info: URL for the seller app
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 7c7aa709-a05e-4ad5-a49d-22bd64282e71
          info: ID used to track the transaction
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: bc167440-16e7-4ba6-9132-9b25518f1da2
          info: ID used for message correlation
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2024-12-23T06:55:45.035Z
          info: Time of the request
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: std:022
          info: Identifies the city
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The context container carries transaction identifiers and metadata that the BAP includes in the select request to maintain session correlation with prior search results.
        owner: BPP
        type: object
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Validity window in ISO8601 duration format that the BPP returns in on_select to indicate how long the quoted offer remains binding. The value must not exceed PT30S (30 seconds).
          owner: BPP
          type: string
    message:
      catalog:
        bpp/fulfillments:
          id:
            _description:
              required: true
              usage: F1
              info: Represents fulfillment details
              owner: BAP
              type: string
          type:
            _description:
              required: true
              usage: Delivery
              info: Defines the method of fulfillment
              owner: BAP
              type: enum
              enums:
                - code: Delivery
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Self-Pickup
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Delivery and Self-Pickup
                  description: about the enum
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: Array of fulfillment options and delivery modes that the BPP supports, included in the catalog response to inform the BAP of how orders can be fulfilled. Each fulfillment entry specifies delivery type, contact information, and other logistics details relevant to order completion.
            owner: BPP
            type: object
          contact:
            phone:
              _description:
                required: false
                usage: "9876543210"
                info: Telephone number provided by the BPP in its fulfillment details, enabling the BAP to contact the BPP regarding fulfillment logistics and inquiries.
                owner: BPP
                type: string
            email:
              _description:
                required: false
                usage: test@gmail.com
                info: The email address of the fulfillment service provider for this fulfillment option, returned by the BPP in the catalog so the BAP and buyer can contact them regarding delivery or fulfillment inquiries.
                owner: BPP
                type: string
            _description:
              required: false
              usage: ""
              info: Contact information associated with the fulfillment method, provided by the BPP to enable the BAP to communicate directly regarding delivery or service-related inquiries.
              owner: BPP
              type: object
        bpp/descriptor:
          name:
            _description:
              required: true
              usage: Seller NP
              info: Seller business name
              owner: BAP
              type: string
          symbol:
            _description:
              required: true
              usage: https://sellerNP.com/images/np.png
              info: Seller brand icon URL
              owner: BAP
              type: string
          short_desc:
            _description:
              required: true
              usage: Seller Marketplace
              info: Short description of the seller
              owner: BAP
              type: string
          long_desc:
            _description:
              required: true
              usage: Seller Marketplace
              info: Detailed description of the seller
              owner: BAP
              type: string
          images:
            _description:
              required: true
              usage: https://sellerNP.com/images/np.png
              info: Image URL of the seller
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: Structured metadata describing the BPP entity in the catalog response.
            owner: BPP
            type: object
          tags:
            code:
              _description:
                required: false
                usage: bpp_terms
                info: Code that identifies the type of terms grouped in the associated tag list; 'bpp_terms' denotes terms and conditions from the BPP that the BAP uses to understand which policies apply to the catalog.
                owner: BPP
                type: string
            list:
              code:
                _description:
                  required: false
                  usage: np_type
                  info: The BPP sets this tag code in its descriptor to classify tag types, which the system validates during the search response.
                  owner: BPP
                  type: string
              value:
                _description:
                  required: false
                  usage: MSN
                  info: The value of a descriptor tag in the BPP's catalog response, indicating a classification or attribute such as merchant type or network category.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Array of catalog tags that classify the BPP's offerings and convey its policies and service capabilities.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: Array of metadata tags that classify and characterize the BPP, with each tag containing a code identifier and a list of code-value pairs representing specific attributes or terms such as network participant type.
              owner: BPP
              type: object
        bpp/providers:
          id:
            _description:
              required: true
              usage: P1
              info: Unique identifier for provider
              owner: BAP
              type: string
          descriptor:
            name:
              _description:
                required: true
                usage: Store 1
                info: Name of the provider store
                owner: BAP
                type: string
            symbol:
              _description:
                required: true
                usage: https://sellerNP.com/images/store1.png
                info: URL for provider logo
                owner: BAP
                type: string
            short_desc:
              _description:
                required: true
                usage: Store 1
                info: Short description of the provider
                owner: BAP
                type: string
            long_desc:
              _description:
                required: true
                usage: Store 1
                info: Detailed description of the provider
                owner: BAP
                type: string
            images:
              _description:
                required: true
                usage: https://sellerNP.com/images/store1.png
                info: URL for provider image
                owner: BAP
                type: string
            _description:
              required: false
              usage: ""
              info: Descriptive metadata for each provider that the BPP includes in the catalog response to enable the BAP to identify and present the provider to consumers.
              owner: BPP
              type: object
          ttl:
            _description:
              required: true
              usage: P1D
              info: Time-To-Live for provider data
              owner: BAP
              type: string
          items:
            descriptor:
              name:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Name of the item
                  owner: BAP
                  type: string
              code:
                _description:
                  required: false
                  usage: 1:XXXXXXXXXXXXX
                  info: Unique code for the item
                  owner: BAP
                  type: string
              symbol:
                _description:
                  required: true
                  usage: https://sellerNP.com/images/i1.png
                  info: URL for product image
                  owner: BAP
                  type: string
              short_desc:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Short description of the item
                  owner: BAP
                  type: string
              long_desc:
                _description:
                  required: true
                  usage: Plain Atta
                  info: Detailed description of the item

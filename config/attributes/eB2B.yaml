          id:
            _description:
              required: true
              usage: Energy and Soft Drinks
              info: Category identifier the BAP filters on in the search query; the BPP uses this to scope the product catalog returned.
              owner: BAP
              type: string
          _description:
            required: true
            usage: ""
            info: The product category the BAP specifies in the search request to filter and scope discovery results to a particular category of items, such as energy drinks or groceries. This object contains the category identifier and related metadata used to narrow search results.
            owner: BAP
            type: object
        tags:
          code:
            _description:
              required: true
              usage: bap_terms
              info: "Tag type code: the BAP assigns codes like 'bap_terms' to classify intent tags sent during search; 'bap_terms' is the tag type used in ONDC searches."
              owner: BAP
              type: string
          list:
            code:
              _description:
                required: true
                usage: static_terms
                info: "Property code: the BAP specifies codes like 'static_terms' or 'effective_date' to identify the type of tag properties being communicated."
                owner: BAP
                type: string
            value:
              _description:
                required: true
                usage: ""
                info: "Property value: paired with the property code to supply specifics such as document URLs, effective dates, Boolean flags, or an empty string when not applicable."
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: "Container for tag property definitions: the BAP includes these during search, though they are not part of downstream validation or requirements."
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: Array of tags (identified by code, e.g., bap_terms, bap_features) the BAP declares to signal capabilities and requirements; tags with code bap_features are filtered when enabled features are present.
            owner: BAP
            type: object
        provider:
          id:
            _description:
              required: false
              usage: P1
              info: Identifier of the Seller App to search; when specified, focuses discovery on that provider's catalog.
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: Provider container that specifies the Seller App the customer intends to order from, thereby constraining search results to that seller.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: The message object carries the BAP's search intent, including the product or service category, fulfillment type preferences, and payment terms to be matched against available BPP offerings.

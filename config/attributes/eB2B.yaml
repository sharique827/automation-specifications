                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: Fulfillment constraints (location, timing, method) the BAP specifies; the BPP returns providers and offers matching these preferences.
            owner: BAP
            type: object
          customer:
            id:
              _description:
                required: false

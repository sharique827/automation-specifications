                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Descriptor object containing a code that identifies the type or category of each payment-related tag, enabling buyers to specify payment terms, conditions, and requirements in search requests.
                  owner: BAP
                  type: object
              value:
                _description:
                  required: false
                  usage: percent-annualized
                  info: Value for the payment tag descriptor, set by the BAP in search and not validated by the BPP or carried through subsequent transaction steps.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: A list of tag objects specifying payment-related parameters, conditions, or preferences the BAP is searching for, where each tag contains a descriptor identifying the parameter type (such as fee structure or settlement window) and a value specifying the requirement or preference.
                owner: BAP
                type: object

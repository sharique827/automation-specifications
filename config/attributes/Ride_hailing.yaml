meta:
  use_case_id: Ride-hailing
attribute_set:
  search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The country specified by the BAP to establish the geographic jurisdiction for the search.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: std:080
              info: Describes the city code this location is, or is located within
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Bangalore
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The BAP specifies the city object within the location context to define the geographic scope of the search request.
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The location the BAP specifies where the transaction is intended to be fulfilled.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:TRV10
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:TRV10
              description: mobility domain Ride
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16.000Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: enum
          enums:
            - code: search
              description: Buyer app indicates the search intent
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: Context provides the demographic, addressing, protocol version, and transaction metadata the BAP includes in every search request to enable the BPP to route and track the request.
        owner: BAP
        type: object
    message:
      intent:
        fulfillment:
          stops:
            type:
              _description:
                required: true
                usage: START
                info: Describes the type of the stops during the fulfillment of order
                owner: BAP
                type: enum
                enums:
                  - code: START
                    description: Describes the initial fulfillment location.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: END
                    description: Describes the final fulfillment location.
                    reference: <PR/Issue/Discussion Links md format text
            location:
              gps:
                _description:
                  required: true
                  usage: 12.923608, 77.614629
                  info: Describes the GPS co-ordinates of this location.
                  owner: BAP
                  type: string
              address: 
                _description:
                  required: true
                  type: string
                  owner: BAP
                  usage: 2nd & 3rd Floor, 7/6, August Kranti Marg
                  info: Describes the address of the location.
              city: 
                code: 
                  _description:
                    required: false
                    type: string
                    owner: BAP
                    usage: std:080
                    info: Describes the city code.
              district: 
                _description:
                  required: false
                  type: string
                  owner: BAP
                  usage: New Delhi
                  info: Describes the district value.
              country: 
                code: 
                  _description:
                    required: false
                    type: string
                    owner: BAP
                    usage: IND
                    info: Describes the country code.
              area_code: 
                _description:
                  required: false
                  type: string
                  owner: BAP
                  usage: '110049'
                  info: Describes the area code.    
              _description:
                required: true
                usage: ""
                info: The BAP specifies the location of each stop in the fulfillment plan during search; this location data is anchored in the session and reused by the BPP across confirmation and fulfillment tracking operations.
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: Ordered list of logical stops the BAP specifies in search to define the fulfillment sequence; anchored in the session, these values are reused by all subsequent order steps.
              owner: BAP
              type: object
            id:
              _description:
                required: false
                usage: "1"
                info: The BAP assigns a unique id to each stop (pickup, drop-off, or intermediate) in the search request. The stops array is persisted in the session and referenced across subsequent steps (select, confirm, update, track, etc.).
                owner: BAP
                type: string
            instructions:
              long_desc:
                _description:
                  required: false
                  usage: long description of the location
                  info: The BAP provides a detailed textual description of each fulfillment stop location during search; this value is persisted in the order and reused across subsequent fulfillment steps.
                  owner: BAP
                  type: string
              short_desc:
                _description:
                  required: false
                  usage: short description of the location
                  info: BAP provides a brief text description of each stop location during search. This value is persisted in the session and reused across subsequent order steps.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Short and long descriptions of the stop location provided by the BAP to help the BPP identify the exact service point and understand any access or operational requirements at that location.
                owner: BAP
                type: object
            parent_stop_id:
              _description:
                required: false
                usage: "1"
                info: BAP specifies parent_stop_id for each stop on search to indicate its parent stop in a multi-stop journey hierarchy; the stops array persists through confirm, status, and track.
                owner: BAP
                type: string
            time:
              timestamp:
                _description:
                  required: false
                  usage: 2024-11-07T00:32:19.000Z
                  info: BAP specifies the time at which this fulfillment stop is scheduled to occur in the search request. The timestamp is persisted in the session as part of the stops array and reused across subsequent actions to maintain the scheduling reference.
                  owner: BAP
                  type: date-time
              _description:
                required: false
                usage: ""
                info: Holds the timing specifications for a fulfillment stop in the BAP's search intent; the stops array is anchored in the session and consumed across subsequent order steps.
                owner: BAP
                type: object
          vehicle:
            category:
              _description:
                required: false
                usage: CAB
                info: Describes the vehicle category.
                owner: BAP
                type: enum
                enums:
                  - code: AUTO_RICKSHAW
                    description: Describes the vehicle category as Auto Rickshaw
                    reference: <PR/Issue/Discussion Links md format text
                  - code: CAB
                    description: Describes the vehicle category as cab
                    reference: <PR/Issue/Discussion Links md format text
                  - code: TWO_WHEELER
                    description: Describes the vehicle category as TWO_WHEELER
                    reference: <PR/Issue/Discussion Links md format text
            _description:
              required: false
              usage: --
              info: Describes a vehicle is a device that is designed or used to transport people or cargo over land, water, air, or through space.<br>This has properties like category, capacity, make, model, size,variant,color,energy_type,registration
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: Fulfillment specifications the BAP provides in search to indicate how the customer wants the order fulfilled, anchored in the transaction session and reused by later steps.
            owner: BAP
            type: object
        payment:
          collected_by:
            _description:
              required: true
              usage: BPP
              info: This field indicates the payment collector. If set to 'bap,' BAP collects first and settles with BPP. If BPP agrees, no payment link is sent. If set to 'bpp,' BPP collects payment directly.
              owner: BAP
              type: enum
              enums:
                - code: BPP
                  description: Describes when the seller app is collecting the payment.
                  reference: <PR/Issue/Discussion Links md format text
                - code: BAP
                  description: Describes when the buyer app is collecting the payment.
                  reference: <PR/Issue/Discussion Links md format text
          _description:
            required: true
            usage: ""
            info: The BAP specifies how the customer wants to pay for the order in the search request. Payment terms are anchored in the session and reused across subsequent fulfillment steps.
            owner: BAP
            type: object
          tags:
            BUYER_FINDER_FEES:
              _description:
                required: true
                usage: --
                info: Describes the finder fees for buyer
                owner: BAP
                type: OBJECT
            SETTLEMENT_TERMS:
              _description:
                required: true
                usage: --
                info: Describes the settlement terms
                owner: BAP
                type: OBJECT
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
        _description:
          required: true
          usage: ""
          info: The BAP declares in the search request what product or service the consumer wants, who should provide it, where and when they need it, and the payment method—data the BPP uses to find matching offerings.
          owner: BAP
          type: object
        category:
          descriptor:
            code:
              _description:
                required: true
                usage: ON_DEMAND_TRIP
                info: The BAP specifies the trip category code in the search request to indicate the type of service being requested—on-demand trip, on-demand rental, scheduled trip, or scheduled rental. This value persists throughout the transaction session.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: Specifies the service category the BAP is seeking in the search request; the BPP echoes it back to confirm the category match and it is anchored in the transaction session.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: The BAP specifies category details in the search intent to define the service category, and the container is preserved across the transaction for use in fulfillment and status operations.
            owner: BAP
            type: object
        tags:
          descriptor:
            name:
              _description:
                required: true
                usage: BAP Terms of Engagement
                info: The BAP specifies a human-readable name for a search-time descriptor. This name persists across all subsequent transaction steps, enabling the BPP to maintain the buyer's initial search context.
                owner: BAP
                type: string
            code:
              _description:
                required: true
                usage: BAP_TERMS
                info: The BAP assigns this descriptor code in search to classify the intent; the BPP validates it in on_search response and it persists through the transaction.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: Identifies the category or type of each search tag through its code, enabling the BAP to specify search requirements and preferences that the BPP applies when matching results.
              owner: BAP
              type: object
          display:
            _description:
              required: true
              usage: "false"
              info: Boolean flag the BAP specifies in the search request to control whether tags are displayed; the value is anchored in the search context and reused across subsequent transaction steps.
              owner: BAP
              type: boolean
          list:
            descriptor:
              code:
                _description:
                  required: true
                  usage: BUYER_FINDER_FEES_PERCENTAGE
                  info: Descriptor code that the BAP sets in search to indicate the category of terms it is seeking. The code persists as search_tags through the session and is reused in subsequent actions to maintain consistent intent.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Descriptor container within tag entries; the BAP specifies this in search and the BPP echoes it in on_search, with the value persisting as a session anchor across subsequent operations.
                owner: BAP
                type: object
            value:
              _description:
                required: true
                usage: "1"
                info: The BAP includes search filter tags in the search request to narrow availability or communicate preferences; the BPP echoes these tags in on_search, and they persist through the session for reuse in subsequent transaction steps.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: Container for intent tags in the BAP's search request; echoed by the BPP in on_search and anchored in the session as search_tags for reuse across downstream transaction steps.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: Tags the BAP includes in the search intent to specify service parameters, terms of engagement, and conditions that filter the available services or providers.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: The message of the transaction that the BAP generates for the search request.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The country specified by the BAP to establish the geographic jurisdiction for the search.
            owner: BPP
            type: object
        city:
          code:
            _description:
              required: true
              usage: std:080
              info: Describes the city code this location is, or is located within
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Bangalore
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The BAP specifies the city object within the location context to define the geographic scope of the search request.
            owner: BPP
            type: object
        _description:
          required: true
          usage: ""
          info: The location the BAP specifies where the transaction is intended to be fulfilled.
          owner: BPP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:TRV10
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:TRV10
              description: mobility domain Ride
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16.000Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: on_search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: enum
          enums:
            - code: on_search
              description: Seller app provides catalog based on search intent.
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: api.example-bpp.com
          info: Describes subscriber ID of the BPP
          owner: BPP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://api.example-bpp.com/dobpp/7f7896dd-787e-4a0b-8675-e9e6fe93bb8f
          info: Describes subscriber URL of the BPP for accepting calls from BAPs.
          owner: BPP
          type: string
      _description:
        required: true
        usage: ""
        info: The BPP echoes the transaction context from the BAP's search request, including demographic, addressing, interoperability, and transaction-tracking information, to enable the BAP to correlate the on_search response with its original transaction.
        owner: BPP
        type: object
    message:
      catalog:
        descriptor:
          name:
            _description:
              required: true
              usage: Mobility Servies BPP
              info: Describes the catalog name.
              owner: BPP
              type: string
          _description:
            required: true
            usage: ""
            info: Physical descriptor of the catalog that the BPP returns in on_search, validated by the BAP and anchored in the session for reuse across steps.
            owner: BPP
            type: object
        providers:
          id:
            _description:
              required: true
              usage: 450dec0f
              info: Describes the unique Id of the provider.
              owner: BPP
              type: string
            descriptor: &provider_descriptor_details
          name: 
            _description:
              required: false
              type: string
              owner: BPP
              usage: Uber
              info: Describes the provider name.  
          short_desc: 
            _description:
              required: false
              type: string
              owner: BPP
              usage: Uber Rides
              info: Describes the provdier short_desc.
          long_desc: 
            _description:
              required: false
              type: string
              owner: BPP
              usage: Uber Rides, India
              info: Describes the provdier long_desc.    
          images:  
            url: 
              _description:
                required: false
                type: string
                owner: BPP
                usage: https://example-bpp.com/prod/seller/asset
                info: Describes the provdier image url.  
            size_type: 
              _description:
                required: false
                type: string
                owner: BPP
                usage: sm
                info: Describes the provdier image size type.  
          locations:
            id:
              _description:
                required: false
                usage: d3ebf05b
                info: Indicates provider locations where this item is available.
                owner: BPP
                type: string
            gps:
              _description:
                required: false
                usage: 28.707358, 77.180910
                info: Describes the GPS co-ordinates of this location.
                owner: BPP
                type: string
            _description:
              required: true
              usage: ""
              info: BPP returns a list of service locations for each provider, generated from the request's pickup and dropoff coordinates.
              owner: BPP
              type: object
          fulfillments:
            id:
              _description:
                required: true
                usage: b68bb35b
                info: Describes the unique reference ID to the fulfillment of an order
                owner: BPP
                type: string
            type:
              _description:
                required: true
                usage: DELIVERY
                info: A code that describes the mode of fulfillment. This is typically set when there are multiple ways an order can be fulfilled.
                owner: BPP
                type: enum
                enums:
                  - code: DELIVERY
                    description: Describes the type of fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: SELF_PICKUP
                    description: Describes the type of fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
            stops:
              type:
                _description:
                  required: true
                  usage: START
                  info: Describes the type of the stops during the fulfillment of order
                  owner: BAP
                  type: enum
                  enums:
                    - code: START
                      description: Describes the initial fulfillment location.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: END
                      description: Describes the final fulfillment location.
                      reference: <PR/Issue/Discussion Links md format text
              location:
                gps:
                  _description:
                    required: true
                    usage: 28.707358, 77.180910
                    info: Describes the GPS co-ordinates of this location.
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Geographic location (coordinates or address) for each stop in a fulfillment leg, which the BPP includes in on_search to describe the fulfillment routing.
                  owner: BPP
                  type: object
                circle:
                  gps:
                    _description:
                      required: false
                      usage: 13.008935, 77.644408
                      info: GPS coordinate for a fulfillment stop's circular geofence, populated by the BPP in on_search when the boundary is defined, persisting with the fulfillments across subsequent order steps.
                      owner: BPP
                      type: string
                  radius:
                    type:
                      _description:
                        required: false
                        usage: CONSTANT
                        info: Specifies how to interpret the radius value for a circular service area at a fulfillment stop. The BPP returns this in on_search, and the fulfillments structure is anchored in the session and reused across subsequent steps.
                        owner: BPP
                        type: string
                    value:
                      _description:
                        required: false
                        usage: "100"
                        info: The BPP specifies the radius of a circular service area around each fulfillment stop in on_search; the BAP validates this value and anchors it in session for reuse across subsequent steps.
                        owner: BPP
                        type: string
                    unit:
                      _description:
                        required: false
                        usage: KILOMETER
                        info: Unit of measurement for the service stop's circular location radius. The BPP provides this in on_search, and it persists with the fulfillment plan across subsequent transaction steps.
                        owner: BPP
                        type: string
                    _description:
                      required: false
                      usage: ""
                      info: Specifies the circular service area radius around a fulfillment stop location, expressed as a constant distance value with a defined unit of measurement.
                      owner: BPP
                      type: object
                  _description:
                    required: false
                    usage: ""
                    info: Circular geographic area at each fulfillment stop that the BPP returns in on_search and persists across the transaction for use in subsequent steps.
                    owner: BPP
                    type: object
              _description:
                required: true
                usage: ""
                info: The BPP returns stops (waypoints) for each fulfillment; these are retained in the transaction session and reused by subsequent steps.
                owner: BPP
                type: object
              instructions:
                short_desc:
                  _description:
                    required: true
                    usage: short description of the location
                    info: A concise text description of the fulfillment stop, such as a pickup location, drop-off destination, or intermediate waypoint along the delivery route.
                    owner: BPP
                    type: string
                long_desc:
                  _description:
                    required: true
                    usage: long description of the location
                    info: The BPP returns a detailed description of each fulfillment stop location in the catalog provided during on_search. This value persists in the session as part of the fulfillments structure and is reused by the BAP across subsequent steps (select, confirm, status) to maintain consistent location context.
                    owner: BPP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Instructions and descriptions of a fulfillment stop location provided by the BPP, enabling the BAP to understand the exact location and any specific notes for pickup or delivery. The object contains short and long form descriptions of the stop's location.
                  owner: BPP
                  type: object
              id:
                _description:
                  required: false
                  usage: "1"
                  info: Each stop within the fulfillment options that the BPP returns in search has a unique identifier. The identifier persists through the order session and the BAP uses it across subsequent steps to reference specific stops.
                  owner: BPP
                  type: string
              parent_stop_id:
                _description:
                  required: false
                  usage: "1"
                  info: The parent stop identifier in a multi-stop fulfillment, set by the BPP in on_search and persisted through the order lifecycle to track hierarchical stop relationships.
                  owner: BPP
                  type: string
              time:
                timestamp:
                  _description:
                    required: false
                    usage: 2024-11-07T00:32:19.000Z
                    info: ISO 8601 timestamp indicating when the BPP will execute this stop in the fulfillment plan. The BPP advertises these times in the on_search catalog response; the values persist through confirm, track, and status flows to maintain fulfillment timeline visibility.
                    owner: BPP
                    type: date-time
                _description:
                  required: false
                  usage: ""
                  info: The scheduled timestamp indicating when service or pickup will commence at this stop location within the fulfillment route.
                  owner: BPP
                  type: object
            vehicle:
              category:
                _description:
                  required: true
                  usage: CAB
                  info: Describes the vehicle category.
                  owner: BAP
                  type: enum
                  enums:
                    - code: AUTO_RICKSHAW
                      description: Describes the vehicle category as Auto Rickshaw
                      reference: <PR/Issue/Discussion Links md format text
                    - code: CAB
                      description: Describes the vehicle category as cab
                      reference: <PR/Issue/Discussion Links md format text
                    - code: TWO_WHEELER
                      description: Describes the vehicle category as TWO_WHEELER
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: true
                usage: ""
                info: The BPP specifies vehicle type for each fulfillment option in on_search, with this data persisting within the fulfillment record for use by the BAP in select and confirm.
                owner: BPP
                type: object
              variant:
                _description:
                  required: true
                  usage: AUTO_RICKSHAW
                  info: The vehicle type available for a fulfillment option; the BPP specifies this in the on_search catalog and the value persists across subsequent transaction steps.
                  owner: BPP
                  type: string
            _description:

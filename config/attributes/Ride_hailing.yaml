meta:
  use_case_id: Ride-hailing
attribute_set:
  search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: This location's country, specified by the BAP in search to scope results to the desired geographic jurisdiction.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: std:080
              info: Describes the city code this location is, or is located within
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Bangalore
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: Identifies the city where the transaction location is situated. The BAP specifies this in the search request to define the geographic scope of the transaction.
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The location where the transaction is intended to be fulfilled; the BAP specifies this in search and the BPP validates it in on_search.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:TRV10
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:TRV10
              description: mobility domain Ride
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: enum
          enums:
            - code: search
              description: Buyer app indicates the search intent
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The BAP initializes context on the first search request with transaction metadata including demographic information, addressing details, protocol version, and transaction identifiers. This context must accompany every subsequent API interaction to enable transaction tracking and proper routing.
        owner: BAP
        type: object
    message:
      intent:
        fulfillment:
          customer:
            person:
              gender:
                _description:
                  required: false
                  usage: CAB
                  info: Describes the customer gender.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Customer person details that the BAP specifies in search and the BPP validates in response, identifying the individual for whom fulfillment service is being requested.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: The BAP specifies the customer who will ultimately receive the order in the search request, so the BPP can identify the intended delivery recipient.
              owner: BAP
              type: object
          agent:
            person:
              gender:
                _description:
                  required: false
                  usage: CAB
                  info: Describes the agent gender.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: The person object specifies fulfillment agent details in the BAP's search request.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Container representing the agent that handles fulfillment; BAP specifies the agent in the search request, and BPP validates in response.
              owner: BAP
              type: object
          stops:
            type:
              _description:
                required: true
                usage: START
                info: Describes the type of the stops during the fulfillment of order
                owner: BAP
                type: enum
                enums:
                  - code: START
                    description: Describes the initial fulfillment location.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: END
                    description: Describes the final fulfillment location.
                    reference: <PR/Issue/Discussion Links md format text
            location:
              gps:
                _description:
                  required: true
                  usage: 12.923608, 77.614629
                  info: Describes the GPS co-ordinates of this location.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Geographic location for the fulfillment stop that the BAP specifies during search to indicate where pickup or delivery occurs; validated and persisted in the session for reuse across all transaction steps.
                owner: BAP
                type: object
              address:
                _description:
                  required: false
                  usage: Banaswadi
                  info: Describes the address of this location.
                  owner: BAP
                  type: string
            _description:
              required: true
              usage: ""
              info: The BAP specifies stops in the search request to communicate waypoints for the intended fulfillment journey. This list is anchored in the session and reused across all subsequent steps of the order lifecycle.
              owner: BAP
              type: object
          vehicle:
            category:
              _description:
                required: false
                usage: CAB
                info: Describes the vehicle category.
                owner: BAP
                type: enum
                enums:
                  - code: AUTO_RICKSHAW
                    description: Describes the vehicle category as Auto Rickshaw
                    reference: <PR/Issue/Discussion Links md format text
                  - code: CAB
                    description: Describes the vehicle category as cab
                    reference: <PR/Issue/Discussion Links md format text
                  - code: TWO_WHEELER
                    description: Describes the vehicle category as TWO_WHEELER
                    reference: <PR/Issue/Discussion Links md format text
            variant:
              _description:
                required: false
                usage: SEDAN
                info: Describes the vehicle variant.
                owner: BAP
                type: enum
                enums:
                  - code: SEDAN
                    description: Describes the vehicle variant for category type CAB
                    reference: <PR/Issue/Discussion Links md format text
                  - code: SUV
                    description: Describes the vehicle variant for category type CAB
                    reference: <PR/Issue/Discussion Links md format text
                  - code: HATCHBACK
                    description: Describes the vehicle variant for category type CAB
                    reference: <PR/Issue/Discussion Links md format text
                  - code: TWO_WHEELER
                    description: Describes the vehicle variant for category TWO_WHEELER
                    reference: <PR/Issue/Discussion Links md format text
                  - code: AUTO_RICKSHAW
                    description: Describes the vehicle variant for category AUTO_RICKSHAW
                    reference: <PR/Issue/Discussion Links md format text
            energy_types:
              _description:
                required: false
                usage: EV
                info: Describes fuel type of the vehicle.
                owner: BAP
                type: string
            _description:
              required: false
              usage: --
              info: Describes a vehicle is a device that is designed or used to transport people or cargo over land, water, air, or through space.<br>This has properties like category, capacity, make, model, size,variant,color,energy_type,registration
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: The BAP specifies the customer's fulfillment preferences in search; the BPP confirms them in on_search.
            owner: BAP
            type: object
        payment:
          collected_by:
            _description:
              required: true
              usage: BPP
              info: This field indicates the payment collector. If set to 'bap,' BAP collects first and settles with BPP. If BPP agrees, no payment link is sent. If set to 'bpp,' BPP collects payment directly.
              owner: BAP
              type: enum
              enums:
                - code: BPP
                  description: Describes when the seller app is collecting the payment.
                  reference: <PR/Issue/Discussion Links md format text
                - code: BAP
                  description: Describes when the buyer app is collecting the payment.
                  reference: <PR/Issue/Discussion Links md format text
          _description:
            required: true
            usage: ""
            info: In search, the BAP specifies how the customer intends to pay and settle the order.
            owner: BAP
            type: object
          tags:
            BUYER_FINDER_FEES:
              _description:
                required: true
                usage: --
                info: Describes Buyer finder fee
                owner: BAP
                type: object
            SETTLEMENT_TERMS:
              _description:
                required: true
                usage: --
                info: Describes settlement terms
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: Array of payment tags through which the BAP specifies payment conditions and settlement terms in the search intent.
              owner: BAP
              type: object
            descriptor:
              code:
                _description:
                  required: true
                  usage: BUYER_FINDER_FEES
                  info: BAP specifies a payment descriptor code in the search request; BPP validates it in the on_search response.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Descriptor metadata for payment tags. BAP specifies it in search; BPP validates it in on_search.
                owner: BAP
                type: object
            display:
              _description:
                required: true
                usage: "false"
                info: Indicates whether this payment tag should be displayed in the BAP user interface when presenting payment options to users.
                owner: BAP
                type: boolean
            list:
              descriptor:
                code:
                  _description:
                    required: true
                    usage: BUYER_FINDER_FEES_PERCENTAGE
                    info: The BAP specifies a code to identify the payment term type in its search request; this code is validated during processing.
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Identifies the classification of the payment tag through a standardized code, enabling the buyer to specify types of payment-related charges or fees in the search intent.
                  owner: BAP
                  type: object
              value:
                _description:
                  required: true
                  usage: "1"
                  info: The specific value of a payment-related tag in search intent, commonly a percentage amount for buyer fees (e.g., 1, 5) or a URL reference to payment terms documentation.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Array of payment term tags that specifies fees, charges, and settlement conditions the BAP seeks or requires during search. Each tag identifies a payment term category (such as buyer finder fees or settlement terms) along with its configuration parameters.
                owner: BAP
                type: object
        _description:
          required: true
          usage: ""
          info: The BAP declares the consumer's intent to buy or avail a service—specifying what they want, who they want it from, where and when they want it, and how they will pay—enabling the BPP to discover and offer matching options.
          owner: BAP
          type: object
      _description:
        required: true
        usage: ""
        info: Message the BAP sends containing search intent and session context; the BPP reflects it in on_search to confirm the search transaction is initiated.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: This location's country, specified by the BAP in search to scope results to the desired geographic jurisdiction.
            owner: BPP
            type: object
        city:
          code:
            _description:
              required: true
              usage: std:080
              info: Describes the city code this location is, or is located within
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Bangalore
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: Identifies the city where the transaction location is situated. The BAP specifies this in the search request to define the geographic scope of the transaction.
            owner: BPP
            type: object
        _description:
          required: true
          usage: ""
          info: The location where the transaction is intended to be fulfilled; the BAP specifies this in search and the BPP validates it in on_search.
          owner: BPP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:TRV10
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:TRV10
              description: mobility domain Ride
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: on_search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: enum
          enums:
            - code: on_search
              description: Seller app provides catalog based on search intent.
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP

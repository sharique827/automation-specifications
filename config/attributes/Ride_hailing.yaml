        owner: BPP
        type: object
    message:
      catalog:
        descriptor:
          name:
            _description:
              required: true
              usage: Mobility Servies BPP
              info: Describes the catalog name.
              owner: BPP
              type: string
          _description:
            required: true
            usage: ""
            info: The BPP includes the catalog descriptor in the on_search response to convey metadata about the catalog.
            owner: BPP
            type: object
        providers:
          id:
            _description:
              required: true
              usage: 450dec0f
              info: Describes the unique Id of the provider.
              owner: BPP
              type: string
          locations:
            id:
              _description:
                required: false
                usage: d3ebf05b
                info: Indicates provider locations where this item is available.
                owner: BPP
                type: string
            gps:
              _description:
                required: false
                usage: 28.707358, 77.180910
                info: Describes the GPS co-ordinates of this location.
                owner: BPP
                type: string
            _description:
              required: true
              usage: ""
              info: Provider service locations; the BPP generates nearby locations based on the ride start point when available and maintains them in session for driver assignment and routing.
              owner: BPP
              type: object
          fulfillments:
            customer:
              person:
                gender:
                  _description:
                    required: false
                    usage: CAB
                    info: Describes the customer gender.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            agent:
              person:
                gender:
                  _description:
                    required: false
                    usage: CAB
                    info: Describes the agent gender.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: ""
                  owner: BPP
                  type: object
              _description:
                required: false
                usage: ""
                info: The BPP returns fulfillment agent data in the catalog response; this persists in the session and is reused across subsequent workflow steps.
                owner: BPP
                type: object
            id:
              _description:
                required: true
                usage: b68bb35b
                info: Describes the unique reference ID to the fulfillment of an order
                owner: BPP
                type: string
            type:
              _description:
                required: true
                usage: DELIVERY
                info: "A code that describes the mode of fulfillment. This is typically set when there are multiple ways an order can be fulfilled. "
                owner: BPP
                type: enum
                enums:
                  - code: DELIVERY
                    description: Describes the type of fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: SELF_PICKUP
                    description: Describes the type of fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
            stops:
              type:
                _description:
                  required: true
                  usage: START
                  info: Describes the type of the stops during the fulfillment of order
                  owner: BAP
                  type: enum
                  enums:
                    - code: START
                      description: Describes the initial fulfillment location.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: END
                      description: Describes the final fulfillment location.
                      reference: <PR/Issue/Discussion Links md format text
              location:
                gps:
                  _description:
                    required: true
                    usage: 28.707358, 77.180910
                    info: Describes the GPS co-ordinates of this location.
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: The BPP specifies each fulfillment stop's location in on_search; this location data persists as part of the fulfillment structure and is reused across subsequent transaction steps.
                  owner: BPP
                  type: object
                address:
                  _description:
                    required: false
                    usage: Banaswadi
                    info: Describes the address of this location.
                    owner: BAP
                    type: string
              _description:
                required: true
                usage: ""
                info: The BPP specifies an ordered list of stops for each fulfillment leg in the on_search response; this list is persisted as part of the fulfillments structure and reused across subsequent order steps.
                owner: BPP
                type: object
              instructions:
                long_desc:
                  _description:
                    required: true
                    usage: long description of the location
                    info: Detailed textual instruction for the driver at this fulfillment stop. The BPP returns this in the on_search catalog; it travels with the fulfillment structure through the session for reuse in subsequent steps.
                    owner: BPP
                    type: string
                short_desc:
                  _description:
                    required: true
                    usage: short description of the location
                    info: BPP provides this short description of each fulfillment stop location in on_search. The fulfillments data is anchored in session and reused by later steps.
                    owner: BPP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Instructions for navigating or handling a fulfillment stop, provided by the BPP in both long and short descriptive formats to guide the BAP during order execution.
                  owner: BPP
                  type: object
            vehicle:
              category:
                _description:
                  required: true
                  usage: CAB
                  info: Describes the vehicle category.
                  owner: BAP
                  type: enum
                  enums:
                    - code: AUTO_RICKSHAW
                      description: Describes the vehicle category as Auto Rickshaw
                      reference: <PR/Issue/Discussion Links md format text
                    - code: CAB
                      description: Describes the vehicle category as cab
                      reference: <PR/Issue/Discussion Links md format text
                    - code: TWO_WHEELER
                      description: Describes the vehicle category as TWO_WHEELER
                      reference: <PR/Issue/Discussion Links md format text
              variant:
                _description:
                  required: false
                  usage: SEDAN
                  info: Describes the vehicle variant.
                  owner: BAP
                  type: enum
                  enums:
                    - code: SEDAN
                      description: Describes the vehicle variant for category type CAB
                      reference: <PR/Issue/Discussion Links md format text
                    - code: SUV
                      description: Describes the vehicle variant for category type CAB
                      reference: <PR/Issue/Discussion Links md format text
                    - code: HATCHBACK
                      description: Describes the vehicle variant for category type CAB
                      reference: <PR/Issue/Discussion Links md format text
                    - code: TWO_WHEELER
                      description: Describes the vehicle variant for category TWO_WHEELER
                      reference: <PR/Issue/Discussion Links md format text
                    - code: AUTO_RICKSHAW
                      description: Describes the vehicle variant for category AUTO_RICKSHAW
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: true
                usage: ""
                info: Specifies the vehicle the BPP offers for each fulfillment option in on_search; these specifications persist across the transaction to inform the BAP's fulfillment selection and execution.
                owner: BPP
                type: object
              energy_type:
                _description:
                  required: true
                  usage: CNG
                  info: BPP declares the vehicle energy type for each fulfillment leg in the search response. The value is anchored in the persisted fulfillments record and asserted in downstream steps.
                  owner: BPP
                  type: string
            _description:
              required: true
              usage: ""
              info: The BPP returns fulfillment modes for each provider in the search response, describing available delivery, pickup, and service arrangements. The BAP persists these options for use during item selection and order confirmation.
              owner: BPP
              type: object
          items:
            id:
              _description:
                required: true
                usage: ecf4d145
                info: Describes the unique Id of the item.
                owner: BPP
                type: string
            descriptor:
              code:
                _description:
                  required: true
                  usage: CAB Economy Ride
                  info: Describes the unique code value of the item
                  owner: BPP
                  type: enum
                  enums:
                    - code: RIDE
                      description: Describes the type of ride.
                      reference: <PR/Issue/Discussion Links md format text
              name:
                _description:
                  required: true
                  usage: RIDE
                  info: Describes the name value of the item
                  owner: BPP
                  type: string
              _description:
                required: true
                usage: ""
                info: Holds descriptive information about the catalog item; the BPP includes this in on_search for each item.
                owner: BPP
                type: object
            price:
              currency:
                _description:
                  required: true
                  usage: INR
                  info: Describes the currency type of a product or service
                  owner: BPP
                  type: string
              value:
                _description:
                  required: true
                  usage: "206"
                  info: Per-item price from the BPP's on_search catalog response, which the BAP carries forward across subsequent transaction steps.
                  owner: BPP
                  type: string
              maximum_value:
                _description:
                  required: true
                  usage: "236"
                  info: Maximum price boundary per item. The BPP provides this in on_search; the value persists with the catalog and is reused across later steps.
                  owner: BPP
                  type: string
              minimum_value:
                _description:
                  required: true
                  usage: "206"
                  info: The BPP returns the minimum price value for each item as a decimal string in the on_search response. This value is anchored in the session and reused by later steps.
                  owner: BPP
                  type: string
              _description:
                required: true
                usage: ""
                info: The price structure for each item in the BPP's catalog search response provides the pricing details that persist through subsequent transaction steps.
                owner: BPP
                type: object
            location_ids:
              _description:
                required: false
                usage: d3ebf05b
                info: Indicates the locations where this item is available from providers.
                owner: BPP
                type: string
            fulfillment_ids:
              _description:
                required: true
                usage: b68bb35b
                info: Describes the Unique reference ID for order fulfillment.
                owner: BPP
                type: string
            _description:
              required: true
              usage: ""
              info: The BPP returns an array of product or service offerings available from this provider in the search response; these items are anchored in the session and reused by later steps.
              owner: BPP
              type: object
          payments:
            collected_by:
              _description:
                required: true
                usage: BPP
                info: "This field indicates who is the collector of payment. "
                owner: BAP
                type: enum
                enums:
                  - code: BPP
                    description: Describes when the seller app is collecting the payment.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: BAP
                    description: Describes when the buyer app is collecting the payment.
                    reference: <PR/Issue/Discussion Links md format text

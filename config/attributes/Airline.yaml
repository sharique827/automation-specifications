meta:
  use_case_id: Airline
attribute_set:
  search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The country object identifies which country's jurisdiction applies to the location in the BAP's search request.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: std:080
              info: Describes the city code this location is, or is located within
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Bangalore
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The city where the BAP intends to complete the transaction, enabling the BPP to scope results to that location.
            owner: BAP
            type: object
        _description:
          required: false
          usage: ""
          info: In the search request, the BAP specifies the location where the transaction is intended to be fulfilled.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:TRV10
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:TRV10
              description: mobility domain Ride
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:TRV11
              description: mobility domain Public Transit
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:TRV12
              description: mobility domain airline
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16.000Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: enum
          enums:
            - code: search
              description: Buyer app indicates the search intent
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      _description:
        required: false
        usage: ""
        info: The BAP establishes the transaction context in search, providing a high-level overview combining demographic, addressing, interoperability, and transaction-level information for the BPP.
        owner: BAP
        type: object
    message:
      intent:
        fulfillment:
          stops:
            type:
              _description:
                required: true
                usage: START
                info: A logical point in space and time during the fulfillment of an order.
                owner: BAP
                type: string
            location:
              descriptor:
                code:
                  _description:
                    required: true
                    usage: DEL
                    info: Physical description of code.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Container for descriptive information about each stop's location within the fulfillment, provided by the BAP during search and persisted through subsequent transaction steps.
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: ""
                info: Location information for each fulfillment stop that the BAP includes in search to identify waypoints along the service journey.
                owner: BAP
                type: object
            time:
              label:
                _description:
                  required: false
                  usage: Date Of Journey
                  info: Label for denoting stop time or date
                  owner: BAP
                  type: string
              timestamp:
                _description:
                  required: false
                  usage: 2023-10-15T00:32:19.000Z
                  info: Timestamp for denoting time at stop
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Holds departure times for each fulfillment leg's origin point, set by the BAP in search and persisted across transaction steps for downstream fulfillment planning.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Ordered list of logical stops the BAP specifies on search to define the fulfillment route. This value persists throughout the transaction and is referenced in subsequent steps.
              owner: BAP
              type: object
          vehicle:
            category:
              _description:
                required: true
                usage: AIRLINE
                info: Describes category of a vehicle
                owner: BAP
                type: enum
                enums:
                  - code: METRO
                    description: Describes the vehicle category as Metro
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: AUTO_RICKSHAW
                    description: Describes the vehicle category as Auto Rickshaw
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: CAB
                    description: Describes the vehicle category as Cab
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: BUS
                    description: Describes the vehicle category as Bus
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: AIRLINE
                    description: Describes the vehicle category as Airline
                    reference: <PR/Issue/Discussion Links md format text>
            _description:
              required: false
              usage: ""
              info: Vehicle specification the BAP defines in the fulfillment requirement during search to indicate transport device characteristics (category, capacity, make, model, size, variant, color, energy type, registration) expected for fulfillment. This specification anchors in the session and is consumed across subsequent transaction steps.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: The BAP specifies fulfillment preferences in the search request to indicate how the customer wants their order fulfilled. This object is anchored in the session and reused across subsequent transaction steps.
            owner: BAP
            type: object
        provider:
          items:
            descriptor:
              name:
                _description:
                  required: true
                  usage: Adult
                  info: Describes the name of an item
                  owner: BAP
                  type: string
              code:
                _description:
                  required: true
                  usage: ADULT_TICKET
                  info: Describes the code of an item
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Container for item characteristics specified by the BAP in search to indicate what the buyer is seeking; persists via the search_1_items session key and is reused across subsequent transaction steps.
                owner: BAP
                type: object
            quantity:
              selected:
                count:
                  _description:
                    required: false
                    usage: "3"
                    info: The BAP specifies the quantity count for this item in the search intent. The value is anchored in the session and reused by later steps.
                    owner: BAP
                    type: number
                _description:
                  required: false
                  usage: ""
                  info: Container for the quantity details the BAP specifies for each item in the search intent; values are persisted in the session and reused across the transaction.
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: ""
                info: Container for quantity information the BAP includes in the search request; anchored in the session and reused across subsequent steps.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Items the BAP specifies in the search request; anchored in session and reused in subsequent steps.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: The BAP specifies which provider to search from, enabling discovery of services from a specific merchant or operator.
            owner: BAP
            type: object
        category:
          descriptor:
            code:
              _description:
                required: true
                usage: ECONOMY
                info: Describes the category code
                owner: BAP
                type: enum
                enums:
                  - code: ECONOMY
                    description: Represents type of seat category
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: PREMIUM_ECONOMY
                    description: Represents type of seat category
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: BUSINESS
                    description: Represents type of seat category
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: FIRST_CLASS
                    description: Represents type of seat category
                    reference: <PR/Issue/Discussion Links md format text>
            _description:
              required: true
              usage: BAP
              info: Describes the category code
              owner: BAP
              type: string
          _description:
            required: true
            usage: BAP
            info: Describes the category
            owner: BAP
            type: string
        _description:
          required: false
          usage: ""
          info: The BAP declares the consumer's intent to purchase or avail a service, specifying what they seek, their preferred provider, location and timing for fulfillment, and payment preference, so the BPP can identify matching offerings.
          owner: BAP
          type: object
        payment:
          tags:
            BUYER_FINDER_FEES:
              _description:
                required: true
                usage: --
                info: Describes Buyer finder fee
                owner: BAP
                type: object
            SETTLEMENT_TERMS:
              _description:
                required: true
                usage: --
                info: Describes settlement terms
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Array of payment configuration tags specifying fees, settlement terms, and payment conditions the buyer applies in the search intent.
              owner: BAP
              type: object
            descriptor:
              code:
                _description:
                  required: false
                  usage: BUYER_FINDER_FEES
                  info: The BAP mints the payment descriptor code in search to indicate which payment term applies. The BPP validates it in on_search, and the code persists in the session for reuse across subsequent steps.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Identifies the category of payment metadata through a coded descriptor, allowing the BAP to specify and categorize payment conditions such as fees, settlement terms, and interest rates.
                owner: BAP
                type: object
            display:
              _description:
                required: false
                usage: "false"
                info: Indicates whether the payment tag should be displayed in the user interface during search. When false, the tag is hidden from the customer's view.
                owner: BAP
                type: boolean
            list:
              descriptor:
                code:
                  _description:
                    required: false
                    usage: BUYER_FINDER_FEES_PERCENTAGE
                    info: Identifies the type of payment condition or fee being searched for. The BAP includes these codes in search; the BPP echoes them back in on_search to confirm applicability, and the codes persist as session context across downstream order steps.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Container for a payment tag's metadata within the BAP's search intent; this payment specification is persisted across transaction steps and is not validated by the BPP in on_search.
                  owner: BAP
                  type: object
              value:
                _description:
                  required: false
                  usage: "1"
                  info: BAP declares this tag value in search to express payment intent; the payment object is retained and propagated through subsequent steps to maintain consistency.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Payment tags that the BAP specifies in search and which persist across the transaction session for reference in subsequent steps.
                owner: BAP
                type: object
          _description:
            required: false
            usage: ""
            info: BAP specifies payment details in search to communicate how the customer wants to pay for the order; this value is anchored in session and consumed by subsequent steps.
            owner: BAP
            type: object
      _description:
        required: false
        usage: ""
        info: The message container in which the BAP places the search request.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object

          owner: BPP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://bpp.example.com
          info: The BAP carries the BPP’s subscriber/callback URL here so subsequent calls can be routed to the BPP’s endpoint. In these finance flows it is stored as `bppUri` from the earlier session context and reused as the flow progresses.

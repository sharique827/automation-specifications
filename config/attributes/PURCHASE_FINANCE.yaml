      transaction_id:
        _description:
          required: true
          usage: 9b460ea2-ee6c-43ad-94eb-b97b27322efd
          info: Stable session identifier for one ONDC transaction, carried unchanged across calls from search through confirm so participants can correlate the ongoing user session. In update, the BAP must reuse the same transaction_id rather than mint a new one, because BPPs can use it to continue the transaction and keep any session-linked offers or recommendations aligned.

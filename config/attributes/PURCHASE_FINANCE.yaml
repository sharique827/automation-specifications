          type: string
      message_id:
        _description:
          required: true
          usage: a3f4c582-5274-4b53-a4e0-9bccd8263371
          info: Unique identifier for a single request/callback cycle, used to correlate an asynchronous BPP callback back to the earlier BAP call and to discard duplicate messages. In update, the BAP places a fresh `message_id` on each new interaction; BPPs use a new one for unsolicited callbacks.

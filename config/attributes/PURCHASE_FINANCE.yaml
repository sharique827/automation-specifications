          type: object
      _description:
        required: true
        usage: ""
        info: BAP sets this transaction context in search to give the receiver the protocol, routing, and session metadata needed to interpret the request and correlate it with the user journey; the same context is echoed back in on_search, and it must accompany every BAP-BPP interaction.

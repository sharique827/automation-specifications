          owner: BPP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Validity window for the message, expressed as an ISO 8601 duration after the timestamp. In update, the BAP sets this to indicate how long the message should remain usable by the BPP before it is treated as stale.

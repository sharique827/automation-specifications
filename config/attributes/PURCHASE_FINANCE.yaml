meta:
  use_case_id: PURCHASE FINANCE
attribute_set:
  search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: Carries the country for the location the search is anchored to, so the BAP tells the BPP which geography the transaction is being initiated in.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: std:080
              info: Describes the city code this location is, or is located within
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Bangalore
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The BAP uses this to identify the city associated with the location in the search request, so the BPP can interpret the search in the correct geographic area.
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The BAP includes the intended fulfillment location in search so providers can evaluate the request against where the transaction is meant to be fulfilled.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:TRV11
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:TRV11
              description: mobility domain Public Transit
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: enum
          enums:
            - code: search
              description: Buyer app indicates the search intent
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: BAP sets this transaction context in search to give the receiver the protocol, routing, and session metadata needed to interpret the request and correlate it with the user journey; the same context is echoed back in on_search, and it must accompany every BAP-BPP interaction.
        owner: BAP
        type: object
      bpp_id:
        _description:
          required: true
          usage: bpp.example.com
          info: Subscriber ID that identifies the BPP. In search, the BAP strips this context field from the outbound request, so the search call is sent without BPP identity details.
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://bpp.example.com
          info: Subscriber URL for the BPP endpoint that the BAP can call. In search, this is stripped from the outgoing request because discovery does not need a BPP-specific address; the flow saves the discovered URI as `bppUri` for use in later steps.
          owner: BAP
          type: string
    message:
      intent:
        fulfillment:
          stops:
            type:
              _description:
                required: false
                usage: START
                info: A logical point in space and time during the fulfillment of an order.
                owner: BAP
                type: enum
                enums:
                  - code: START
                    description: Describes the initial fulfillment location.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: END
                    description: Describes the final fulfillment location.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: INTERMEDIATE_STOP
                    description: Describes the intermediate stops during fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: TRANSIT_STOP
                    description: Describes the transit stops during fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
            location:
              gps:
                _description:
                  required: false
                  usage: 12.923608, 77.614629
                  info: Describes a GPS coordinate
                  owner: BAP
                  type: string
              descriptor:
                code:
                  _description:
                    required: false
                    usage: SHAHEED_STHAL
                    info: Describes the code for a particular location.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: Describe the descriptor of the location
                  owner: BAP/BPP
                  type: object
              _description:
                required: false
                usage: --
                info: Describe the location of the stop
                owner: BAP/BPP
                type: object
            _description:
              required: false
              usage: --
              info: The list of logical stops encountered during the fulfillment of an order.
              owner: BAP/BPP
              type: object
          vehicle:
            category:
              _description:
                required: true
                usage: METRO
                info: Describes category of a vehicle
                owner: BAP
                type: enum
                enums:
                  - code: BUS
                    description: Describes the vehicle category as Bus
                    reference: <PR/Issue/Discussion Links md format text
                  - code: METRO
                    description: Describes the vehicle category as Metro
                    reference: <PR/Issue/Discussion Links md format text
            _description:
              required: true
              usage: --
              info: Describes a vehicle is a device that is designed or used to transport people or cargo over land, water, air, or through space.<br>This has properties like category, capacity, make, model, size,variant,color,energy_type,registration
              owner: BAP
              type: object
          _description:
            required: true
            usage: --
            info: Describes how a an order will be rendered/fulfilled to the end-customer
            owner: BAP/BPP
            type: object
        payment:
          collected_by:
            _description:
              required: false
              usage: BPP
              info: This field indicates the payment collector. If set to 'bap,' BAP collects first and settles with BPP. If BPP agrees, no payment link is sent. If set to 'bpp,' BPP collects payment directly.
              owner: BAP
              type: string
          _description:
            required: true
            usage: ""
            info: Payment details describing how the customer wants to settle the order; the BAP includes this in search so the BPP can interpret the requested payment terms for the financing flow.
            owner: BAP
            type: object
          tags:
            descriptor:
              code:
                _description:
                  required: true
                  usage: BAP_TERMS
                  info: Identifier for the payment tag’s descriptor, used to label the payment-terms context in the search request. The BAP sets it to BAP_TERMS so the finance flow can recognize the terms-related payment tag, and the same code is asserted again during validation rather than treated as free text.
                  owner: BAP
                  type: string
              name:
                _description:
                  required: true
                  usage: BAP Terms of Engagement
                  info: Human-readable name of the payment tag descriptor the BAP includes in search to label the payment terms it is sending, so the BPP can recognize that block consistently. In this flow it is populated by the BAP as part of request generation and is typically used as a stable terms-of-engagement label rather than a data-bearing value.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Descriptor container used to label the payment tag that the BAP places in search, and the same descriptor is validated in the on_search round-trip.
                owner: BAP
                type: object
            display:
              _description:
                required: true
                usage: "false"
                info: Boolean flag in payment tags that the BAP sets in search to indicate whether the payment details should be displayed for the financing journey. In the observed purchase-finance flows it is carried as a search-time switch, so the key constraint is that it must be a boolean signal rather than a free-form value.
                owner: BAP
                type: boolean
            list:
              descriptor:
                code:
                  _description:
                    required: true
                    usage: BUYER_FINDER_FEES_TYPE
                    info: Code that names the meaning of this payment tag in the request, so the BAP can mark which fee, interest, or contract-related payment condition it is expressing. In this flow the BAP sets it during search and the same code is checked again in validation, so the tag meaning must stay consistent across the round trip.
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Labels the payment tag in the search request so the BPP can interpret what the BAP is asking for; the BAP sets it in search and the same descriptor is asserted again during validation.
                  owner: BAP
                  type: object
              value:
                _description:
                  required: true
                  usage: percent-annualized
                  info: String payload attached to a payment tag entry in the intent, used by the BAP in search to express the specific payment parameter the BPP should interpret for the finance offer. Because this value is set in generate and asserted again in validate, it has to remain stable across the round trip.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Container for the payment tags the BAP generates in the search request to carry payment-related intent for the finance flow.
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: Container for the payment tags the BAP sends in search to express the payment context of the request; the flow validates that this tags array is present and non-empty.
              owner: BAP
              type: object
        _description:
          required: true
          usage: ""
          info: The BAP uses this object to express the consumer’s buying or service intent in search so the BPP can match relevant offerings against that purpose. In the purchase-finance flow, validation specifically checks that intent.category.descriptor.code is PURCHASE_FINANCE, so the category value acts as the gate for this search round-trip.
          owner: BAP
          type: object
        category:
          descriptor:
            code:
              _description:
                required: true
                usage: PURCHASE_FINANCE
                info: Classifies the search as a purchase-finance intent, so the BAP uses it to tell the network this request is for financing rather than a general catalog search. In this flow the value must be exactly PURCHASE_FINANCE, because the same code is generated upstream and then validated in search; any other category code is rejected.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: BAP sends the physical description of the thing being searched for, giving the BPP a human-readable descriptor to match against available offerings.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: Container for the item category details in the search request, used by the BAP to state the category being queried and kept consistent when the request is validated.
            owner: BAP
            type: object
        provider:
          id:
            _description:
              required: true
              usage: P1
              info: Identifier of the provider the BAP wants to search against. The BAP sets this in search, and that same provider_id is persisted in session and reused later, including the validate round-trip, to keep the flow anchored to the selected provider.
              owner: BAP
              type: string
          items:
            id:
              _description:
                required: true
                usage: ITEM_ID_ELECTRONICS
                info: Identifier of the provider item being requested in search, used to pin the query to a specific item under the chosen provider. The BAP copies it from the selected provider in session state and persists it as `item_id` so later steps can validate and reuse the same item choice.
                owner: BAP
                type: string
            xinput:
              form:
                id:
                  _description:
                    required: true
                    usage: personal_details_information_form
                    info: Identifier for the XInput form attached to the selected provider item; in search, the BAP sets it to tell the BPP which form it is requesting the buyer to complete, typically choosing the form name from session data or current user input.
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: Container for the xinput form the BAP sends in search; the BPP validates the same structure in on_search and echoes it back consistently in the round-trip.
                  owner: BAP
                  type: object
              form_response:
                status:
                  _description:
                    required: true
                    usage: SUCCESS
                    info: Outcome of the xinput form submission that the BAP places into the search payload for the provider item, typically indicating a successful form completion. In the purchase-finance flows it is written either from fresh user input or from the existing selected-provider session payload, and the same value is then carried forward and asserted unchanged in later validation.
                    owner: BAP
                    type: string
                submission_id:
                  _description:
                    required: true
                    usage: F02_SUBMISSION_ID
                    info: BAP places the submission identifier for the xinput form response here so the provider can correlate the search with the specific form submission created during the redirection flow. It is written only after the form response is successfully captured, and the same value is later asserted in validation, so it must stay stable across that round-trip.
                    owner: BAP
                    type: string
                _description:
                  required: true
                  usage: ""
                  info: The BAP places the submitted xinput form response here in search so the same structure can be carried forward for validation, with only the status and submission_id updated while the existing payload is preserved.
                  owner: BAP
                  type: object
              _description:
                required: true
                usage: ""
                info: Carries provider-specific input attached to the requested item in search; the BAP sets it during generation and the same structure is validated later in the flow, so it must stay consistent across the round trip.
                owner: BAP
                type: object
            _description:
              required: true
              usage: ""
              info: Carries the provider items the BAP is searching against in the financing intent, and the same list is later checked in validation so the request stays aligned across the flow.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: The BAP places the chosen provider object here in search to indicate which seller the customer wants to place the order with; it is populated from user input when present. That same provider selection is then carried forward and checked later in the flow, so the search request anchors the buyer’s chosen provider for the rest of the transaction.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: Top-level transaction message envelope for the search request that the BAP sends; it must be present so the request can be validated as a complete payload.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: Carries the country for the location the search is anchored to, so the BAP tells the BPP which geography the transaction is being initiated in.
            owner: BPP
            type: object
        city:
          code:
            _description:
              required: true
              usage: std:080
              info: Describes the city code this location is, or is located within
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Bangalore
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The BAP uses this to identify the city associated with the location in the search request, so the BPP can interpret the search in the correct geographic area.
            owner: BPP
            type: object
        _description:
          required: true
          usage: ""
          info: The BAP includes the intended fulfillment location in search so providers can evaluate the request against where the transaction is meant to be fulfilled.
          owner: BPP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:TRV11
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:TRV11
              description: mobility domain Public Transit
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: on_search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: enum
          enums:
            - code: on_search
              description: Seller app provides catalog based on search intent.
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: true
          usage: api.example-bpp.com
          info: Describes subscriber ID of the BPP
          owner: BPP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://api.example-bpp.com/dobpp/7f7896dd-787e-4a0b-8675-e9e6fe93bb8f
          info: Describes subscriber URL of the BPP for accepting calls from BAPs.
          owner: BPP
          type: string
      _description:
        required: true
        usage: ""
        info: BAP sets this transaction context in search to give the receiver the protocol, routing, and session metadata needed to interpret the request and correlate it with the user journey; the same context is echoed back in on_search, and it must accompany every BAP-BPP interaction.
        owner: BPP
        type: object
    message:
      catalog:
        descriptor:
          name:
            _description:
              required: true
              usage: Transit Solutions
              info: Describes the catalog's name.
              owner: BPP
              type: string
          images:
            url:
              _description:
                required: false
                usage: https://transitsolutions.in/logos/logo.ico
                info: URL to the image. This can be a data url or an remote url
                owner: BPP
                type: string
            _description:
              required: false
              usage: --
              info: Describes the images's description.
              owner: BPP
              type: object
          _description:
            required: true
            usage: ""
            info: Carries the physical description that the BPP publishes in on_search so the BAP can identify and render the catalog entry in search results.
            owner: BPP
            type: object
        providers:
          id:
            _description:
              required: true
              usage: db1928f9
              info: Id of the provider
              owner: BPP
              type: string
          categories:
            id:
              _description:
                required: true
                usage: C1
                info: Unique Id for the categories
                owner: BPP
                type: string
            descriptor:
              name:
                _description:
                  required: false
                  usage: Ticket
                  info: Describes the category name.
                  owner: BPP
                  type: string
              code:
                _description:
                  required: true
                  usage: TICKET
                  info: Describes the category code.
                  owner: BPP
                  type: enum
                  enums:
                    - code: TICKET
                      description: Represents type of category
                      reference: <PR/Issue/Discussion Links md format text
                    - code: PASS
                      description: Represents type of category
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: true
                usage: ""
                info: BPP returns the provider’s categories description in the search catalog response, filling it from `sessionData.categories` so the same categories captured earlier are echoed under the provider entry.
                owner: BPP
                type: object
            _description:
              required: true
              usage: ""
              info: BPP returns the provider’s category list in on_search so the BAP can render the offerings under that provider, and in these purchase-finance flows the same categories may be carried forward in session and reused to rebuild later on_search responses for the selected provider.
              owner: BPP
              type: object
            parent_category_id:
              _description:
                required: true
                usage: "101123"
                info: Identifier of the immediate parent category in the provider’s category tree. In on_search, the BPP returns it so the BAP can place each category under the correct parent while building the catalog hierarchy.
                owner: BPP
                type: string
          time:
            range:
              start:
                _description:
                  required: true
                  usage: 2023-09-14T05:30:00.000Z
                  info: Describes the start time period for individual category.
                  owner: BPP
                  type: string
              end:
                _description:
                  required: true
                  usage: 2023-09-14T23:30:00.000Z
                  info: Describes the end time period for individual category.
                  owner: BPP
                  type: string
              _description:
                required: true
                usage: --
                info: Describes time in its various forms. It can be a single point in time; duration; or a structured timetable of operations<br>This has properties like label, time stamp,duration,range, days, schedule
                owner: BPP
                type: object
            _description:
              required: true
              usage: --
              info: Describes time in its various forms. It can be a single point in time; duration; or a structured timetable of operations<br>This has properties like label, time stamp,duration,range, days, schedule
              owner: BPP
              type: object
          descriptor:
            name:
              _description:
                required: true
                usage: Delhi Metro Rail Limited
                info: Describes the provider's name.
                owner: BPP
                type: string
            images:
              url:
                _description:
                  required: false
                  usage: https://delhimetrorail.com/logos/logo.ico
                  info: URL to the image. This can be a data url or an remote url
                  owner: BPP
                  type: string
              _description:
                required: true
                usage: ""
                info: In on_search, the BPP includes the provider’s image details as part of the catalog entry it returns so the BAP can render that provider’s listing. That provider object is anchored as selected_provider and reused in later steps.
                owner: BPP
                type: object
              size_type:
                _description:
                  required: true
                  usage: sm
                  info: Size category for the provider image shown in the search catalog. In on_search, the BPP returns it as part of the selected provider record, and the BAP keeps that provider payload anchored in session as `selected_provider` for reuse in later steps.
                  owner: BPP
                  type: string
            _description:
              required: true
              usage: ""
              info: Provider metadata that describes each catalog provider returned in on_search, so the BAP can identify the provider entry to select; the chosen provider is persisted as selected_provider and reused in later steps, with the same value carried forward through validation.
              owner: BPP
              type: object
            short_desc:
              _description:
                required: true
                usage: ICICI Bank Ltd
                info: Short human-readable name of the provider shown in the search results so the BAP can identify and select the right lender. This value is persisted as `selected_provider` from the first returned provider and reused in later steps of the flow.
                owner: BPP
                type: string
            long_desc:
              _description:
                required: true
                usage: ICICI Bank Ltd, India.
                info: Human-readable long description of the provider included in the search catalog so the BAP can identify the lender or partner being offered. In on_search, the BPP returns it with the provider entry the BAP selects, and that selected provider is then persisted as `selected_provider` for reuse in later steps.
                owner: BPP
                type: string
          fulfillments:
            id:
              _description:
                required: true
                usage: 3bd4ea25
                info: Unique reference ID to the fulfillment of an order
                owner: BPP
                type: string
            type:
              _description:
                required: true
                usage: ROUTE
                info: A code that describes the mode of fulfillment. This is typically set when there are multiple ways an order can be fulfilled.
                owner: BPP
                type: enum
                enums:
                  - code: ROUTE
                    description: Describes the type of fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: TRIP
                    description: Describes the type of fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
            stops:
              id:
                _description:
                  required: true
                  usage: 2
                  info: Unique reference ID for individual stop
                  owner: BPP
                  type: string
              parent_stop_id:
                _description:
                  required: false
                  usage: 1
                  info: Unique ID for referencing parent stop
                  owner: BPP
                  type: string
              type:
                _description:
                  required: true
                  usage: INTERMEDIATE_STOP
                  info: The type of stop. Allowed values of this property can be defined by the network policy.
                  owner: BPP
                  type: enum
                  enums:
                    - code: START
                      description: Describes the initial fulfillment location.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: END
                      description: Describes the final fulfillment location.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: INTERMEDIATE_STOP
                      description: Describes the intermediate stops during fulfillment.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: TRANSIT_STOP
                      description: Describes the transit stops during fulfillment.
                      reference: <PR/Issue/Discussion Links md format text
              instructions:
                name:

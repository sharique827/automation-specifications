  on_select:
    - _NAME_: ON_SELECT_CONTEXT
      action:
        - on_select
      domain:
        - ONDC:TRV11
      version:
        - 2.1.0
      _RETURN_: *COMMON_CONTEXT

    - &COMMON_PROVIDER_DETAILS
      _NAME_: REQUIRED_PROVIDER_DETAILS
      _RETURN_: 
        - _NAME_: ON_SELECT_PROVIDER_ID
          attr:  $.message.order.provider.id
          _RETURN_: attr are present
        - _NAME_: ON_SELECT_PROVIDER_NAME
          attr:  $.message.order.provider.descriptor.name
          _RETURN_: attr are present
        - _NAME_: ON_SELECT_PROVIDER_IMAGES_URL
          attr:  $.message.order.provider.descriptor.images[*].url
          _RETURN_: attr are present
        # - _NAME_: ON_SELECT_PROVIDER_IMAGES_SIZE_TYPE
        #   attr:  $.message.order.provider.descriptor.images[*].size_type
        #   _RETURN_: attr are present

    - &COMMON_ITEM_DETAILS
      _NAME_: REQUIRED_ITEM_DETAILS
      _RETURN_: 
        - *REQUIRED_ORDER_ITEM_ID
        - &REQUIRED_ITEM_DESCRIPTOR_CODE
          _NAME_: REQUIRED_ITEM_DESCRIPTOR_CODE
          attr: $.message.order.items[*].descriptor.code
          _RETURN_: attr are present
        # - &REQUIRED_ITEM_FULFILLMENT_IDS
        #   _NAME_: ON_SELECT_ITEM_FULFILLMENT_IDS
        #   attr:  $.message.order.items[*].fulfillment_ids[*]
        #   _RETURN_: attr are present  
        - &REQUIRED_ITEM_PRICE_CURRENCY
          _NAME_: ON_SELECT_ITEM_PRICE_CURRENCY
          attr:  $.message.order.items[*].price.currency
          _RETURN_: attr are present
        - &REQUIRED_ITEM_PRICE_VALUE
          _NAME_: ON_SELECT_ITEM_PRICE_VALUE
          attr:  $.message.order.items[*].price.value
          _RETURN_: attr are present

        - _NAME_: FULFILLMENT_SPECIFIC_ITEMS
          usecasepath: $.message.order.items[*].descriptor.code
          enumList:
            - *PURCHASE
            - *AGENT_TICKETING
            - *RECHARGE
          _CONTINUE_: (usecasepath all in enumList)
          _RETURN_: 
            - &REQUIRED_ITEM_SELECTED_QUANTITY
              _NAME_: REQUIRED_ITEM_SELECTED_QUANTITY
              attr:  $.message.order.items[*].quantity.selected.count
              _RETURN_: attr are present
            - &REQUIRED_ITEM_TIME_LABEL
              _NAME_: REQUIRED_ITEM_TIME_LABEL
              attr:  $.message.order.items[*].time.label
              _RETURN_: attr are present 
            - &REQUIRED_ITEM_TIME_DURATION
              _NAME_: REQUIRED_ITEM_TIME_DURATION
              attr:  $.message.order.items[*].time.duration
              _RETURN_: attr are present
            - &REQUIRED_ITEM_TIME_TIMESTAMP
              _NAME_: REQUIRED_ITEM_TIME_TIMESTAMP
              attr:  $.message.order.items[*].time.timestamp
              _RETURN_: attr are present
            - &REQUIRED_ITEM_FULFILLMENT_IDS
              _NAME_: ON_SELECT_ITEM_FULFILLMENT_IDS
              attr:  $.message.order.items[*].fulfillment_ids[*]
              _RETURN_: attr are present  


        - &REQUIRED_CATEGORY_ID
          _NAME_: REQUIRED_CATEGORY_ID
          usecasepath: $.message.order.items[*].descriptor.code
          enumList:
            - *AGENT_TICKETING
            - *PURCHASE
            - *RECHARGE
          _CONTINUE_: '!(usecasepath all in enumList)'
          attr: $.message.order.items[*].category_ids[*]
          _RETURN_: attr are present  

    - &COMMON_FULFILLMENT_ITEMS
      _NAME_: REQUIRED_FULFILLMENT_ITEMS
      _RETURN_: 
        - _NAME_: REQUIRED_FULFILLMENT_ITEMS
          _RETURN_: 
            - _NAME_: REQUIRED_FULFILLMENT_ID
              attr: $.message.order.fulfillments[*].id
              _RETURN_: attr are present

            - _NAME_: REQUIRED_AUTH_TYPE
              attr: $.message.order.fulfillments[*].stops[*].authorization.type
              usecasepath1: $.message.order.fulfillments[*].type
              usecasepath2: $.message.order.fulfillments[*].vehicle.category
              enumList:
                - *TICKET
              enumList1:
                - *BUS  
              _CONTINUE_: '!(usecasepath1 all in enumList && usecasepath2 all in enumList1)'
              _RETURN_: attr are present


            - _NAME_: REQUIRED_FULFILLMENT_STOPS
              usecasepath1: $.message.order.fulfillments[*].type
              usecasepath_purchase: $.message.order.items[*].descriptor.code
              enumList:
                - *TRIP
                - *PASS
              enumListPurchase:
                - *PURCHASE  
              _CONTINUE_: '!(usecasepath1 all in enumList && !(usecasepath_purchase all in enumListPurchase))'
              _RETURN_:
                - _NAME_: REQUIRED_STOPS_TYPE
                  attr: $.message.order.fulfillments[*].stops[*].type
                  _RETURN_: attr are present
                # - _NAME_: REQUIRED_LOCATION_CODE
                #   attr: $.message.order.fulfillments[*].stops[*].location.descriptor.code
                #   _RETURN_: attr are present
                - _NAME_: REQUIRED_LOCATION_GPS
                  attr: $.message.order.fulfillments[*].stops[*].location.gps
                  _RETURN_: attr are present
                - _NAME_: REQUIRED_STOPS_ID
                  attr: $.message.order.fulfillments[*].stops[*].location.gps
                  _RETURN_: attr are present 
                - _NAME_: REQUIRED_VEHICLE_CATEGORY
                  attr: $.message.order.fulfillments[*].vehicle.category
                  _RETURN_: attr are present  

                - _NAME_: VALID_STOPS_TYPE
                  attr: $.message.order.fulfillments[*].stops[*].type
                  enumList2: *stopsType
                  _CONTINUE_: '!(attr are present)'
                  _RETURN_: attr all in enumList2


            - _NAME_: REQUIRED_CUSTOMER_DETAILS
              usecasepath4: $.message.order.fulfillments[*].type
              enumList4:
                - *PASS
                - *ONLINE
              usecasepath_purchase: $.message.order.items[*].descriptor.code  
              enumListPurchase:
                - *PURCHASE   
              _CONTINUE_: '!(usecasepath4 all in enumList4 && !(usecasepath_purchase all in enumListPurchase))'
              _RETURN_:
                - _NAME_: REQUIRED_CREDS_TYPE
                  attr: $.message.order.fulfillments[*].customer.person.creds[*].type
                  _RETURN_: attr are present

                - _NAME_: REQUIRED_CREDS_ID
                  attr: $.message.order.fulfillments[*].customer.person.creds[*].id
                  _RETURN_: attr are present  
                
                            

            - _NAME_: REQUIRED_FULFILLMENT_TYPE
              attr: $.message.order.fulfillments[*].type
              _RETURN_: attr are present

        - _NAME_: FULFILLMENT_TAGS
          usecasepath1: $.message.order.fulfillments[*].type
          enumList:
            - *PASS
            - *TRIP
            - *ROUTE
          usecasepath_purchase: $.message.order.items[*].descriptor.code
          vehicleCategory: 
            - *METRO
          enumListPurchase:
            - *PURCHASE  
          _CONTINUE_: '!(usecasepath1 all in enumList && !(usecasepath_purchase all in enumListPurchase))' 
          _RETURN_:
            - _NAME_: REQUIRED_FULFILLMENT_TAGS
              validTags: *fulfillmentTags
              tagPath: $.message.order.fulfillments[*].tags[*].descriptor.code
              _CONTINUE_: '!(tagPath are present)'
              _RETURN_: tagPath all in validTags

            - _NAME_: REQUIRED_ROUTE_INFO
              _SCOPE_: $.message.order.fulfillments[*].tags[?(@.descriptor.code == 'ROUTE_INFO')]
              subTags: $.list[*].descriptor.code
              validValues: *routeTags
              _RETURN_: subTags all in validValues      

        - _NAME_: FULFILLMENT_TAGS_TICKET
          usecasepath1: $.message.order.fulfillments[*].type
          enumList:
            - *TICKET
          _CONTINUE_: '!(usecasepath1 all in enumList)'
          _RETURN_:
            - _NAME_: REQUIRED_FULFILLMENT_TAGS
              validTags: *fulfillmentTags
              tagPath: $.message.order.fulfillments[*].tags[*].descriptor.code
              _CONTINUE_: '!(tagPath are present)'
              _RETURN_: tagPath all in validTags

            - _NAME_: REQUIRED_INFO
              _SCOPE_: $.message.order.fulfillments[*].tags[?(@.descriptor.code == 'INFO')]
              subTags: $.list[*].descriptor.code
              validValues: *info
              _RETURN_: subTags all in validValues      


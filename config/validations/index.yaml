      attr: $.message.intent.category.id
      _RETURN_: attr are present && attr all in enumList
      enumList:
      - Express Delivery
      - Standard Delivery
      - Immediate Delivery
      - Next Day Delivery
      - Same Day Delivery
      - Instant Delivery
    - _NAME_: REQUIRED_MESSAGE_DAYS
      attr: $.message.intent.provider.time.days
      _RETURN_: attr are present
    - _NAME_: REQUIRED_MESSAGE_HOLIDAYS
      attr: $.message.intent.provider.time.schedule.holidays[*]
      reg: [ '^\\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12]\\d|3[01])$' ]
      _CONTINUE_: "!(attr are present)"
      _RETURN_: attr follow regex reg
    - _NAME_: REQUIRED_MESSAGE_DURATION
      attr: $.message.intent.provider.time.duration
      reg: [ '^(P\\d+D|PT\\d+H|PT\\d+M)$' ]
      _RETURN_: attr follow regex reg
      _CONTINUE_: "!(attr are present)"
    - _NAME_: REQUIRED_MESSAGE_START
      attr: $.message.intent.provider.time.range.start
      _RETURN_: attr are present
    - _NAME_: REQUIRED_MESSAGE_END
      attr: $.message.intent.provider.time.range.end
      _RETURN_: attr are present
    - _NAME_: REQUIRED_MESSAGE_TYPE
      attr: $.message.intent.fulfillment.type
      _RETURN_: attr are present && attr all in enumList
      enumList:
      - Delivery
      - Return
      - Batch
      - RTO
      - PTL
      - FTL
      - FIFO
    - _NAME_: REQUIRED_MESSAGE_GPS
      attr: $.message.intent.fulfillment.start.location.gps
      reg: [ '^-?\\d+\\.\\d{4,},-?\\d+\\.\\d{4,}$' ]
      _RETURN_: attr follow regex reg
    - _NAME_: REQUIRED_MESSAGE_AREA_CODE
      attr: $.message.intent.fulfillment.start.location.address.area_code
      _RETURN_: attr are present

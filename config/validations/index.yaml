            - _NAME_: REGEX_CONTEXT_BAP_URI
              attr: $.context.bap_uri
              reg:
                - ^https?:\/\/[a-zA-Z0-9.-]+(\/[a-zA-Z0-9\-._~:\/?#\[\]@!$&'()*+,;=%]*)?\/?$
              _CONTINUE_: '!(attr are present)'

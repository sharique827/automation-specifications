_TESTS_:
  search:
    - _NAME_: Context_tests
      _RETURN_:
        - _NAME_: Context_Attributes_Tests
          _RETURN_:
            - &a1
              attr: $.context.timestamp
              _RETURN_: attr are present
              _NAME_: REQUIRED_context_timestamp
            - &a2
              attr: $.context.bap_id
              _RETURN_: attr are present
              _NAME_: REQUIRED_context_bap_id
            - &a3
              attr: $.context.transaction_id
              _RETURN_: attr are present
              _NAME_: REQUIRED_context_transaction_id
            - &a4
              attr: $.context.message_id
              _RETURN_: attr are present
              _NAME_: REQUIRED_context_message_id
            - &a5
              attr: $.context.version
              _RETURN_: attr are present
              _NAME_: REQUIRED_context_version
            - &a6
              attr: $.context.bap_uri
              _RETURN_: attr are present
              _NAME_: REQUIRED_context_bap_uri
            - &a8
              _NAME_: VALIDATE_CITY_CODE_FORMAT
              _SCOPE_: $.context.location.city
              subTags: $.code
              match1:
                - ^std:0\d+$
              _RETURN_: subTags follow regex match1
            - &a7
              attr: $.context.ttl
              reg:
                - ^P(?=\\d|T)(\\d+Y)?(\\d+M)?(\\d+W)?(\\d+D)?(T(?=\\d)(\\d+H)?(\\d+M)?(\\d+S)?)?$
              optional_vars:
                - on_search
                - on_select
                - on_confirm
                - on_init
                - on_cancel
                - on_track
                - on_update
                - on_status
              _RETURN_: attr are present
              _NAME_: REQUIRED_context_ttl
        - _NAME_: Context_Enums_Tests
          _RETURN_:
            - &a9
              attr: $.context.location.country.code
              _RETURN_: attr all in enumList
              enumList:
                - IND
              _NAME_: VALID_ENUM_context_location_country_code
            - &a10
              attr: $.context.domain
              _RETURN_: attr all in enumList
              enumList:
                - ONDC:TRV10
              _NAME_: VALID_ENUM_context_domain
            - attr: $.context.action
              _RETURN_: attr all in enumList
              enumList:
                - search
              _NAME_: VALID_ENUM_context_action
    - _NAME_: fulfillment_Tests
      _RETURN_:
        - _NAME_: fulfillment_Attributes_Tests
          _RETURN_:
            - _NAME_: VALIDATE_GPS_FORMAT
              _SCOPE_: $.message.intent.fulfillment.stops[*].location
              subTags: $.gps
              match1:
                - ^-?\d{1,3}\.\d{6,},\s*-?\d{1,3}\.\d{6,}$
              _RETURN_: subTags follow regex match1
        - _NAME_: fulfillment_Enums_Tests
          _RETURN_:
            - attr: $.message.intent.fulfillment.stops[*].type
              _RETURN_: attr all in enumList
              enumList:
                - START
                - END
                - INTERMEDIATE_STOP
              _NAME_: VALID_ENUM_message_intent_fulfillment_stops_type
            - enumList:
                - AUTO_RICKSHAW
                - CAB
                - TWO_WHEELER
              enumPath: $.message.intent.fulfillment.vehicle.category
              _CONTINUE_: "!(enumPath are present)"
              _RETURN_: enumPath all in enumList
              _NAME_: VALID_ENUM_message_intent_fulfillment_vehicle_category
            - enumList:
                - SEDAN
                - SUV
                - HATCHBACK
                - TWO_WHEELER
                - AUTO_RICKSHAW
              enumPath: $.message.intent.fulfillment.vehicle.variant
              _CONTINUE_: "!(enumPath are present)"
              _RETURN_: enumPath all in enumList
              _NAME_: VALID_ENUM_message_intent_fulfillment_vehicle_variant
            - enumList:

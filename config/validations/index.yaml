          _RETURN_: tagPath any in validTags
        - _NAME_: REQUIRED_CONSENT_HANDLER
          _SCOPE_: $.message.order.items[*].tags[?(@.descriptor.code=='CONSENT_INFO')]
          subTags: $.list[*].descriptor.code

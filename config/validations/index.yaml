      enumPath: $.message.intent.fulfillment.stops[*].authorization.type
      _CONTINUE_: "!(enumPath are present)"
      _RETURN_: enumPath all in enumList
    - _NAME_: VALID_ENUM_MESSAGE_STATUS_4
      enumList:

        - _NAME_: REQUIRED_BPP_TERMS_TAG
          validTags: *a9
          tagPath: $.message.order.payments[*].tags[*].descriptor.code
          _RETURN_: tagPath any in validTags
        - _NAME_: REQUIRED_BPP_TERMS_LIST

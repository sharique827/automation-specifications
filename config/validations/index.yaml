          usecaespath2: $.message.catalog.providers[*].fulfillments[*].vehicle.category
          vehicleCategory: 
            - *BUS
          usecaespath3: $.context.location.city.code
          _CONTINUE_: '!(usecasepath1 all in enumList && usecaespath2 all in vehicleCategory)' 
          _RETURN_:
            - _NAME_: REQUIRED_FULFILLMENT_TAGS

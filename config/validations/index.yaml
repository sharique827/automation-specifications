      _RETURN_: pickupTimestamp are present
    - _NAME_: order_delivered_timestamp
      _DESCRIPTION_: >-
        Order pickup timestamp in fulfillments/start/time/timestamp and delivery timestamp in fulfillments/end/time/timestamp should be present when order is delivered
      pickupTimestamp: $.message.order.fulfillments[?(@.type=='Delivery')].start.time.timestamp
      deliveryTimestamp: $.message.order.fulfillments[?(@.type=='Delivery')].end.time.timestamp
      fulfillmentState: >-
        $.message.order.fulfillments[?(@.type=='Delivery')].state.descriptor.code
      state:
      - Order-delivered
      _CONTINUE_: "!(fulfillmentState all in state)"
      _RETURN_: pickupTimestamp are present && deliveryTimestamp are present
    - _NAME_: rto_initiated_timestamp
      _DESCRIPTION_: >-
        RTO-Initiated timestamp in fulfillments/start/time/timestamp (RTO fulfillment) should be present when RTO is initiated
      rtoInitiatedTimestamp: $.message.order.fulfillments[?(@.type=='RTO')].start.time.timestamp
      fulfillmentState: $.message.order.fulfillments[?(@.type=='RTO')].state.descriptor.code
      state:
      - RTO-Initiated
      _CONTINUE_: "!(fulfillmentState all in state)"
      _RETURN_: rtoInitiatedTimestamp are present
    - _NAME_: rto_delivery_timestamp
      _DESCRIPTION_: >-
        RTO-Initiated timestamp in fulfillments/start/time/timestamp and RTO delivery timestamp in fulfillments/end/time/timestamp (RTO fulfillment) should be present when RTO fulfillment reaches its terminal state
      rtoInitiatedTimestamp: $.message.order.fulfillments[?(@.type=='RTO')].start.time.timestamp
      rtoDeliveredTimestamp: $.message.order.fulfillments[?(@.type=='RTO')].end.time.timestamp
      fulfillmentState: $.message.order.fulfillments[?(@.type=='RTO')].state.descriptor.code
      state:
      - RTO-Delivered
      - RTO-Disposed
      _CONTINUE_: "!(fulfillmentState all in state)"
      _RETURN_: rtoInitiatedTimestamp are present && rtoDeliveredTimestamp are present
    - _NAME_: start_address_validations
      _DESCRIPTION_: Valid address should be sent in fulfillments/start/location
      startLocation: >-
        $.message.order.fulfillments[?(@.type=='Delivery' || @.type=='Return' || @.type=='FTL' || @.type=='PTL' || @.type=='FIFO')].start.location.address.city
      _RETURN_: startLocation are present
    - _NAME_: end_address_validations
      _DESCRIPTION_: Valid address should be sent in fulfillments/end/location
      endLocation: >-
        $.message.order.fulfillments[?(@.type=='Delivery' || @.type=='Return' || @.type=='FTL' || @.type=='PTL' || @.type=='FIFO')].end.location.address.city
      fulfillmentType: $.message.order.fulfillments[*].type
      fulfillmentState: $.message.order.fulfillments[*].state.descriptor.code
      fulType: [ "Batch" ]
      fulState: [ "Agent-assigned" ]
      _CONTINUE_: "(fulfillmentType any in fulType) && (fulfillmentState all in fulState)"
      _RETURN_: endLocation are present

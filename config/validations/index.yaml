        - TRANSIT_STOP
      enumPath: $.message.intent.fulfillment.stops[*].type
      _CONTINUE_: "!(enumPath are present)"
      _RETURN_: enumPath all in enumList
    - _NAME_: VALID_ENUM_MESSAGE_TYPE_3
      enumList:
        - QR
